    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // ── Glidarintervall ──
        const BMIN = 0.1, BMAX = 2.0;        // flödestäthet B (T)
        const IMIN = 0.1, IMAX = 5.0;        // ström I (A)
        const LMIN = 5, LMAX = 100;          // ledarens längd l (mm)

        // ── Scen-geometri (viewBox-koordinater) ──
        const VBW = 820, VBH = 540;
        const WX = 410, WY = 272;            // ledarens tvärsnitt (px)
        const PX0 = 106, PX1 = 714;          // fältområdets kanter (px)

        const fmt = (num, decimals = 1) => {
            if (!isFinite(num)) return '–';
            const s = num.toFixed(decimals);
            if (parseFloat(s) === 0) return '0';
            return s.replace('.', ',').replace('-', '−');
        };
        // kraft med lämpligt prefix
        const fmtF = (F) => {
            if (F >= 1) return `${fmt(F, 2)} N`;
            if (F >= 1e-3) { const m = F * 1e3; return `${fmt(m, m < 10 ? 1 : 0)} mN`; }
            const u = F * 1e6; return `${fmt(u, u < 10 ? 1 : 0)} µN`;
        };

        const COL = {
            ink:   '#1f2530',
            falt:  '#c0392b',    // fältlinjer (röda, som teorifigurerna)
            kraft: '#2563c9',    // kraften F (blå, som teorifigurerna)
            npol:  '#c0392b',    // nordpolen (röd)
            spol:  '#ffffff',    // sydpolen (vit)
            koppar:'#b5743a',    // ledaren (koppar)
        };

        // ── THREE-hjälpare (3D-vyn) ─────────────────────────────
        const disposeGroup = (g) => {
            g.traverse((o) => {
                if (o.geometry) o.geometry.dispose();
                if (o.material) (Array.isArray(o.material) ? o.material : [o.material]).forEach((m) => {
                    if (m.map) m.map.dispose();
                    m.dispose();
                });
            });
            g.clear();
        };

        // Textetikett som sprite (kursiva variabler via canvas-font)
        const textSprite = (parts, h = 0.42) => {
            const c = document.createElement('canvas');
            const ctx = c.getContext('2d');
            const FS = 64, PAD = 14;
            const fontFor = (p) => `${p.italic ? 'italic ' : ''}${p.weight || 600} ${FS}px Poppins, sans-serif`;
            let w = 0;
            parts.forEach((p) => { ctx.font = fontFor(p); w += ctx.measureText(p.t).width; });
            c.width = Math.max(2, Math.ceil(w) + PAD * 2);
            c.height = FS + PAD * 2;
            let x = PAD;
            parts.forEach((p) => {
                ctx.font = fontFor(p);
                ctx.fillStyle = p.color;
                ctx.textBaseline = 'middle';
                ctx.fillText(p.t, x, c.height / 2 + 2);
                x += ctx.measureText(p.t).width;
            });
            const tex = new THREE.CanvasTexture(c);
            tex.minFilter = THREE.LinearFilter;
            const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
            spr.scale.set(h * c.width / c.height, h, 1);
            spr.renderOrder = 10;
            return spr;
        };

        // Kon (pilspets) orienterad längs en riktningsvektor
        const cone = (dir, pos, len, rad, color, opacity = 1) => {
            const m = new THREE.Mesh(
                new THREE.ConeGeometry(rad, len, 14),
                new THREE.MeshStandardMaterial({ color, transparent: opacity < 1, opacity, roughness: 0.6 })
            );
            m.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
            m.position.copy(pos);
            return m;
        };

        // Poltextur: bokstaven N/S på polens framsida/baksida (N röd, S vit)
        const poleTexture = (letter) => {
            const isN = letter === 'N';
            const c = document.createElement('canvas');
            c.width = 64; c.height = 560;
            const ctx = c.getContext('2d');
            ctx.fillStyle = isN ? COL.npol : COL.spol;
            ctx.fillRect(0, 0, c.width, c.height);
            ctx.fillStyle = isN ? '#ffffff' : COL.npol;
            ctx.font = '600 44px Poppins, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(letter, c.width / 2, c.height / 2);
            const tex = new THREE.CanvasTexture(c);
            tex.minFilter = THREE.LinearFilter;
            return tex;
        };

        const Slider = ({ label, sub, value, min, max, step, onChange, valueText }) => (
            <div className="mb-3">
                <div className="flex justify-between items-baseline mb-1">
                    <label className="text-sm font-bold" style={{ color: 'var(--lab-ink)' }}
                           dangerouslySetInnerHTML={{ __html: label }} />
                    <div className="font-mono font-semibold text-sm" style={{ color: 'var(--lab-accent)' }}>{valueText}</div>
                </div>
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))}
                       className="w-full cursor-pointer" />
                {sub && <div className="text-xs mt-1" style={{ color: 'var(--lab-ink-muted)' }}
                             dangerouslySetInnerHTML={{ __html: sub }} />}
            </div>
        );

        const FsSlider = ({ label, value, min, max, step, onChange, valueText }) => (
            <div className="fs-row">
                <span className="fs-label" style={{ minWidth: 150 }} dangerouslySetInnerHTML={{ __html: label }} />
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))} />
                <span className="fs-value" style={{ minWidth: 90, textAlign: 'right' }}>{valueText}</span>
            </div>
        );

        // Formelkort-hjälpare (samma mönster som fysik2-svangningstid-app)
        const Vbl = ({ label, children }) => (
            <div className="flex flex-col items-center" style={{ lineHeight: 1.1 }}>
                <span className="flbl">{label}</span>
                <span className="fnum">{children}</span>
                <span className="flbl" aria-hidden="true" style={{ visibility: 'hidden' }}>{label}</span>
            </div>
        );

        const FormulaCard = () => (
            <div className="glass-card rounded-xl p-4 mb-6 flex flex-wrap items-center gap-x-6 gap-y-3" style={{ color: 'var(--lab-ink)' }}>
                <div className="flex items-center gap-x-3">
                    <Vbl label="Kraft på ledaren"><em>F</em></Vbl>
                    <span className="fnum">=</span>
                    <Vbl label="Flödestäthet"><em>B</em></Vbl>
                    <span className="fnum">·</span>
                    <Vbl label="Ström"><em>I</em></Vbl>
                    <span className="fnum">·</span>
                    <Vbl label="Ledarens längd"><em>l</em></Vbl>
                </div>
                <div className="flex items-center gap-x-2" style={{ color: 'var(--lab-ink-muted)', fontSize: 13 }}>
                    <span><em>B</em> vinkelrätt mot ledaren</span>
                </div>
            </div>
        );

        // ── Huvudapp ─────────────────────────────────────────────
        const App = () => {
            const q = new URLSearchParams(location.search);
            const [B, setB] = useState(isFinite(parseFloat(q.get('b'))) ? parseFloat(q.get('b')) : 1.4);
            const [I, setI] = useState(isFinite(parseFloat(q.get('i'))) ? parseFloat(q.get('i')) : 2.2);
            const [lmm, setLmm] = useState(isFinite(parseFloat(q.get('l'))) ? parseFloat(q.get('l')) : 25);
            const [ut, setUt] = useState(q.get('strom') !== 'in');     // ström ut ur planet
            const [hoger, setHoger] = useState(q.get('falt') !== 'v'); // fält åt höger
            const [show, setShow] = useState({ res: q.get('res') === '1', kraft: true });
            const [view, setView] = useState(q.get('vy') === '3d' ? '3d' : '2d');
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [controlsOpen, setControlsOpen] = useState(true);
            const [fontsReady, setFontsReady] = useState(0);

            const sceneWrapRef = useRef(null);
            const threeRef = useRef(null);
            const pRef = useRef({});

            // rita om text-sprites när Poppins laddats (annars fallback-typsnitt)
            useEffect(() => {
                if (document.fonts && document.fonts.ready)
                    document.fonts.ready.then(() => setFontsReady(1));
            }, []);

            // ── Härledda storheter (exakt enligt genomgången) ──
            const l = lmm / 1000;                // ledarens längd (m)
            const F = B * I * l;                 // kraft på ledaren (N)
            const dirB = hoger ? 1 : -1;
            const sOut = ut ? 1 : -1;
            // I ut ur planet + B åt höger ⟹ kraften uppåt (högerhandsregeln)
            const fUp = sOut * dirB > 0;

            pRef.current = { I, sOut };

            // ── THREE-scenen (3D-vyn): initieras när vyn växlas till 3D ──
            useEffect(() => {
                const wrap = sceneWrapRef.current;
                if (view !== '3d' || !wrap || !window.THREE) return;

                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.setSize(wrap.clientWidth, wrap.clientHeight);
                wrap.insertBefore(renderer.domElement, wrap.firstChild);

                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0xf3eee4);   // Laborans-papper

                const camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.1, 100);

                scene.add(new THREE.AmbientLight(0xffffff, 0.75));
                const key = new THREE.DirectionalLight(0xffffff, 0.85);
                key.position.set(4, 6, 5);
                scene.add(key);
                const fill = new THREE.DirectionalLight(0xffe9d0, 0.25);
                fill.position.set(-5, -2, -4);
                scene.add(fill);

                const groups = {
                    poler: new THREE.Group(), falt: new THREE.Group(),
                    ledare: new THREE.Group(), kraft: new THREE.Group(), matt: new THREE.Group(),
                };
                Object.values(groups).forEach((g) => scene.add(g));

                const T = {
                    renderer, scene, camera, groups,
                    dots: [], wireLen: 1,
                    az: 0.55, pol: 1.18, radius: 9.5,
                };
                threeRef.current = T;

                const updateCam = () => {
                    camera.position.set(
                        T.radius * Math.sin(T.pol) * Math.sin(T.az),
                        T.radius * Math.cos(T.pol),
                        T.radius * Math.sin(T.pol) * Math.cos(T.az)
                    );
                    camera.lookAt(0, 0, 0);
                };
                updateCam();

                // ── Rotera med musen / fingret, zooma med scrollhjulet ──
                const el = renderer.domElement;
                let dragging = false, px = 0, py = 0;
                const onDown = (e) => { dragging = true; px = e.clientX; py = e.clientY; el.setPointerCapture(e.pointerId); };
                const onMove = (e) => {
                    if (!dragging) return;
                    T.az -= (e.clientX - px) * 0.006;
                    T.pol = Math.max(0.15, Math.min(Math.PI - 0.15, T.pol - (e.clientY - py) * 0.006));
                    px = e.clientX; py = e.clientY;
                    updateCam();
                };
                const onUp = (e) => { dragging = false; try { el.releasePointerCapture(e.pointerId); } catch (err) {} };
                const onWheel = (e) => {
                    e.preventDefault();
                    T.radius = Math.max(4, Math.min(16, T.radius * (1 + e.deltaY * 0.001)));
                    updateCam();
                };
                el.addEventListener('pointerdown', onDown);
                el.addEventListener('pointermove', onMove);
                el.addEventListener('pointerup', onUp);
                el.addEventListener('pointercancel', onUp);
                el.addEventListener('wheel', onWheel, { passive: false });

                // ── Storleksändring (inkl. fullskärm) ──
                const ro = new ResizeObserver(() => {
                    const w = wrap.clientWidth, h = wrap.clientHeight;
                    if (!w || !h) return;
                    renderer.setSize(w, h);
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                });
                ro.observe(wrap);

                // ── Animationsloop: laddningarna vandrar längs ledaren ──
                let raf, last = performance.now();
                const loop = (now) => {
                    raf = requestAnimationFrame(loop);
                    const dt = Math.min((now - last) / 1000, 0.05);
                    last = now;
                    const p = pRef.current;
                    if (T.dots.length) {
                        const speed = (0.9 + 0.5 * p.I) / T.wireLen;   // konstant fart längs ledaren
                        T.dots.forEach((d) => {
                            d.u = (d.u + p.sOut * speed * dt + 1) % 1;
                            d.mesh.position.z = (d.u - 0.5) * T.wireLen;
                        });
                    }
                    renderer.render(scene, camera);
                };
                raf = requestAnimationFrame(loop);

                return () => {
                    cancelAnimationFrame(raf);
                    ro.disconnect();
                    el.removeEventListener('pointerdown', onDown);
                    el.removeEventListener('pointermove', onMove);
                    el.removeEventListener('pointerup', onUp);
                    el.removeEventListener('pointercancel', onUp);
                    el.removeEventListener('wheel', onWheel);
                    Object.values(groups).forEach(disposeGroup);
                    renderer.dispose();
                    if (el.parentNode) el.parentNode.removeChild(el);
                    threeRef.current = null;
                };
            }, [view]);

            // ── Bygg om 3D-scenen när parametrarna ändras ──
            useEffect(() => {
                const T = threeRef.current;
                if (!T) return;
                const { poler, falt, ledare, kraft, matt } = T.groups;
                Object.values(T.groups).forEach(disposeGroup);
                T.dots = [];

                const GAP = 3.2;                                      // polernas innerytor vid x = ±GAP
                const D = 1.2 + 2.4 * (lmm - LMIN) / (LMAX - LMIN);   // fältområdets djup ∝ l
                const Lw = D + 2.8;                                   // ledarens längd i scenen
                T.wireLen = Lw;

                // ── Polerna N och S (bokstaven på fram- och baksidan) ──
                const leftIsN = dirB > 0;
                [-1, 1].forEach((s) => {
                    const letter = (s < 0) === leftIsN ? 'N' : 'S';
                    const plain = new THREE.MeshStandardMaterial({ color: letter === 'N' ? COL.npol : COL.spol, roughness: 0.7 });
                    const faced = new THREE.MeshStandardMaterial({ map: poleTexture(letter), roughness: 0.7 });
                    const box = new THREE.Mesh(
                        new THREE.BoxGeometry(0.5, 4.4, D),
                        [plain, plain, plain, plain, faced, faced]
                    );
                    box.position.set(s * (GAP + 0.25), 0, 0);
                    poler.add(box);
                });

                // ── Fältlinjer: raka eller resulterande (superposition med ledarens fält) ──
                const ys = [-1.75, -1.05, -0.35, 0.35, 1.05, 1.75];
                const zs = [-(D / 2 - 0.25), 0, D / 2 - 0.25];
                const faltMat = new THREE.MeshStandardMaterial({ color: COL.falt, roughness: 0.7 });
                if (!show.res) {
                    ys.forEach((y) => zs.forEach((z) => {
                        const cyl = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 2 * GAP, 8), faltMat);
                        cyl.rotation.z = Math.PI / 2;
                        cyl.position.set(0, y, z);
                        falt.add(cyl);
                        [-1.7, 1.5].forEach((ax) => {
                            falt.add(cone(new THREE.Vector3(dirB, 0, 0),
                                new THREE.Vector3(dirB > 0 ? ax : -ax, y, z), 0.2, 0.06, COL.falt));
                        });
                    }));
                } else {
                    // samma strömlinjer som i 2D-vyn — fältet är oberoende av z,
                    // så en integrerad kurva per starthöjd ritas i flera z-plan
                    const bend = Math.min(2, 1.6 * (I / IMAX) / Math.max(B, 0.12));
                    const S = 1.05 * bend;
                    ys.forEach((y0) => {
                        const pts2 = [];
                        let x = dirB > 0 ? -GAP : GAP, y = y0;
                        for (let k = 0; k < 400; k++) {
                            pts2.push([x, y]);
                            const r2 = x * x + y * y + 0.09;
                            const bx = dirB - sOut * S * y / r2;
                            const by = sOut * S * x / r2;
                            const m = Math.hypot(bx, by) || 1;
                            x += 0.065 * bx / m; y += 0.065 * by / m;
                            if (Math.abs(x) > GAP + 0.05 || Math.abs(y) > 2.1) { pts2.push([x, y]); break; }
                        }
                        zs.forEach((z) => {
                            const v3 = pts2.map((p) => new THREE.Vector3(p[0], p[1], z));
                            const curve = new THREE.CatmullRomCurve3(v3);
                            const tube = new THREE.Mesh(
                                new THREE.TubeGeometry(curve, Math.min(300, v3.length * 2), 0.016, 6), faltMat);
                            falt.add(tube);
                            [0.3, 0.72].forEach((frac) => {
                                const i = Math.max(1, Math.floor(pts2.length * frac));
                                if (i >= pts2.length) return;
                                const [x1, y1] = pts2[i - 1], [x2, y2] = pts2[i];
                                falt.add(cone(new THREE.Vector3(x2 - x1, y2 - y1, 0),
                                    new THREE.Vector3(x2, y2, z), 0.2, 0.06, COL.falt));
                            });
                        });
                    });
                }
                const bSpr = textSprite([{ t: 'B', italic: true, color: COL.falt }], 0.46);
                bSpr.position.set(-dirB * 1.0, 2.35, D / 2 + 0.35);
                falt.add(bSpr);

                // ── Ledaren (koppar) med strömriktningspilar och vandrande laddningar ──
                const wireMesh = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.09, 0.09, Lw, 16),
                    new THREE.MeshStandardMaterial({ color: COL.koppar, metalness: 0.35, roughness: 0.45 })
                );
                wireMesh.rotation.x = Math.PI / 2;
                ledare.add(wireMesh);
                for (let k = 0; k < 4; k++) {
                    const z = -Lw / 2 + (k + 0.5) * Lw / 4;
                    ledare.add(cone(new THREE.Vector3(0, 0, sOut), new THREE.Vector3(0, 0, z), 0.26, 0.13, COL.ink));
                }
                const dotGeo = new THREE.SphereGeometry(0.105, 12, 12);
                const dotMat = new THREE.MeshBasicMaterial({ color: COL.ink });
                for (let k = 0; k < 8; k++) {
                    const mesh = new THREE.Mesh(dotGeo, dotMat);
                    const u = k / 8;
                    mesh.position.set(0, 0, (u - 0.5) * Lw);
                    ledare.add(mesh);
                    T.dots.push({ u, mesh });
                }
                const iSpr = textSprite([
                    { t: 'I', italic: true, color: COL.ink },
                    { t: ` = ${fmt(I, 1)} A`, color: COL.ink },
                ], 0.38);
                iSpr.position.set(0.15, -0.5, Lw / 2 + 0.5);
                ledare.add(iSpr);

                // ── Kraften F (skalenlig: samma längdmappning som 2D-vyn) ──
                const Lf = 2.5 * F / (F + 0.35) + 0.18;
                const head = Math.max(0.16, Math.min(0.3, Lf * 0.5));
                const dirY = fUp ? 1 : -1;
                const y0 = dirY * 0.14;
                const shaftLen = Math.max(0.02, Lf - head);
                const shaft = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.045, 0.045, shaftLen, 10),
                    new THREE.MeshStandardMaterial({ color: COL.kraft, roughness: 0.5 })
                );
                shaft.position.set(0, y0 + dirY * shaftLen / 2, 0);
                kraft.add(shaft);
                kraft.add(cone(new THREE.Vector3(0, dirY, 0),
                    new THREE.Vector3(0, y0 + dirY * (shaftLen + head / 2), 0), head, 0.11, COL.kraft));
                const fSpr = textSprite([{ t: 'F', italic: true, color: COL.kraft }], 0.44);
                fSpr.position.set(0.35, y0 + dirY * (Lf + 0.18), 0);
                kraft.add(fSpr);

                // ── Måttlinje för l (dubbelpil i fri yta under ledaren) ──
                const my = -2.6;
                const dashMat = new THREE.LineDashedMaterial({ color: COL.ink, dashSize: 0.1, gapSize: 0.07, transparent: true, opacity: 0.8 });
                [-1, 1].forEach((s) => {
                    const ln = new THREE.Line(new THREE.BufferGeometry().setFromPoints([
                        new THREE.Vector3(0, -0.16, s * D / 2), new THREE.Vector3(0, my - 0.06, s * D / 2)]), dashMat);
                    ln.computeLineDistances();
                    matt.add(ln);
                });
                matt.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, my, -D / 2 + 0.12), new THREE.Vector3(0, my, D / 2 - 0.12)]),
                    new THREE.LineBasicMaterial({ color: COL.ink })));
                matt.add(cone(new THREE.Vector3(0, 0, -1), new THREE.Vector3(0, my, -D / 2 + 0.07), 0.14, 0.045, COL.ink));
                matt.add(cone(new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, my, D / 2 - 0.07), 0.14, 0.045, COL.ink));
                const lSpr = textSprite([
                    { t: 'l', italic: true, color: COL.ink },
                    { t: ` = ${fmt(lmm, 0)} mm`, color: COL.ink },
                ], 0.34);
                lSpr.position.set(0, my - 0.32, 0);
                matt.add(lSpr);
            }, [view, B, I, lmm, ut, hoger, show.res, fontsReady]);

            // ── Visa/dölj kraften i 3D-vyn ──
            useEffect(() => {
                const T = threeRef.current;
                if (T) T.groups.kraft.visible = show.kraft;
            }, [show.kraft, view]);

            // ── Fullskärm ──
            useEffect(() => {
                const handler = () => setIsFullscreen(
                    document.fullscreenElement === sceneWrapRef.current ||
                    document.webkitFullscreenElement === sceneWrapRef.current
                );
                document.addEventListener('fullscreenchange', handler);
                document.addEventListener('webkitfullscreenchange', handler);
                return () => {
                    document.removeEventListener('fullscreenchange', handler);
                    document.removeEventListener('webkitfullscreenchange', handler);
                };
            }, []);
            const toggleFullscreen = () => {
                const el = sceneWrapRef.current;
                if (!el) return;
                if (document.fullscreenElement || document.webkitFullscreenElement)
                    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
                else (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
            };

            const tShow = (key) => setShow(sh => ({ ...sh, [key]: !sh[key] }));
            // Exempel 2 i teorigenomgången: 2,2 A, 25 mm, B = 1,4 T ⟹ F ≈ 77 mN (~75 mN)
            const setExample2 = () => { setB(1.4); setI(2.2); setLmm(25); setUt(true); setHoger(true); };

            // ── Fältlinjer: raka eller resulterande (superposition med ledarens fält) ──
            const fieldLines = useMemo(() => {
                const ys = [155, 188, 221, 254, 287, 320, 353, 386];
                const lines = [];
                if (!show.res) {
                    ys.forEach((y) => {
                        const pts = [[dirB > 0 ? PX0 : PX1, y], [dirB > 0 ? PX1 : PX0, y]];
                        lines.push({ pts, straight: true, y });
                    });
                    return lines;
                }
                // styrkan i ledarens eget fält relativt det homogena (schematisk skala)
                const bend = Math.min(2, 1.6 * (I / IMAX) / Math.max(B, 0.12));
                const S = 100 * bend;
                ys.forEach((y0) => {
                    const pts = [];
                    let x = dirB > 0 ? PX0 : PX1, y = y0;
                    for (let k = 0; k < 420; k++) {
                        pts.push([x, y]);
                        const dx = x - WX, dy = y - WY;
                        const r2 = dx * dx + dy * dy + 800;
                        let bx = dirB + sOut * S * dy / r2;
                        let by = -sOut * S * dx / r2;
                        const m = Math.hypot(bx, by) || 1;
                        x += 6 * bx / m; y += 6 * by / m;
                        if (x > PX1 + 4 || x < PX0 - 4 || y < 96 || y > 468) { pts.push([x, y]); break; }
                    }
                    lines.push({ pts, straight: false, y: y0 });
                });
                return lines;
            }, [show.res, dirB, sOut, I, B]);

            // ── Scenen ──
            const scene = () => {
                const els = [];

                // magnetpoler (N och S, som teorifiguren)
                const leftPole = dirB > 0 ? 'N' : 'S';
                const rightPole = dirB > 0 ? 'S' : 'N';
                const poleFill = (p) => p === 'N' ? COL.npol : COL.spol;
                const poleText = (p) => p === 'N' ? '#ffffff' : COL.npol;
                els.push(
                    <g key="poler">
                        <rect x="66" y="120" width="38" height="300" fill={poleFill(leftPole)}
                              stroke="rgba(15,22,32,0.5)" strokeWidth="1.2" />
                        <rect x="716" y="120" width="38" height="300" fill={poleFill(rightPole)}
                              stroke="rgba(15,22,32,0.5)" strokeWidth="1.2" />
                        <text x="85" y="278" textAnchor="middle" fontSize="17" fontWeight="600" fill={poleText(leftPole)}>{leftPole}</text>
                        <text x="735" y="278" textAnchor="middle" fontSize="17" fontWeight="600" fill={poleText(rightPole)}>{rightPole}</text>
                    </g>
                );

                // fältlinjer
                const fEls = [];
                fieldLines.forEach((ln, li) => {
                    if (ln.straight) {
                        fEls.push(<line key={'l' + li} x1={PX0} y1={ln.y} x2={PX1} y2={ln.y}
                                        stroke={COL.falt} strokeWidth="1.6" strokeLinecap="butt" />);
                        [240, 560].forEach((ax, ai) => {
                            fEls.push(<polygon key={`h${li}-${ai}`}
                                               points={dirB > 0
                                                   ? `${ax + 9},${ln.y} ${ax},${ln.y - 4.5} ${ax},${ln.y + 4.5}`
                                                   : `${ax - 9},${ln.y} ${ax},${ln.y - 4.5} ${ax},${ln.y + 4.5}`}
                                               fill={COL.falt} />);
                        });
                    } else {
                        fEls.push(<polyline key={'l' + li}
                                            points={ln.pts.map(p => `${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ')}
                                            fill="none" stroke={COL.falt} strokeWidth="1.6" />);
                        [0.3, 0.72].forEach((frac, ai) => {
                            const i = Math.max(1, Math.floor(ln.pts.length * frac));
                            if (i >= ln.pts.length) return;
                            const [x1p, y1p] = ln.pts[i - 1], [x2p, y2p] = ln.pts[i];
                            const dxv = x2p - x1p, dyv = y2p - y1p;
                            const m = Math.hypot(dxv, dyv) || 1;
                            const ux = dxv / m, uy = dyv / m;
                            const tip = [x2p + ux * 9, y2p + uy * 9];
                            fEls.push(<polygon key={`h${li}-${ai}`}
                                               points={`${tip[0]},${tip[1]} ${x2p - uy * 4.5},${y2p + ux * 4.5} ${x2p + uy * 4.5},${y2p - ux * 4.5}`}
                                               fill={COL.falt} />);
                        });
                    }
                });
                els.push(<g key="falt">{fEls}</g>);
                els.push(<text key="blbl" x={140} y={138} textAnchor="middle" fontSize="16" fill={COL.falt}>
                    <tspan fontStyle="italic">B</tspan>
                </text>);

                // kraften F (från ledarens kant, längd växer med F)
                if (show.kraft) {
                    const Lf = 240 * F / (F + 0.35) + 16;
                    const head = Math.max(10, Math.min(16, Lf * 0.5));
                    const y0 = fUp ? WY - 15 : WY + 15;
                    const tip = fUp ? y0 - Lf : y0 + Lf;
                    const base = fUp ? tip + head : tip - head;
                    els.push(
                        <g key="kraft">
                            <line x1={WX} y1={y0} x2={WX} y2={base} stroke={COL.kraft} strokeWidth="3" strokeLinecap="butt" />
                            <polygon points={`${WX},${tip} ${WX - 6},${base} ${WX + 6},${base}`} fill={COL.kraft} />
                            <text x={WX + 15} y={tip + (fUp ? 6 : 2)} textAnchor="start" fontSize="16" fill={COL.kraft}>
                                <tspan fontStyle="italic">F</tspan>
                            </text>
                        </g>
                    );
                }

                // ledaren (tvärsnitt med prick eller kryss, som teorifigurerna)
                els.push(
                    <g key="ledare">
                        <circle cx={WX} cy={WY} r="13" fill="#f7f2e8" stroke={COL.ink} strokeWidth="1.8" />
                        {ut
                            ? <circle cx={WX} cy={WY} r="3.4" fill={COL.ink} />
                            : <g>
                                <line x1={WX - 7} y1={WY - 7} x2={WX + 7} y2={WY + 7} stroke={COL.ink} strokeWidth="1.8" />
                                <line x1={WX + 7} y1={WY - 7} x2={WX - 7} y2={WY + 7} stroke={COL.ink} strokeWidth="1.8" />
                              </g>}
                        <text x={WX} y={500} textAnchor="middle" fontSize="12.5" fill="var(--lab-ink-muted, #5a6170)">
                            {ut ? 'strömmen ut ur planet (prick)' : 'strömmen in i planet (kryss)'}
                        </text>
                    </g>
                );

                return (
                    <svg viewBox={`0 0 ${VBW} ${VBH}`} preserveAspectRatio="xMidYMid meet"
                         fontFamily="Poppins, sans-serif">
                        <defs>
                            <linearGradient id="paperG" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0" stopColor="#f7f2e8" />
                                <stop offset="1" stopColor="#ece3d2" />
                            </linearGradient>
                        </defs>
                        <rect x="0" y="0" width={VBW} height={VBH} fill="url(#paperG)" />
                        {els}
                    </svg>
                );
            };

            // ── Kryssrutor och lägesval (uppe till höger på scenen) ──
            const sceneToggles = () => (
                <div className="scene-toggles">
                    <div className="st-title">Vy</div>
                    <label><input type="radio" name="vy" checked={view === '2d'} onChange={() => setView('2d')} />
                        <span>2D — tvärsnitt</span></label>
                    <label><input type="radio" name="vy" checked={view === '3d'} onChange={() => setView('3d')} />
                        <span>3D — hela ledaren</span></label>
                    <div className="st-title st-group">Strömmen <em style={{ textTransform: 'none' }}>I</em></div>
                    <label><input type="radio" name="strom" checked={ut} onChange={() => setUt(true)} />
                        <span>{view === '3d' ? 'Mot dig (ut ur planet)' : 'Ut ur planet (prick)'}</span></label>
                    <label><input type="radio" name="strom" checked={!ut} onChange={() => setUt(false)} />
                        <span>{view === '3d' ? 'Bort från dig (in i planet)' : 'In i planet (kryss)'}</span></label>
                    <div className="st-title st-group">Magnetfältet <em style={{ textTransform: 'none' }}>B</em></div>
                    <label><input type="radio" name="falt" checked={hoger} onChange={() => setHoger(true)} />
                        <span>Åt höger (N till vänster)</span></label>
                    <label><input type="radio" name="falt" checked={!hoger} onChange={() => setHoger(false)} />
                        <span>Åt vänster (N till höger)</span></label>
                    <div className="st-title st-group">Visa</div>
                    <label><input type="checkbox" checked={show.kraft} onChange={() => tShow('kraft')} />
                        <span className="st-swatch" style={{ background: COL.kraft }}></span>
                        <span>Kraften <em>F</em></span></label>
                    <label><input type="checkbox" checked={show.res} onChange={() => tShow('res')} />
                        <span className="st-swatch" style={{ background: COL.falt }}></span>
                        <span>Resulterande fältet</span></label>
                </div>
            );

            const Readout = ({ label, value, unit, color }) => (
                <div className="p-2 rounded-lg" style={{ background: 'var(--lab-bg)', border: '1px solid var(--lab-line-strong)' }}>
                    <div className="text-xs" style={{ color: 'var(--lab-ink-muted)' }} dangerouslySetInnerHTML={{ __html: label }} />
                    <div className="font-mono font-bold text-sm" style={{ color: color || 'var(--lab-ink)' }}>
                        {value} <span className="font-normal text-xs" style={{ color: 'var(--lab-ink-muted)' }}>{unit}</span>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen dark-container px-4 md:px-8 pb-12" style={{ fontFamily: "'DM Sans', sans-serif" }}>
                    <div className="max-w-6xl mx-auto pt-6">
                        <div className="breadcrumb mb-4" style={{ fontSize: 13 }}>
                            <a href="index.html">Hem</a> / <a href="katalog.html#fy2">Fysik nivå 2</a> / Strömförande ledare i magnetfält
                        </div>
                        <h1 className="text-3xl md:text-4xl font-black tracking-tight" style={{ color: 'var(--lab-ink)' }}>Strömförande ledare i magnetfält</h1>
                        <p className="mt-2 mb-5" style={{ color: 'var(--lab-ink-soft)', maxWidth: 820 }}>
                            En ledare med strömmen <em>I</em> ligger vinkelrätt mot magnetfältet mellan en nordpol
                            och en sydpol — du ser ledarens tvärsnitt. Ledaren påverkas av
                            kraften <span style={{ whiteSpace: 'nowrap' }}><em>F</em> = <em>B</em> · <em>I</em> · <em>l</em></span>,
                            vars riktning ges av högerhandsregeln. Byt strömriktning och fältriktning och se kraften
                            vända — och slå på "Resulterande fältet" för att se varför: fältet blir tätare på ena
                            sidan av ledaren och glesare på den andra. Växla till 3D-vyn för att se hela ledaren
                            mellan polerna och rotera scenen fritt.
                        </p>

                        <FormulaCard />

                        <main className="flex flex-col lg:flex-row gap-6">
                            {/* Scen */}
                            <div className="lg:w-3/5 order-1">
                                <div className="scene-wrap" data-theme="ljusPapper" ref={sceneWrapRef}>
                                    {view === '2d' && scene()}
                                    {view === '3d' && (
                                        <div className="scene-hint">Dra för att rotera — scrolla för att zooma</div>
                                    )}

                                    <div className="scene-info">
                                        <span className="si-lbl">Kraft <em style={{ textTransform: 'none' }}>F</em></span>
                                        <span className="si-val">{fmtF(F)}</span>
                                        <span className="si-lbl" style={{ marginTop: 4 }}>Riktning</span>
                                        <span className="si-val" style={{ fontSize: 13 }}>{fUp ? 'uppåt' : 'nedåt'}</span>
                                    </div>

                                    {sceneToggles()}

                                    {/* Fullskärm: glidarna i en hopfällbar panel i underkant */}
                                    {isFullscreen && (
                                        <React.Fragment>
                                            <div className={`fs-controls ${controlsOpen ? '' : 'collapsed'}`}>
                                                <FsSlider label="Flödestäthet (<em>B</em>)" value={B}
                                                          min={BMIN} max={BMAX} step={0.05} onChange={setB}
                                                          valueText={`${fmt(B, 2)} T`} />
                                                <FsSlider label="Ström (<em>I</em>)" value={I}
                                                          min={IMIN} max={IMAX} step={0.1} onChange={setI}
                                                          valueText={`${fmt(I, 1)} A`} />
                                                <FsSlider label="Ledarens längd (<em>l</em>)" value={lmm}
                                                          min={LMIN} max={LMAX} step={5} onChange={setLmm}
                                                          valueText={`${fmt(lmm, 0)} mm`} />
                                            </div>
                                            <button className="fs-toggle-handle" onClick={() => setControlsOpen(o => !o)}
                                                    title={controlsOpen ? 'Dölj reglage' : 'Visa reglage'}
                                                    aria-expanded={controlsOpen}>
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                     strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"
                                                     style={{ transform: controlsOpen ? 'rotate(0deg)' : 'rotate(180deg)' }}>
                                                    <path d="M6 9l6 6 6-6"/>
                                                </svg>
                                                <span>{controlsOpen ? 'Dölj reglage' : 'Reglage'}</span>
                                            </button>
                                        </React.Fragment>
                                    )}

                                    <button className="fs-btn" onClick={toggleFullscreen} aria-label="Fullskärm"
                                            title={isFullscreen ? 'Lämna fullskärm' : 'Fullskärm'}>
                                        {isFullscreen ? (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M9 3v6H3" /><path d="M15 21v-6h6" /><path d="M21 9h-6V3" /><path d="M3 15h6v6" />
                                            </svg>
                                        ) : (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M3 9V3h6" /><path d="M21 9V3h-6" /><path d="M3 15v6h6" /><path d="M21 15v6h-6" />
                                            </svg>
                                        )}
                                    </button>
                                </div>
                            </div>

                            {/* Kontroller */}
                            <div className="lg:w-2/5 order-2">
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <Slider label="Flödestäthet (<em>B</em>)"
                                            sub="Starkare fält ⟹ större kraft (<em>F</em> ∝ <em>B</em>)."
                                            value={B} min={BMIN} max={BMAX} step={0.05} onChange={setB}
                                            valueText={`${fmt(B, 2)} T`} />
                                    <Slider label="Ström (<em>I</em>)"
                                            sub="Större ström ⟹ större kraft (<em>F</em> ∝ <em>I</em>)."
                                            value={I} min={IMIN} max={IMAX} step={0.1} onChange={setI}
                                            valueText={`${fmt(I, 1)} A`} />
                                    <Slider label="Ledarens längd (<em>l</em>)"
                                            sub="Längden av den del av ledaren som är inne i fältet (vinkelrätt mot planet)."
                                            value={lmm} min={LMIN} max={LMAX} step={5} onChange={setLmm}
                                            valueText={`${fmt(lmm, 0)} mm`} />
                                </div>

                                {/* Live-beräkning */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <div className="flbl mb-2">Beräkning av kraften</div>
                                    <div className="flex flex-wrap items-center gap-x-2 gap-y-2"
                                         style={{ color: 'var(--lab-ink)', fontSize: 15 }}>
                                        <span><em>F</em></span>
                                        <span>=</span>
                                        <span style={{ whiteSpace: 'nowrap' }}><em>B</em> · <em>I</em> · <em>l</em></span>
                                        <span>=</span>
                                        <span style={{ whiteSpace: 'nowrap' }}>{fmt(B, 2)} T</span>
                                        <span>·</span>
                                        <span style={{ whiteSpace: 'nowrap' }}>{fmt(I, 1)} A</span>
                                        <span>·</span>
                                        <span style={{ whiteSpace: 'nowrap' }}>{fmt(l, 3)} m</span>
                                        <span>=</span>
                                        <span className="font-bold" style={{ color: 'var(--lab-accent)', whiteSpace: 'nowrap' }}>{fmtF(F)}</span>
                                    </div>
                                    <button className="btn-toggle w-full mt-3 text-sm" onClick={setExample2}
                                            title="B = 1,4 T (beräknat i exemplet), I = 2,2 A, l = 25 mm ⟹ F ≈ 77 mN">
                                        Exempel 2 ur teorin (1,4 T, 2,2 A, 25 mm)
                                    </button>
                                </div>

                                {/* Avläsning */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <div className="flbl mb-2">Avläsning</div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <Readout label="Kraft <em>F</em>" value={fmtF(F)} unit="" color="var(--lab-accent)" />
                                        <Readout label="Kraftens riktning" value={fUp ? 'uppåt' : 'nedåt'} unit="" />
                                        <Readout label="Flödestäthet <em>B</em>" value={fmt(B, 2)} unit="T" />
                                        <Readout label="Ström <em>I</em>" value={fmt(I, 1)} unit="A" />
                                    </div>
                                    <div className="mt-2 p-2 rounded-lg text-xs" style={{ background: 'rgba(13,148,136,0.08)', color: 'var(--lab-ink-soft)' }}>
                                        Testa högerhandsregeln: tummen i strömmens riktning (ut ur/in i planet),
                                        pekfingret i fältets riktning — långfingret ger kraftens riktning. Byt
                                        sedan strömriktning i scenen och kontrollera att kraften vänder.
                                    </div>
                                </div>
                            </div>
                        </main>

                        {/* Pedagogiska sektioner */}
                        <div className="grid md:grid-cols-3 gap-4 mt-6">
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Högerhandsregeln</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Samma högerhandsregel som för laddningar: <strong>tummen</strong> är
                                    strömriktningen <em>I</em>, <strong>pekfingret</strong> magnetfältet <em>B</em> och
                                    <strong> långfingret</strong> kraften <em>F</em>. I en strömförande ledare är det
                                    de många ledningselektronernas magnetiska krafter som tillsammans ger kraften
                                    på hela ledaren.
                                </p>
                            </div>
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Det resulterande fältet</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Ledaren befinner sig i två magnetfält samtidigt: det homogena fältet mellan
                                    polerna och sitt eget cirkulära fält. På ena sidan av ledaren samverkar fälten
                                    (tätare fältlinjer), på den andra motverkar de varandra (glesare). Kraften går
                                    åt det håll där det resulterande fältet är som <strong>svagast</strong> — det
                                    starka fältet "puttar" ledaren.
                                </p>
                            </div>
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Två parallella ledare</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Två strömförande ledare påverkar varandra, eftersom den ena ligger i den andras
                                    magnetfält: <span style={{ whiteSpace: 'nowrap' }}><em>F</em> = <em>k</em> · <em>I</em><sub>1</sub> · <em>I</em><sub>2</sub> · <em>l</em>/<em>d</em></span> med <span style={{ whiteSpace: 'nowrap' }}><em>k</em> = 2,0 · 10<sup>−7</sup> T·m/A</span>.
                                    Strömmar åt <strong>samma håll</strong> ger en attraherande kraft, motriktade
                                    strömmar en repellerande.
                                </p>
                            </div>
                        </div>

                        <details className="glass-card rounded-xl p-4 mt-4">
                            <summary className="accordion-head" style={{ color: 'var(--lab-ink)' }}>
                                <span>Var kommer formeln ifrån?</span><span style={{ color: 'var(--lab-ink-muted)' }}>▾</span>
                            </summary>
                            <p className="mt-3 text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                Den magnetiska kraften på en enskild laddning
                                är <span style={{ whiteSpace: 'nowrap' }}><em>F</em> = <em>q</em> · <em>v</em> · <em>B</em></span>.
                                Under tiden Δ<em>t</em> passerar laddningen <span style={{ whiteSpace: 'nowrap' }}><em>Q</em> = <em>I</em> · Δ<em>t</em></span> en
                                sträcka <em>l</em> av ledaren, med hastigheten <span style={{ whiteSpace: 'nowrap' }}><em>v</em> = <em>l</em>/Δ<em>t</em></span>.
                                Sätter vi in detta får
                                vi <span style={{ whiteSpace: 'nowrap' }}><em>F</em> = <em>I</em> · Δ<em>t</em> · (<em>l</em>/Δ<em>t</em>) · <em>B</em> = <em>B</em> · <em>I</em> · <em>l</em></span> —
                                tidsintervallet förkortas bort och kvar står kraften på hela ledarstycket.
                            </p>
                        </details>

                        <details className="glass-card rounded-xl p-4 mt-4">
                            <summary className="accordion-head" style={{ color: 'var(--lab-ink)' }}>
                                <span>Vanliga missuppfattningar</span><span style={{ color: 'var(--lab-ink-muted)' }}>▾</span>
                            </summary>
                            <ul className="mt-3 space-y-2 text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                <li><strong>"Kraften pekar längs fältlinjerna."</strong> Nej — kraften är vinkelrät både mot fältet och mot strömmen. Det är därför den pekar uppåt eller nedåt i scenen fast fältet går i sidled.</li>
                                <li><strong>"Ledaren måste röra sig för att påverkas."</strong> Nej — ledaren ligger stilla. Det räcker att laddningarna <em>inuti</em> den rör sig, alltså att det går en ström.</li>
                                <li><strong>"En ledare parallell med fältet påverkas också."</strong> Nej — då är strömmens riktning och fältets riktning inte vinkelräta, och kraften blir noll. Formeln <em>F</em> = <em>B</em> · <em>I</em> · <em>l</em> gäller när <em>B</em> är vinkelrät mot ledaren.</li>
                            </ul>
                        </details>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <script src="feedback.js" defer></script>
    <script src="data/katalog.js"></script>
    <script src="section-nav.js"></script>
</body>
</html>
