<script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // ─── Färger ───────────────────────────────────────────────────────────────
    const C_PROTON  = '#ef4444';
    const C_NEUTRON = '#60a5fa';
    const C_ENERGY  = '#fbbf24';

    // ─── Hjälpfunktioner ─────────────────────────────────────────────────────
    function hexToRgb(hex) {
        const n = parseInt(hex.slice(1), 16);
        return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
    }
    function lighten(hex, a) {
        const [r, g, b] = hexToRgb(hex);
        return `rgb(${Math.min(255, Math.round(r + (255-r)*a))},${Math.min(255, Math.round(g + (255-g)*a))},${Math.min(255, Math.round(b + (255-b)*a))})`;
    }
    function darken(hex, a) {
        const [r, g, b] = hexToRgb(hex);
        return `rgb(${Math.round(r*(1-a))},${Math.round(g*(1-a))},${Math.round(b*(1-a))})`;
    }
    function eio(t) { return t < 0.5 ? 2*t*t : -1 + (4-2*t)*t; }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function fmt(n, d = 6) { return n.toFixed(d).replace('.', ','); }

    // ─── Fysikdata ────────────────────────────────────────────────────────────
    // Massor i atomära massenheter (u), kärnmassor (utan elektroner)
    const EXAMPLES = {
        deuteron: {
            label: 'Proton + neutron → deuterium',
            shortLabel: 'p + n',
            p1: { name: 'Proton', sym: 'p', protons: 1, neutrons: 0, mass: 1.007276 },
            p2: { name: 'Neutron', sym: 'n', protons: 0, neutrons: 1, mass: 1.008665 },
            prod: { name: 'Deuterium', sym: '²H', protons: 1, neutrons: 1, mass: 2.013553 },
            deltaM: 0.002388,
            Eb: 2.224,
            EbPerA: 1.112,
            nucleons: 2,
        },
        helium: {
            label: 'Deuterium + deuterium → helium-4',
            shortLabel: '²H + ²H',
            p1: { name: 'Deuterium', sym: '²H', protons: 1, neutrons: 1, mass: 2.013553 },
            p2: { name: 'Deuterium', sym: '²H', protons: 1, neutrons: 1, mass: 2.013553 },
            prod: { name: 'Helium-4', sym: '⁴He', protons: 2, neutrons: 2, mass: 4.001506 },
            deltaM: 0.025600,
            Eb: 23.85,
            EbPerA: 5.96,
            nucleons: 4,
        },
    };

    // ─── Klusterpositioner (gx, gy i nukleonsteg-enheter) ────────────────────
    function getLayout(protons, neutrons) {
        const total = protons + neutrons;
        if (total === 1) return protons ? [{gx:0, gy:0, t:'p'}] : [{gx:0, gy:0, t:'n'}];
        if (total === 2) {
            const items = [];
            for (let i = 0; i < protons; i++) items.push({ gx: -0.55 + i*1.1, gy: 0, t: 'p' });
            for (let i = 0; i < neutrons; i++) items.push({ gx: (protons-1)*0.55 + 0.55 + i*1.1, gy: 0, t: 'n' });
            return items;
        }
        // 4 nukleoner: 2p övre, 2n nedre
        return [
            { gx: -0.55, gy: -0.55, t: 'p' },
            { gx:  0.55, gy: -0.55, t: 'p' },
            { gx: -0.55, gy:  0.55, t: 'n' },
            { gx:  0.55, gy:  0.55, t: 'n' },
        ];
    }

    // ─── Ritfunktioner ────────────────────────────────────────────────────────
    function drawNucleon(ctx, x, y, r, color, glow = 0) {
        ctx.save();
        if (glow > 0) { ctx.shadowColor = color; ctx.shadowBlur = glow; }
        const g = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.05, x, y, r);
        g.addColorStop(0, lighten(color, 0.55));
        g.addColorStop(0.5, color);
        g.addColorStop(1, darken(color, 0.45));
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI*2);
        ctx.fillStyle = g;
        ctx.fill();
        ctx.restore();
    }

    function drawCluster(ctx, cx, cy, r, lay, glow = 0) {
        const sp = r * 1.55;
        lay.forEach(n => {
            drawNucleon(ctx, cx + n.gx * sp, cy + n.gy * sp, r,
                n.t === 'p' ? C_PROTON : C_NEUTRON, glow);
        });
    }

    function txt(ctx, text, x, y, font, color, alpha = 1, align = 'center') {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = font;
        ctx.fillStyle = color;
        ctx.textAlign = align;
        ctx.textBaseline = 'middle';
        ctx.fillText(text, x, y);
        ctx.restore();
    }

    function drawEnergyPhoton(ctx, x, y, r, alpha, label) {
        const dotR = 4;
        const lblSize = 14;
        ctx.save();
        ctx.globalAlpha = alpha;
        // Liten prick
        ctx.shadowColor = C_ENERGY;
        ctx.shadowBlur = 16;
        ctx.beginPath();
        ctx.arc(x, y, dotR, 0, Math.PI * 2);
        ctx.fillStyle = C_ENERGY;
        ctx.fill();
        ctx.restore();
        // γ ovanför pricken
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = `bold ${lblSize}px Poppins, sans-serif`;
        ctx.fillStyle = C_ENERGY;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'alphabetic';
        ctx.shadowColor = C_ENERGY;
        ctx.shadowBlur = 12;
        ctx.fillText('\u03B3', x, y - dotR - 6);
        ctx.restore();
        // Energitext bredvid
        if (label) {
            txt(ctx, label, x + dotR + 8, y, `bold ${Math.max(10, r * 1.1) | 0}px Poppins, sans-serif`, C_ENERGY, alpha, 'left');
        }
    }

    function drawFlash(ctx, cx, cy, radius, alpha) {
        ctx.save();
        ctx.globalAlpha = alpha;
        const fg = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
        fg.addColorStop(0, 'rgba(255,255,255,1)');
        fg.addColorStop(0.4, 'rgba(180,220,255,0.6)');
        fg.addColorStop(1, 'rgba(56,189,248,0)');
        ctx.fillStyle = fg;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }

    function drawBackground(ctx, W, H) {
        const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H)*0.7);
        bg.addColorStop(0, '#0d1526');
        bg.addColorStop(1, '#050510');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);
    }

    function drawLegend(ctx, x, y, dotR) {
        const items = [
            { color: C_PROTON,  label: 'Proton'  },
            { color: C_NEUTRON, label: 'Neutron' },
        ];
        const lineH = dotR * 3;
        ctx.save();
        ctx.font = `${Math.max(10, dotR*1.8)|0}px Poppins, sans-serif`;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        items.forEach((item, i) => {
            const iy = y + i * lineH;
            ctx.fillStyle = item.color;
            ctx.shadowColor = item.color;
            ctx.shadowBlur = 4;
            ctx.beginPath();
            ctx.arc(x + dotR, iy, dotR, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#94a3b8';
            ctx.fillText(item.label, x + dotR*2 + 5, iy);
        });
        ctx.restore();
    }

    // ─── Canvas-simuleringskomponent ──────────────────────────────────────────
    function SimCanvas({ mode, exKey, phase, onPhaseChange }) {
        const canvasRef    = useRef(null);
        const containerRef = useRef(null);
        const animRef      = useRef({ rafId: null, start: null });
        const [size, setSize] = useState({ w: 750, h: 450 });

        const cfg = EXAMPLES[exKey];

        // Responsiv storleksändring
        useEffect(() => {
            function upd() {
                if (containerRef.current) {
                    const w = Math.min(containerRef.current.getBoundingClientRect().width, 750);
                    setSize({ w, h: Math.round(w * 450 / 750) });
                }
            }
            upd();
            window.addEventListener('resize', upd);
            return () => window.removeEventListener('resize', upd);
        }, []);

        // ── Ritfunktion ──────────────────────────────────────────────────────
        const draw = useCallback((prog, ph) => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const W = canvas.width;
            const H = canvas.height;

            drawBackground(ctx, W, H);

            const cx   = W / 2;
            const cy   = H * 0.42;
            const nr   = W * 0.034;
            const dotR = Math.max(4, nr * 0.42);

            const lay1    = getLayout(cfg.p1.protons,   cfg.p1.neutrons);
            const lay2    = getLayout(cfg.p2.protons,   cfg.p2.neutrons);
            const layProd = getLayout(cfg.prod.protons, cfg.prod.neutrons);

            const lx0 = cx - W * 0.26;
            const rx0 = cx + W * 0.26;

            const fs  = `${Math.max(10, W*0.018)|0}px Poppins, sans-serif`;
            const fsB = `bold ${Math.max(11, W*0.02)|0}px Poppins, sans-serif`;
            const fsH = `bold ${Math.max(13, W*0.024)|0}px Poppins, sans-serif`;

            // ── Gemensamma massruta-variabler ─────────────────────────────
            const sumMass = cfg.p1.mass + cfg.p2.mass;
            const fsBig = `bold ${Math.max(18, W*0.038)|0}px Poppins, sans-serif`;
            const fsBigLabel = `${Math.max(11, W*0.016)|0}px Poppins, sans-serif`;
            const massBoxY = H * 0.14;

            function drawMassBox(currentMass, alpha, highlight) {
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    // Bakgrund
                    const bw = W * 0.38;
                    const bh = H * 0.14;
                    const bx = cx - bw/2;
                    const by = massBoxY - bh/2;
                    ctx.fillStyle = 'rgba(15, 23, 42, 0.85)';
                    ctx.strokeStyle = highlight ? 'rgba(56, 189, 248, 0.6)' : 'rgba(100, 116, 139, 0.3)';
                    ctx.lineWidth = highlight ? 2 : 1;
                    ctx.beginPath();
                    ctx.roundRect(bx, by, bw, bh, 8);
                    ctx.fill();
                    ctx.stroke();
                    // Label
                    ctx.font = fsBigLabel;
                    ctx.fillStyle = '#64748b';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('Total massa', cx, massBoxY - bh*0.22);
                    // Värde
                    ctx.font = fsBig;
                    ctx.fillStyle = highlight ? '#38bdf8' : '#e2e8f0';
                    if (highlight) { ctx.shadowColor = '#38bdf8'; ctx.shadowBlur = 12; }
                    ctx.fillText(fmt(currentMass) + ' u', cx, massBoxY + bh*0.18);
                    ctx.restore();
                }

            if (mode === 'bind') {
                // ── FUSION-läge ──────────────────────────────────────────────
                if (ph === 'idle') {
                    drawCluster(ctx, lx0, cy, nr, lay1);
                    drawCluster(ctx, rx0, cy, nr, lay2);
                    txt(ctx, cfg.p1.name,           lx0, cy + nr*3.4, fsB, '#e2e8f0');
                    txt(ctx, fmt(cfg.p1.mass) + ' u', lx0, cy + nr*5.1, fs, '#64748b');
                    txt(ctx, cfg.p2.name,           rx0, cy + nr*3.4, fsB, '#e2e8f0');
                    txt(ctx, fmt(cfg.p2.mass) + ' u', rx0, cy + nr*5.1, fs, '#64748b');
                    // "+" tecken
                    txt(ctx, '+', cx, cy, `bold ${Math.max(20, W*0.044)|0}px Poppins`, '#475569');
                    // Total massa (stor ruta)
                    drawMassBox(sumMass, 1, false);
                    // Tiptext
                    txt(ctx, 'Tryck "Starta fusion" för att se reaktionen',
                        cx, H * 0.87, fs, '#334155');
                } else {
                    const APPROACH_END = 0.35;
                    const FLASH_END    = 0.48;
                    const RATTLE_START = 0.55;  // Massa-rasslet startar
                    const RATTLE_END   = 0.82;  // Massa-rasslet avslutas

                    if (prog < APPROACH_END) {
                        // Fas 1: Partiklar närmar sig
                        const t  = eio(prog / APPROACH_END);
                        const lx = lx0 + (cx - lx0) * t;
                        const rx = rx0 - (rx0 - cx) * t;
                        const fa = 1 - t * 0.85;
                        drawCluster(ctx, lx, cy, nr, lay1);
                        drawCluster(ctx, rx, cy, nr, lay2);
                        txt(ctx, cfg.p1.name,             lx, cy + nr*3.4, fsB, '#e2e8f0', fa);
                        txt(ctx, fmt(cfg.p1.mass) + ' u', lx, cy + nr*5.1, fs,  '#64748b', fa);
                        txt(ctx, cfg.p2.name,             rx, cy + nr*3.4, fsB, '#e2e8f0', fa);
                        txt(ctx, fmt(cfg.p2.mass) + ' u', rx, cy + nr*5.1, fs,  '#64748b', fa);
                        // Visa total massa hela tiden
                        drawMassBox(sumMass, 1, false);

                    } else if (prog < FLASH_END) {
                        // Fas 2: Bindningsblixten
                        const ft = (prog - APPROACH_END) / (FLASH_END - APPROACH_END);
                        const flashAlpha = Math.sin(ft * Math.PI) * 0.9;
                        drawCluster(ctx, cx, cy, nr, layProd, 22 * Math.sin(ft * Math.PI));
                        drawFlash(ctx, cx, cy, nr * 7 * ft, flashAlpha);
                        // Massa-rutan kvar
                        drawMassBox(sumMass, 1, false);

                    } else {
                        // Fas 3: Produkt visas, massa rasslar ner
                        const rt  = clamp((prog - FLASH_END) / (1 - FLASH_END), 0, 1);
                        const rte = eio(rt);
                        drawCluster(ctx, cx, cy, nr, layProd, rte * 12);

                        txt(ctx, cfg.prod.name + ' (' + cfg.prod.sym + ')',
                            cx, cy + nr*3.4, fsB, '#e2e8f0', rte);

                        // Energifotonen skjuts ut från kärnan snett uppåt höger
                        const px = cx + W*0.18 * rte;
                        const py = cy - H*0.12 * rte;
                        const photonAlpha = Math.min(1, rte * 3);
                        drawEnergyPhoton(ctx, px, py, nr*0.88, photonAlpha,
                            rte > 0.5 ? fmt(cfg.Eb, 2) + ' MeV' : null);

                        // Massa-rasslet: räkna ner från summa till produktmassa
                        const rattleT = clamp((prog - RATTLE_START) / (RATTLE_END - RATTLE_START), 0, 1);
                        const rattleEased = eio(rattleT);
                        const displayMass = sumMass - (sumMass - cfg.prod.mass) * rattleEased;
                        const isRattling = prog >= RATTLE_START && rattleT < 1;
                        drawMassBox(displayMass, 1, isRattling || rattleT >= 1);

                        // Visa produktmassa under kärnan när rasslet är klart
                        if (rattleT >= 1) {
                            txt(ctx, fmt(cfg.prod.mass) + ' u',
                                cx, cy + nr*5.1, fs, '#38bdf8', rte);
                        }

                        // Massdefektinfo – visa efter rasslet
                        if (rattleT >= 0.8) {
                            const ea = clamp((rattleT - 0.8) / 0.2, 0, 1);
                            txt(ctx, 'Δm = ' + fmt(cfg.deltaM) + ' u  (massa som blev energi)',
                                cx, H*0.79, fs, '#38bdf8', ea);
                            txt(ctx, 'E = Δm · c² = ' + fmt(cfg.Eb, 3) + ' MeV',
                                cx, H*0.86, fsH, '#22c55e', ea);
                        }
                    }
                }

            } else {
                // ── SEPARATIONS-läge ─────────────────────────────────────────
                if (ph === 'idle') {
                    drawCluster(ctx, cx, cy, nr, layProd);
                    txt(ctx, cfg.prod.name + ' (' + cfg.prod.sym + ')',
                        cx, cy + nr*3.4, fsB, '#e2e8f0');
                    txt(ctx, fmt(cfg.prod.mass) + ' u',
                        cx, cy + nr*5.1, fs, '#64748b');
                    // Massruta visar bundna kärnans massa
                    drawMassBox(cfg.prod.mass, 1, false);
                    // Energiindikator (hur mycket som krävs)
                    txt(ctx, 'Krävs: ' + fmt(cfg.Eb, 2) + ' MeV för att bryta bindningen',
                        cx, H*0.87, fs, '#fbbf24', 0.6);
                    txt(ctx, 'Tryck "Bryt bindningen" för att se separationen',
                        cx, H*0.93, fs, '#334155');
                } else {
                    const ENERGY_END   = 0.32;
                    const FLASH_END    = 0.45;
                    const RATTLE_S_START = 0.52;
                    const RATTLE_S_END   = 0.80;

                    if (prog < ENERGY_END) {
                        // Fas 1: Energifotonen kommer in uppifrån, kärnan glöder
                        const et  = eio(prog / ENERGY_END);
                        const py  = cy - H*0.28 + H*0.28*et;
                        const px  = cx;
                        drawCluster(ctx, cx, cy, nr, layProd, et * 28);
                        drawEnergyPhoton(ctx, px, py, nr*0.88, 1, null);
                        txt(ctx, cfg.prod.name + ' (' + cfg.prod.sym + ')',
                            cx, cy + nr*3.4, fsB, '#e2e8f0', 1 - et*0.5);
                        // Massruta visar bundna massan
                        drawMassBox(cfg.prod.mass, 1, false);
                        txt(ctx, 'Tillförd energi: ' + fmt(cfg.Eb, 2) + ' MeV',
                            cx, H*0.84, fsB, C_ENERGY, et);

                    } else if (prog < FLASH_END) {
                        // Fas 2: Blixt
                        const ft = (prog - ENERGY_END) / (FLASH_END - ENERGY_END);
                        drawCluster(ctx, cx, cy, nr, layProd, 30);
                        drawFlash(ctx, cx, cy, nr * 7 * ft, Math.sin(ft * Math.PI) * 0.9);
                        // Massruta kvar
                        drawMassBox(cfg.prod.mass, 1, false);

                    } else {
                        // Fas 3: Separation – partiklar flyger isär, massa rasslar upp
                        const st  = clamp((prog - FLASH_END) / (1 - FLASH_END), 0, 1);
                        const ste = eio(st);
                        const lx  = cx - W*0.26*ste;
                        const rx  = cx + W*0.26*ste;
                        drawCluster(ctx, lx, cy, nr, lay1);
                        drawCluster(ctx, rx, cy, nr, lay2);
                        txt(ctx, cfg.p1.name,             lx, cy + nr*3.4, fsB, '#e2e8f0', ste);
                        txt(ctx, fmt(cfg.p1.mass) + ' u', lx, cy + nr*5.1, fs,  '#64748b', ste);
                        txt(ctx, cfg.p2.name,             rx, cy + nr*3.4, fsB, '#e2e8f0', ste);
                        txt(ctx, fmt(cfg.p2.mass) + ' u', rx, cy + nr*5.1, fs,  '#64748b', ste);

                        // Massa-rasslet uppåt: från produktmassa till summa
                        const rattleT = clamp((prog - RATTLE_S_START) / (RATTLE_S_END - RATTLE_S_START), 0, 1);
                        const rattleEased = eio(rattleT);
                        const displayMass = cfg.prod.mass + (sumMass - cfg.prod.mass) * rattleEased;
                        const isRattling = prog >= RATTLE_S_START && rattleT < 1;
                        drawMassBox(displayMass, 1, isRattling || rattleT >= 1);

                        // Massdefektinfo – visa efter rasslet
                        if (rattleT >= 0.8) {
                            const ea = clamp((rattleT - 0.8) / 0.2, 0, 1);
                            txt(ctx, 'Ökade med Δm = ' + fmt(cfg.deltaM) + ' u  (energi blev massa)',
                                cx, H*0.79, fs, C_ENERGY, ea);
                            txt(ctx, 'Tillförd energi: ' + fmt(cfg.Eb, 3) + ' MeV → massa',
                                cx, H*0.86, fsH, C_ENERGY, ea);
                        }
                    }
                }
            }

            // Teckenförklaring (övre vänster)
            drawLegend(ctx, W*0.025, H*0.06, dotR);

        }, [mode, exKey]);

        // Starta animation
        const animate = useCallback(() => {
            if (animRef.current.rafId) cancelAnimationFrame(animRef.current.rafId);
            onPhaseChange('animating');
            animRef.current.start = null;
            const DURATION = 3200;

            function frame(ts) {
                if (!animRef.current.start) animRef.current.start = ts;
                const prog = Math.min((ts - animRef.current.start) / DURATION, 1);
                draw(prog, 'animating');
                if (prog < 1) {
                    animRef.current.rafId = requestAnimationFrame(frame);
                } else {
                    onPhaseChange('done');
                }
            }
            animRef.current.rafId = requestAnimationFrame(frame);
        }, [draw, onPhaseChange]);

        // Rita om vid fas-/exempeländring
        useEffect(() => {
            if (phase === 'idle') draw(0, 'idle');
            if (phase === 'done') draw(1, 'done');
        }, [phase, draw, size]);

        // Städa upp RAF
        useEffect(() => () => {
            if (animRef.current.rafId) cancelAnimationFrame(animRef.current.rafId);
        }, []);

        const btnLabel = phase === 'idle'
            ? (mode === 'bind' ? 'Starta fusion' : 'Bryt bindningen')
            : 'Kör igen';

        return (
            <div ref={containerRef} className="w-full">
                <canvas ref={canvasRef} width={size.w} height={size.h} className="w-full" />
                <div className="flex justify-center gap-3 mt-5">
                    {phase !== 'animating' ? (
                        <>
                            <button onClick={animate}
                                className="btn-primary px-7 py-2.5 rounded-xl text-sm">
                                {btnLabel}
                            </button>
                            {phase === 'done' && (
                                <button onClick={() => onPhaseChange('idle')}
                                    className="btn-secondary px-6 py-2.5 rounded-xl text-sm">
                                    Återställ
                                </button>
                            )}
                        </>
                    ) : (
                        <p className="text-slate-500 text-sm py-2.5">Animering pågår…</p>
                    )}
                </div>
            </div>
        );
    }

    // ─── Masspanel ────────────────────────────────────────────────────────────
    function MassPanel({ exKey, mode }) {
        const cfg = EXAMPLES[exKey];
        const sum = cfg.p1.mass + cfg.p2.mass;

        return (
            <div className="glass-card rounded-2xl p-5 space-y-0.5">
                <h3 className="text-sky-400 font-bold mb-3 text-base">Massbalans</h3>

                <div className="mass-row font-mono">
                    <span className="text-slate-300">{cfg.p1.name} ({cfg.p1.sym})</span>
                    <span className="text-slate-100">{fmt(cfg.p1.mass)} u</span>
                </div>
                <div className="mass-row font-mono">
                    <span className="text-slate-300">+ {cfg.p2.name} ({cfg.p2.sym})</span>
                    <span className="text-slate-100">{fmt(cfg.p2.mass)} u</span>
                </div>
                <div className="mass-row divider font-mono">
                    <span className="text-slate-400">= Summa (fria)</span>
                    <span className="text-slate-100">{fmt(sum)} u</span>
                </div>
                <div className="mass-row font-mono">
                    <span className="text-slate-400">− {cfg.prod.sym} (bunden)</span>
                    <span className="text-slate-100">{fmt(cfg.prod.mass)} u</span>
                </div>

                <div className="mass-row divider highlight font-mono mt-1">
                    <span className="text-sky-300 font-semibold">Massdefekt (Δm)</span>
                    <span className="text-sky-300 font-semibold">{fmt(cfg.deltaM)} u</span>
                </div>

                <div className="pt-3 mt-3 border-t border-slate-700/50 space-y-2">
                    <div className="mass-row font-mono">
                        <span className="text-green-400">Bindningsenergi (E_b)</span>
                        <span className="text-green-400 font-bold">{fmt(cfg.Eb, 3)} MeV</span>
                    </div>
                    <div className="mass-row font-mono">
                        <span className="text-slate-400">Per nukleon (E_b/A)</span>
                        <span className="text-slate-200">{fmt(cfg.EbPerA, 3)} MeV/nukleon</span>
                    </div>
                </div>

                <div className="pt-3 mt-3 border-t border-slate-700/50 text-center">
                    <p className="text-slate-500 text-xs font-mono leading-relaxed">
                        E = Δm · c²<br/>
                        = {fmt(cfg.deltaM)} u × 931,5 MeV/u
                    </p>
                    <p className="text-green-400 font-bold mt-1 text-base">
                        = {fmt(cfg.Eb, 3)} MeV
                    </p>
                </div>

                <div className="pt-3 mt-3 border-t border-slate-700/50">
                    <p className="text-xs text-slate-500 mb-1 text-center">Reaktion ({mode === 'bind' ? 'fusion' : 'separation'})</p>
                    <div className="formula-box text-sm">
                        {mode === 'bind'
                            ? <>{cfg.p1.sym} + {cfg.p2.sym} → {cfg.prod.sym} + γ</>
                            : <>{cfg.prod.sym} + γ → {cfg.p1.sym} + {cfg.p2.sym}</>
                        }
                    </div>
                </div>
            </div>
        );
    }

    // ─── Huvud-app ────────────────────────────────────────────────────────────
    function App() {
        const [mode,   setMode]   = useState('bind');
        const [exKey,  setExKey]  = useState('deuteron');
        const [phase,  setPhase]  = useState('idle');

        function switchMode(m) { setMode(m); setPhase('idle'); }
        function switchEx(k)   { setExKey(k); setPhase('idle'); }

        return (
            <div className="min-h-screen bg-slate-950 pb-16">
                <div className="max-w-5xl mx-auto px-4 pt-6">

                    {/* Brödsmulor */}
                    <p className="breadcrumb mb-4">
                        <a href="index.html">Hem</a> /{' '}
                        <a href="fysik1.html">Fysik 1</a> /{' '}
                        Massdefekt och bindningsenergi
                    </p>

                    {/* Titel */}
                    <div className="mb-6">
                        <h1 className="text-3xl md:text-4xl font-bold text-white glow-text mb-2">
                            Massdefekt och bindningsenergi
                        </h1>
                        <p className="text-slate-400 text-sm md:text-base max-w-2xl leading-relaxed">
                            När nukleoner (protoner och neutroner) bildar en kärna minskar den totala
                            massan eftersom energi strålar ut i form av en foton (γ). Denna förlorade
                            energi motsvarar kärnans bindningsenergi – det vill säga den mängd energi
                            man måste tillföra för att bryta upp kärnan igen.
                        </p>
                    </div>

                    {/* Läge + exempelval */}
                    <div className="flex flex-wrap items-center gap-3 mb-5">
                        <div className="mode-toggle">
                            <button
                                className={`mode-btn${mode === 'bind'  ? ' active' : ''}`}
                                onClick={() => switchMode('bind')}>
                                ⚡ Fusion
                            </button>
                            <button
                                className={`mode-btn${mode === 'break' ? ' active' : ''}`}
                                onClick={() => switchMode('break')}>
                                💥 Separation
                            </button>
                        </div>
                        <div className="flex gap-2">
                            {Object.entries(EXAMPLES).map(([k, ex]) => (
                                <button key={k}
                                    className={`tab-btn${exKey === k ? ' active' : ''}`}
                                    onClick={() => switchEx(k)}>
                                    {ex.shortLabel}
                                </button>
                            ))}
                        </div>
                        <span className="text-slate-500 text-xs hidden md:block ml-1">
                            {EXAMPLES[exKey].label}
                        </span>
                    </div>

                    {/* Canvas + sidopanel */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-5 items-start">
                        <div className="lg:col-span-2 glass-card rounded-2xl p-4">
                            <SimCanvas
                                mode={mode}
                                exKey={exKey}
                                phase={phase}
                                onPhaseChange={setPhase}
                            />
                        </div>
                        <div>
                            <MassPanel exKey={exKey} mode={mode} />
                        </div>
                    </div>

                    {/* Förklaringssektion */}
                    <div className="mt-10 grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <h2 className="text-sky-400 font-bold text-lg mb-3">Vad är massdefekt?</h2>
                            <div className="explanation-box">
                                En fri proton väger <strong className="text-white">1,007 276 u</strong> och
                                en fri neutron väger <strong className="text-white">1,008 665 u</strong>.
                                Deras summa är 2,015 941 u. Men en deuteronkärna (²H) väger bara{' '}
                                <strong className="text-white">2,013 553 u</strong> – alltså{' '}
                                <em>mindre</em> än de fria partiklarna.
                                <br/><br/>
                                Massdifferensen kallas <strong className="text-sky-300">massdefekt</strong> (Δm).
                                Enligt Einsteins formel <em>E = Δm · c²</em> har denna massa omvandlats till
                                den <strong className="text-green-400">bindningsenergi</strong> som håller kärnan samman.
                            </div>
                        </div>

                        <div>
                            <h2 className="text-sky-400 font-bold text-lg mb-3">Fusion och separation</h2>
                            <div className="explanation-box">
                                Vid <strong className="text-sky-300">fusion</strong> slås kärnor ihop och
                                bindningsenergin <em>frigörs</em> – ofta som gammastrålning (γ). Det är
                                denna process som driver solen och stjärnorna.
                                <br/><br/>
                                Vid <strong className="text-yellow-300">separation</strong> bryts kärnan isär.
                                Då måste <em>exakt lika mycket</em> energi <em>tillföras</em> som frigörs
                                vid fusionen. Bindningsenergin är det "lim" som håller kärnan samman –
                                ju mer per nukleon, desto stabilare kärna.
                            </div>
                        </div>

                        <div className="md:col-span-2">
                            <h2 className="text-sky-400 font-bold text-lg mb-3">Räkneexempel: p + n → ²H</h2>
                            <div className="explanation-box">
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 font-mono text-sm">
                                    <div>
                                        <p className="text-slate-400 mb-1">Massor av fria partiklar:</p>
                                        <p>m(p) = 1,007 276 u</p>
                                        <p>m(n) = 1,008 665 u</p>
                                        <p className="border-t border-slate-600 mt-1 pt-1">
                                            Summa = <strong className="text-white">2,015 941 u</strong>
                                        </p>
                                        <p className="mt-3 text-slate-400">Massa bunden kärna (²H):</p>
                                        <p><strong className="text-white">2,013 553 u</strong></p>
                                        <p className="mt-3 text-sky-300">
                                            Δm = 2,015 941 − 2,013 553 = <strong>0,002 388 u</strong>
                                        </p>
                                    </div>
                                    <div>
                                        <p className="text-slate-400 mb-1">Bindningsenergi:</p>
                                        <p>1 u · c² = 931,5 MeV</p>
                                        <p className="mt-1">
                                            E_b = 0,002 388 u × 931,5 MeV/u
                                        </p>
                                        <p className="text-green-400 mt-1">
                                            <strong>E_b = 2,224 MeV</strong>
                                        </p>
                                        <p className="mt-3 text-slate-400">Per nukleon (A = 2):</p>
                                        <p className="text-green-400">
                                            <strong>E_b/A = 1,112 MeV/nukleon</strong>
                                        </p>
                                        <p className="mt-3 text-slate-400 text-xs">
                                            (Helium-4 har 7,07 MeV/nukleon – mycket stabilare!)
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                <footer className="mt-14 text-center text-slate-600 text-sm">
                    <p>&copy; 2025 Fysiklabbet. Skapad för gymnasieelever.</p>
                </footer>
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
