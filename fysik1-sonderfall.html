    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback, useMemo } = React;

        // ─── Seeded pseudo-random number generator (mulberry32) ───────────────
        function seededRng(seed) {
            let s = seed >>> 0;
            return function () {
                s |= 0; s = s + 0x6D2B79F5 | 0;
                let t = Math.imul(s ^ s >>> 15, 1 | s);
                t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }

        // ─── Hex-packed nucleus builder ───────────────────────────────────────
        function buildNucleus(protons, neutrons, seed = 42) {
            const total = protons + neutrons;
            const rng = seededRng(seed);
            const spacing = 1.0;
            const points = [];

            // Generate hex grid points, collect those within a circle
            const radius = Math.sqrt(total / Math.PI) * spacing * 1.25 + spacing;
            const iMax = Math.ceil(radius / spacing) + 2;
            for (let row = -iMax; row <= iMax; row++) {
                for (let col = -iMax; col <= iMax; col++) {
                    const x = col * spacing + (row % 2) * spacing * 0.5;
                    const y = row * spacing * 0.866;
                    if (x * x + y * y <= radius * radius * 1.05) {
                        points.push({ x, y });
                    }
                }
            }

            // Sort by distance from centre, keep exactly `total`
            points.sort((a, b) => (a.x * a.x + a.y * a.y) - (b.x * b.x + b.y * b.y));
            const kept = points.slice(0, total);

            // Shuffle assignment of proton/neutron
            const types = Array(protons).fill('proton').concat(Array(neutrons).fill('neutron'));
            for (let i = types.length - 1; i > 0; i--) {
                const j = Math.floor(rng() * (i + 1));
                [types[i], types[j]] = [types[j], types[i]];
            }

            // Compute bounding circle radius (for later sizing)
            let maxR = 0;
            kept.forEach(p => { const r = Math.sqrt(p.x * p.x + p.y * p.y); if (r > maxR) maxR = r; });

            return kept.map((p, i) => ({
                gx: p.x,   // grid x
                gy: p.y,   // grid y
                type: types[i],
                distFromCenter: Math.sqrt(p.x * p.x + p.y * p.y),
            }));
        }

        // ─── Decay configurations ─────────────────────────────────────────────
        const DECAY_CONFIGS = {
            alpha: {
                label: 'Alfasönderfall',
                shortLabel: 'α',
                protons: 88,
                neutrons: 138,
                nucleonRadius: 4,
                seed: 17,
            },
            betaMinus: {
                label: 'Beta⁻-sönderfall',
                shortLabel: 'β⁻',
                protons: 6,
                neutrons: 8,
                nucleonRadius: 13,
                seed: 7,
            },
            betaPlus: {
                label: 'Beta⁺-sönderfall',
                shortLabel: 'β⁺',
                protons: 9,
                neutrons: 9,
                nucleonRadius: 11,
                seed: 23,
            },
            gamma: {
                label: 'Gammasönderfall',
                shortLabel: 'γ',
                protons: 43,
                neutrons: 56,
                nucleonRadius: 5.5,
                seed: 31,
            },
        };

        // ─── Colours ──────────────────────────────────────────────────────────
        const COL_PROTON   = '#ef4444';
        const COL_NEUTRON  = '#60a5fa';
        const COL_ELECTRON = '#22c55e';
        const COL_POSITRON = '#ec4899';
        const COL_NEUTRINO = '#94a3b8';
        const COL_GAMMA    = '#fbbf24';
        const COL_ALPHA    = '#f59e0b';

        // Draw a single nucleon with a simple 3-D gradient
        function drawNucleon(ctx, x, y, r, color, glowColor = null, glowStrength = 0) {
            ctx.save();
            if (glowColor && glowStrength > 0) {
                ctx.shadowColor = glowColor;
                ctx.shadowBlur  = glowStrength;
            }
            const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.05, x, y, r);
            grad.addColorStop(0, lighten(color, 0.55));
            grad.addColorStop(0.5, color);
            grad.addColorStop(1, darken(color, 0.45));
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.restore();
        }

        function lighten(hex, amt) {
            const [r, g, b] = hexToRgb(hex);
            return `rgb(${Math.min(255, Math.round(r + (255 - r) * amt))},${Math.min(255, Math.round(g + (255 - g) * amt))},${Math.min(255, Math.round(b + (255 - b) * amt))})`;
        }
        function darken(hex, amt) {
            const [r, g, b] = hexToRgb(hex);
            return `rgb(${Math.round(r * (1 - amt))},${Math.round(g * (1 - amt))},${Math.round(b * (1 - amt))})`;
        }
        function hexToRgb(hex) {
            const n = parseInt(hex.slice(1), 16);
            return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
        }
        function lerpColor(hexA, hexB, t) {
            const [r1, g1, b1] = hexToRgb(hexA);
            const [r2, g2, b2] = hexToRgb(hexB);
            return `rgb(${Math.round(r1 + (r2 - r1) * t)},${Math.round(g1 + (g2 - g1) * t)},${Math.round(b1 + (b2 - b1) * t)})`;
        }
        function easeInOut(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }
        function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

        // ─── Label data ───────────────────────────────────────────────────────
        const LABEL_INFO = {
            alpha:     { parent: 'Radium-226 (²²⁶Ra)',      daughter: 'Radon-222 (²²²Rn)' },
            betaMinus: { parent: 'Kol-14 (¹⁴C)',            daughter: 'Kväve-14 (¹⁴N)' },
            betaPlus:  { parent: 'Fluor-18 (¹⁸F)',          daughter: 'Syre-18 (¹⁸O)' },
            gamma:     { parent: 'Teknetium-99 (⁹⁹Tc*)',    daughter: 'Teknetium-99 (⁹⁹Tc)' },
        };

        // Formula tokens: { mass, Z, sym } for nuclide notation, or plain string for arrows/particles
        const FORMULA_TOKENS = {
            alpha: [
                { mass:'226', Z:'88', sym:'Ra' }, '→',
                { mass:'222', Z:'86', sym:'Rn' }, '+',
                { mass:'4', Z:'2', sym:'He' }
            ],
            betaMinus: [
                { mass:'14', Z:'6', sym:'C' }, '→',
                { mass:'14', Z:'7', sym:'N' }, '+',
                { mass:'0', Z:'-1', sym:'e⁻' }, '+',
                'ν̄ₑ'
            ],
            betaPlus: [
                { mass:'18', Z:'9', sym:'F' }, '→',
                { mass:'18', Z:'8', sym:'O' }, '+',
                { mass:'0', Z:'1', sym:'e⁺' }, '+',
                'νₑ'
            ],
            gamma: [
                { mass:'99', Z:'43', sym:'Tc*' }, '→',
                { mass:'99', Z:'43', sym:'Tc' }, '+',
                'γ'
            ],
        };

        /**
         * Draw a decay formula centred at (cx, cy) using canvas-rendered
         * superscript/subscript for mass/Z numbers.
         */
        function drawFormula(ctx, cx, cy, tokens, fontSize, color) {
            const symSize    = fontSize;
            const scriptSize = Math.round(fontSize * 0.6);
            const spacing    = Math.round(fontSize * 0.6);  // space around arrows/plus

            // First pass: measure total width
            let totalW = 0;
            const parts = tokens.map(tok => {
                if (typeof tok === 'string') {
                    ctx.font = `${symSize}px Poppins, sans-serif`;
                    const tw = ctx.measureText('  ' + tok + '  ').width;
                    return { type: 'text', text: '  ' + tok + '  ', w: tw };
                } else {
                    ctx.font = `bold ${scriptSize}px Poppins, sans-serif`;
                    const massW = ctx.measureText(tok.mass).width;
                    const zW    = ctx.measureText(tok.Z).width;
                    const scriptColW = Math.max(massW, zW);
                    ctx.font = `bold ${symSize}px Poppins, sans-serif`;
                    const symW = ctx.measureText(tok.sym).width;
                    const gap  = Math.round(fontSize * 0.08);
                    const w = scriptColW + gap + symW;
                    return { type: 'nuclide', tok, scriptColW, symW, gap, w };
                }
            });
            parts.forEach(p => totalW += p.w);

            // Second pass: draw left-to-right
            let x = cx - totalW / 2;
            ctx.save();
            ctx.fillStyle = color;
            ctx.textBaseline = 'middle';

            parts.forEach(p => {
                if (p.type === 'text') {
                    ctx.font = `${symSize}px Poppins, sans-serif`;
                    ctx.textAlign = 'left';
                    ctx.fillText(p.text, x, cy);
                } else {
                    const midX = x + p.scriptColW / 2;
                    // Mass (superscript)
                    ctx.font = `bold ${scriptSize}px Poppins, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText(p.tok.mass, midX, cy - symSize * 0.3);
                    // Z (subscript)
                    ctx.fillText(p.tok.Z, midX, cy + symSize * 0.3);
                    // Symbol
                    ctx.font = `bold ${symSize}px Poppins, sans-serif`;
                    ctx.textAlign = 'left';
                    ctx.fillText(p.tok.sym, x + p.scriptColW + p.gap, cy);
                }
                x += p.w;
            });

            ctx.restore();
        }

        /**
         * Draw legend in the top-left corner of the canvas.
         */
        function drawLegend(ctx, decayType, x, y, currentPhase, progress) {
            const showProducts = currentPhase === 'animating' || currentPhase === 'done' || currentPhase === 'formula';
            const prodProg = currentPhase === 'formula' || currentPhase === 'done' ? 1 : progress;
            const items = [
                { color: '#ef4444', label: 'Proton', show: true },
                { color: '#60a5fa', label: 'Neutron', show: true },
            ];
            // Alpha: cluster starts forming at prodProg ~0.15
            if (decayType === 'alpha')     items.push({ color: '#f59e0b', label: 'Alfapartikel (⁴He)', show: showProducts && prodProg > 0.15 });
            // Beta⁻: electron ejects at prodProg 0.3, neutrino at 0.38
            if (decayType === 'betaMinus') {
                const ejectProg = clamp((prodProg - 0.3) / 0.7, 0, 1);
                items.push({ color: '#22c55e', label: 'Elektron (e⁻)', show: showProducts && ejectProg > 0 });
                items.push({ color: '#94a3b8', label: 'Antineutrino (ν̄ₑ)', show: showProducts && ejectProg > 0.1 });
            }
            // Beta⁺: same timing as beta⁻
            if (decayType === 'betaPlus') {
                const ejectProg = clamp((prodProg - 0.3) / 0.7, 0, 1);
                items.push({ color: '#c084fc', label: 'Positron (e⁺)', show: showProducts && ejectProg > 0 });
                items.push({ color: '#94a3b8', label: 'Neutrino (νₑ)', show: showProducts && ejectProg > 0.1 });
            }
            // Gamma: photon appears at prodProg ~0.1
            if (decayType === 'gamma')     items.push({ color: '#fbbf24', label: 'Gammafoton (γ)', show: showProducts && prodProg > 0.1 });

            const visibleItems = items.filter(it => it.show);

            ctx.save();
            ctx.font = '11px Poppins, sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            const dotR = 5;
            const lineH = 18;
            visibleItems.forEach((item, i) => {
                const iy = y + i * lineH;
                ctx.fillStyle = item.color;
                ctx.shadowColor = item.color;
                ctx.shadowBlur = 4;
                ctx.beginPath();
                ctx.arc(x + dotR, iy, dotR, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#cbd5e1';
                ctx.fillText(item.label, x + dotR * 2 + 6, iy);
            });
            ctx.restore();
        }

        // Structured nucleus label data for canvas rendering
        // { name: 'Radium-226', mass: '226', Z: '88', symbol: 'Ra' }
        const NUCLEUS_LABELS = {
            alpha:     { parent: { name: 'Radium-226',       mass: '226', Z: '88', symbol: 'Ra' },
                         daughter:{ name: 'Radon-222',        mass: '222', Z: '86', symbol: 'Rn' } },
            betaMinus: { parent: { name: 'Kol-14',           mass: '14',  Z: '6',  symbol: 'C'  },
                         daughter:{ name: 'Kväve-14',         mass: '14',  Z: '7',  symbol: 'N'  } },
            betaPlus:  { parent: { name: 'Fluor-18',         mass: '18',  Z: '9',  symbol: 'F'  },
                         daughter:{ name: 'Syre-18',          mass: '18',  Z: '8',  symbol: 'O'  } },
            gamma:     { parent: { name: 'Teknetium-99',     mass: '99', Z: '43', symbol: 'Tc*' },
                         daughter:{ name: 'Teknetium-99',     mass: '99',  Z: '43', symbol: 'Tc' } },
        };

        /**
         * Draw a nucleus label like:  226
         *                              88 Ra   Radium-226
         * centred at (cx, cy). fontSize is for the chemical symbol.
         */
        function drawNucleusLabel(ctx, cx, cy, info, fontSize, color, suffix) {
            const symSize  = fontSize;
            const scriptSize = Math.round(fontSize * 0.62);
            const nameSize = Math.round(fontSize * 0.72);
            const gap = Math.round(fontSize * 0.12);   // gap between scripts and symbol

            ctx.save();
            ctx.fillStyle = color;
            ctx.textBaseline = 'middle';

            // Measure symbol
            ctx.font = `bold ${symSize}px Poppins, sans-serif`;
            const symW = ctx.measureText(info.symbol).width;

            // Measure suffix (e.g. " (α)")
            const suffixStr = suffix ? '  ' + suffix : '';
            const suffixW = suffix ? ctx.measureText(suffixStr).width : 0;

            // Measure name
            ctx.font = `${nameSize}px Poppins, sans-serif`;
            const nameStr = info.name ? '  ' + info.name : '';
            const nameW = info.name ? ctx.measureText(nameStr).width : 0;

            // Measure scripts - use the wider of mass/Z for the column
            ctx.font = `bold ${scriptSize}px Poppins, sans-serif`;
            const massW = ctx.measureText(info.mass).width;
            const zW    = ctx.measureText(info.Z).width;
            const scriptColW = Math.max(massW, zW);

            // Total width
            const rightPart = suffix ? suffixW : nameW;
            const totalW = scriptColW + gap + symW + rightPart;
            const startX = cx - totalW / 2;

            // Draw mass number and atomic number - manually centred on same X
            ctx.font = `bold ${scriptSize}px Poppins, sans-serif`;
            ctx.textAlign = 'left';
            const scriptMidX = startX + scriptColW / 2;
            ctx.fillText(info.mass, scriptMidX - massW / 2, cy - symSize * 0.28);
            ctx.fillText(info.Z,    scriptMidX - zW / 2,    cy + symSize * 0.32);

            // Draw chemical symbol
            ctx.font = `bold ${symSize}px Poppins, sans-serif`;
            ctx.textAlign = 'left';
            ctx.fillText(info.symbol, startX + scriptColW + gap, cy);

            // Draw name or suffix
            if (suffix) {
                ctx.font = `bold ${symSize}px Poppins, sans-serif`;
                ctx.fillText(suffixStr, startX + scriptColW + gap + symW, cy);
            } else {
                ctx.font = `${nameSize}px Poppins, sans-serif`;
                ctx.fillText(nameStr, startX + scriptColW + gap + symW, cy);
            }

            ctx.restore();
        }

        // ─── The Canvas simulation component ─────────────────────────────────
        function DecayCanvas({ decayType }) {
            const canvasRef   = useRef(null);
            const stateRef    = useRef({ phase: 'idle', progress: 0, rafId: null, startTime: null });
            const [phase, setPhase]       = useState('idle'); // idle | animating | done | formula
            const [canvasSize, setCanvasSize] = useState({ w: 750, h: 480 });
            const containerRef = useRef(null);

            const cfg = DECAY_CONFIGS[decayType];

            // Build nucleus once per decayType
            const nucleons = useMemo(() => buildNucleus(cfg.protons, cfg.neutrons, cfg.seed), [decayType]);

            // Find indices of nucleons to use in each decay
            const specialIndices = useMemo(() => {
                if (decayType === 'alpha') {
                    // Find 4 ADJACENT outer nucleons: 2 protons + 2 neutrons
                    const indexed = nucleons.map((n, i) => ({ ...n, i }));
                    const outer = [...indexed].sort((a, b) => b.distFromCenter - a.distFromCenter);
                    const candidates = outer.slice(0, Math.max(30, Math.floor(nucleons.length * 0.25)));

                    let best = null;
                    let bestSpread = Infinity;
                    for (const anchor of candidates) {
                        const nearby = candidates
                            .filter(c => c.i !== anchor.i)
                            .sort((a, b) => {
                                const da = (a.gx - anchor.gx) ** 2 + (a.gy - anchor.gy) ** 2;
                                const db = (b.gx - anchor.gx) ** 2 + (b.gy - anchor.gy) ** 2;
                                return da - db;
                            });
                        let group = [anchor];
                        let pC = anchor.type === 'proton' ? 1 : 0;
                        let nC = anchor.type === 'neutron' ? 1 : 0;
                        for (const o of nearby) {
                            if (group.length >= 4) break;
                            if (o.type === 'proton' && pC < 2) { group.push(o); pC++; }
                            else if (o.type === 'neutron' && nC < 2) { group.push(o); nC++; }
                        }
                        if (pC === 2 && nC === 2) {
                            let maxD = 0;
                            for (let a = 0; a < 4; a++)
                                for (let b = a + 1; b < 4; b++) {
                                    const d = (group[a].gx - group[b].gx) ** 2 + (group[a].gy - group[b].gy) ** 2;
                                    if (d > maxD) maxD = d;
                                }
                            if (maxD < bestSpread) { bestSpread = maxD; best = group.map(g => g.i); }
                        }
                    }
                    return best || [];
                }
                if (decayType === 'betaMinus') {
                    // Find a neutron near the surface
                    const neutrons = nucleons
                        .map((n, i) => ({ ...n, i }))
                        .filter(n => n.type === 'neutron')
                        .sort((a, b) => b.distFromCenter - a.distFromCenter);
                    return [neutrons[0].i];
                }
                if (decayType === 'betaPlus') {
                    const protons = nucleons
                        .map((n, i) => ({ ...n, i }))
                        .filter(n => n.type === 'proton')
                        .sort((a, b) => b.distFromCenter - a.distFromCenter);
                    return [protons[0].i];
                }
                return [];
            }, [decayType, nucleons]);

            // Responsive canvas sizing
            useEffect(() => {
                function updateSize() {
                    if (containerRef.current) {
                        const rect = containerRef.current.getBoundingClientRect();
                        const w = Math.min(rect.width || 750, 750);
                        const h = Math.round(w * 480 / 750);
                        setCanvasSize({ w, h });
                    }
                }
                updateSize();
                window.addEventListener('resize', updateSize);
                return () => window.removeEventListener('resize', updateSize);
            }, []);

            // ── Main draw function ────────────────────────────────────────────
            const draw = useCallback((progress, currentPhase) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const w = canvas.width;
                const h = canvas.height;
                const nr = cfg.nucleonRadius;
                const time = Date.now() / 1000;
                const labels = LABEL_INFO[decayType];

                // Background
                const bg = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, Math.max(w, h) * 0.7);
                bg.addColorStop(0, '#0d1526');
                bg.addColorStop(1, '#050510');
                ctx.fillStyle = bg;
                ctx.fillRect(0, 0, w, h);

                const isSplit = (currentPhase === 'formula');

                // Helper: compute scale and a drawR that ensures nucleons touch
                let maxGridR = 0;
                nucleons.forEach(n => { if (n.distFromCenter > maxGridR) maxGridR = n.distFromCenter; });

                if (currentPhase === 'idle') {
                    // ── IDLE: single centred view ────────────────────────────
                    const padding = nr * 3;
                    const availR  = Math.min(w, h) * 0.42 - padding;
                    const scale   = maxGridR > 0 ? availR / (maxGridR + nr) : availR;
                    const drawR   = Math.max(nr, scale * 0.48);
                    const cx = w / 2;
                    const cy = h / 2;

                    const jiggleAmp = decayType === 'gamma' ? drawR * 0.38 : drawR * 0.10;
                    const glowStr   = decayType === 'gamma' ? 12 + Math.sin(time * 8) * 6 : 0;

                    nucleons.forEach((n, idx) => {
                        const jx = Math.sin(time * (decayType === 'gamma' ? 5 + idx * 0.13 : 4.1) + idx * 1.3) * jiggleAmp;
                        const jy = Math.cos(time * (decayType === 'gamma' ? 4.7 + idx * 0.11 : 3.7) + idx * 0.9) * jiggleAmp;
                        const px = cx + n.gx * scale + jx;
                        const py = cy + n.gy * scale + jy;
                        const color = n.type === 'proton' ? COL_PROTON : COL_NEUTRON;
                        drawNucleon(ctx, px, py, drawR, color, decayType === 'gamma' ? color : null, glowStr * 0.7);
                    });

                    // Decay type title at top
                    const DECAY_TITLES = { alpha: 'Alfasönderfall', betaMinus: 'Beta⁻-sönderfall', betaPlus: 'Beta⁺-sönderfall', gamma: 'Gammasönderfall' };
                    const headingSize = Math.max(16, Math.min(24, w / 30));
                    ctx.save();
                    ctx.font = `bold ${headingSize}px Poppins, sans-serif`;
                    ctx.fillStyle = '#e2e8f0';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = 'rgba(56,189,248,0.3)';
                    ctx.shadowBlur = 8;
                    ctx.fillText(DECAY_TITLES[decayType], w / 2, 24);
                    ctx.restore();

                    // Parent isotope label closer to nucleus
                    const nucleusTop = cy - (maxGridR * scale + drawR);
                    const titleSize = Math.max(16, Math.min(22, w / 32));
                    const nLabels = NUCLEUS_LABELS[decayType];
                    ctx.save();
                    ctx.shadowColor = 'rgba(56,189,248,0.3)';
                    ctx.shadowBlur = 8;
                    drawNucleusLabel(ctx, w / 2, nucleusTop - 18, nLabels.parent, titleSize, '#e2e8f0');
                    ctx.restore();

                    // "Exciterat tillstånd" label for gamma
                    if (decayType === 'gamma') {
                        ctx.save();
                        ctx.globalAlpha = 0.75 + Math.sin(time * 2) * 0.15;
                        ctx.font = `bold ${Math.max(11, titleSize * 0.6)}px Poppins, sans-serif`;
                        ctx.fillStyle = '#fbbf24';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.shadowColor = '#fbbf24';
                        ctx.shadowBlur = 12;
                        ctx.fillText('Exciterat tillstånd', w / 2, nucleusTop - 36);
                        ctx.restore();
                    }

                    // Formula at bottom
                    const fmSize = Math.max(13, Math.min(19, w / 40));
                    const fTokens = FORMULA_TOKENS[decayType];
                    drawFormula(ctx, w / 2, h - 18, fTokens, fmSize, '#94a3b8');

                    // Legend top-left
                    drawLegend(ctx, decayType, 12, 16, currentPhase, progress);

                } else if (currentPhase === 'animating' || currentPhase === 'done') {
                    // ── SINGLE VIEW: decay animation / final products ────────
                    const padding = nr * 3;
                    const availR  = Math.min(w, h) * 0.42 - padding;
                    const scale   = maxGridR > 0 ? availR / (maxGridR + nr) : availR;
                    const drawR   = Math.max(nr, scale * 0.48);
                    const cx = w / 2;
                    const cy = h / 2;

                    // prodProg is just the raw animation progress (0 to 1), no hold
                    const prodProg = progress;

                    // Decay type title at top
                    const DECAY_TITLES = { alpha: 'Alfasönderfall', betaMinus: 'Beta⁻-sönderfall', betaPlus: 'Beta⁺-sönderfall', gamma: 'Gammasönderfall' };
                    const headingSize = Math.max(16, Math.min(24, w / 30));
                    ctx.save();
                    ctx.font = `bold ${headingSize}px Poppins, sans-serif`;
                    ctx.fillStyle = '#e2e8f0';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = 'rgba(56,189,248,0.3)';
                    ctx.shadowBlur = 8;
                    ctx.fillText(DECAY_TITLES[decayType], w / 2, 24);
                    ctx.restore();

                    const lblSize = Math.max(16, Math.min(22, w / 32));
                    const nLabels = NUCLEUS_LABELS[decayType];

                    // ── ALPHA single view ─────────────────────────────────────
                    if (decayType === 'alpha') {
                        const alphaSet = new Set(specialIndices);

                        // Tight diamond cluster offsets
                        const cR = drawR * 1.1;
                        const alphaProtons  = specialIndices.filter(i => nucleons[i].type === 'proton');
                        const alphaNeutrons = specialIndices.filter(i => nucleons[i].type === 'neutron');
                        const orderedAlpha = [alphaProtons[0], alphaNeutrons[0], alphaProtons[1], alphaNeutrons[1]];
                        const clusterOffsets = [
                            { dx: -cR, dy: 0 },
                            { dx: 0,   dy: -cR },
                            { dx: cR,  dy: 0 },
                            { dx: 0,   dy: cR },
                        ];

                        const convergeProg = easeInOut(clamp(prodProg / 0.40, 0, 1));
                        const driftProg    = easeInOut(clamp((prodProg - 0.15) / 0.75, 0, 1));

                        const nucleusVisR = maxGridR * scale + drawR;
                        const targetDist  = nucleusVisR + drawR * 8;
                        const clusterCX   = cx + targetDist * driftProg;
                        const clusterCY   = cy;

                        // Draw daughter nucleus (all nucleons except alpha ones)
                        const daughterJiggle = drawR * 0.08;
                        nucleons.forEach((n, idx) => {
                            if (alphaSet.has(idx)) return;
                            const jx = Math.sin(time * 4.1 + idx * 1.3) * daughterJiggle;
                            const jy = Math.cos(time * 3.7 + idx * 0.9) * daughterJiggle;
                            const px = cx + n.gx * scale + jx;
                            const py = cy + n.gy * scale + jy;
                            const color = n.type === 'proton' ? COL_PROTON : COL_NEUTRON;
                            drawNucleon(ctx, px, py, drawR, color);
                        });

                        // Alpha nucleons: interpolate from original grid position to tight cluster
                        const glowAmt = 12 + Math.sin(time * 6) * 4;
                        orderedAlpha.forEach((idx, si) => {
                            const n = nucleons[idx];
                            const origX = cx + n.gx * scale;
                            const origY = cy + n.gy * scale;
                            const targetX = clusterCX + clusterOffsets[si].dx;
                            const targetY = clusterCY + clusterOffsets[si].dy;
                            const px = origX + (targetX - origX) * convergeProg;
                            const py = origY + (targetY - origY) * convergeProg;
                            const color = n.type === 'proton' ? COL_PROTON : COL_NEUTRON;
                            drawNucleon(ctx, px, py, drawR, color, COL_ALPHA, glowAmt);
                        });

                        // Circle border around alpha cluster (once mostly converged)
                        if (convergeProg > 0.5) {
                            ctx.save();
                            ctx.globalAlpha = (convergeProg - 0.5) * 2 * 0.45;
                            ctx.strokeStyle = COL_ALPHA;
                            ctx.lineWidth = 1.5;
                            ctx.shadowColor = COL_ALPHA;
                            ctx.shadowBlur = 10;
                            ctx.beginPath();
                            ctx.arc(clusterCX, clusterCY, cR + drawR + 3, 0, Math.PI * 2);
                            ctx.stroke();
                            ctx.restore();
                        }

                        // Alpha label above the cluster
                        if (prodProg > 0.4) {
                            const alphaInfo = { mass: '4', Z: '2', symbol: 'He', name: 'Helium-4' };
                            ctx.save();
                            ctx.globalAlpha = clamp((prodProg - 0.4) / 0.25, 0, 1);
                            ctx.shadowColor = COL_ALPHA;
                            ctx.shadowBlur = 12;
                            drawNucleusLabel(ctx, clusterCX, clusterCY - cR - drawR - 14, alphaInfo, lblSize, COL_ALPHA, '(α)');
                            ctx.restore();
                        }

                        // Daughter label above nucleus
                        const nucleusTopY = cy - (maxGridR * scale + drawR);
                        ctx.save();
                        ctx.globalAlpha = clamp(prodProg / 0.3, 0, 1);
                        ctx.shadowColor = 'rgba(56,189,248,0.4)';
                        ctx.shadowBlur = 8;
                        drawNucleusLabel(ctx, cx, nucleusTopY - 18, nLabels.daughter, lblSize, '#38bdf8');
                        ctx.restore();
                    }

                    // ── BETA⁻ single view ─────────────────────────────────────
                    if (decayType === 'betaMinus') {
                        const convIdx = specialIndices[0];
                        const convNucleon = nucleons[convIdx];
                        const ejectProg = clamp((prodProg - 0.3) / 0.7, 0, 1);
                        const rightJiggle = drawR * 0.08;

                        nucleons.forEach((n, idx) => {
                            const jx = Math.sin(time * 4.1 + idx * 1.3) * rightJiggle;
                            const jy = Math.cos(time * 3.7 + idx * 0.9) * rightJiggle;
                            const px = cx + n.gx * scale + jx;
                            const py = cy + n.gy * scale + jy;

                            if (idx === convIdx) {
                                drawNucleon(ctx, px, py, drawR, COL_PROTON, '#fff', 8);
                                if (prodProg < 0.7) {
                                    ctx.save();
                                    ctx.globalAlpha = clamp(prodProg / 0.3, 0, 1) * (1 - clamp((prodProg - 0.5) / 0.2, 0, 1));
                                    ctx.font = `italic bold ${drawR * 1.3}px Poppins, sans-serif`;
                                    ctx.fillStyle = '#fff';
                                    ctx.textAlign = 'center';
                                    ctx.textBaseline = 'middle';
                                    ctx.shadowColor = '#fff';
                                    ctx.shadowBlur = 10;
                                    ctx.fillText('n \u2192 p', px, py - drawR * 2.2);
                                    ctx.restore();
                                }
                            } else {
                                const color = n.type === 'proton' ? COL_PROTON : COL_NEUTRON;
                                drawNucleon(ctx, px, py, drawR, color);
                            }
                        });

                        // Electron & antineutrino: fly out and settle to the right
                        const nucleusVisR = maxGridR * scale + drawR;
                        const eRadius = drawR * 0.55;
                        const nuRadius = drawR * 0.35;
                        const particleSpacing = drawR * 6;
                        const eFinalX = cx + nucleusVisR + drawR * 5;
                        const eFinalY = cy;
                        const nuFinalX = eFinalX + particleSpacing;
                        const nuFinalY = cy;
                        const eStartX = cx + convNucleon.gx * scale;
                        const eStartY = cy + convNucleon.gy * scale;

                        if (ejectProg > 0) {
                            const eProg = easeInOut(clamp(ejectProg / 0.8, 0, 1));
                            const ex = eStartX + (eFinalX - eStartX) * eProg;
                            const ey = eStartY + (eFinalY - eStartY) * eProg;
                            ctx.save();
                            ctx.shadowColor = COL_ALPHA;
                            ctx.shadowBlur = 14;
                            ctx.beginPath();
                            ctx.arc(ex, ey, eRadius, 0, Math.PI * 2);
                            ctx.fillStyle = COL_ELECTRON;
                            ctx.fill();
                            ctx.strokeStyle = COL_ALPHA;
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.arc(ex, ey, eRadius + 3, 0, Math.PI * 2);
                            ctx.stroke();
                            ctx.restore();

                            if (ejectProg > 0.5) {
                                const eInfo = { mass: '0', Z: '-1', symbol: 'e\u207B', name: '' };
                                ctx.save();
                                ctx.globalAlpha = clamp((ejectProg - 0.5) / 0.3, 0, 1);
                                ctx.shadowColor = COL_ALPHA;
                                ctx.shadowBlur = 10;
                                drawNucleusLabel(ctx, ex, ey - eRadius - 18, eInfo, lblSize, COL_ALPHA, '(\u03B2\u207B)');
                                ctx.restore();
                            }
                        }

                        if (ejectProg > 0.1) {
                            const nuProg = easeInOut(clamp((ejectProg - 0.1) / 0.8, 0, 1));
                            const nx = eStartX + (nuFinalX - eStartX) * nuProg;
                            const ny = eStartY + (nuFinalY - eStartY) * nuProg;
                            ctx.save();
                            ctx.shadowColor = COL_NEUTRINO;
                            ctx.shadowBlur = 8;
                            ctx.beginPath();
                            ctx.arc(nx, ny, nuRadius, 0, Math.PI * 2);
                            ctx.fillStyle = COL_NEUTRINO;
                            ctx.fill();
                            ctx.restore();

                            if (ejectProg > 0.5) {
                                ctx.save();
                                ctx.globalAlpha = clamp((ejectProg - 0.5) / 0.3, 0, 1);
                                ctx.font = `bold ${lblSize}px Poppins, sans-serif`;
                                ctx.fillStyle = COL_NEUTRINO;
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'alphabetic';
                                ctx.fillText('\u03BD\u0304\u2091', nx, ny - nuRadius - 10);
                                ctx.restore();
                            }
                        }

                        // Daughter label above nucleus
                        const nucleusTopY = cy - (maxGridR * scale + drawR);
                        ctx.save();
                        ctx.globalAlpha = clamp(prodProg / 0.3, 0, 1);
                        ctx.shadowColor = 'rgba(56,189,248,0.4)';
                        ctx.shadowBlur = 8;
                        drawNucleusLabel(ctx, cx, nucleusTopY - 18, nLabels.daughter, lblSize, '#38bdf8');
                        ctx.restore();
                    }

                    // ── BETA⁺ single view ─────────────────────────────────────
                    if (decayType === 'betaPlus') {
                        const convIdx = specialIndices[0];
                        const convNucleon = nucleons[convIdx];
                        const ejectProg = clamp((prodProg - 0.3) / 0.7, 0, 1);
                        const rightJiggle = drawR * 0.08;

                        nucleons.forEach((n, idx) => {
                            const jx = Math.sin(time * 4.1 + idx * 1.3) * rightJiggle;
                            const jy = Math.cos(time * 3.7 + idx * 0.9) * rightJiggle;
                            const px = cx + n.gx * scale + jx;
                            const py = cy + n.gy * scale + jy;

                            if (idx === convIdx) {
                                drawNucleon(ctx, px, py, drawR, COL_NEUTRON, '#fff', 8);
                                if (prodProg < 0.7) {
                                    ctx.save();
                                    ctx.globalAlpha = clamp(prodProg / 0.3, 0, 1) * (1 - clamp((prodProg - 0.5) / 0.2, 0, 1));
                                    ctx.font = `italic bold ${drawR * 1.3}px Poppins, sans-serif`;
                                    ctx.fillStyle = '#fff';
                                    ctx.textAlign = 'center';
                                    ctx.textBaseline = 'middle';
                                    ctx.shadowColor = '#fff';
                                    ctx.shadowBlur = 10;
                                    ctx.fillText('p \u2192 n', px, py - drawR * 2.2);
                                    ctx.restore();
                                }
                            } else {
                                const color = n.type === 'proton' ? COL_PROTON : COL_NEUTRON;
                                drawNucleon(ctx, px, py, drawR, color);
                            }
                        });

                        // Positron & neutrino: fly out and settle to the right
                        const nucleusVisRBp = maxGridR * scale + drawR;
                        const eRadiusBp = drawR * 0.55;
                        const nuRadiusBp = drawR * 0.35;
                        const particleSpacingBp = drawR * 6;
                        const eFinalXBp = cx + nucleusVisRBp + drawR * 5;
                        const eFinalYBp = cy;
                        const nuFinalXBp = eFinalXBp + particleSpacingBp;
                        const nuFinalYBp = cy;
                        const eStartXBp = cx + convNucleon.gx * scale;
                        const eStartYBp = cy + convNucleon.gy * scale;

                        if (ejectProg > 0) {
                            const eProg = easeInOut(clamp(ejectProg / 0.8, 0, 1));
                            const ex = eStartXBp + (eFinalXBp - eStartXBp) * eProg;
                            const ey = eStartYBp + (eFinalYBp - eStartYBp) * eProg;
                            ctx.save();
                            ctx.shadowColor = COL_ALPHA;
                            ctx.shadowBlur = 14;
                            ctx.beginPath();
                            ctx.arc(ex, ey, eRadiusBp, 0, Math.PI * 2);
                            ctx.fillStyle = COL_POSITRON;
                            ctx.fill();
                            ctx.strokeStyle = COL_ALPHA;
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.arc(ex, ey, eRadiusBp + 3, 0, Math.PI * 2);
                            ctx.stroke();
                            ctx.restore();

                            if (ejectProg > 0.5) {
                                const eInfoBp = { mass: '0', Z: '1', symbol: 'e\u207A', name: '' };
                                ctx.save();
                                ctx.globalAlpha = clamp((ejectProg - 0.5) / 0.3, 0, 1);
                                ctx.shadowColor = COL_ALPHA;
                                ctx.shadowBlur = 10;
                                drawNucleusLabel(ctx, ex, ey - eRadiusBp - 18, eInfoBp, lblSize, COL_ALPHA, '(\u03B2\u207A)');
                                ctx.restore();
                            }
                        }

                        if (ejectProg > 0.1) {
                            const nuProg = easeInOut(clamp((ejectProg - 0.1) / 0.8, 0, 1));
                            const nx = eStartXBp + (nuFinalXBp - eStartXBp) * nuProg;
                            const ny = eStartYBp + (nuFinalYBp - eStartYBp) * nuProg;
                            ctx.save();
                            ctx.shadowColor = COL_NEUTRINO;
                            ctx.shadowBlur = 8;
                            ctx.beginPath();
                            ctx.arc(nx, ny, nuRadiusBp, 0, Math.PI * 2);
                            ctx.fillStyle = COL_NEUTRINO;
                            ctx.fill();
                            ctx.restore();

                            if (ejectProg > 0.5) {
                                ctx.save();
                                ctx.globalAlpha = clamp((ejectProg - 0.5) / 0.3, 0, 1);
                                ctx.font = `bold ${lblSize}px Poppins, sans-serif`;
                                ctx.fillStyle = COL_NEUTRINO;
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'alphabetic';
                                ctx.fillText('\u03BD\u2091', nx, ny - nuRadiusBp - 10);
                                ctx.restore();
                            }
                        }

                        // Daughter label above nucleus
                        const nucleusTopY = cy - (maxGridR * scale + drawR);
                        ctx.save();
                        ctx.globalAlpha = clamp(prodProg / 0.3, 0, 1);
                        ctx.shadowColor = 'rgba(56,189,248,0.4)';
                        ctx.shadowBlur = 8;
                        drawNucleusLabel(ctx, cx, nucleusTopY - 18, nLabels.daughter, lblSize, '#38bdf8');
                        ctx.restore();
                    }

                    // ── GAMMA single view ─────────────────────────────────────
                    if (decayType === 'gamma') {
                        // Ground state: calm nucleus (slight residual jiggle that fades)
                        const calmProg = clamp(prodProg / 0.3, 0, 1);
                        const jiggleAmp = drawR * (0.22 - 0.19 * calmProg);
                        const glowStr = (10 + Math.sin(time * 8) * 5) * (1 - calmProg);

                        nucleons.forEach((n, idx) => {
                            const freq = decayType === 'gamma' ? (5 + idx * 0.13) - calmProg * 3 : 2;
                            const jx = Math.sin(time * freq + idx * 1.3) * jiggleAmp;
                            const jy = Math.cos(time * (freq - 0.3) + idx * 0.9) * jiggleAmp;
                            const px = cx + n.gx * scale + jx;
                            const py = cy + n.gy * scale + jy;
                            const color = n.type === 'proton' ? COL_PROTON : COL_NEUTRON;
                            drawNucleon(ctx, px, py, drawR, color, calmProg < 1 ? color : null, glowStr * 0.7);
                        });

                        // "Grundtillstånd" label
                        if (prodProg > 0.2) {
                            const gtTopY = cy - (maxGridR * scale + drawR);
                            ctx.save();
                            ctx.globalAlpha = clamp((prodProg - 0.2) / 0.3, 0, 1);
                            ctx.font = `bold ${Math.max(10, lblSize * 0.7)}px Poppins, sans-serif`;
                            ctx.fillStyle = '#38bdf8';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.shadowColor = '#38bdf8';
                            ctx.shadowBlur = 10;
                            ctx.fillText('Grundtillst\u00e5nd', cx, gtTopY - 36);
                            ctx.restore();
                        }

                        // Wavy gamma photon going to the right
                        const gammaProg = clamp((prodProg - 0.1) / 0.7, 0, 1);
                        const gammaFade = clamp((prodProg - 0.85) / 0.15, 0, 1);
                        const nucleusVisRG = maxGridR * scale + drawR;
                        const gammaStartX = cx + nucleusVisRG + drawR;
                        const gammaEndX   = cx + nucleusVisRG + drawR * 12;
                        const gammaFinalX = gammaStartX + (gammaEndX - gammaStartX) * easeInOut(gammaProg);
                        const gammaY = cy;

                        if (gammaProg > 0) {
                            const numWaves = 5;
                            const waveAmp  = drawR * 1.4;
                            const steps = 80;
                            const waveLength = gammaFinalX - gammaStartX;

                            ctx.save();
                            ctx.globalAlpha = clamp(gammaProg / 0.2, 0, 1) * (1 - gammaFade);
                            ctx.strokeStyle = COL_GAMMA;
                            ctx.lineWidth = 2.5;
                            ctx.shadowColor = COL_GAMMA;
                            ctx.shadowBlur = 18;
                            ctx.lineJoin = 'round';
                            ctx.beginPath();
                            for (let s = 0; s <= steps; s++) {
                                const frac = s / steps;
                                const px = gammaStartX + frac * waveLength;
                                const py = gammaY + Math.sin(frac * numWaves * Math.PI * 2) * waveAmp;
                                s === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                            }
                            ctx.stroke();
                            ctx.restore();

                            const gDotR = drawR * 0.5;
                            ctx.save();
                            ctx.globalAlpha = clamp(gammaProg / 0.2, 0, 1);
                            ctx.shadowColor = COL_GAMMA;
                            ctx.shadowBlur = 16;
                            ctx.beginPath();
                            ctx.arc(gammaFinalX, gammaY, gDotR, 0, Math.PI * 2);
                            ctx.fillStyle = COL_GAMMA;
                            ctx.fill();
                            ctx.restore();

                            if (gammaProg > 0.3) {
                                ctx.save();
                                ctx.globalAlpha = clamp((gammaProg - 0.3) / 0.25, 0, 1);
                                ctx.font = `bold ${lblSize}px Poppins, sans-serif`;
                                ctx.fillStyle = COL_GAMMA;
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'alphabetic';
                                ctx.shadowColor = COL_GAMMA;
                                ctx.shadowBlur = 12;
                                ctx.fillText('\u03B3', gammaFinalX, gammaY - gDotR - 10);
                                ctx.restore();
                            }
                        }

                        // Daughter label above nucleus
                        const nucleusTopY = cy - (maxGridR * scale + drawR);
                        ctx.save();
                        ctx.globalAlpha = clamp(prodProg / 0.3, 0, 1);
                        ctx.shadowColor = 'rgba(56,189,248,0.4)';
                        ctx.shadowBlur = 8;
                        drawNucleusLabel(ctx, cx, nucleusTopY - 18, nLabels.daughter, lblSize, '#38bdf8');
                        ctx.restore();
                    }

                    // Legend top-left
                    drawLegend(ctx, decayType, 12, 16, currentPhase, progress);

                } else if (currentPhase === 'formula') {
                    // ── SPLIT VIEW: Före (left) | Efter (right) ──────────────
                    const panelW = w / 2;

                    // Compute scale that fits a nucleus in a half-width panel
                    const padding = nr * 3;
                    const availR  = Math.min(panelW - 10, h - 80) * 0.40 - padding;
                    const scale   = maxGridR > 0 ? availR / (maxGridR + nr) : availR;
                    const drawR   = Math.max(nr, scale * 0.48);

                    // Panel centres
                    const lcx = w / 4;
                    const lcy = h / 2 + 8;
                    const rcx = 3 * w / 4;
                    const rcy = h / 2 + 8;

                    // Static final state: prodProg = 1
                    const prodProg = 1;

                    // ── Dashed divider ────────────────────────────────────────
                    ctx.save();
                    ctx.strokeStyle = 'rgba(148,163,184,0.25)';
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([6, 6]);
                    ctx.beginPath();
                    ctx.moveTo(w / 2, 10);
                    ctx.lineTo(w / 2, h - 10);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.restore();

                    // ── Panel headers ─────────────────────────────────────────
                    const hdrSize = Math.max(13, Math.min(18, w / 45));
                    ctx.save();
                    ctx.font = `bold ${hdrSize}px Poppins, sans-serif`;
                    ctx.textBaseline = 'top';
                    ctx.textAlign = 'center';
                    ctx.fillStyle = '#94a3b8';
                    ctx.fillText('F\u00f6re', w / 4, 10);
                    ctx.fillText('Efter', 3 * w / 4, 10);
                    ctx.restore();

                    // ── LEFT PANEL: frozen original nucleus with subtle jiggle ─
                    const leftJiggle = decayType === 'gamma' ? drawR * 0.22 : drawR * 0.10;
                    const leftGlowStr = decayType === 'gamma' ? 10 + Math.sin(time * 8) * 5 : 0;

                    nucleons.forEach((n, idx) => {
                        const jx = Math.sin(time * (decayType === 'gamma' ? 5 + idx * 0.13 : 4.1) + idx * 1.3) * leftJiggle;
                        const jy = Math.cos(time * (decayType === 'gamma' ? 4.7 + idx * 0.11 : 3.7) + idx * 0.9) * leftJiggle;
                        const px = lcx + n.gx * scale + jx;
                        const py = lcy + n.gy * scale + jy;
                        const color = n.type === 'proton' ? COL_PROTON : COL_NEUTRON;
                        drawNucleon(ctx, px, py, drawR, color, decayType === 'gamma' ? color : null, leftGlowStr * 0.7);
                    });

                    // Parent label above left-panel nucleus
                    const parentTopY = lcy - (maxGridR * scale + drawR);
                    const lblSize = Math.max(14, Math.min(20, w / 42));
                    const nLabels = NUCLEUS_LABELS[decayType];
                    ctx.save();
                    ctx.shadowColor = 'rgba(56,189,248,0.3)';
                    ctx.shadowBlur = 6;
                    drawNucleusLabel(ctx, lcx, parentTopY - 18, nLabels.parent, lblSize, '#e2e8f0');
                    ctx.restore();

                    // Gamma: "Exciterat tillstånd" below parent label
                    if (decayType === 'gamma') {
                        ctx.save();
                        ctx.globalAlpha = 0.85;
                        ctx.font = `bold ${Math.max(10, lblSize * 0.7)}px Poppins, sans-serif`;
                        ctx.fillStyle = '#fbbf24';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.shadowColor = '#fbbf24';
                        ctx.shadowBlur = 12;
                        ctx.fillText('Exciterat tillst\u00e5nd', lcx, parentTopY - 40);
                        ctx.restore();
                    }

                    // ── RIGHT PANEL: decay products (static final state) ─────

                    // ── ALPHA right panel ─────────────────────────────────────
                    if (decayType === 'alpha') {
                        const alphaSet = new Set(specialIndices);

                        const cR = drawR * 1.1;
                        const alphaProtons  = specialIndices.filter(i => nucleons[i].type === 'proton');
                        const alphaNeutrons = specialIndices.filter(i => nucleons[i].type === 'neutron');
                        const orderedAlpha = [alphaProtons[0], alphaNeutrons[0], alphaProtons[1], alphaNeutrons[1]];
                        const clusterOffsets = [
                            { dx: -cR, dy: 0 },
                            { dx: 0,   dy: -cR },
                            { dx: cR,  dy: 0 },
                            { dx: 0,   dy: cR },
                        ];

                        const nucleusVisR = maxGridR * scale + drawR;
                        const targetDist  = nucleusVisR + drawR * 8;
                        const clusterCX   = rcx + targetDist;
                        const clusterCY   = rcy;

                        // Draw daughter nucleus
                        const daughterJiggle = drawR * 0.08;
                        nucleons.forEach((n, idx) => {
                            if (alphaSet.has(idx)) return;
                            const jx = Math.sin(time * 4.1 + idx * 1.3) * daughterJiggle;
                            const jy = Math.cos(time * 3.7 + idx * 0.9) * daughterJiggle;
                            const px = rcx + n.gx * scale + jx;
                            const py = rcy + n.gy * scale + jy;
                            const color = n.type === 'proton' ? COL_PROTON : COL_NEUTRON;
                            drawNucleon(ctx, px, py, drawR, color);
                        });

                        // Alpha cluster at final position
                        const glowAmt = 12 + Math.sin(time * 6) * 4;
                        orderedAlpha.forEach((idx, si) => {
                            const targetX = clusterCX + clusterOffsets[si].dx;
                            const targetY = clusterCY + clusterOffsets[si].dy;
                            const color = nucleons[idx].type === 'proton' ? COL_PROTON : COL_NEUTRON;
                            drawNucleon(ctx, targetX, targetY, drawR, color, COL_ALPHA, glowAmt);
                        });

                        // Circle border
                        ctx.save();
                        ctx.globalAlpha = 0.45;
                        ctx.strokeStyle = COL_ALPHA;
                        ctx.lineWidth = 1.5;
                        ctx.shadowColor = COL_ALPHA;
                        ctx.shadowBlur = 10;
                        ctx.beginPath();
                        ctx.arc(clusterCX, clusterCY, cR + drawR + 3, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.restore();

                        // Alpha label
                        const alphaInfo = { mass: '4', Z: '2', symbol: 'He', name: 'Helium-4' };
                        ctx.save();
                        ctx.shadowColor = COL_ALPHA;
                        ctx.shadowBlur = 12;
                        drawNucleusLabel(ctx, clusterCX, clusterCY - cR - drawR - 14, alphaInfo, lblSize, COL_ALPHA, '(\u03B1)');
                        ctx.restore();
                    }

                    // ── BETA⁻ right panel ─────────────────────────────────────
                    if (decayType === 'betaMinus') {
                        const convIdx = specialIndices[0];
                        const convNucleon = nucleons[convIdx];
                        const rightJiggle = drawR * 0.08;

                        // Shift group left so electron is roughly centered in right panel
                        const nucleusVisR_bm = maxGridR * scale + drawR;
                        const groupExtent = nucleusVisR_bm + drawR * 5 + drawR * 6;
                        const groupShift = (groupExtent - nucleusVisR_bm) / 2;
                        const bmRcx = rcx - groupShift;

                        nucleons.forEach((n, idx) => {
                            const jx = Math.sin(time * 4.1 + idx * 1.3) * rightJiggle;
                            const jy = Math.cos(time * 3.7 + idx * 0.9) * rightJiggle;
                            const px = bmRcx + n.gx * scale + jx;
                            const py = rcy + n.gy * scale + jy;

                            if (idx === convIdx) {
                                drawNucleon(ctx, px, py, drawR, COL_PROTON, '#fff', 8);
                            } else {
                                const color = n.type === 'proton' ? COL_PROTON : COL_NEUTRON;
                                drawNucleon(ctx, px, py, drawR, color);
                            }
                        });

                        const nucleusVisR = nucleusVisR_bm;
                        const eRadius = drawR * 0.55;
                        const nuRadius = drawR * 0.35;
                        const particleSpacing = drawR * 6;
                        const eFinalX = bmRcx + nucleusVisR + drawR * 5;
                        const eFinalY = rcy;
                        const nuFinalX = eFinalX + particleSpacing;
                        const nuFinalY = rcy;

                        // Electron at final position
                        ctx.save();
                        ctx.shadowColor = COL_ALPHA;
                        ctx.shadowBlur = 14;
                        ctx.beginPath();
                        ctx.arc(eFinalX, eFinalY, eRadius, 0, Math.PI * 2);
                        ctx.fillStyle = COL_ELECTRON;
                        ctx.fill();
                        ctx.strokeStyle = COL_ALPHA;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(eFinalX, eFinalY, eRadius + 3, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.restore();

                        const eInfo = { mass: '0', Z: '-1', symbol: 'e\u207B', name: '' };
                        ctx.save();
                        ctx.shadowColor = COL_ALPHA;
                        ctx.shadowBlur = 10;
                        drawNucleusLabel(ctx, eFinalX, eFinalY - eRadius - 18, eInfo, lblSize, COL_ALPHA, '(\u03B2\u207B)');
                        ctx.restore();

                        // Antineutrino at final position
                        ctx.save();
                        ctx.shadowColor = COL_NEUTRINO;
                        ctx.shadowBlur = 8;
                        ctx.beginPath();
                        ctx.arc(nuFinalX, nuFinalY, nuRadius, 0, Math.PI * 2);
                        ctx.fillStyle = COL_NEUTRINO;
                        ctx.fill();
                        ctx.restore();

                        ctx.save();
                        ctx.font = `bold ${lblSize}px Poppins, sans-serif`;
                        ctx.fillStyle = COL_NEUTRINO;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'alphabetic';
                        ctx.fillText('\u03BD\u0304\u2091', nuFinalX, nuFinalY - nuRadius - 10);
                        ctx.restore();
                    }

                    // ── BETA⁺ right panel ─────────────────────────────────────
                    if (decayType === 'betaPlus') {
                        const convIdx = specialIndices[0];
                        const convNucleon = nucleons[convIdx];
                        const rightJiggle = drawR * 0.08;

                        // Shift group left so positron is roughly centered in right panel
                        const nucleusVisRBp = maxGridR * scale + drawR;
                        const groupShiftBp = (drawR * 5 + drawR * 6) / 2;
                        const bpRcx = rcx - groupShiftBp;

                        nucleons.forEach((n, idx) => {
                            const jx = Math.sin(time * 4.1 + idx * 1.3) * rightJiggle;
                            const jy = Math.cos(time * 3.7 + idx * 0.9) * rightJiggle;
                            const px = bpRcx + n.gx * scale + jx;
                            const py = rcy + n.gy * scale + jy;

                            if (idx === convIdx) {
                                drawNucleon(ctx, px, py, drawR, COL_NEUTRON, '#fff', 8);
                            } else {
                                const color = n.type === 'proton' ? COL_PROTON : COL_NEUTRON;
                                drawNucleon(ctx, px, py, drawR, color);
                            }
                        });

                        const eRadiusBp = drawR * 0.55;
                        const nuRadiusBp = drawR * 0.35;
                        const particleSpacingBp = drawR * 6;
                        const eFinalXBp = bpRcx + nucleusVisRBp + drawR * 5;
                        const eFinalYBp = rcy;
                        const nuFinalXBp = eFinalXBp + particleSpacingBp;
                        const nuFinalYBp = rcy;

                        // Positron at final position
                        ctx.save();
                        ctx.shadowColor = COL_ALPHA;
                        ctx.shadowBlur = 14;
                        ctx.beginPath();
                        ctx.arc(eFinalXBp, eFinalYBp, eRadiusBp, 0, Math.PI * 2);
                        ctx.fillStyle = COL_POSITRON;
                        ctx.fill();
                        ctx.strokeStyle = COL_ALPHA;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(eFinalXBp, eFinalYBp, eRadiusBp + 3, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.restore();

                        const eInfoBp = { mass: '0', Z: '1', symbol: 'e\u207A', name: '' };
                        ctx.save();
                        ctx.shadowColor = COL_ALPHA;
                        ctx.shadowBlur = 10;
                        drawNucleusLabel(ctx, eFinalXBp, eFinalYBp - eRadiusBp - 18, eInfoBp, lblSize, COL_ALPHA, '(\u03B2\u207A)');
                        ctx.restore();

                        // Neutrino at final position
                        ctx.save();
                        ctx.shadowColor = COL_NEUTRINO;
                        ctx.shadowBlur = 8;
                        ctx.beginPath();
                        ctx.arc(nuFinalXBp, nuFinalYBp, nuRadiusBp, 0, Math.PI * 2);
                        ctx.fillStyle = COL_NEUTRINO;
                        ctx.fill();
                        ctx.restore();

                        ctx.save();
                        ctx.font = `bold ${lblSize}px Poppins, sans-serif`;
                        ctx.fillStyle = COL_NEUTRINO;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'alphabetic';
                        ctx.fillText('\u03BD\u2091', nuFinalXBp, nuFinalYBp - nuRadiusBp - 10);
                        ctx.restore();
                    }

                    // ── GAMMA right panel ─────────────────────────────────────
                    if (decayType === 'gamma') {
                        const calmJiggle = drawR * 0.03;
                        nucleons.forEach((n, idx) => {
                            const jx = Math.sin(time * 2 + idx * 1.3) * calmJiggle;
                            const jy = Math.cos(time * 1.7 + idx * 0.9) * calmJiggle;
                            const px = rcx + n.gx * scale + jx;
                            const py = rcy + n.gy * scale + jy;
                            const color = n.type === 'proton' ? COL_PROTON : COL_NEUTRON;
                            drawNucleon(ctx, px, py, drawR, color);
                        });

                        // "Grundtillstånd" label
                        const gtTopY = rcy - (maxGridR * scale + drawR);
                        ctx.save();
                        ctx.font = `bold ${Math.max(10, lblSize * 0.7)}px Poppins, sans-serif`;
                        ctx.fillStyle = '#38bdf8';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.shadowColor = '#38bdf8';
                        ctx.shadowBlur = 10;
                        ctx.fillText('Grundtillst\u00e5nd', rcx, gtTopY - 40);
                        ctx.restore();

                        // Gamma dot at final position (no wave)
                        const nucleusVisRG = maxGridR * scale + drawR;
                        const gammaEndX = rcx + nucleusVisRG + drawR * 12;
                        const gammaY = rcy;
                        const gDotR = drawR * 0.5;

                        ctx.save();
                        ctx.shadowColor = COL_GAMMA;
                        ctx.shadowBlur = 16;
                        ctx.beginPath();
                        ctx.arc(gammaEndX, gammaY, gDotR, 0, Math.PI * 2);
                        ctx.fillStyle = COL_GAMMA;
                        ctx.fill();
                        ctx.restore();

                        ctx.save();
                        ctx.font = `bold ${lblSize}px Poppins, sans-serif`;
                        ctx.fillStyle = COL_GAMMA;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'alphabetic';
                        ctx.shadowColor = COL_GAMMA;
                        ctx.shadowBlur = 12;
                        ctx.fillText('\u03B3', gammaEndX, gammaY - gDotR - 10);
                        ctx.restore();
                    }

                    // Daughter label above right-panel nucleus
                    const nucleusTopY = rcy - (maxGridR * scale + drawR);
                    const daughterLabelX = (decayType === 'betaMinus' || decayType === 'betaPlus') ? rcx - drawR * 5.5 : rcx;
                    ctx.save();
                    ctx.shadowColor = 'rgba(56,189,248,0.4)';
                    ctx.shadowBlur = 8;
                    drawNucleusLabel(ctx, daughterLabelX, nucleusTopY - 18, nLabels.daughter, lblSize, '#38bdf8');
                    ctx.restore();

                    // Formula aligned with panels: reactant left, arrow center, products right
                    const fmSize = Math.max(16, Math.min(24, w / 32));
                    const fTokens = FORMULA_TOKENS[decayType];
                    const reactant = [fTokens[0]];
                    const products = fTokens.slice(2);
                    const formulaY = h - 38;
                    const formulaBoxH = fmSize * 2.2;

                    // Background box
                    ctx.save();
                    ctx.fillStyle = 'rgba(15, 23, 42, 0.85)';
                    ctx.strokeStyle = 'rgba(56, 189, 248, 0.2)';
                    ctx.lineWidth = 1;
                    const boxY = formulaY - formulaBoxH / 2;
                    const boxR = 8;
                    ctx.beginPath();
                    ctx.roundRect(10, boxY, w - 20, formulaBoxH, boxR);
                    ctx.fill();
                    ctx.stroke();
                    ctx.restore();

                    // Reactant centred in left panel
                    drawFormula(ctx, lcx, formulaY, reactant, fmSize, '#e2e8f0');

                    // Arrow at centre
                    ctx.save();
                    ctx.font = `${fmSize}px Poppins, sans-serif`;
                    ctx.fillStyle = '#e2e8f0';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('→', w / 2, formulaY);
                    ctx.restore();

                    // Products centred in right panel
                    drawFormula(ctx, rcx, formulaY, products, fmSize, '#e2e8f0');

                    // Legend top-left
                    drawLegend(ctx, decayType, 12, 16, currentPhase, progress);
                }

            }, [decayType, nucleons, specialIndices, cfg]);

            // Animation loop
            const startAnimation = useCallback(() => {
                if (stateRef.current.phase === 'animating') return;
                stateRef.current.phase = 'animating';
                stateRef.current.startTime = null;
                setPhase('animating');

                const duration = 3200; // ms

                function loop(ts) {
                    if (!stateRef.current.startTime) stateRef.current.startTime = ts;
                    const elapsed = ts - stateRef.current.startTime;
                    const prog = Math.min(elapsed / duration, 1);
                    stateRef.current.progress = prog;
                    draw(prog, 'animating');

                    if (prog < 1) {
                        stateRef.current.rafId = requestAnimationFrame(loop);
                    } else {
                        stateRef.current.phase = 'done';
                        setPhase('done');
                    }
                }
                stateRef.current.rafId = requestAnimationFrame(loop);
            }, [draw]);

            // Idle jiggle loop (also keeps running in 'done' so left panel stays alive)
            const idleRafRef = useRef(null);
            const startIdleLoop = useCallback(() => {
                function loop() {
                    const p = stateRef.current.phase;
                    if (p !== 'idle' && p !== 'done' && p !== 'formula') return;
                    draw(stateRef.current.progress, p);
                    idleRafRef.current = requestAnimationFrame(loop);
                }
                idleRafRef.current = requestAnimationFrame(loop);
            }, [draw]);

            const stopIdleLoop = useCallback(() => {
                if (idleRafRef.current) cancelAnimationFrame(idleRafRef.current);
            }, []);

            const reset = useCallback(() => {
                if (stateRef.current.rafId) cancelAnimationFrame(stateRef.current.rafId);
                stopIdleLoop();
                stateRef.current.phase = 'idle';
                stateRef.current.progress = 0;
                setPhase('idle');
            }, [stopIdleLoop]);

            const showFormula = useCallback(() => {
                stopIdleLoop();
                stateRef.current.phase = 'formula';
                stateRef.current.progress = 1;
                setPhase('formula');
            }, [stopIdleLoop]);

            // Start/stop idle loop based on phase
            useEffect(() => {
                if (phase === 'idle' || phase === 'done' || phase === 'formula') {
                    startIdleLoop();
                } else {
                    stopIdleLoop();
                }
                return () => stopIdleLoop();
            }, [phase, startIdleLoop, stopIdleLoop]);

            // Cleanup on decay type change or unmount
            useEffect(() => {
                return () => {
                    if (stateRef.current.rafId) cancelAnimationFrame(stateRef.current.rafId);
                    stopIdleLoop();
                };
            }, [decayType, stopIdleLoop]);

            // Reset when decay type changes
            useEffect(() => {
                if (stateRef.current.rafId) cancelAnimationFrame(stateRef.current.rafId);
                stopIdleLoop();
                stateRef.current.phase = 'idle';
                stateRef.current.progress = 0;
                setPhase('idle');
                // Restart idle loop since phase may already be 'idle' (effect won't re-trigger)
                setTimeout(() => startIdleLoop(), 0);
            }, [decayType]);

            // Draw initial frame whenever canvas size changes
            useEffect(() => {
                draw(stateRef.current.progress, stateRef.current.phase);
            }, [canvasSize, draw]);

            return (
                <div ref={containerRef} style={{ width: '100%' }}>
                    <canvas
                        ref={canvasRef}
                        width={canvasSize.w}
                        height={canvasSize.h}
                        style={{ width: '100%', height: 'auto', borderRadius: '0.75rem', background: '#050510' }}
                    />
                    <div className="flex gap-3 justify-center mt-5">
                        {phase === 'idle' && (
                            <button
                                onClick={startAnimation}
                                className="btn-primary px-8 py-3 rounded-xl text-base"
                                style={{ fontFamily: 'Poppins, sans-serif' }}
                            >
                                {{ alpha: 'α-sönderfall', betaMinus: 'β⁻-sönderfall', betaPlus: 'β⁺-sönderfall', gamma: 'γ-sönderfall' }[decayType]}
                            </button>
                        )}
                        {phase === 'animating' && (
                            <span
                                className="px-8 py-3 rounded-xl text-base text-slate-400"
                                style={{ fontFamily: 'Poppins, sans-serif', background: 'rgba(30,41,59,0.5)', border: '1px solid rgba(148,163,184,0.2)' }}
                            >
                                Animerar...
                            </span>
                        )}
                        {phase === 'done' && (
                            <React.Fragment>
                                <button
                                    onClick={reset}
                                    className="btn-secondary px-8 py-3 rounded-xl text-base"
                                    style={{ fontFamily: 'Poppins, sans-serif' }}
                                >
                                    Återställ
                                </button>
                                <button
                                    onClick={showFormula}
                                    className="btn-primary px-8 py-3 rounded-xl text-base"
                                    style={{ fontFamily: 'Poppins, sans-serif' }}
                                >
                                    Visa sönderfallsformel
                                </button>
                            </React.Fragment>
                        )}
                        {phase === 'formula' && (
                            <button
                                onClick={reset}
                                className="btn-secondary px-8 py-3 rounded-xl text-base"
                                style={{ fontFamily: 'Poppins, sans-serif' }}
                            >
                                Återställ
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        // ─── Equation display for each decay ─────────────────────────────────
        function DecayEquation({ decayType }) {
            const equations = {
                alpha: (
                    <span>
                        <sup>226</sup><sub>88</sub>Ra
                        {' '}&rarr;{' '}
                        <sup>222</sup><sub>86</sub>Rn
                        {' '}+{' '}
                        <sup>4</sup><sub>2</sub>He&nbsp;(α)
                    </span>
                ),
                betaMinus: (
                    <span>
                        <sup>14</sup><sub>6</sub>C
                        {' '}&rarr;{' '}
                        <sup>14</sup><sub>7</sub>N
                        {' '}+{' '}
                        e<sup>&minus;</sup>
                        {' '}+{' '}
                        &nu;&#x0305;<sub>e</sub>
                    </span>
                ),
                betaPlus: (
                    <span>
                        <sup>18</sup><sub>9</sub>F
                        {' '}&rarr;{' '}
                        <sup>18</sup><sub>8</sub>O
                        {' '}+{' '}
                        e<sup>+</sup>
                        {' '}+{' '}
                        &nu;<sub>e</sub>
                    </span>
                ),
                gamma: (
                    <span>
                        <sup>99</sup><sub>43</sub>Tc*
                        {' '}&rarr;{' '}
                        <sup>99</sup><sub>43</sub>Tc
                        {' '}+{' '}
                        &gamma;
                    </span>
                ),
            };
            return (
                <div className="equation-box">
                    {equations[decayType]}
                </div>
            );
        }

        // ─── Explanation text for each decay ──────────────────────────────────
        function DecayExplanation({ decayType }) {
            const texts = {
                alpha: 'En alfapartikel (2 protoner och 2 neutroner) lämnar kärnan. Masstalet minskar med 4 och atomnumret minskar med 2. Radium-226 omvandlas till Radon-222.',
                betaMinus: 'En neutron i kärnan omvandlas till en proton. En elektron (e⁻) och en antineutrino (ν̄ₑ) sänds ut. Atomnumret ökar med 1, masstalet är oförändrat. Kol-14 omvandlas till Kväve-14.',
                betaPlus: 'En proton i kärnan omvandlas till en neutron. En positron (e⁺) och en neutrino (νₑ) sänds ut. Atomnumret minskar med 1, masstalet är oförändrat. Fluor-18 omvandlas till Syre-18.',
                gamma: 'Kärnan befinner sig i ett exciterat tillstånd (hög energi). Den avger energi som en gammafoton (elektromagnetisk strålning) och övergår till grundtillståndet. Varken masstal eller atomnummer förändras. Teknetium-99 i exciterat tillstånd övergår till grundtillståndet.',
            };
            return <p className="explanation-box">{texts[decayType]}</p>;
        }

        // ─── Legend ────────────────────────────────────────────────────────────
        function Legend({ decayType }) {
            const items = [
                { color: '#ef4444', label: 'Proton' },
                { color: '#60a5fa', label: 'Neutron' },
            ];
            if (decayType === 'alpha') {
                items.push({ color: '#f59e0b', label: 'Alfapartikel (⁴He)' });
            }
            if (decayType === 'betaMinus') {
                items.push({ color: '#22c55e', label: 'Elektron (e⁻)' });
