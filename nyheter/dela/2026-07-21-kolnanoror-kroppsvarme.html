    <title>Forskare stoppar kolnanorören från att klumpa ihop sig — och slår rekord i att omvandla kroppsvärme till el — Fysiklabbet</title>
    <meta name="description" content="Kolnanorör har i över tjugo år setts som en nästan perfekt byggsten för böjliga generatorer som omvandlar kroppsvärme direkt till elektricitet — lätta, ledande och tåliga. Ändå har nanorörens envisa tendens att klumpa ihop sig bromsat utvecklingen. Nu har forskare vid Queensland University of Technology i Australien konstruerat en molekyl som håller nanorören isär, satt ett nytt prestandarekord och byggt en böjlig generator som drivs av kroppsvärme.">
