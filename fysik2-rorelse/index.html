<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snett kast - Fysiklabbet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300..700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles-laborans.css">
    <link rel="stylesheet" href="../styles-laborans-sim.css">
    <style>
      body.lab-sim { background: var(--lab-bg-panel) !important; }
      body.lab-sim #root > nav,
      body.lab-sim #root > div:nth-of-type(1) { display: none !important; }
      body.lab-sim .min-h-screen[style*="0f172a"],
      body.lab-sim div[style*="background-color: #0f172a"] {
        background-color: var(--lab-bg-panel) !important;
      }
      body.lab-sim h1, body.lab-sim h2, body.lab-sim h3 { color: var(--lab-ink) !important; }
      body.lab-sim .text-cyan-400, body.lab-sim .text-cyan-300,
      body.lab-sim .text-sky-400, body.lab-sim .text-sky-300 { color: var(--lab-ink) !important; }
      body.lab-sim .bg-slate-900\/70, body.lab-sim .bg-slate-900\/50,
      body.lab-sim .bg-slate-800\/50, body.lab-sim .bg-slate-800,
      body.lab-sim .bg-slate-700\/50 {
        background: var(--lab-bg) !important;
        border-color: var(--lab-line-strong) !important;
      }
      body.lab-sim button[class*="bg-cyan-5"],
      body.lab-sim button[class*="bg-cyan-6"],
      body.lab-sim button[class*="bg-sky"],
      body.lab-sim button[class*="bg-blue"] {
        background: var(--lab-accent) !important;
        color: #fff !important;
      }
      body.lab-sim input[type="range"]::-webkit-slider-thumb {
        background: var(--lab-bg) !important;
        border: 2px solid var(--lab-accent) !important;
      }
      body.lab-sim input[type="checkbox"] { accent-color: var(--lab-accent); }
    </style>
  </head>
  <body class="lab-sim">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
