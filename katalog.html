                    </div>
                </div>
            );
        }

        function Breadcrumb({ course, chapter, section }) {
            // Hoppar över "Katalog" och "Fysik" — eftersom sidan numera bara
            // har två ingångar (Fysik / Fysik nivå 2) börjar vi direkt med
            // kursnamnet.
            return (
                <div className="lab-breadcrumb">
                    {course ? (
                        <span className="lab-breadcrumb-current">{course.toUpperCase()}</span>
                    ) : (
                        <span className="lab-breadcrumb-current">FYSIKLABBET</span>
                    )}
                    {chapter && (
                        <React.Fragment>
                            <span className="lab-breadcrumb-sep">/</span>
                            <span className="lab-breadcrumb-current">{chapter.toUpperCase()}</span>
                        </React.Fragment>
                    )}
                    {section && (
                        <React.Fragment>
                            <span className="lab-breadcrumb-sep">/</span>
                            <span className="lab-breadcrumb-tail">{section}</span>
                        </React.Fragment>
                    )}
                </div>
            );
        }

        function SearchBar() {
            const [query, setQuery] = useState('');
            const [activeIdx, setActiveIdx] = useState(-1);
            const [open, setOpen] = useState(false);
            const wrapRef = useRef(null);

            const matches = useMemo(() => {
                const q = normalize(query.trim());
                if (!q) return [];
                const terms = q.split(/\s+/).filter(t => t.length > 0);
                if (terms.length === 0) return [];
                const filtered = KF.filter((_, i) => {
                    const hay = HAYSTACKS[i] || '';
                    return terms.every(t => hay.includes(t));
                });
                // Expandera varje matchat avsnitt till två rader:
                // en teori-länk (alltid) och en simulering-länk (om href finns).
                const out = [];
                for (const sim of filtered) {
                    const code = sim.course === 'Fysik nivå 2' ? 'fy2' : 'fy1';
                    out.push({ ...sim, kind: 'teori', resultHref: `katalog.html#${code}-${sim.num}` });
                    if (sim.href) {
                        out.push({ ...sim, kind: 'sim', resultHref: sim.href });
                    }
                }
                return out;
            }, [query]);

            useEffect(() => { setActiveIdx(matches.length > 0 ? 0 : -1); }, [matches.length, query]);

            useEffect(() => {
                const onDocClick = (e) => {
                    if (!wrapRef.current) return;
                    if (!wrapRef.current.contains(e.target)) setOpen(false);
                };
                document.addEventListener('click', onDocClick);
                return () => document.removeEventListener('click', onDocClick);
            }, []);

            const handleKey = (e) => {
                if (!open || matches.length === 0) return;
                if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx((activeIdx + 1) % matches.length); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); setActiveIdx((activeIdx - 1 + matches.length) % matches.length); }
                else if (e.key === 'Enter' && activeIdx >= 0) { e.preventDefault(); window.location.href = matches[activeIdx].resultHref; }
                else if (e.key === 'Escape') { setQuery(''); setOpen(false); e.target.blur(); }
            };

            return (
                <div className="lab-search lab-search--in-header" ref={wrapRef}>
                    <div className="lab-search-input-wrap">
                        <span className="lab-search-icon" aria-hidden="true">⌕</span>
                        <input type="text" value={query} className="lab-search-input"
                            placeholder="sök — t.ex. coulomb, pendel, magnetfält, ljus…"
                            autoComplete="off" aria-label="Sök på Fysiklabbet"
                            onChange={(e) => { setQuery(e.target.value); setOpen(true); }}
                            onFocus={() => { if (query.trim()) setOpen(true); }}
                            onKeyDown={handleKey} />
                        {query && (
                            <button className="lab-search-clear" aria-label="Rensa sökning"
                                onClick={() => { setQuery(''); setOpen(false); }}>✕</button>
                        )}
                    </div>
                    <div className={'lab-search-results' + (open && query.trim() ? ' visible' : '')} role="listbox">
                        {open && query.trim() && matches.length === 0 && (
                            <div className="lab-search-empty">Inga simuleringar matchar "{query}"</div>
                        )}
                        {open && matches.map((sim, idx) => (
                            <a key={`${sim.course}-${sim.num}-${sim.kind}`} href={sim.resultHref}
                                className={'lab-search-result' + (idx === activeIdx ? ' active' : '')}
                                role="option" onMouseEnter={() => setActiveIdx(idx)}>
                                <span className="lab-search-result-icon">
                                    {sim.kind === 'teori' ? '📖' : sim.icon}
                                </span>
                                <div>
                                    <div className="lab-search-result-title">
                                        <span className="lab-search-result-kind">
                                            {sim.kind === 'teori' ? 'Teori' : 'Simulering'}
                                        </span>
                                        {sim.title}
                                    </div>
                                    <div className="lab-search-result-desc">{sim.description}</div>
                                </div>
                                <div className="lab-search-result-meta">
                                    {sim.course.toUpperCase()}<br />{sim.num}
                                </div>
                            </a>
                        ))}
                    </div>
                </div>
            );
        }

        function MathematicsPlaceholder() {
            return (
                <div className="lab-placeholder">
                    <div className="lab-placeholder-title">Under uppbyggnad</div>
                    <p className="lab-placeholder-text">
                        Matematik-katalogen kommer hösten 2026. Vi planerar att täcka
                        Matematik 1 till 4 med samma typ av interaktiva utforskningar
                        som fysiken — i samma bibliotek.
                    </p>
                </div>
            );
        }

        function CourseIntro({ courseData, courseName, chapters, onPickChapter }) {
            const intro = courseData.intro;
            const totalSections = chapters.reduce((sum, ch) => {
                return sum + (courseData.chapters[ch].sections || []).length;
            }, 0);
            return (
                <div className="lab-course-intro">
                    <div className="lab-course-intro-head">
                        <span className="lab-mono-label">
                            {courseName.toUpperCase()} · ÖVERSIKT
                        </span>
                        <span className="lab-mono-label">
                            {chapters.length} KAPITEL · {totalSections} AVSNITT
                        </span>
                    </div>
                    <h2 className="lab-course-intro-title">{courseName}</h2>
                    {intro?.tagline && (
                        <p className="lab-course-intro-tagline">{intro.tagline}</p>
                    )}
                    {intro?.paragraphs?.map((p, i) => (
                        <p key={i} className="lab-course-intro-text">{p}</p>
                    ))}
                    {intro?.bullets?.length > 0 && (
                        <ul className="lab-course-intro-bullets">
                            {intro.bullets.map((b, i) => (
                                <li key={i}>{b}</li>
                            ))}
                        </ul>
                    )}
                    <div className="lab-course-intro-chapters">
                        <div className="lab-mono-label" style={{ marginBottom: 14 }}>
                            KAPITEL I ÄMNET
                        </div>
                        <div className="lab-course-chapter-grid">
                            {chapters.map((ch, i) => {
                                const chapterData = courseData.chapters[ch];
                                const secCount = (chapterData.sections || []).length;
                                return (
                                    <button key={ch} type="button"
                                        className="lab-course-chapter-card"
                                        onClick={() => onPickChapter(ch)}>
                                        <span className="lab-course-chapter-num">
                                            {String(chapterData.number ?? i + 1).padStart(2, '0')}
                                        </span>
                                        <span className="lab-course-chapter-title">{ch}</span>
                                        <span className="lab-course-chapter-meta">
                                            {secCount} avsnitt →
                                        </span>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        // ── Bionic reading ──────────────────────────────────────────
        // Fetmarkerar början ("fixeringspunkten") av varje ord i teori-
        // texten som lässtöd. Spannen läggs ALLTID in; på/av styrs sedan
        // av klassen .bionic-on på behållaren (ren CSS-växling — ingen ny
        // DOM-vandring vid varje toggling). Hoppar över KaTeX, kod och
        // rubriker så att matematik/formler aldrig påverkas.
        function bionicFixLen(n) {
            if (n <= 3) return 1;
            if (n <= 6) return 2;
            if (n <= 9) return 3;
            return Math.ceil(n * 0.4);
        }
        function applyBionic(root) {
            if (!root || root.querySelector('.lab-bionic')) return; // redan gjort
            const SKIP = { SCRIPT: 1, STYLE: 1, CODE: 1, PRE: 1, H1: 1, H2: 1, H3: 1, H4: 1, H5: 1, H6: 1 };
            const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
                acceptNode(node) {
                    if (!node.nodeValue || !/\S/.test(node.nodeValue)) return NodeFilter.FILTER_REJECT;
                    for (let p = node.parentElement; p && p !== root; p = p.parentElement) {
                        if (SKIP[p.tagName]) return NodeFilter.FILTER_REJECT;
                        const c = p.classList;
                        if (c && (c.contains('katex') || c.contains('katex-display'))) return NodeFilter.FILTER_REJECT;
                    }
                    return NodeFilter.FILTER_ACCEPT;
                }
            });
            const nodes = [];
            for (let n = walker.nextNode(); n; n = walker.nextNode()) nodes.push(n);
            const wordRe = /\p{L}[\p{L}\p{M}'’\-]*/gu;
            for (const tn of nodes) {
                const text = tn.nodeValue;
                wordRe.lastIndex = 0;
                if (!wordRe.test(text)) continue;
                wordRe.lastIndex = 0;
                const frag = document.createDocumentFragment();
                let last = 0, m;
                while ((m = wordRe.exec(text))) {
                    const word = m[0], start = m.index;
                    if (start > last) frag.appendChild(document.createTextNode(text.slice(last, start)));
                    let k = bionicFixLen(word.length);
                    if (word.length > 1) k = Math.min(k, word.length - 1);
                    const span = document.createElement('span');
                    span.className = 'lab-bionic';
                    span.textContent = word.slice(0, k);
                    frag.appendChild(span);
                    if (k < word.length) frag.appendChild(document.createTextNode(word.slice(k)));
                    last = start + word.length;
                }
                if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
                tn.parentNode.replaceChild(frag, tn);
            }
        }

        // ── Formelrutans layout ─────────────────────────────────────
        // Variabellistan placeras till HÖGER om formeln med en vertikal
        // avskiljare. Får formel + lista inte plats bredvid varandra staplas
        // listan UNDER formeln med en horisontell avskiljare (fitFormel
        // mäter och växlar automatiskt). "där" tas bort och punktlistan görs
        // om till en staplad lista utan punkter.
        // Sätt variabelsymbolen (allt FÖRE "=") i en .vardef-sym-span så att
        // den kan ges samma typsnitt som formlerna (KaTeX). Hanterar alla
        // skrivsätt: <em>M</em>, Δ<em>t</em>, bar grekisk bokstav (λ, ω),
        // <em>v</em>₀ och färdig KaTeX ($\mathbb{E}$). Texten efter "=" rörs ej.
        function styleVardefSymbols(list) {
            for (const li of Array.from(list.children)) {
                if (li.tagName !== 'LI') continue;
                if (li.querySelector('.vardef-sym')) continue;            // redan gjort
                if (li.textContent.indexOf('=') < 0) continue;           // ingen variabeldef
                const sym = document.createElement('span');
                sym.className = 'vardef-sym';
                for (const node of Array.from(li.childNodes)) {
                    if (node.nodeType === 3) {                            // textnod
                        const txt = node.nodeValue;
                        const idx = txt.indexOf('=');
                        if (idx >= 0) {
                            const before = txt.slice(0, idx);
                            if (before) sym.appendChild(document.createTextNode(before));
                            node.nodeValue = txt.slice(idx);              // "=" och efter stannar kvar
                            li.insertBefore(sym, node);
                            break;
                        }
                        sym.appendChild(node);                            // hela noden före "=" → in i sym
                    } else {
                        sym.appendChild(node);                            // element (em/katex) före "=" → in i sym
                    }
                }
            }
        }
        function buildFormelLayouts(root) {
            if (!root) return;
            root.querySelectorAll('.lab-block-formel').forEach(box => {
                if (box.querySelector('.formel-layout')) return;          // redan byggd
                if (!box.querySelector('.katex-display, .katex')) return;
                // Förklaringen till höger: i första hand en punktlista <ul>,
                // annars ett stycke som börjar med "där" (prosaförklaring).
                let right = box.querySelector('ul');
                let isProse = false;
                if (!right) {
                    right = Array.from(box.children).find(
                        el => el.tagName === 'P' && /^där\b/i.test(el.textContent.trim()));
                    isProse = !!right;
                }
                if (!right) return;                                       // ingen variabelförklaring → lämna
                const cell = document.createElement('div');
                cell.className = 'formel-cell';
                for (const el of Array.from(box.children)) {
                    if (el.classList && el.classList.contains('lab-block-title')) continue;
                    if (el === right) continue;
                    if (el.tagName === 'P' && el.textContent.trim().toLowerCase() === 'där') { el.remove(); continue; }
                    cell.appendChild(el);                                 // flytta in formelinnehållet
                }
                if (isProse) {
                    const f = right.firstChild;                          // ta bort ledande "där "
                    if (f && f.nodeType === 3) f.nodeValue = f.nodeValue.replace(/^\s*där\s+/i, '');
                    right.classList.add('vardef-prose');
                } else {
                    right.classList.add('vardef-stack');
                    styleVardefSymbols(right);
                }
                const rule = document.createElement('div');
                rule.className = 'formel-rule';
                const layout = document.createElement('div');
                layout.className = 'formel-layout';
                layout.appendChild(cell);
                layout.appendChild(rule);
                layout.appendChild(right);
                box.appendChild(layout);
            });
        }
        function fitFormel(root) {
            if (!root) return;
            root.querySelectorAll('.formel-layout').forEach(layout => {
                const cell = layout.querySelector('.formel-cell');
                const list = layout.querySelector('.vardef-stack');
                const prose = layout.querySelector('.vardef-prose');
                if (!cell || (!list && !prose)) return;
                layout.classList.remove('is-stacked');                   // mät i sida-vid-sida-läge
                const fW = cell.offsetWidth;                             // formelns naturliga bredd (ignorerar scale-transform)
                const avail = layout.clientWidth;
                // 28 px gap på var sida om linjen + 1 px linje + liten buffert
                let stack;
                if (list) {
                    let lW = 0;
                    for (const li of list.children) lW = Math.max(lW, li.scrollWidth);
                    stack = (fW + lW + 57 > avail - 6);
                } else {
                    // prosaförklaring (wrappar): stacka om kvarvarande bredd blir för smal
                    stack = (avail - fW - 57 < 240);
                }
                if (stack) layout.classList.add('is-stacked');
            });
        }

        function TeoriBody({ id, bionic, dyslexia }) {
            const ref = useRef(null);
            const html = useMemo(() => {
                const raw = TEORI[id];
                if (!raw) return null;
                const { body } = parseFrontmatter(raw);
                const { md, tokens } = protectMath(body);
                let processed = preprocessSuperscripts(md);
                processed = preprocessSubproblems(processed);
                processed = preprocessBlocks(processed);
                return restoreMath(marked.parse(processed), tokens);
            }, [id]);
            useEffect(() => {
                if (!ref.current || !html) return;
                renderMathInElement(ref.current, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                    ],
                    throwOnError: false,
                });
                // Bygg om formelrutorna (variabellista bredvid/under formeln)
                // FÖRE bionic — annars delar bionic upp "där"-textnoden och
                // borttagningen av "där" i prosaförklaringar missar.
                buildFormelLayouts(ref.current);
                // Lägg in bionic-spann EFTER KaTeX (så .katex kan hoppas över).
                // Synlighet styrs sedan av .bionic-on-klassen via CSS.
                applyBionic(ref.current);
                // Skala ner long display-math; kör efter KaTeX-rendering.
                // Måste vänta på fonts.ready — KaTeX laddar Computer Modern
                // async och bredder är inte korrekta innan dess. fitFormel
                // körs före fitMathDisplays så att formelcellen hunnit få sin
                // bredd innan eventuell nedskalning av breda formler.
                const root = ref.current;
                const fit = () => { fitFormel(root); fitMathDisplays(root); };
                let cancelled = false;
                const safeFit = () => { if (!cancelled) fit(); };
                const raf1 = requestAnimationFrame(safeFit);
                if (document.fonts && document.fonts.ready) {
                    document.fonts.ready.then(safeFit);
                }
                // Köra igen efter ytterligare en tick — KaTeX-bredder kan
                // ändras precis efter font-load.
                const tid = setTimeout(safeFit, 250);
                window.addEventListener('resize', fit);
                return () => {
                    cancelled = true;
                    cancelAnimationFrame(raf1);
                    clearTimeout(tid);
                    window.removeEventListener('resize', fit);
                };
            }, [html]);
            if (!html) {
                return (
                    <div className="lab-block lab-block-bild" style={{ marginTop: 8 }}>
                        <em>Teorigenomgång kommer snart.</em>
                    </div>
                );
            }
            return (
                <div className={'lab-article-body lab-article-body-inline' + (bionic ? ' bionic-on' : '') + (dyslexia ? ' dyslexia-on' : '')}
                    ref={ref}
                    dangerouslySetInnerHTML={{ __html: html }} />
            );
        }

        // Renderar en markdown-sträng med samma pipeline som TeoriBody
        // (protect math, preprocesseringar, marked, restore, KaTeX, fit).
        function MarkdownBody({ source, className }) {
            const ref = useRef(null);
            const html = useMemo(() => {
                if (!source) return null;
                const { md, tokens } = protectMath(source);
                let processed = preprocessSuperscripts(md);
                processed = preprocessSubproblems(processed);
                processed = preprocessBlocks(processed);
                return restoreMath(marked.parse(processed), tokens);
            }, [source]);
            useEffect(() => {
                if (!ref.current || !html) return;
                renderMathInElement(ref.current, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                    ],
                    throwOnError: false,
                });
                const root = ref.current;
                const fit = () => fitMathDisplays(root);
                let cancelled = false;
                const safeFit = () => { if (!cancelled) fit(); };
                requestAnimationFrame(safeFit);
                if (document.fonts && document.fonts.ready) {
                    document.fonts.ready.then(safeFit);
                }
                return () => { cancelled = true; };
            }, [html]);
            if (!html) return null;
            return (
                <div className={className || 'lab-article-body lab-article-body-inline'}
                    ref={ref}
                    dangerouslySetInnerHTML={{ __html: html }} />
            );
        }

        // ── Presentationsläge ───────────────────────────────────────
        // Fullskärms-genomgång av ett teoriavsnitt, som ett bildspel:
        // läraren klickar fram ett stycke/block i taget. Exempel-rutor
        // stegas dessutom rad för rad (formel → insättning → svar).
        // Tangenter: → ↓ Space Enter = nästa · ← ↑ = föregående ·
        // Home/End = början/slutet · Esc = avsluta.
        function buildPresSteps(root) {
            const steps = [];
            const blocks = [];
            for (const el of Array.from(root.children)) {
                // H1 dubblerar titelbilden — hoppa över.
                if (el.tagName === 'H1') { el.classList.add('pres-skip'); continue; }
                if (el.classList.contains('lab-block-exempel')) {
                    const subs = Array.from(el.children)
                        .filter(c => !c.classList.contains('lab-block-title'));
                    if (subs.length > 1) {
                        el.classList.add('pres-block');
                        blocks.push(el);
                        for (const c of subs) {
                            c.classList.add('pres-sub');
                            steps.push({ el: c, block: el });
                        }
                        continue;
                    }
                }
                el.classList.add('pres-item');
                steps.push({ el, block: null });
            }
            return { steps, blocks };
        }

        function PresentationMode({ id, num, title, chapter, chapterNumber, course, onClose }) {
            const overlayRef = useRef(null);
            const bodyRef = useRef(null);
            const stepsRef = useRef([]);
            const blocksRef = useRef([]);
            const totalRef = useRef(0);
            const chromeTimer = useRef(null);
            const [step, setStep] = useState(0);     // 0 = titelbild
            const [total, setTotal] = useState(0);
            const [ready, setReady] = useState(false);
            const [chrome, setChrome] = useState(true);

            const html = useMemo(() => {
                const raw = TEORI[id];
                if (!raw) return null;
                const { body } = parseFrontmatter(raw);
                const { md, tokens } = protectMath(body);
                let processed = preprocessSuperscripts(md);
                processed = preprocessSubproblems(processed);
                processed = preprocessBlocks(processed);
                return restoreMath(marked.parse(processed), tokens);
            }, [id]);

            const next = () => setStep(s => Math.min(s + 1, totalRef.current));
            const prev = () => setStep(s => Math.max(s - 1, 0));

            // Fullskärm + lås sidans egen scroll under presentationen.
            // Vi fullskärmar dokumentroten (inte overlayen) så att tooltips
            // (som appendas på <body>) fortsätter fungera.
            useEffect(() => {
                const el = document.documentElement;
                if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
                const onFs = () => { if (!document.fullscreenElement) onClose(); };
                document.addEventListener('fullscreenchange', onFs);
                const prevOverflow = document.body.style.overflow;
                document.body.style.overflow = 'hidden';
                // Gömmer bl.a. feedback-lampan (z-index 9998) under presentationen.
                document.body.classList.add('lab-pres-active');
                return () => {
                    document.removeEventListener('fullscreenchange', onFs);
                    document.body.style.overflow = prevOverflow;
                    document.body.classList.remove('lab-pres-active');
                    if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
                };
            }, []);

            // Tangentbordsnavigering
            useEffect(() => {
                const onKey = (e) => {
                    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown'
                        || e.key === ' ' || e.key === 'Enter') { e.preventDefault(); next(); }
                    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp'
                        || e.key === 'Backspace') { e.preventDefault(); prev(); }
                    else if (e.key === 'Home') { e.preventDefault(); setStep(0); }
                    else if (e.key === 'End') { e.preventDefault(); setStep(totalRef.current); }
                    // Esc lämnar fullskärm → fullscreenchange stänger. Men om
                    // fullskärm aldrig beviljades måste Esc stänga direkt.
                    else if (e.key === 'Escape' && !document.fullscreenElement) onClose();
                };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, []);

            // Bygg stegen: KaTeX → formellayout → stegindelning.
            useEffect(() => {
                const root = bodyRef.current;
                if (!root || !html) return;
                renderMathInElement(root, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                    ],
                    throwOnError: false,
                });
                buildFormelLayouts(root);
                const { steps, blocks } = buildPresSteps(root);
                stepsRef.current = steps;
                blocksRef.current = blocks;
                totalRef.current = steps.length;
                setTotal(steps.length);
                setStep(0);
                setReady(true);
                const fit = () => { fitFormel(root); fitMathDisplays(root); };
                if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
                window.addEventListener('resize', fit);
                return () => window.removeEventListener('resize', fit);
            }, [html]);

            // Applicera aktuellt steg: visa/dim-klasser + mjuk autoscroll.
            useEffect(() => {
                if (!ready) return;
                const steps = stepsRef.current;
                steps.forEach((st, i) => {
                    st.el.classList.toggle('is-on', i < step);
                    st.el.classList.toggle('is-current', i === step - 1);
                });
                blocksRef.current.forEach(b => {
                    let anyOn = false, anyCur = false;
                    for (const c of b.children) {
                        if (!c.classList.contains('pres-sub')) continue;
                        if (c.classList.contains('is-on')) anyOn = true;
                        if (c.classList.contains('is-current')) anyCur = true;
                    }
                    b.classList.toggle('is-on', anyOn);
                    b.classList.toggle('is-current', anyCur);
                });
                // Nyvisade formler kan behöva mätas om (gömda element har bredd 0).
                const root = bodyRef.current;
                if (root) { fitFormel(root); fitMathDisplays(root); }
                const overlay = overlayRef.current;
                if (!overlay) return;
                const raf = requestAnimationFrame(() => {
                    if (step === 0) { overlay.scrollTo({ top: 0, behavior: 'smooth' }); return; }
                    const st = steps[step - 1];
                    if (!st) return;
                    // Första delsteget i en exempel-ruta: skrolla till rutans
                    // ram (med titel), inte bara den första raden.
                    let target = st.el;
                    if (st.block) {
                        const before = steps[step - 2];
                        if (!before || before.block !== st.block) target = st.block;
                    }
                    const r = target.getBoundingClientRect();
                    const oh = overlay.clientHeight;
                    const top = (r.height > oh * 0.62)
                        ? overlay.scrollTop + r.top - oh * 0.10
                        : overlay.scrollTop + r.top - (oh - r.height) / 2;
                    overlay.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
                });
                return () => cancelAnimationFrame(raf);
            }, [step, ready]);

            // Nedre listen göms efter en stunds musinaktivitet (som i bildspel).
            const pokeChrome = () => {
                setChrome(true);
                clearTimeout(chromeTimer.current);
                chromeTimer.current = setTimeout(() => setChrome(false), 2800);
            };
            useEffect(() => { pokeChrome(); return () => clearTimeout(chromeTimer.current); }, []);

            const onStageClick = (e) => {
                if (e.target.closest('button, a')) return;
                const sel = window.getSelection && window.getSelection();
                if (sel && sel.toString()) return;   // markerar text — bläddra inte
                next();
            };

            return (
                <div className={'lab-pres' + (chrome ? ' chrome-on' : '')
                        + (step === 0 ? ' at-title' : '') + (ready ? ' is-ready' : '')}
                    ref={overlayRef} onMouseMove={pokeChrome} onClick={onStageClick}
                    role="dialog" aria-label={'Presentationsläge: ' + title}>
                    <div className="lab-pres-progress" aria-hidden="true">
                        <div style={{ width: (total > 0 ? (step / total) * 100 : 0) + '%' }} />
                    </div>
                    <div className="lab-pres-stage">
                        <div className="lab-pres-title">
                            <span className="lab-mono-label">
                                {(course || '').toUpperCase()} · KAPITEL {chapterNumber} — {(chapter || '').toUpperCase()} · AVSNITT {num}
                            </span>
                            <h1>{title}</h1>
                            <span className="lab-pres-rule" aria-hidden="true" />
                            <div className="lab-pres-hint">
                                Klicka — eller tryck <kbd>→</kbd> — för nästa stycke · <kbd>Esc</kbd> avslutar
                            </div>
                        </div>
                        {html ? (
                            <div className="lab-article-body lab-pres-body" ref={bodyRef}
                                dangerouslySetInnerHTML={{ __html: html }} />
                        ) : (
                            <p className="lab-pres-empty">Teorigenomgång saknas för det här avsnittet.</p>
                        )}
                    </div>
                    <div className="lab-pres-bar" onClick={(e) => e.stopPropagation()}>
                        <span className="lab-mono-label lab-pres-counter">
                            {step === 0 ? 'TITELBILD' : `STEG ${step} / ${total}`}
                        </span>
                        <div className="lab-pres-bar-btns">
                            <button type="button" onClick={prev} disabled={step === 0}
                                aria-label="Föregående steg">←</button>
                            <button type="button" onClick={next} disabled={step >= total}
                                aria-label="Nästa steg">→</button>
                        </div>
                        <button type="button" className="lab-pres-exit" onClick={onClose}>
                            Avsluta · Esc
                        </button>
                    </div>
                </div>
            );
        }

        // Plocka ut bara svaret ur en lösningstext.
        // Letar efter en rad/paragraf som börjar med "**Svar:**".
        function extractAnswer(solution) {
            if (!solution) return '';
            const m = solution.match(/\*\*Svar:\*\*[\s\S]*?(?:\n\n|$)/);
            return m ? m[0].trim() : '';
        }

        // Tolka en sträng som ett tal — accepterar både komma och punkt som
        // decimal, mellanslag som tusentalsavgränsare, och ·10^n eller e-notation
        // (inkl. Unicode-superscript som ⁻³, ⁹). Plockar ut första numret i texten.
        function parseAnswerNumber(input) {
            if (typeof input !== 'string') return NaN;
            let s = input.trim();
            if (!s) return NaN;
            // Unicode-superscript → ASCII
            const supMap = { '⁻': '-', '⁺': '+', '⁰': '0', '¹': '1', '²': '2',
                '³': '3', '⁴': '4', '⁵': '5', '⁶': '6', '⁷': '7', '⁸': '8', '⁹': '9' };
            s = s.replace(/[⁻⁺⁰¹²³⁴⁵⁶⁷⁸⁹]/g, ch => supMap[ch] || ch);
            // Komma → punkt, ta bort mellanslag i tal
            s = s.replace(/,/g, '.').replace(/(\d)\s+(\d)/g, '$1$2');
            // ·10^n eller *10^n eller x10^n → e-notation
            s = s.replace(/[·*x×]\s*10\^?(-?\d+)/g, 'e$1');
            // Plocka första numret (med valfri e-notation)
            const m = s.match(/-?\d+(\.\d+)?(e-?\d+)?/i);
            if (!m) return NaN;
            return parseFloat(m[0]);
        }

        function checkAnswer(input, expected) {
            if (!expected || typeof expected.value !== 'number') return null;
            const num = parseAnswerNumber(input);
            if (isNaN(num)) return 'unparseable';
            const tol = typeof expected.tol === 'number' ? expected.tol : 0.02;
            const abs = Math.abs(expected.value);
            const margin = abs > 0 ? abs * tol : Math.max(tol, 0.001);
            return Math.abs(num - expected.value) <= margin ? 'correct' : 'wrong';
        }

        // Symboler för formaterings-popover. ·10ⁿ infogar literalt "·10^"
        // så eleven kan skriva valfri exponent direkt efter (t.ex. "·10^-3").
        const FORMAT_SYMBOLS = [
            { label: '·10⁻³', insert: '·10⁻³' },
            { label: '·10⁻⁶', insert: '·10⁻⁶' },
            { label: '·10⁻⁹', insert: '·10⁻⁹' },
            { label: '·10³', insert: '·10³' },
            { label: '·10⁶', insert: '·10⁶' },
            { label: '·10⁹', insert: '·10⁹' },
            { label: '·10ⁿ', insert: '·10^', title: 'Skriv exponenten själv efter — t.ex. ·10^-12' },
            { label: '²', insert: '²' },
            { label: '³', insert: '³' },
            { label: '⁻', insert: '⁻' },
            { label: 'π', insert: 'π' },
            { label: '√', insert: '√' },
            { label: '°', insert: '°' },
            { label: 'Δ', insert: 'Δ' },
        ];

        function Ovning({ uppgift, index, total }) {
            const isMC = Array.isArray(uppgift.choices) && typeof uppgift.correct === 'number';
            const [answer, setAnswer] = useState('');
            const [selected, setSelected] = useState(null); // för flerval: index av valt alternativ
            const [feedback, setFeedback] = useState(null); // 'correct' | 'wrong' | 'unparseable' | null
            const [showAnswer, setShowAnswer] = useState(false);
            const [showSolution, setShowSolution] = useState(false);
            const [formatOpen, setFormatOpen] = useState(false);
            const inputRef = useRef(null);
            const answerOnly = useMemo(() => extractAnswer(uppgift.solution), [uppgift.solution]);
            const levelLabel = uppgift.level === 1 ? 'Nivå 1 · Grundläggande'
                             : uppgift.level === 2 ? 'Nivå 2 · Medel'
                             : 'Nivå 3 · Avancerad';

            const handleCheck = () => {
                if (isMC) {
                    if (selected === null) return;
                    setFeedback(selected === uppgift.correct ? 'correct' : 'wrong');
                    return;
                }
                if (!uppgift.answer) return;
                setFeedback(checkAnswer(answer, uppgift.answer));
            };
            const handleChange = (e) => {
                setAnswer(e.target.value);
                if (feedback !== null) setFeedback(null);
            };
            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && uppgift.answer) {
                    e.preventDefault();
                    handleCheck();
                }
            };
            const insertSymbol = (text) => {
                const el = inputRef.current;
                if (!el) return;
                const start = el.selectionStart ?? answer.length;
                const end = el.selectionEnd ?? answer.length;
                const next = answer.slice(0, start) + text + answer.slice(end);
                setAnswer(next);
                setFeedback(null);
                setFormatOpen(false);
                setTimeout(() => {
                    el.focus();
                    const c = start + text.length;
                    el.setSelectionRange(c, c);
                }, 0);
            };

            const inputClass = 'lab-ovning-answer-input'
                + (feedback === 'correct' ? ' is-correct' : '')
                + (feedback === 'wrong' ? ' is-wrong' : '');

            return (
                <div className={`lab-ovning lab-ovning-level-${uppgift.level}`}>
                    <div className="lab-ovning-head">
                        <span className="lab-mono-label">{levelLabel}</span>
                        <span className="lab-mono-label">Uppgift {index + 1} / {total}</span>
                    </div>
                    <MarkdownBody source={uppgift.question} className="lab-ovning-question" />
                    {isMC ? (
                        <div className="lab-ovning-choices">
                            {uppgift.choices.map((choice, i) => {
                                const isSelected = selected === i;
                                const isCorrectChoice = i === uppgift.correct;
                                const showResult = feedback !== null;
                                let cls = 'lab-ovning-choice';
                                if (isSelected) cls += ' is-selected';
                                if (showResult && isSelected && feedback === 'correct') cls += ' is-correct';
                                if (showResult && isSelected && feedback === 'wrong') cls += ' is-wrong';
                                if (showResult && !isSelected && isCorrectChoice) cls += ' is-reveal';
                                return (
                                    <label key={i} className={cls}>
                                        <input
                                            type="radio"
                                            name={`mc-${index}`}
                                            checked={isSelected}
                                            onChange={() => { setSelected(i); if (feedback !== null) setFeedback(null); }}
                                        />
                                        <span className="lab-ovning-choice-marker">{String.fromCharCode(65 + i)}</span>
                                        <MarkdownBody source={choice} className="lab-ovning-choice-text" />
                                    </label>
                                );
                            })}
                            {feedback === 'correct' && (
                                <span className="lab-ovning-feedback is-correct">✓ Rätt!</span>
                            )}
                            {feedback === 'wrong' && (
                                <span className="lab-ovning-feedback is-wrong">✗ Inte riktigt — rätt alternativ är markerat</span>
                            )}
                        </div>
                    ) : (
                        <div className="lab-ovning-answer-row">
                            <div className="lab-ovning-input-col">
                                <div className="lab-ovning-fx-bar">
                                    <span className="lab-ovning-answer-label">Ditt svar</span>
                                    <div className="lab-ovning-fx-anchor">
                                        <button
                                            type="button"
                                            className={'lab-ovning-fx-btn' + (formatOpen ? ' active' : '')}
                                            onClick={() => setFormatOpen(o => !o)}
                                            title="Specialtecken"
                                            aria-label="Specialtecken"
                                        >fx</button>
                                        {formatOpen && (
                                            <div className="lab-ovning-fx-popover" onMouseLeave={() => setFormatOpen(false)}>
                                                <div className="lab-ovning-fx-grid">
                                                    {FORMAT_SYMBOLS.map(sym => (
                                                        <button key={sym.label} type="button"
                                                            title={sym.title}
                                                            onClick={() => insertSymbol(sym.insert)}>
                                                            {sym.label}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="lab-ovning-input-wrap">
                                    <input
                                        type="text"
                                        ref={inputRef}
                                        className={inputClass}
                                        value={answer}
                                        onChange={handleChange}
                                        onKeyDown={handleKeyDown}
                                    />
                                    {uppgift.answer && (
                                        <span className="lab-ovning-unit">{uppgift.answer.unit}</span>
                                    )}
                                </div>
                            </div>
                            {feedback === 'correct' && (
                                <span className="lab-ovning-feedback is-correct">✓ Rätt!</span>
                            )}
                            {feedback === 'wrong' && (
                                <span className="lab-ovning-feedback is-wrong">✗ Inte riktigt — försök igen</span>
                            )}
                            {feedback === 'unparseable' && (
                                <span className="lab-ovning-feedback is-wrong">Kunde inte tolka svaret som ett tal</span>
                            )}
                        </div>
                    )}
                    <div className="lab-ovning-buttons">
                        {(uppgift.answer || isMC) && (
                            <button type="button"
                                className="lab-btn lab-btn-primary"
                                onClick={handleCheck}
                                disabled={isMC && selected === null}
                            >
                                Kontrollera
                            </button>
                        )}
                        <button
                            type="button"
                            className="lab-btn lab-btn-quiet"
                            onClick={() => setShowAnswer(s => !s)}
                        >
                            {showAnswer ? 'Dölj svar' : 'Visa svar'}
                        </button>
                        <button
                            type="button"
                            className="lab-btn lab-btn-quiet"
                            onClick={() => setShowSolution(s => !s)}
                        >
                            {showSolution ? 'Dölj lösningsförslag' : 'Visa lösningsförslag'}
                        </button>
                    </div>
                    {showAnswer && !showSolution && answerOnly && (
                        <div className="lab-ovning-answer-only">
                            <MarkdownBody source={answerOnly} />
                        </div>
                    )}
                    {showSolution && (
                        <div className="lab-ovning-solution">
                            <div className="lab-mono-label" style={{ marginBottom: 8 }}>
                                Lösningsförslag
                            </div>
                            <MarkdownBody source={uppgift.solution} />
                        </div>
                    )}
                </div>
            );
        }

        function Ovningar({ id }) {
            const list = OVNINGAR[id];
            const [selectedLevel, setSelectedLevel] = useState(null);
            if (!list || list.length === 0) {
                return (
                    <div className="lab-block lab-block-bild" style={{ marginTop: 8 }}>
                        <em>Övningar kommer snart.</em>
                    </div>
                );
            }
            const counts = { 1: 0, 2: 0, 3: 0 };
            for (const u of list) counts[u.level] = (counts[u.level] || 0) + 1;
            const filtered = selectedLevel === null
                ? list
                : list.filter(u => u.level === selectedLevel);
            return (
                <div className="lab-ovningar">
                    <h3 className="lab-ovningar-heading">Övningar</h3>
                    <div className="lab-ovningar-filter">
                        <button type="button"
                            className={'lab-ovningar-filter-btn' + (selectedLevel === null ? ' active' : '')}
                            onClick={() => setSelectedLevel(null)}>
                            Alla <span className="lab-ovningar-filter-count">{list.length}</span>
                        </button>
                        {[1, 2, 3].map(lvl => (
                            <button key={lvl} type="button"
                                className={`lab-ovningar-filter-btn lab-ovningar-filter-btn-level-${lvl}` + (selectedLevel === lvl ? ' active' : '')}
                                disabled={counts[lvl] === 0}
                                onClick={() => setSelectedLevel(lvl)}>
                                Nivå {lvl} <span className="lab-ovningar-filter-count">{counts[lvl]}</span>
                            </button>
                        ))}
                    </div>
                    {filtered.map((u, i) => (
                        <Ovning key={`${selectedLevel}-${i}`} uppgift={u} index={i} total={filtered.length} />
                    ))}
                </div>
            );
        }

        function Catalog({ state, setState }) {
            const { subject, course, chapter, section } = state;
            const subjectData = K[subject] || {};
            const isMath = subject === 'Matematik';

            const subjects = Object.keys(K);
            const chapters = Object.keys((subjectData.courses?.[course]?.chapters) || {});
            const sections = subjectData.courses?.[course]?.chapters?.[chapter]?.sections || [];
            const activeSection = sections.find(s => s.num === section);
            const chapterNumber = subjectData.courses?.[course]?.chapters?.[chapter]?.number;
            const sectionIdx = sections.findIndex(s => s.num === section);

            const tid = activeSection ? teoriId(course, activeSection.num) : null;
            const hasTeori = tid && TEORI[tid];
            const hasOvningar = tid && OVNINGAR[tid] && OVNINGAR[tid].length > 0;

            // View-tab: 'teori' eller 'ovningar' (Simulering öppnar extern länk).
            // Ligger i top-state så att hashen (#fy2-1.5:ovningar) kan djuplänka hit.
            // Nollställs till 'teori' när man byter avsnitt (i navigations-handlers).
            const view = state.view || 'teori';
            const setView = (v) => setState(s => ({ ...s, view: v }));

            // Bionisk läsning (lässtöd) — på/av sparas mellan besök.
            const [bionic, setBionic] = useState(() => {
                try { return localStorage.getItem('fy-bionic') === '1'; } catch (e) { return false; }
            });
            useEffect(() => {
                try { localStorage.setItem('fy-bionic', bionic ? '1' : '0'); } catch (e) {}
            }, [bionic]);

            // Dyslexivänligt typsnitt (OpenDyslexic) — på/av sparas mellan besök.
            const [dyslexia, setDyslexia] = useState(() => {
                try { return localStorage.getItem('fy-dyslexia') === '1'; } catch (e) { return false; }
            });
            useEffect(() => {
                try { localStorage.setItem('fy-dyslexia', dyslexia ? '1' : '0'); } catch (e) {}
            }, [dyslexia]);

            // Presentationsläge (fullskärmsbildspel av teorin)
            const [presenting, setPresenting] = useState(false);

            // När man klickar Föregående/Nästa: byt avsnitt och scrolla högst
            // upp i den nya genomgången så man inte hamnar längst ned.
            const sectionContentRef = useRef(null);
            const scrollPendingRef = useRef(false);
            const goPrev = () => {
                if (sectionIdx > 0) {
                    scrollPendingRef.current = true;
                    setState({ ...state, section: sections[sectionIdx - 1].num, view: 'teori' });
                }
            };
            const goNext = () => {
                if (sectionIdx >= 0 && sectionIdx < sections.length - 1) {
                    scrollPendingRef.current = true;
                    setState({ ...state, section: sections[sectionIdx + 1].num, view: 'teori' });
                }
            };

            useEffect(() => {
                if (!scrollPendingRef.current) return;
                scrollPendingRef.current = false;
                // Vänta ett frame så att den nya genomgången har renderats.
                requestAnimationFrame(() => {
                    const el = sectionContentRef.current;
                    if (!el) { window.scrollTo({ top: 0 }); return; }
                    const top = el.getBoundingClientRect().top + window.scrollY - 16;
                    window.scrollTo({ top, behavior: 'auto' });
                });
            }, [section]);

            return (
                <section className="lab-section lab-catalog">
                    {/* Kurs-nivån borttagen — Fysik/2 finns i headern */}
                    {isMath ? (
                        <div className="lab-level-3" style={{ paddingBottom: 24, marginBottom: 28 }}>
                            <MathematicsPlaceholder />
                        </div>
                    ) : (
                        <div className="lab-level-3">
                            {/* Nivå 1: Kapitel */}
                            <div className="lab-mono-label" style={{ marginBottom: 12 }}>KAPITEL</div>
                                <div className="lab-tabs-3">
                                    {chapters.map((ch, i) => (
                                        <button key={ch}
                                            className={'lab-tab-3' + (chapter === ch ? ' active' : '')}
                                            onClick={() => setState({ ...state, chapter: ch, section: null, view: 'teori' })}>
                                            <span className="lab-tab-3-num">{String(i + 1).padStart(2, '0')}</span>
                                            {ch}
                                        </button>
                                    ))}
                                </div>

                                {!chapter ? (
                                    /* Nivå 4 (intro): visa kursintro när inget kapitel är valt. */
                                    <div className="lab-level-4 lab-level-4-intro">
                                        <CourseIntro
                                            courseData={subjectData.courses[course]}
                                            courseName={course}
                                            chapters={chapters}
                                            onPickChapter={(ch) => setState({ ...state, chapter: ch, section: null, view: 'teori' })}
                                        />
                                    </div>
                                ) : (
                                /* Nivå 4: Avsnitt */
                                <div className="lab-level-4">
                                    <aside className="lab-sections-aside">
                                        <div className="lab-mono-label" style={{ marginBottom: 14, paddingLeft: 4 }}>
                                            AVSNITT
                                        </div>
                                        {sections.map(s => (
                                            <button key={s.num}
                                                className={'lab-section-item' + (section === s.num ? ' active' : '')}
                                                onClick={() => setState({ ...state, section: s.num, view: 'teori' })}>
                                                <span className="lab-section-item-num">{s.num}</span>
                                                <span className="lab-section-item-title">{s.title}</span>
                                                <span className="lab-section-item-arrow">
                                                    {section === s.num ? '●' : '→'}
                                                </span>
                                            </button>
                                        ))}
                                        <div className="lab-sections-aside-foot" />
                                    </aside>

                                    <div className="lab-section-content" ref={sectionContentRef}>
                                        {activeSection ? (
                                            <React.Fragment>
                                                <div className="lab-section-content-head">
                                                    <span className="lab-mono-label">
                                                        Kapitel {chapterNumber} · {(chapter || '').toUpperCase()} · Avsnitt {activeSection.num}
                                                    </span>
                                                    <span className="lab-mono-label">
                                                        {sectionIdx + 1} / {sections.length}
                                                    </span>
                                                </div>
                                                <h2 className="lab-section-title">
                                                    <span className="lab-section-title-num">{activeSection.num}</span>
                                                    {activeSection.title}
                                                </h2>

                                                <div className="lab-section-cards">
                                                    <button type="button"
                                                        className={'lab-card ' + (view === 'teori' ? 'lab-card-active' : 'lab-card-clickable')}
                                                        onClick={() => setView('teori')}>
                                                        <div className="lab-card-tag">Läsning</div>
                                                        <div className="lab-card-title">Teori</div>
                                                        <div className="lab-card-meta">
                                                            {hasTeori ? 'Genomgång' : 'Kommer snart'}
                                                        </div>
                                                    </button>
                                                    {activeSection.href ? (
                                                        <a className="lab-card lab-card-clickable" href={activeSection.href}>
                                                            <div className="lab-card-tag">Experiment</div>
                                                            <div className="lab-card-title">Simulering</div>
                                                            <div className="lab-card-meta">Interaktiv</div>
                                                        </a>
                                                    ) : (
                                                        <div className="lab-card lab-card-disabled">
                                                            <div className="lab-card-tag">Experiment</div>
                                                            <div className="lab-card-title">Simulering</div>
                                                            <div className="lab-card-meta">Kommer snart</div>
                                                        </div>
                                                    )}
                                                    {hasOvningar ? (
                                                        <button type="button"
                                                            className={'lab-card ' + (view === 'ovningar' ? 'lab-card-active' : 'lab-card-clickable')}
                                                            onClick={() => setView('ovningar')}>
                                                            <div className="lab-card-tag">Räkna</div>
                                                            <div className="lab-card-title">Övningar</div>
                                                            <div className="lab-card-meta">{OVNINGAR[tid].length} st</div>
                                                        </button>
                                                    ) : (
                                                        <div className="lab-card lab-card-disabled">
                                                            <div className="lab-card-tag">Räkna</div>
                                                            <div className="lab-card-title">Övningar</div>
                                                            <div className="lab-card-meta">Kommer snart</div>
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="lab-teori-nav">
                                                    <span className="lab-mono-label">
                                                        Avsnitt {sectionIdx + 1} av {sections.length}
                                                    </span>
                                                    <div className="lab-section-actions-spacer" />
                                                    <button className="lab-btn lab-btn-quiet" type="button"
                                                        onClick={goPrev} disabled={sectionIdx <= 0}
                                                        style={sectionIdx <= 0 ? { opacity: 0.4, cursor: 'not-allowed' } : null}>
                                                        ← Föregående
                                                    </button>
                                                    <button className="lab-btn lab-btn-quiet" type="button"
                                                        onClick={goNext} disabled={sectionIdx >= sections.length - 1}
                                                        style={sectionIdx >= sections.length - 1 ? { opacity: 0.4, cursor: 'not-allowed' } : null}>
                                                        Nästa →
                                                    </button>
                                                </div>

                                                {view === 'teori' && (
                                                    <div className="lab-bionic-bar">
                                                        <button type="button"
                                                            className={'lab-bionic-toggle' + (bionic ? ' is-on' : '')}
                                                            onClick={() => setBionic(b => !b)}
                                                            aria-pressed={bionic}
                                                            title="Bionisk läsning — fetmarkerar början av varje ord som lässtöd">
                                                            <span className="lab-bionic-knob" />
                                                            <span><b>Bio</b>nisk <b>läs</b>ning</span>
                                                        </button>
                                                        <button type="button"
                                                            className={'lab-bionic-toggle' + (dyslexia ? ' is-on' : '')}
                                                            onClick={() => setDyslexia(d => !d)}
                                                            aria-pressed={dyslexia}
                                                            title="Dyslexivänligt typsnitt (OpenDyslexic) — anpassat för läsare med dyslexi">
                                                            <span className="lab-bionic-knob" />
                                                            <span className="lab-dys-label">Dyslexivänligt</span>
                                                        </button>
                                                        {hasTeori && (
                                                            <button type="button" className="lab-pres-launch"
                                                                onClick={() => setPresenting(true)}
                                                                aria-label="Presentationsläge"
                                                                title="Presentationsläge — visa genomgången i fullskärm och klicka fram ett stycke i taget">
                                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                                                                    stroke="currentColor" strokeWidth="2"
                                                                    strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                                                                    <path d="M2 4h20" />
                                                                    <rect x="4" y="4" width="16" height="11" rx="1" />
                                                                    <path d="M10.5 7.6l4 2.15-4 2.15z" fill="currentColor" stroke="none" />
                                                                    <path d="M12 15v3" />
                                                                    <path d="M8.5 21l3.5-3 3.5 3" />
                                                                </svg>
                                                            </button>
                                                        )}
                                                    </div>
                                                )}
                                                {view === 'teori' && <TeoriBody id={tid} bionic={bionic} dyslexia={dyslexia} />}
                                                {presenting && activeSection && (
                                                    <PresentationMode
                                                        id={tid}
                                                        num={activeSection.num}
                                                        title={activeSection.title}
                                                        chapter={chapter}
                                                        chapterNumber={chapterNumber}
                                                        course={course}
                                                        onClose={() => setPresenting(false)} />
                                                )}
                                                {view === 'ovningar' && <Ovningar id={tid} />}

                                                <div className="lab-section-actions" style={{ marginTop: 32, paddingTop: 14, borderTop: '1px solid var(--lab-line)' }}>
                                                    {activeSection.href && (
                                                        <a className="lab-btn" href={activeSection.href}>
                                                            Simulering →
                                                        </a>
                                                    )}
                                                    <div className="lab-section-actions-spacer" />
                                                    <button className="lab-btn lab-btn-quiet" type="button"
                                                        onClick={goPrev} disabled={sectionIdx <= 0}
                                                        style={sectionIdx <= 0 ? { opacity: 0.4, cursor: 'not-allowed' } : null}>
                                                        ← Föregående
                                                    </button>
                                                    <button className="lab-btn lab-btn-quiet" type="button"
                                                        onClick={goNext} disabled={sectionIdx >= sections.length - 1}
                                                        style={sectionIdx >= sections.length - 1 ? { opacity: 0.4, cursor: 'not-allowed' } : null}>
                                                        Nästa →
                                                    </button>
                                                </div>
                                            </React.Fragment>
                                        ) : (
                                            <div className="lab-chapter-intro">
                                                <div className="lab-section-content-head">
                                                    <span className="lab-mono-label">
                                                        Kapitel {chapterNumber} · {(chapter || '').toUpperCase()}
                                                    </span>
                                                    <span className="lab-mono-label">
                                                        {sections.length} avsnitt
                                                    </span>
                                                </div>
                                                <h2 className="lab-section-title">{chapter}</h2>
                                                {subjectData.courses[course]?.chapters[chapter]?.intro && (
                                                    <p className="lab-chapter-intro-text">
                                                        {subjectData.courses[course].chapters[chapter].intro}
                                                    </p>
                                                )}
                                                <p className="lab-chapter-intro-hint">
                                                    Välj ett avsnitt i listan till vänster för att börja läsa.
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                )}
                        </div>
                    )}

                    <div style={{ height: 28 }} />
                </section>
            );
        }

        function Footer() {
            return (
                <footer className="lab-section lab-footer">
                    <span>© 2026 FYSIKLABBET</span>
                    <span>SKAPAD FÖR GYMNASIEELEVER</span>
                </footer>
            );
        }

        // Parsea URL-parametrar och hash för djuplänkar:
        //   katalog.html?course=Fysik+1
        //   katalog.html#fy1            → Fysik, kursintro
        //   katalog.html#fy2-3          → Fysik nivå 2, kapitel 3 (första avsnittet)
        //   katalog.html#fy1-2.3        → Fysik, kapitel 2, avsnitt 2.3
        function parseInitialState() {
            const subject = 'Fysik';
            const subj = K[subject];
            const courses = Object.keys(subj.courses);
            const out = { subject, course: courses[0] || null, chapter: null, section: null, view: 'teori' };

            const params = new URLSearchParams(window.location.search);
            const courseParam = params.get('course');
            if (courseParam && subj.courses[courseParam]) {
                out.course = courseParam;
            }

            const hash = (window.location.hash || '').replace(/^#/, '');
            const m = hash.match(/^fy([12])(?:-(\d+)(?:\.(\d+))?)?(?::(teori|ovningar))?$/);
            if (m && m[4]) out.view = m[4];
            if (m) {
                const courseKey = m[1] === '1' ? 'Fysik nivå 1' : 'Fysik nivå 2';
                if (subj.courses[courseKey]) {
                    out.course = courseKey;
                    if (m[2]) {
                        const chapNum = parseInt(m[2], 10);
                        const chapters = subj.courses[courseKey].chapters;
                        const chKey = Object.keys(chapters)
                            .find(k => chapters[k].number === chapNum);
                        if (chKey) {
                            out.chapter = chKey;
                            if (m[3]) {
                                const sectionId = `${chapNum}.${m[3]}`;
                                const sec = chapters[chKey].sections
                                    .find(s => s.num === sectionId);
                                if (sec) out.section = sec.num;
                                else out.section = chapters[chKey].sections[0]?.num || null;
                            } else {
                                out.section = chapters[chKey].sections[0]?.num || null;
                            }
                        }
                    }
                }
            }
            return out;
        }

        function App() {
            const [state, setState] = useState(parseInitialState);

            // Lyssna på hash-ändringar så att klick på Fysik/Fysik nivå 2 i navbar
            // (när användaren redan är på katalog.html) uppdaterar vyn.
            useEffect(() => {
                const onHashChange = () => setState(parseInitialState());
                window.addEventListener('hashchange', onHashChange);
                return () => window.removeEventListener('hashchange', onHashChange);
            }, []);

            useEffect(() => {
                const subj = K[state.subject];
                if (!subj) return;
                let { course, chapter, section } = state;
                const courses = Object.keys(subj.courses || {});
                if (!course || !courses.includes(course)) course = courses[0] || null;
                // chapter och section får vara null (kursintro).
                // Bara om chapter är satt valideras att det finns; annars lämnas null.
                if (chapter) {
                    const chapters = course ? Object.keys(subj.courses[course].chapters || {}) : [];
                    if (!chapters.includes(chapter)) chapter = null;
                }
                if (section && chapter) {
                    const sections = subj.courses[course].chapters[chapter].sections || [];
                    if (!sections.find(s => s.num === section)) section = sections[0]?.num || null;
                } else if (!chapter) {
                    section = null;
                }
                if (course !== state.course || chapter !== state.chapter || section !== state.section) {
                    setState(s => ({ ...s, course, chapter, section }));
                }
            }, [state.subject, state.course, state.chapter, state.section]);

            return (
                <div className="lab-page">
                    <Topbar />
                    <Header />
                    <Breadcrumb {...state} />
                    <Catalog state={state} setState={setState} />
                    <Footer />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <script>document.write('<scr' + 'ipt src="feedback.js?v=' + window.__CB + '" defer></scr' + 'ipt>');</script>

    <!-- Tooltip för fysikaliska begrepp (.lab-term med data-tip) -->
    <script>
    (function () {
        let tip = null;
        function ensureTip() {
            if (tip) return tip;
            tip = document.createElement('div');
            tip.className = 'lab-term-tooltip';
            document.body.appendChild(tip);
            return tip;
        }
        function position(e) {
            if (!tip) return;
            const offset = 16;
            const rect = tip.getBoundingClientRect();
            let x = e.clientX + offset;
            let y = e.clientY + offset;
            if (x + rect.width > window.innerWidth - 8)  x = e.clientX - rect.width - offset;
            if (y + rect.height > window.innerHeight - 8) y = e.clientY - rect.height - offset;
            if (x < 8) x = 8;
            if (y < 8) y = 8;
            tip.style.left = x + 'px';
            tip.style.top = y + 'px';
        }
        document.addEventListener('mouseover', (e) => {
            const t = e.target.closest && e.target.closest('.lab-term');
            if (!t) return;
            ensureTip().innerHTML = t.dataset.tip || '';
            tip.classList.add('visible');
            position(e);
        });
        document.addEventListener('mousemove', (e) => {
            if (tip && tip.classList.contains('visible')) position(e);
        });
        document.addEventListener('mouseout', (e) => {
            const from = e.target.closest && e.target.closest('.lab-term');
            const to = e.relatedTarget && e.relatedTarget.closest && e.relatedTarget.closest('.lab-term');
            if (from && from !== to && tip) tip.classList.remove('visible');
        });
    })();
    </script>
