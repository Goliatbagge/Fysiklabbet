    <style>
        /* Avsnittsväxlare: Teori / Simulering / Övningar (alltid tillgänglig) */
        .section-switch {
            display: flex; gap: 8px; flex-wrap: wrap;
            max-width: 1400px; margin: 0 auto 14px; padding: 0 2rem;
        }
        .section-switch a, .section-switch .ss-current {
            display: flex; flex-direction: column; gap: 1px;
            background: var(--lab-bg); color: var(--lab-ink);
            border: 1px solid var(--lab-line-strong); border-radius: 10px;
            padding: 8px 18px; text-decoration: none; min-width: 116px;
            transition: border-color 0.15s ease, background 0.15s ease;
        }
        .section-switch a:hover { border-color: var(--lab-accent); }
        .section-switch .ss-current {
            background: var(--lab-ink); color: var(--lab-bg); border-color: var(--lab-ink); cursor: default;
        }
        .section-switch .ss-tag {
            font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
            opacity: 0.65; font-family: var(--lab-font-mono, monospace);
        }
        .section-switch .ss-title { font-weight: 600; font-size: 15px; }
        .sim-sublabel {
            max-width: 1400px; margin: 0 auto 4px; padding: 0 2rem;
            font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--lab-ink-muted); font-family: var(--lab-font-mono, monospace);
        }
        .sim-toggle {
            display: flex; gap: 6px; max-width: 1400px; margin: 0 auto;
            padding: 0 2rem;
        }
        .sim-toggle button {
            background: var(--lab-bg); color: var(--lab-ink);
            border: 1px solid var(--lab-line-strong); border-radius: 10px;
            padding: 9px 18px; font-weight: 600; cursor: pointer;
            font-family: Poppins, sans-serif; font-size: 14px;
            transition: all 0.15s ease;
        }
        .sim-toggle button:hover:not(.active) { border-color: var(--lab-accent); }
        .sim-toggle button.active {
            background: var(--lab-ink); color: var(--lab-bg); border-color: var(--lab-ink);
        }
        .sim-frame-wrap {
            width: 100%; max-width: 1400px; margin: 0.9rem auto 1.5rem; padding: 0 2rem;
        }
        .sim-frame-wrap iframe {
            width: 100%; min-height: 600px; border: 1px solid var(--lab-line-strong);
            border-radius: 12px; display: block; background: var(--lab-bg);
        }
        /* Fast (sticky) menyrad: topbaren rullar bort, menyraden med Start/Fysik
           stannar kvar. iframe:n auto-höjs till sitt innehåll → en enda yttre
           rullist (ingen rullist-i-rullist). */
        .lab-header { position: sticky; top: 0; z-index: 50; background: var(--lab-bg); }
    </style>

    <main style="padding: 1.6rem 0;">
        <div class="breadcrumb" style="max-width: 1400px; margin: 0 auto 1rem; padding: 0 2rem; font-size: 13px;">
            <a href="index.html">Hem</a> / <a href="katalog.html#fy2">Fysik – fördjupning</a> / <span>Konisk pendel</span>
        </div>

        <div class="sim-sublabel">Välj simulering</div>
        <div class="sim-toggle">
            <button id="btn-konisk" class="active" onclick="showSim('konisk')">Konisk pendel</button>
            <button id="btn-jamf" onclick="showSim('jamf')">Periodiska rörelser (jämförelse)</button>
        </div>

        <div class="sim-frame-wrap">
            <iframe id="sim-frame" src="fysik2-konisk-pendel-app.html?embed=1" title="Konisk pendel"></iframe>
        </div>
    </main>

    <script src="feedback.js" defer></script>
    <script>
        const SIMS = {
            konisk: { src: 'fysik2-konisk-pendel-app.html?embed=1', title: 'Konisk pendel' },
            jamf:   { src: 'fysik2-svangningar-jamforelse.html?embed=1', title: 'Periodiska rörelser' }
        };
        const frame = document.getElementById('sim-frame');
        let ro = null;

        // Auto-höj iframe:n till sitt innehåll → bara den yttre rullisten finns.
        function fitFrame() {
            try {
                const doc = frame.contentDocument;
                if (!doc) return;
                const h = Math.max(
                    doc.documentElement ? doc.documentElement.scrollHeight : 0,
                    doc.body ? doc.body.scrollHeight : 0
                );
                if (h > 0) frame.style.height = (h + 2) + 'px';
            } catch (e) {}
        }
        function watchFrame() {
            try {
                if (ro) { ro.disconnect(); ro = null; }
                const doc = frame.contentDocument;
                if (doc && doc.body) {
                    ro = new ResizeObserver(fitFrame);
                    ro.observe(doc.body);
                }
            } catch (e) {}
            fitFrame();
        }
        function onFrameReady() {
            watchFrame();
            // Efter-justeringar när React/3D hunnit rendera klart.
            setTimeout(fitFrame, 250);
            setTimeout(fitFrame, 900);
            setTimeout(fitFrame, 1800);
        }
        frame.addEventListener('load', onFrameReady);
        // Täck race-villkoret: om iframen redan laddats färdigt när detta skript
        // körs (snabb/cachad laddning) hinner 'load'-eventet annars missas.
        try {
            const d0 = frame.contentDocument;
            if (d0 && d0.readyState === 'complete') onFrameReady();
        } catch (e) {}
        // Extra säkerhet: justera höjden några gånger strax efter sidladdning.
        window.addEventListener('load', () => { fitFrame(); setTimeout(fitFrame, 500); });
        window.addEventListener('resize', fitFrame);

        function showSim(key) {
            frame.src = SIMS[key].src;
            frame.title = SIMS[key].title;
            document.getElementById('btn-konisk').classList.toggle('active', key === 'konisk');
            document.getElementById('btn-jamf').classList.toggle('active', key === 'jamf');
        }
    </script>
    <script src="data/katalog.js"></script>
    <script src="section-nav.js"></script>
