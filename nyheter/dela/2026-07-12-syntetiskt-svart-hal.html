    <title>Ett stillastående kretskort får radiovågor att bli starkare — med ett knep lånat från svarta hål — Fysiklabbet</title>
    <meta name="description" content="Forskare vid CUNY Advanced Science Research Center i New York har i tidskriften Nature återskapat en av relativitetsteorins mest exotiska förutsägelser: att ett tillräckligt snabbt roterande föremål kan ge energi till en förbipasserande våg i stället för att bara reflektera den. Genom att låta en ring av elektroniska komponenter växla egenskaper i exakt rätt takt fick de radiovågor att uppträda som om de mötte ett föremål som snurrade snabbare än ljuset — och vågorna kom ut nästan sex gånger starkare än de gick in, utan att en enda del i kretsen någonsin rörde sig.">
