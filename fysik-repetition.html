    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        const PACKS = window.REPETITION || {};

        // ── Hjälpare ─────────────────────────────────────────────

        function shuffled(arr) {
            const a = arr.slice();
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            // Undvik att en blandning råkar bli identisk med originalet
            if (a.length > 2 && a.every((x, i) => x === arr[i])) {
                [a[0], a[1]] = [a[1], a[0]];
            }
            return a;
        }

        // Renderar en sträng där $...$ är KaTeX och resten vanlig text.
        // VIKTIGT: allt läggs i EN gemensam wrapper-span. Flera syskon-spans
        // blir egna flex-items i flex-containrar (kort, brickor) — då bryts
        // texten i separata kolumncentrerade bitar (buggen där "s-t" lossnade
        // från raden). En enda span ger normalt inline-flöde med rätt baslinje.
        function Rich({ text }) {
            const parts = String(text).split(/(\$[^$]+\$)/g);
            return (
                <span>
                    {parts.map((p, i) => {
                        if (p.startsWith('$') && p.endsWith('$')) {
                            const html = katex.renderToString(p.slice(1, -1), { throwOnError: false });
                            return <span key={i} dangerouslySetInnerHTML={{ __html: html }} />;
                        }
                        return <span key={i}>{p}</span>;
                    })}
                </span>
            );
        }

        function Star({ filled }) {
            return (
                <svg width="26" height="26" viewBox="0 0 24 24"
                     fill={filled ? 'var(--lab-accent, #c8324a)' : 'none'}
                     stroke={filled ? 'var(--lab-accent, #c8324a)' : 'rgba(15,22,32,0.4)'}
                     strokeWidth="1.6" strokeLinejoin="round">
                    <path d="M12 2.6l2.9 5.9 6.5 0.9-4.7 4.6 1.1 6.5L12 17.4l-5.8 3.1 1.1-6.5L2.6 9.4l6.5-0.9z" />
                </svg>
            );
        }

        function Stars({ n }) {
            return (
                <span className="rep-stars" aria-label={n + ' av 3 stjärnor'}>
                    <Star filled={n >= 1} /><Star filled={n >= 2} /><Star filled={n >= 3} />
                </span>
            );
        }

        // Stjärnor utifrån antal fel i förhållande till antal moment.
        function starsFor(mistakes, items) {
            if (mistakes === 0) return 3;
            if (mistakes <= Math.max(1, Math.round(items * 0.25))) return 2;
            return 1;
        }

        // ── Dra-och-släpp (pointer events) + klick-att-välja ────
        //
        // Robust klassiskt mönster: pointerdown på brickan registrerar
        // move/up-lyssnare på window (mus-moves bubblar alltid dit; touch
        // har implicit capture på startelementet och bubblar också dit).
        // Spöket är ett permanent DOM-element som flyttas direkt via style
        // — ingen React-re-render sker under själva draget, så rörelsen är
        // mjuk och inget event går förlorat. En kort tryckning utan rörelse
        // (< 4 px) räknas som klick (välj/avvälj); annars är det ett drag
        // och släpp-ytan hittas via elementFromPoint på [data-drop].
        function useDragEngine(onDropChip, onClickChip) {
            const ghostRef = useRef(null);
            const activeRef = useRef(false);

            const chipHandlers = (chipId, disabled) => ({
                onPointerDown: (e) => {
                    if (disabled || activeRef.current) return;
                    if (e.button !== undefined && e.button !== 0) return;
                    const el = e.currentTarget;
                    const st = {
                        pid: e.pointerId, sx: e.clientX, sy: e.clientY,
                        w: el.getBoundingClientRect().width,
                        html: el.innerHTML, moved: false,
                    };
                    activeRef.current = true;

                    const setGhostPos = (x, y) => {
                        const g = ghostRef.current;
                        if (!g) return;
                        g.style.left = x + 'px';
                        g.style.top = y + 'px';
                    };
                    const onMove = (ev) => {
                        if (ev.pointerId !== st.pid) return;
                        if (!st.moved) {
                            if (Math.hypot(ev.clientX - st.sx, ev.clientY - st.sy) < 4) return;
                            st.moved = true;
                            const g = ghostRef.current;
                            if (g) {
                                g.firstChild.innerHTML = st.html;
                                g.style.width = st.w + 'px';
                                g.style.display = 'block';
                            }
                            el.classList.add('ghosted');
                        }
                        setGhostPos(ev.clientX, ev.clientY);
                        const t = document.elementFromPoint(ev.clientX, ev.clientY);
                        const drop = t && t.closest('[data-drop]');
                        document.querySelectorAll('[data-drop].over').forEach(n => { if (n !== drop) n.classList.remove('over'); });
                        if (drop) drop.classList.add('over');
                        if (ev.cancelable) ev.preventDefault();   // stoppa scroll under touch-drag
                    };
                    const cleanup = () => {
                        window.removeEventListener('pointermove', onMove);
                        window.removeEventListener('pointerup', onUp);
                        window.removeEventListener('pointercancel', onCancel);
                        const g = ghostRef.current;
                        if (g) g.style.display = 'none';
                        el.classList.remove('ghosted');
                        document.querySelectorAll('[data-drop].over').forEach(n => n.classList.remove('over'));
                        activeRef.current = false;
                    };
                    const onUp = (ev) => {
                        if (ev.pointerId !== st.pid) return;
                        cleanup();
                        if (!st.moved) {
                            if (onClickChip) onClickChip(chipId);
                            return;
                        }
                        const t = document.elementFromPoint(ev.clientX, ev.clientY);
                        const drop = t && t.closest('[data-drop]');
                        if (drop && onDropChip) onDropChip(chipId, drop.getAttribute('data-drop'));
                    };
                    const onCancel = (ev) => {
                        if (ev.pointerId !== st.pid) return;
                        cleanup();
                    };
                    window.addEventListener('pointermove', onMove, { passive: false });
                    window.addEventListener('pointerup', onUp);
                    window.addEventListener('pointercancel', onCancel);
                },
            });

            // Permanent spök-element — visas/flyttas direkt via style under drag.
            const ghost = (
                <div className="rep-ghost" ref={ghostRef} style={{ display: 'none' }} aria-hidden="true">
                    <div className="rep-chip" />
                </div>
            );

            return { chipHandlers, ghost };
        }

        // Blinka "fel" på ett element via klass
        function flashWrong(el) {
            if (!el) return;
            el.classList.remove('wrongflash');
            void el.offsetWidth;
            el.classList.add('wrongflash');
            setTimeout(() => el.classList.remove('wrongflash'), 350);
        }

        // ── Station: Para ihop ───────────────────────────────────
        function ParStation({ station, onComplete }) {
            const pairs = station.pairs;
            const [placed, setPlaced] = useState({});     // leftIdx -> chipIdx
            const [selected, setSelected] = useState(null);
            const [mistakes, setMistakes] = useState(0);
            const chips = useMemo(() => shuffled(pairs.map((p, i) => i)), []);
            const doneCount = Object.keys(placed).length;

            useEffect(() => {
                if (doneCount === pairs.length) {
                    onComplete({ mistakes, items: pairs.length });
                }
            }, [doneCount]);

            const tryPlace = (chipIdx, leftIdx) => {
                if (placed[leftIdx] !== undefined) return;
                if (chipIdx === leftIdx) {
                    setPlaced(p => ({ ...p, [leftIdx]: chipIdx }));
                    setSelected(null);
                } else {
                    setMistakes(m => m + 1);
                    flashWrong(document.querySelector('[data-drop="L' + leftIdx + '"]'));
                    setSelected(null);
                }
            };

            const { chipHandlers, ghost } = useDragEngine(
                (chipId, dropId) => {
                    if (!dropId.startsWith('L')) return;
                    tryPlace(parseInt(chipId, 10), parseInt(dropId.slice(1), 10));
                },
                (chipId) => setSelected(s => (s === chipId ? null : chipId))
            );

            const onDropClick = (leftIdx) => {
                if (selected !== null) tryPlace(parseInt(selected, 10), leftIdx);
            };

            return (
                <div>
                    <div className="rep-pool">
                        {chips.map(ci => {
                            const used = Object.values(placed).includes(ci);
                            if (used) return null;
                            return (
                                <button key={ci} type="button"
                                    className={'rep-chip' + (String(selected) === String(ci) ? ' selected' : '')}
                                    {...chipHandlers(String(ci), false)}>
                                    <Rich text={pairs[ci].b} />
                                </button>
                            );
                        })}
                    </div>
                    <div className="rep-pairs">
                        {pairs.map((p, li) => (
                            <React.Fragment key={li}>
                                <div className="rep-pair-left"><Rich text={p.a} /></div>
                                <div className={'rep-drop' + (placed[li] !== undefined ? ' filled' : '')}
                                     data-drop={'L' + li}
                                     onClick={() => onDropClick(li)}>
                                    {placed[li] !== undefined
                                        ? <span className="rep-chip locked"><Rich text={pairs[placed[li]].b} /></span>
                                        : <span style={{ fontSize: 12, color: 'var(--lab-ink-muted)' }}>Släpp här</span>}
                                </div>
                            </React.Fragment>
                        ))}
                    </div>
                    <div className="rep-meta">
                        <span>Klara: {doneCount} / {pairs.length}</span>
                        <span>Fel: {mistakes}</span>
                    </div>
                    {ghost}
                </div>
            );
        }

        // ── Station: Sortera i lådor ─────────────────────────────
        function SorteraStation({ station, onComplete }) {
            const bins = station.bins;
            const allItems = useMemo(() => {
                const list = [];
                bins.forEach((b, bi) => b.items.forEach(it => list.push({ text: it, bin: bi })));
                return shuffled(list);
            }, []);
            const [placed, setPlaced] = useState({});   // itemIdx -> binIdx
            const [selected, setSelected] = useState(null);
            const [mistakes, setMistakes] = useState(0);
            const doneCount = Object.keys(placed).length;

            useEffect(() => {
                if (doneCount === allItems.length) onComplete({ mistakes, items: allItems.length });
            }, [doneCount]);

            const tryPlace = (itemIdx, binIdx) => {
                if (placed[itemIdx] !== undefined) return;
                if (allItems[itemIdx].bin === binIdx) {
                    setPlaced(p => ({ ...p, [itemIdx]: binIdx }));
                    setSelected(null);
                } else {
                    setMistakes(m => m + 1);
                    flashWrong(document.querySelector('[data-drop="B' + binIdx + '"]'));
                    setSelected(null);
                }
            };

            const { chipHandlers, ghost } = useDragEngine(
                (chipId, dropId) => {
                    if (!dropId.startsWith('B')) return;
                    tryPlace(parseInt(chipId, 10), parseInt(dropId.slice(1), 10));
                },
                (chipId) => setSelected(s => (s === chipId ? null : chipId))
            );

            return (
                <div>
                    <div className="rep-pool">
                        {allItems.map((it, ii) => placed[ii] === undefined && (
                            <button key={ii} type="button"
                                className={'rep-chip' + (String(selected) === String(ii) ? ' selected' : '')}
                                {...chipHandlers(String(ii), false)}>
                                <Rich text={it.text} />
                            </button>
                        ))}
                    </div>
                    <div className="rep-bins" style={{ gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))' }}>
                        {bins.map((b, bi) => (
                            <div key={bi} className="rep-bin" data-drop={'B' + bi}
                                 onClick={() => { if (selected !== null) tryPlace(parseInt(selected, 10), bi); }}>
                                <div className="rep-bin-title">{b.name}</div>
                                <div className="rep-bin-items">
                                    {allItems.map((it, ii) => placed[ii] === bi && (
                                        <span key={ii} className="rep-chip locked"><Rich text={it.text} /></span>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="rep-meta">
                        <span>Klara: {doneCount} / {allItems.length}</span>
                        <span>Fel: {mistakes}</span>
                    </div>
                    {ghost}
                </div>
            );
        }

        // ── Station: Ordna i följd ───────────────────────────────
        function OrdnaStation({ station, onComplete }) {
            const correct = station.items;
            const [order, setOrder] = useState(() => shuffled(correct.map((_, i) => i)));
            const [lockedPos, setLockedPos] = useState({});  // pos -> true (rätt efter kontroll)
            const [selected, setSelected] = useState(null);
            const [mistakes, setMistakes] = useState(0);
            const [checks, setChecks] = useState(0);
            const [complete, setComplete] = useState(false);

            const swap = (p1, p2) => {
                if (lockedPos[p1] || lockedPos[p2]) return;
                setOrder(o => {
                    const n = o.slice();
                    [n[p1], n[p2]] = [n[p2], n[p1]];
                    return n;
                });
                setSelected(null);
            };

            // Drag = flytta brickan TILL platsen (insticks-semantik): brickan
            // tas ur listan och skjuts in på målplatsen, övriga olåsta brickor
            // förskjuts. Låsta (rätta) positioner står orörda kvar.
            const moveTo = (from, to) => {
                if (from === to || lockedPos[from] || lockedPos[to]) return;
                setOrder(o => {
                    const unlocked = o.map((_, p) => p).filter(p => !lockedPos[p]);
                    const seq = unlocked.map(p => o[p]);
                    const fi = unlocked.indexOf(from), ti = unlocked.indexOf(to);
                    if (fi === -1 || ti === -1) return o;
                    const [item] = seq.splice(fi, 1);
                    seq.splice(ti, 0, item);
                    const n = o.slice();
                    unlocked.forEach((p, i) => { n[p] = seq[i]; });
                    return n;
                });
                setSelected(null);
            };

            const { chipHandlers, ghost } = useDragEngine(
                (chipPos, dropId) => {
                    if (!dropId.startsWith('P')) return;
                    moveTo(parseInt(chipPos, 10), parseInt(dropId.slice(1), 10));
                },
                (chipPos) => {
                    const p = parseInt(chipPos, 10);
                    if (lockedPos[p]) return;
                    setSelected(s => {
                        if (s === null) return chipPos;
                        if (s === chipPos) return null;
                        swap(parseInt(s, 10), p);
                        return null;
                    });
                }
            );

            const check = () => {
                let wrong = 0;
                const newLocked = { ...lockedPos };
                order.forEach((itemIdx, pos) => {
                    if (itemIdx === pos) newLocked[pos] = true;
                    else wrong++;
                });
                setLockedPos(newLocked);
                setChecks(c => c + 1);
                if (wrong === 0) {
                    setComplete(true);
                    onComplete({ mistakes, items: correct.length });
                } else {
                    setMistakes(m => m + wrong);
                    order.forEach((itemIdx, pos) => {
                        if (itemIdx !== pos) flashWrong(document.querySelector('[data-drop="P' + pos + '"] .rep-chip'));
                    });
                }
            };

            return (
                <div>
                    {(station.etikettStart || station.etikettSlut) && (
                        <div className="rep-order-ends">
                            <span>Överst: {station.etikettStart}</span>
                            <span>Nederst: {station.etikettSlut}</span>
                        </div>
                    )}
                    <div className="rep-order">
                        {order.map((itemIdx, pos) => (
                            <div key={pos} className="rep-order-row"
                                 data-drop={lockedPos[pos] ? undefined : 'P' + pos}>
                                <span className="rep-order-num">{pos + 1}.</span>
                                <button type="button"
                                    className={'rep-chip' + (lockedPos[pos] ? ' rightpos' : '') + (String(selected) === String(pos) ? ' selected' : '')}
                                    {...chipHandlers(String(pos), !!lockedPos[pos] || complete)}>
                                    <Rich text={correct[itemIdx]} />
                                </button>
                            </div>
                        ))}
                    </div>
                    <div className="rep-actions">
                        <button type="button" className="rep-btn" onClick={check} disabled={complete}>
                            Kontrollera ordningen
                        </button>
                    </div>
                    <div className="rep-meta">
                        <span>Kontroller: {checks}</span>
                        <span>Fel: {mistakes}</span>
                    </div>
                    {ghost}
                </div>
            );
        }

        // ── Station: Formellucka ─────────────────────────────────
        function LuckaStation({ station, onComplete }) {
            const rows = station.formler;   // { fore, efter, svar }  (allt Rich-text)
            const chipList = useMemo(() => {
                const list = rows.map((r, i) => ({ text: r.svar, row: i }));
                (station.distraktorer || []).forEach(d => list.push({ text: d, row: -1 }));
                return shuffled(list);
            }, []);
            const [placed, setPlaced] = useState({});   // rowIdx -> chipIdx
            const [selected, setSelected] = useState(null);
            const [mistakes, setMistakes] = useState(0);
            const doneCount = Object.keys(placed).length;

            useEffect(() => {
                if (doneCount === rows.length) onComplete({ mistakes, items: rows.length });
            }, [doneCount]);

            const tryPlace = (chipIdx, rowIdx) => {
                if (placed[rowIdx] !== undefined) return;
                if (chipList[chipIdx].row === rowIdx) {
                    setPlaced(p => ({ ...p, [rowIdx]: chipIdx }));
                    setSelected(null);
                } else {
                    setMistakes(m => m + 1);
                    flashWrong(document.querySelector('[data-drop="G' + rowIdx + '"]'));
                    setSelected(null);
                }
            };

            const { chipHandlers, ghost } = useDragEngine(
                (chipId, dropId) => {
                    if (!dropId.startsWith('G')) return;
                    tryPlace(parseInt(chipId, 10), parseInt(dropId.slice(1), 10));
                },
                (chipId) => setSelected(s => (s === chipId ? null : chipId))
            );

            return (
                <div>
                    <div className="rep-pool">
                        {chipList.map((c, ci) => {
                            const used = Object.values(placed).includes(ci);
                            if (used) return null;
                            return (
                                <button key={ci} type="button"
                                    className={'rep-chip' + (String(selected) === String(ci) ? ' selected' : '')}
                                    {...chipHandlers(String(ci), false)}>
                                    <Rich text={c.text} />
                                </button>
                            );
                        })}
                    </div>
                    <div className="rep-gaps">
                        {rows.map((r, ri) => (
                            <div key={ri} className="rep-gap-row">
                                {r.fore ? <span><Rich text={r.fore} /></span> : null}
                                <div className={'rep-drop' + (placed[ri] !== undefined ? ' filled' : '')}
                                     data-drop={'G' + ri}
                                     onClick={() => { if (selected !== null) tryPlace(parseInt(selected, 10), ri); }}>
                                    {placed[ri] !== undefined
                                        ? <span style={{ padding: '2px 6px' }}><Rich text={chipList[placed[ri]].text} /></span>
                                        : <span style={{ fontSize: 12, color: 'var(--lab-ink-muted)' }}>?</span>}
                                </div>
                                {r.efter ? <span><Rich text={r.efter} /></span> : null}
                            </div>
                        ))}
                    </div>
                    <div className="rep-meta">
                        <span>Klara: {doneCount} / {rows.length}</span>
                        <span>Fel: {mistakes}</span>
                    </div>
                    {ghost}
                </div>
            );
        }

        // ── Station: Sant eller falskt ───────────────────────────
        function BlixtStation({ station, onComplete }) {
            const items = useMemo(() => shuffled(station.pastaenden), []);
            const [idx, setIdx] = useState(0);
            const [answered, setAnswered] = useState(null);   // true om spelarens svar var rätt
            const [mistakes, setMistakes] = useState(0);

            const cur = items[idx];
            const answer = (val) => {
                if (answered !== null) return;
                const ok = val === cur.sant;
                if (!ok) setMistakes(m => m + 1);
                setAnswered(ok);
            };
            const next = () => {
                if (idx + 1 >= items.length) {
                    onComplete({ mistakes, items: items.length });
                } else {
                    setIdx(i => i + 1);
                    setAnswered(null);
                }
            };

            return (
                <div className="rep-tf">
                    <div className="rep-meta" style={{ marginTop: 0, marginBottom: 12 }}>
                        <span>Påstående {idx + 1} / {items.length}</span>
                        <span>Fel: {mistakes}</span>
                    </div>
                    <div className="rep-tf-card"><Rich text={cur.text} /></div>
                    <div className="rep-tf-btns">
                        <button type="button" className="rep-tf-btn" disabled={answered !== null} onClick={() => answer(true)}>Sant</button>
                        <button type="button" className="rep-tf-btn" disabled={answered !== null} onClick={() => answer(false)}>Falskt</button>
                    </div>
                    {answered !== null && (
                        <div className={'rep-tf-why ' + (answered ? 'ok' : 'fel')}>
                            <span className="rw-verdict">{answered ? 'Rätt' : 'Fel'} — påståendet är {cur.sant ? 'sant' : 'falskt'}</span>
                            <Rich text={cur.varfor} />
                        </div>
                    )}
                    {answered !== null && (
                        <div className="rep-actions">
                            <button type="button" className="rep-btn" onClick={next}>
                                {idx + 1 >= items.length ? 'Slutför stationen' : 'Nästa påstående'}
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const STATION_TYPES = {
            par: { comp: ParStation, tag: 'Para ihop' },
            sortera: { comp: SorteraStation, tag: 'Sortera' },
            ordna: { comp: OrdnaStation, tag: 'Ordna i följd' },
            lucka: { comp: LuckaStation, tag: 'Fyll luckan' },
            blixt: { comp: BlixtStation, tag: 'Sant eller falskt' },
        };

        // ── Huvudapp ─────────────────────────────────────────────
        function useHashId() {
            const read = () => (window.location.hash || '').replace(/^#/, '').trim();
            const [id, setId] = useState(read);
            useEffect(() => {
                const h = () => setId(read());
                window.addEventListener('hashchange', h);
                return () => window.removeEventListener('hashchange', h);
            }, []);

        }

        function GameView({ packId, pack }) {
            const stations = pack.stations;
            // ?station=N (1-baserad) hoppar direkt till en station — för test
            // och djuplänkar. Normalspel börjar på station 1.
            const initialStation = (() => {
                const n = parseInt(new URLSearchParams(location.search).get('station'), 10);
                return n >= 1 && n <= stations.length ? n - 1 : 0;
            })();
            const [stationIdx, setStationIdx] = useState(initialStation);
            const [results, setResults] = useState({});        // idx -> {mistakes, items, stars}
            const [phase, setPhase] = useState('spel');        // 'spel' | 'stationKlar' | 'resultat'
            const [runId, setRunId] = useState(0);             // byts för omstart (nollställer stationer)
            const wrapRef = useRef(null);

            const cur = stations[stationIdx];
            const typeInfo = STATION_TYPES[cur && cur.type] || null;

            const onComplete = useCallback((stats) => {
                const stars = starsFor(stats.mistakes, stats.items);
                setResults(r => ({ ...r, [stationIdx]: { ...stats, stars } }));
                setPhase('stationKlar');
            }, [stationIdx]);

            const goNext = () => {
                if (stationIdx + 1 >= stations.length) setPhase('resultat');
                else { setStationIdx(i => i + 1); setPhase('spel'); }
            };
            const restart = () => {
                setResults({}); setStationIdx(0); setPhase('spel'); setRunId(r => r + 1);
            };

            const totalStars = Object.values(results).reduce((s, r) => s + r.stars, 0);
            const catalogHref = 'katalog.html#' + packId + '.S';

            const StationComp = typeInfo && typeInfo.comp;

            return (
                <main className="rep-main">
                    <div className="breadcrumb">
                        <a href="index.html">Hem</a> / <a href={'katalog.html#' + pack.courseCode}>{pack.course}</a> / <span>Repetition: {pack.chapter}</span>
                    </div>
                    <div className="rep-head">
                        <span className="lab-mono-label">KAPITEL {pack.chapterNumber} · {pack.chapter.toUpperCase()} · SPELA OCH REPETERA</span>
                        <h1>Repetition inför provet</h1>
                        <p className="rep-intro">{pack.intro} Läs gärna <a href={catalogHref}>kapitlets sammanfattning</a> först — spela sedan igenom stationerna.</p>
                    </div>

                    <div className="rep-stage" ref={wrapRef} data-theme="ljusPapper">
                        <FsBtn wrapRef={wrapRef} />

                        <div className="rep-steps">
                            {stations.map((s, i) => (
                                <React.Fragment key={i}>
                                    {i > 0 && <span className="rep-step-line" />}
                                    <button type="button"
                                        className={'rep-step' + (results[i] ? ' done' : '') + (i === stationIdx && phase !== 'resultat' ? ' active' : '')}
                                        disabled={!results[i] && i !== stationIdx}
                                        title={s.title}
                                        onClick={() => { setStationIdx(i); setPhase(results[i] && i !== stationIdx ? 'stationKlar' : 'spel'); }}>
                                        {i + 1}
                                    </button>
                                </React.Fragment>
                            ))}
                        </div>

                        {phase === 'spel' && cur && StationComp && (
                            <React.Fragment>
                                <div className="rep-station-head">
                                    <span className="rs-kicker">Station {stationIdx + 1} av {stations.length} · {typeInfo.tag}</span>
                                    <h2>{cur.title}</h2>
                                    <p className="rs-instr"><Rich text={cur.instruktion} /></p>
                                </div>
                                <StationComp key={runId + '-' + stationIdx} station={cur} onComplete={onComplete} />
                            </React.Fragment>
                        )}

                        {phase === 'stationKlar' && results[stationIdx] && (
                            <div className="rep-done">
                                <Stars n={results[stationIdx].stars} />
                                <h3>Station {stationIdx + 1} klar</h3>
                                <p>
                                    {results[stationIdx].mistakes === 0
                                        ? 'Felfritt — mycket bra.'
                                        : results[stationIdx].mistakes + ' fel på ' + results[stationIdx].items + ' moment.'}
                                </p>
                                <div className="rep-actions">
                                    <button type="button" className="rep-btn" onClick={goNext}>
                                        {stationIdx + 1 >= stations.length ? 'Visa resultatet' : 'Nästa station'}
                                    </button>
                                </div>
                            </div>
                        )}

                        {phase === 'resultat' && (
                            <div className="rep-done">
                                <h3>Kapitlet repeterat</h3>
                                <p>{totalStars} av {stations.length * 3} stjärnor.</p>
                                <div className="rep-result-rows">
                                    {stations.map((s, i) => (
                                        <div key={i} className="rep-result-row">
                                            <span className="rr-num">{i + 1}.</span>
                                            <span className="rr-title">{s.title}</span>
                                            <Stars n={(results[i] || { stars: 0 }).stars} />
                                        </div>
                                    ))}
                                </div>
                                <div className="rep-actions">
                                    <button type="button" className="rep-btn quiet" onClick={restart}>Spela igen</button>
                                    <a className="rep-btn" style={{ textDecoration: 'none', display: 'inline-block' }} href={catalogHref}>
                                        Till sammanfattningen
                                    </a>
                                </div>
                            </div>
                        )}
                    </div>
                </main>
            );
        }

        function App() {
            const id = useHashId();
            const pack = PACKS[id];
            if (!pack) return <Chooser />;
            return <GameView key={id} packId={id} pack={pack} />;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <script src="feedback.js" defer></script>
</body>
</html>
