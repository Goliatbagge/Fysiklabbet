    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TAU = 2 * Math.PI;

        // ── Glidarintervall ──
        const FMIN = 0.25, FMAX = 1.50;      // frekvens f (Hz)
        const VMIN = 1.0,  VMAX = 4.0;       // utbredningshastighet v (m/s)
        const AMIN = 0.10, AMAX = 0.55;      // amplitud A (m)

        // ── Scen-geometri (viewBox-koordinater) ──
        const VBW = 820, VBH = 540;
        const CY = 300;                      // repets jämviktslinje (px)
        const X0 = 130;                      // repets vänsterände (px)
        const PPM = 83;                      // pixlar per meter
        const ROPE_M = 8.2;                  // repets längd (m) — löper ut ur bild
        const X1 = X0 + ROPE_M * PPM;
        const LSCALE = 28;                   // longitudinell förskjutning (px per m, förminskad)
        const XPOINT = 3.5;                  // markerad del av repet (m)
        const VPILMAX = 4.2;                 // v-pilens högergräns (m) — fri från toggles-rutan
        const DIMMAX = 7.9;                  // våglängdsmåttets högergräns (m) — måttet ligger under repet

        // Källsignalen lagras i en ringbuffert: repet visar en fördröjd kopia
        // av handens rörelse, y(x, t) = s(t − x/v)
        const SR = 120;                      // buffertens samplingsfrekvens (Hz)
        const NBUF = 2048;

        const fmt = (num, decimals = 1) => {
            if (!isFinite(num)) return '–';
            const s = num.toFixed(decimals);
            if (parseFloat(s) === 0) return '0';
            return s.replace('.', ',').replace('-', '−');
        };
        const fmtLam = (lam) => fmt(lam, lam >= 10 ? 1 : 2);

        const COL = {
            ink:   '#0f1620',
            rope:  '#1f2530',
            coil:  '#6b7178',
            point: '#c0392b',   // markerad punkt (röd, som teorifigurerna)
            vpil:  '#c0392b',   // hastighetspilen v (röd, som teorifigurerna)
            dim:   '#1f2530',   // våglängdsmåttet
            eq:    'rgba(15,22,32,0.40)',
        };

        const Slider = ({ label, sub, value, min, max, step, unit, onChange, decimals = 1 }) => (
            <div className="mb-3">
                <div className="flex justify-between items-baseline mb-1">
                    <label className="text-sm font-bold" style={{ color: 'var(--lab-ink)' }}
                           dangerouslySetInnerHTML={{ __html: label }} />
                    <div className="font-mono font-semibold text-sm" style={{ color: 'var(--lab-accent)' }}>
                        {fmt(value, decimals)} <span style={{ color: 'var(--lab-ink-muted)' }}>{unit}</span>
                    </div>
                </div>
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))}
                       className="w-full cursor-pointer" />
                <div className="flex justify-between mt-1 text-xs font-mono" style={{ color: 'var(--lab-ink-muted)' }}>
                    <span>{fmt(min, decimals)} {unit}</span>
                    <span>{fmt(max, decimals)} {unit}</span>
                </div>
                {sub && <div className="text-xs mt-1" style={{ color: 'var(--lab-ink-muted)' }}
                             dangerouslySetInnerHTML={{ __html: sub }} />}
            </div>
        );

        const FsSlider = ({ label, value, min, max, step, unit, onChange, decimals = 1 }) => (
            <div className="fs-row">
                <span className="fs-label" style={{ minWidth: 190 }} dangerouslySetInnerHTML={{ __html: label }} />
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))} />
                <span className="fs-value" style={{ minWidth: 90, textAlign: 'right' }}>
                    {fmt(value, decimals)} {unit}
                </span>
            </div>
        );

        // Formelkort-hjälpare (samma mönster som fysik2-svangningstid-app)
        const Vbl = ({ label, children }) => (
            <div className="flex flex-col items-center" style={{ lineHeight: 1.1 }}>
                <span className="flbl">{label}</span>
                <span className="fnum">{children}</span>
                <span className="flbl" aria-hidden="true" style={{ visibility: 'hidden' }}>{label}</span>
            </div>
        );
        const FracL = ({ topLbl, top, botLbl, bot }) => (
            <div className="flex flex-col items-center" style={{ lineHeight: 1.15 }}>
                <span className="flbl" style={topLbl ? {} : { visibility: 'hidden' }}>{topLbl || '·'}</span>
                <span className="fnum" style={{ padding: '0 8px 3px' }}>{top}</span>
                <span className="fnum" style={{ padding: '3px 8px 0', borderTop: '2px solid currentColor', alignSelf: 'stretch', textAlign: 'center' }}>{bot}</span>
                <span className="flbl" style={botLbl ? {} : { visibility: 'hidden' }}>{botLbl || '·'}</span>
            </div>
        );
        const FracP = ({ top, bot }) => (
            <span style={{ display: 'inline-flex', flexDirection: 'column', alignItems: 'center', lineHeight: 1.25 }}>
                <span style={{ padding: '0 6px 2px' }}>{top}</span>
                <span style={{ padding: '2px 6px 0', borderTop: '1.5px solid currentColor', alignSelf: 'stretch', textAlign: 'center' }}>{bot}</span>
            </span>
        );

        const FormulaCard = () => (
            <div className="glass-card rounded-xl p-4 mb-6 flex flex-wrap items-center gap-x-3 gap-y-3" style={{ color: 'var(--lab-ink)' }}>
                <Vbl label="Utbredningshastighet"><em>v</em></Vbl>
                <span className="fnum">=</span>
                <FracL topLbl="Våglängd" top={<em>λ</em>} botLbl="Periodtid" bot={<em>T</em>} />
                <span className="fnum">=</span>
                <Vbl label="Frekvens"><em>f</em></Vbl>
                <span className="fnum">·</span>
                <Vbl label="Våglängd"><em>λ</em></Vbl>
            </div>
        );

        // Handen (från teorifigurerna): handflata + fingrar + tumme, håller repänden
        const Hand = ({ x, y }) => (
            <g transform={`translate(${x - 109}, ${y - 110})`}>
                <rect x="78" y="99" width="24" height="22" rx="9" fill="#f0c39c" stroke="#cf9a6f" strokeWidth="1.2" />
                <rect x="98" y="102" width="11" height="5" rx="2.5" fill="#f0c39c" stroke="#cf9a6f" strokeWidth="1" />
                <rect x="98" y="108" width="11" height="5" rx="2.5" fill="#f0c39c" stroke="#cf9a6f" strokeWidth="1" />
                <rect x="98" y="114" width="11" height="5" rx="2.5" fill="#f0c39c" stroke="#cf9a6f" strokeWidth="1" />
                <rect x="84" y="97" width="9" height="6" rx="3" fill="#f0c39c" stroke="#cf9a6f" strokeWidth="1" />
            </g>
        );

        // ── Huvudapp ─────────────────────────────────────────────
        const App = () => {
            const [f, setF] = useState(0.50);        // frekvens (Hz)
            const [v, setV] = useState(2.0);         // utbredningshastighet (m/s)
            const [A, setA] = useState(0.35);        // amplitud (m)
            const [waveType, setWaveType] = useState(
                new URLSearchParams(location.search).get('wt') === 'long' ? 'long' : 'trans');
            const [mode, setMode] = useState(
                new URLSearchParams(location.search).get('mode') === 'puls' ? 'puls' : 'vag');
            const [running, setRunning] = useState(true);
            const [show, setShow] = useState({
                lam: true, point: true, vpil: true, eq: true,
            });
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [controlsOpen, setControlsOpen] = useState(true);
            const [, setTick] = useState(0);

            const sceneWrapRef = useRef(null);
            const pRef = useRef({});

            // Simuleringstillstånd (utanför React-state: uppdateras varje bildruta)
            const simRef = useRef({
                t: 0,                    // simuleringstid (s)
                phi: 0,                  // källans fasvinkel (rad), vågläget
                filled: -1,              // senast ifyllda buffert-index
                buf: new Float32Array(NBUF),
                pulses: [],              // aktiva pulsers starttider
                peaks: [],               // emissionstider för vågberg (transversell mätning)
                comps: [],               // emissionstider för förtätningar (longitudinell mätning)
            });

            const T = 1 / f;
            const lam = v / f;                       // våglängd λ = v/f (m)
            const pulseW = v * (1 / (2 * f));        // pulsens rumsliga bredd (m)

            pRef.current = { f, v, A, mode, running };

            // Fyll källbufferten fram till aktuell simuleringstid
            const fillBuf = (p) => {
                const s = simRef.current;
                const target = Math.floor(s.t * SR);
                while (s.filled < target) {
                    s.filled++;
                    const ts = s.filled / SR;
                    let val = 0;
                    if (p.mode === 'vag') {
                        const phiPrev = s.phi;
                        s.phi += TAU * p.f / SR;
                        val = p.A * Math.sin(s.phi);
                        // registrera vågberg (fas passerar π/2) och
                        // förtätningar (fas passerar 0/2π, stigande)
                        const k1 = Math.floor((s.phi - Math.PI / 2) / TAU);
                        if (k1 > Math.floor((phiPrev - Math.PI / 2) / TAU)) s.peaks.push(ts);
                        const k2 = Math.floor(s.phi / TAU);
                        if (k2 > Math.floor(phiPrev / TAU)) s.comps.push(ts);
                    } else {
                        for (const t0 of s.pulses) {
                            const tp = 1 / (2 * p.f);
                            if (ts >= t0 && ts <= t0 + tp) {
                                val += p.A * Math.sin(Math.PI * (ts - t0) / tp);
                                const mid = t0 + tp / 2;
                                if (ts - 1 / SR < mid && ts >= mid) { s.peaks.push(ts); s.comps.push(ts); }
                            }
                        }
                    }
                    s.buf[((s.filled % NBUF) + NBUF) % NBUF] = val;
                }
                // rensa toppar/pulser som lämnat repet
                const gone = (tp) => (s.t - tp) * p.v > ROPE_M + 2;
                s.peaks = s.peaks.filter(tp => !gone(tp));
                s.comps = s.comps.filter(tp => !gone(tp));
                s.pulses = s.pulses.filter(t0 => (s.t - t0) * p.v < ROPE_M + 4);
            };

            // ── Fysikloop: fyll källbufferten och rita om ──
            useEffect(() => {
                // dolt testkrok: ?t0=6 snabbspolar simuleringen (skärmdumpsverifiering)
                const t0p = parseFloat(new URLSearchParams(location.search).get('t0'));
                if (isFinite(t0p) && t0p > 0) {
                    simRef.current.t = t0p;
                    if (pRef.current.mode === 'puls') simRef.current.pulses.push(0.2);
                    fillBuf(pRef.current);
                    setTick(t => t + 1);
                }
                let raf, last = performance.now();
                const loop = (now) => {
                    raf = requestAnimationFrame(loop);
                    const dt = Math.min((now - last) / 1000, 0.05);
                    last = now;
                    const p = pRef.current;
                    const s = simRef.current;
                    if (p.running) {
                        s.t += dt;
                        fillBuf(p);
                    }
                    setTick(t => t + 1);
                };
                raf = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(raf);
            }, []);

            // Källsignalens värde vid tiden tq (s)
            const sAt = (tq) => {
                const s = simRef.current;
                if (tq < 0) return 0;
                const idx = tq * SR;
                if (idx > s.filled) return s.buf[((s.filled % NBUF) + NBUF) % NBUF] || 0;
                if (s.filled - idx > NBUF - 2) return 0;
                const i0 = Math.floor(idx), frac = idx - i0;
                const a = s.buf[((i0 % NBUF) + NBUF) % NBUF];
                const b = s.buf[(((i0 + 1) % NBUF) + NBUF) % NBUF];
                return a + (b - a) * frac;
            };

            // ── Fullskärm ──
            useEffect(() => {
                const handler = () => setIsFullscreen(
                    document.fullscreenElement === sceneWrapRef.current ||
                    document.webkitFullscreenElement === sceneWrapRef.current
                );
                document.addEventListener('fullscreenchange', handler);
                document.addEventListener('webkitfullscreenchange', handler);
                return () => {
                    document.removeEventListener('fullscreenchange', handler);
                    document.removeEventListener('webkitfullscreenchange', handler);
                };
            }, []);
            const toggleFullscreen = () => {
                const el = sceneWrapRef.current;
                if (!el) return;
                if (document.fullscreenElement || document.webkitFullscreenElement)
                    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
                else (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
            };

            const tShow = (key) => setShow(sh => ({ ...sh, [key]: !sh[key] }));
            const reset = () => {
                const s = simRef.current;
                s.t = 0; s.phi = 0; s.filled = -1;
                s.buf.fill(0); s.pulses = []; s.peaks = []; s.comps = [];
                setRunning(true);
            };
            const sendPulse = () => {
                const s = simRef.current;
                s.pulses.push(s.t);
                setRunning(true);
            };
            const switchMode = (m) => { setMode(m); reset(); };

            // ── Aktuellt tillstånd ──
            const sim = simRef.current;
            const t = sim.t;
            const handS = sAt(t);                    // källans utslag just nu (m)

            // toppositioner på repet (m): x = v · (t − t_emission)
            const marksOf = (list) => list
                .map(tp => v * (t - tp))
                .filter(x => x >= 0.15 && x <= ROPE_M)
                .sort((a, b) => a - b);
            const marks = marksOf(waveType === 'long' ? sim.comps : sim.peaks);

            // våglängdsmåttet: två intilliggande toppar inom mätzonen (leftmost par)
            let dimPair = null;
            if (show.lam && mode === 'vag') {
                for (let i = 0; i < marks.length - 1; i++) {
                    if (marks[i] >= 0.25 && marks[i + 1] <= DIMMAX) { dimPair = [marks[i], marks[i + 1]]; break; }
                }
            }
            // v-pilen rider ovanför den topp som hunnit längst inom pilzonen
            let vpilX = null;
            if (show.vpil) {
                const inZone = marks.filter(x => x >= 0.3 && x <= VPILMAX);
                if (inZone.length) vpilX = inZone[inZone.length - 1];
            }

            const ampPx = A * PPM;                   // max-utslag (px), transversellt
            const xPx = (xm) => X0 + xm * PPM;

            // ── Kryssrutor och lägen (uppe till höger på scenen) ──
            const sceneToggles = () => (
                <div className="scene-toggles">
                    <div className="st-title">Vågtyp</div>
                    <label><input type="radio" name="wtype" checked={waveType === 'trans'} onChange={() => setWaveType('trans')} />
                        <span>Transversell (rep)</span></label>
                    <label><input type="radio" name="wtype" checked={waveType === 'long'} onChange={() => setWaveType('long')} />
                        <span>Longitudinell (fjäder)</span></label>
                    <div className="st-sep"></div>
                    <div className="st-title">Läge</div>
                    <label><input type="radio" name="wmode" checked={mode === 'vag'} onChange={() => switchMode('vag')} />
                        <span>Fortskridande våg</span></label>
                    <label><input type="radio" name="wmode" checked={mode === 'puls'} onChange={() => switchMode('puls')} />
                        <span>Enstaka puls</span></label>
                    <div className="st-sep"></div>
                    <div className="st-title">Visa</div>
                    {mode === 'vag' && (
                        <label><input type="checkbox" checked={show.lam} onChange={() => tShow('lam')} />
                            <span className="st-swatch" style={{ background: COL.dim }}></span>
                            <span>Våglängd <em>λ</em></span></label>
                    )}
                    <label><input type="checkbox" checked={show.point} onChange={() => tShow('point')} />
                        <span className="st-swatch" style={{ background: COL.point }}></span>
                        <span>Markerad del av mediet</span></label>
                    <label><input type="checkbox" checked={show.vpil} onChange={() => tShow('vpil')} />
                        <span className="st-swatch" style={{ background: COL.vpil }}></span>
                        <span>Hastighetspil <em>v</em></span></label>
                    {waveType === 'trans' && (
                        <label><input type="checkbox" checked={show.eq} onChange={() => tShow('eq')} />
                            <span className="st-swatch" style={{ background: COL.eq }}></span>
                            <span>Jämviktsläge</span></label>
                    )}
                    {/* Styrknappar visas här BARA i fullskärm — i normalläget finns
                        de i sidopanelen (aldrig dubblerade). */}
                    {isFullscreen && (
                        <div className="st-actions">
                            {mode === 'puls' && (
                                <button className="btn-toggle" onClick={sendPulse}>Skicka puls</button>
                            )}
                            <button className="btn-toggle" onClick={() => setRunning(r => !r)}>{running ? 'Pausa' : 'Fortsätt'}</button>
                            <button className="btn-toggle" onClick={reset}>Börja om</button>
                        </div>
                    )}
                </div>
            );

            // ── Scenen ──
            const scene = () => {
                const els = [];

                // meterskala under repet
                const SCY = CY + 104;
                const ticks = [];
                for (let mtr = 0; mtr <= 8; mtr++) {
                    ticks.push(<line key={'t' + mtr} x1={xPx(mtr)} y1={SCY} x2={xPx(mtr)} y2={SCY + 7}
                                     stroke="rgba(15,22,32,0.35)" strokeWidth="1.2" />);
                    if (mtr % 2 === 0) ticks.push(
                        <text key={'tl' + mtr} x={xPx(mtr)} y={SCY + 23} textAnchor="middle" fontSize="11"
                              fill="var(--lab-ink-muted, #5a6170)">{mtr === 8 ? '8 m' : mtr}</text>
                    );
                }
                els.push(<line key="tick0" x1={X0} y1={SCY + 3.5} x2={xPx(8)} y2={SCY + 3.5}
                               stroke="rgba(15,22,32,0.25)" strokeWidth="1" />);
                els.push(<g key="ticks">{ticks}</g>);

                if (waveType === 'trans') {
                    // repet som polyline: y(x) = jämviktslinjen − s(t − x/v)
                    const pts = [];
                    const NSEG = 170;
                    for (let i = 0; i <= NSEG; i++) {
                        const xm = ROPE_M * i / NSEG;
                        const yy = CY - sAt(t - xm / v) * PPM;
                        pts.push(`${xPx(xm).toFixed(1)},${yy.toFixed(1)}`);
                    }
                    els.push(<polyline key="rope" points={pts.join(' ')} fill="none"
                                       stroke={COL.rope} strokeWidth="2.4" strokeLinejoin="round" />);

                    // markerad repbit: rör sig BARA upp/ned (vinkelrätt mot utbredningen)
                    if (show.point) {
                        const yp = CY - sAt(t - XPOINT / v) * PPM;
                        const xp = xPx(XPOINT);
                        els.push(
                            <g key="pt">
                                <line x1={xp + 16} y1={CY - ampPx - 4} x2={xp + 16} y2={CY - 12}
                                      stroke={COL.ink} strokeWidth="1.4" strokeLinecap="butt" opacity="0.75" />
                                <polygon points={`${xp + 13},${CY - ampPx - 4} ${xp + 16},${CY - ampPx - 11} ${xp + 19},${CY - ampPx - 4}`} fill={COL.ink} opacity="0.75" />
                                <line x1={xp + 16} y1={CY + ampPx + 4} x2={xp + 16} y2={CY + 12}
                                      stroke={COL.ink} strokeWidth="1.4" strokeLinecap="butt" opacity="0.75" />
                                <polygon points={`${xp + 13},${CY + ampPx + 4} ${xp + 16},${CY + ampPx + 11} ${xp + 19},${CY + ampPx + 4}`} fill={COL.ink} opacity="0.75" />
                                <circle cx={xp} cy={yp} r="5" fill={COL.point} />
                            </g>
                        );
                    }
                    els.push(<Hand key="hand" x={X0} y={CY - handS * PPM} />);
                } else {
                    // fjädern som ellips-spolar; varje spole förskjuts i längdled.
                    // Skalan dämpas vid kort våglängd/stor amplitud så att spolarna
                    // aldrig korsar varandra (visualiseringen är förminskad).
                    const NC = 100;
                    const lsEff = Math.min(LSCALE, 7.6 * (v / f) / A);
                    const coils = [];
                    for (let i = 0; i < NC; i++) {
                        const xm = ROPE_M * i / (NC - 1);
                        const u = sAt(t - xm / v) * lsEff;
                        coils.push(<ellipse key={i} cx={xPx(xm) + u} cy={CY} rx="3" ry="16"
                                            fill="none" stroke={COL.coil} strokeWidth="1.3" />);
                    }
                    els.push(<g key="coils">{coils}</g>);

                    // markerad spole: rör sig BARA fram/tillbaka i längdriktningen
                    if (show.point) {
                        const u = sAt(t - XPOINT / v) * lsEff;
                        const xp = xPx(XPOINT) + u;
                        const aw = Math.max(14, A * lsEff + 8);
                        const xc = xPx(XPOINT);
                        els.push(
                            <g key="ptl">
                                <ellipse cx={xp} cy={CY} rx="3" ry="16" fill="none"
                                         stroke={COL.point} strokeWidth="2.2" />
                                <line x1={xc - 4} y1={CY - 34} x2={xc - aw + 3} y2={CY - 34}
                                      stroke={COL.ink} strokeWidth="1.4" strokeLinecap="butt" opacity="0.75" />
                                <polygon points={`${xc - aw + 3},${CY - 37} ${xc - aw - 4},${CY - 34} ${xc - aw + 3},${CY - 31}`} fill={COL.ink} opacity="0.75" />
                                <line x1={xc + 4} y1={CY - 34} x2={xc + aw - 3} y2={CY - 34}
                                      stroke={COL.ink} strokeWidth="1.4" strokeLinecap="butt" opacity="0.75" />
                                <polygon points={`${xc + aw - 3},${CY - 37} ${xc + aw + 4},${CY - 34} ${xc + aw - 3},${CY - 31}`} fill={COL.ink} opacity="0.75" />
                            </g>
                        );
                    }
                    els.push(<Hand key="hand" x={X0 + handS * lsEff} y={CY} />);
                }

                // våglängdsmåttet: dubbelpil i fri yta UNDER repet, med streckade
                // projektionslinjer upp till topparna/förtätningarna
                if (dimPair) {
                    const dy = waveType === 'trans' ? CY + ampPx + 34 : CY + 50;
                    const projTop = waveType === 'trans' ? CY - ampPx + 10 : CY - 14;
                    const xA = xPx(dimPair[0]), xB = xPx(dimPair[1]);
                    const mid = (xA + xB) / 2;
                    els.push(
                        <g key="dim">
                            <line x1={xA} y1={projTop} x2={xA} y2={dy - 6}
                                  stroke="rgba(15,22,32,0.35)" strokeWidth="1" strokeDasharray="4 4" />
                            <line x1={xB} y1={projTop} x2={xB} y2={dy - 6}
                                  stroke="rgba(15,22,32,0.35)" strokeWidth="1" strokeDasharray="4 4" />
                            <line x1={xA + 8} y1={dy} x2={xB - 8} y2={dy}
                                  stroke={COL.dim} strokeWidth="1.5" strokeLinecap="butt" />
                            <polygon points={`${xA},${dy} ${xA + 8},${dy - 3.3} ${xA + 8},${dy + 3.3}`} fill={COL.dim} />
                            <polygon points={`${xB},${dy} ${xB - 8},${dy - 3.3} ${xB - 8},${dy + 3.3}`} fill={COL.dim} />
                            <text x={mid} y={dy + 19} textAnchor="middle" fontSize="14" fill={COL.dim}>
                                <tspan fontStyle="italic">λ</tspan> = {fmtLam(lam)} m
                            </text>
                        </g>
                    );
                }

                // hastighetspilen v rider ovanför en topp/förtätning
                if (vpilX !== null) {
                    const xp = xPx(vpilX);
                    const dy = waveType === 'trans' ? CY - ampPx - 30 : CY - 56;
                    els.push(
                        <g key="vpil">
                            <line x1={xp - 20} y1={dy} x2={xp + 15} y2={dy}
                                  stroke={COL.vpil} strokeWidth="2.6" strokeLinecap="butt" />
                            <polygon points={`${xp + 15},${dy - 4.2} ${xp + 24},${dy} ${xp + 15},${dy + 4.2}`} fill={COL.vpil} />
                            <text x={xp + 1} y={dy - 7} textAnchor="middle" fontSize="14" fill={COL.vpil}>
                                <tspan fontStyle="italic">v</tspan>
                            </text>
                        </g>
                    );
                }

                return (
                    <svg viewBox={`0 0 ${VBW} ${VBH}`} preserveAspectRatio="xMidYMid meet"
                         fontFamily="Poppins, sans-serif">
                        <defs>
                            <linearGradient id="paperG" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0" stopColor="#f7f2e8" />
                                <stop offset="1" stopColor="#ece3d2" />
                            </linearGradient>
                        </defs>
                        <rect x="0" y="0" width={VBW} height={VBH} fill="url(#paperG)" />
                        {show.eq && waveType === 'trans' && (
                            <g>
                                <line x1={X0 - 6} y1={CY} x2={VBW - 8} y2={CY}
                                      stroke={COL.eq} strokeWidth="1.2" strokeDasharray="6 5" />
                                <text x={10} y={CY - 8} fontSize="11.5" fill="var(--lab-ink-muted, #5a6170)">Jämvikts-</text>
                                <text x={10} y={CY + 8} fontSize="11.5" fill="var(--lab-ink-muted, #5a6170)">läge</text>
                            </g>
                        )}
                        {els}
                    </svg>
                );
            };

            const Readout = ({ label, value, unit, color }) => (
                <div className="p-2 rounded-lg" style={{ background: 'var(--lab-bg)', border: '1px solid var(--lab-line-strong)' }}>
                    <div className="text-xs" style={{ color: 'var(--lab-ink-muted)' }} dangerouslySetInnerHTML={{ __html: label }} />
                    <div className="font-mono font-bold text-sm" style={{ color: color || 'var(--lab-ink)' }}>
                        {value} <span className="font-normal text-xs" style={{ color: 'var(--lab-ink-muted)' }}>{unit}</span>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen dark-container px-4 md:px-8 pb-12" style={{ fontFamily: "'DM Sans', sans-serif" }}>
                    <div className="max-w-6xl mx-auto pt-6">
                        <div className="breadcrumb mb-4" style={{ fontSize: 13 }}>
                            <a href="index.html">Hem</a> / <a href="katalog.html#fy2">Fysik nivå 2</a> / Pulser, vågor och utbredningshastighet
                        </div>
                        <h1 className="text-3xl md:text-4xl font-black tracking-tight" style={{ color: 'var(--lab-ink)' }}>Pulser, vågor och utbredningshastighet</h1>
                        <p className="mt-2 mb-5" style={{ color: 'var(--lab-ink-soft)', maxWidth: 820 }}>
                            En hand skakar änden på ett rep — en enstaka svängning blir en <strong>puls</strong>, och
                            upprepade svängningar med en viss frekvens blir en <strong>fortskridande våg</strong>. Växla
                            mellan transversell våg (rep) och longitudinell våg (fjäder), ändra frekvensen <em>f</em>,
                            utbredningshastigheten <em>v</em> och amplituden <em>A</em>, och se hur
                            våglängden <em>λ</em> = <em>v</em>/<em>f</em> ändras. Den markerade delen av mediet visar
                            att vågen inte för med sig någon materia — bara energi.
                        </p>

                        <FormulaCard />

                        <main className="flex flex-col lg:flex-row gap-6">
                            {/* Scen */}
                            <div className="lg:w-3/5 order-1">
                                <div className="scene-wrap" data-theme="ljusPapper" ref={sceneWrapRef}>
                                    {scene()}

                                    <div className="scene-info">
                                        {mode === 'vag' ? (
                                            <React.Fragment>
                                                <span className="si-lbl">Våglängd <em style={{ textTransform: 'none' }}>λ</em></span>
                                                <span className="si-val">{fmtLam(lam)} m</span>
                                                <span className="si-lbl" style={{ marginTop: 4 }}>Periodtid <em style={{ textTransform: 'none' }}>T</em></span>
                                                <span className="si-val">{fmt(T, 2)} s</span>
                                            </React.Fragment>
                                        ) : (
                                            <React.Fragment>
                                                <span className="si-lbl">Hastighet <em style={{ textTransform: 'none' }}>v</em></span>
                                                <span className="si-val">{fmt(v, 1)} m/s</span>
                                                <span className="si-lbl" style={{ marginTop: 4 }}>Pulsens bredd</span>
                                                <span className="si-val">{fmt(pulseW, 1)} m</span>
                                            </React.Fragment>
                                        )}
                                    </div>

                                    <div className="scene-hint">
                                        {mode === 'puls' ? 'Tryck på Skicka puls och följ pulsen längs repet'
                                                         : 'Följ den röda markerade delen — den rör sig, men följer inte med vågen'}
                                    </div>
                                    {sceneToggles()}

                                    {/* Fullskärm: glidarna i en hopfällbar panel i underkant */}
                                    {isFullscreen && (
                                        <React.Fragment>
                                            <div className={`fs-controls ${controlsOpen ? '' : 'collapsed'}`}>
                                                <FsSlider label="Frekvens (<em>f</em>)" value={f}
                                                          min={FMIN} max={FMAX} step={0.05} unit="Hz" onChange={setF} decimals={2} />
                                                <FsSlider label="Utbredningshastighet (<em>v</em>)" value={v}
                                                          min={VMIN} max={VMAX} step={0.1} unit="m/s" onChange={setV} decimals={1} />
                                                <FsSlider label="Amplitud (<em>A</em>)" value={A}
                                                          min={AMIN} max={AMAX} step={0.01} unit="m" onChange={setA} decimals={2} />
                                            </div>
                                            <button className="fs-toggle-handle" onClick={() => setControlsOpen(o => !o)}
                                                    title={controlsOpen ? 'Dölj reglage' : 'Visa reglage'}
                                                    aria-expanded={controlsOpen}>
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                     strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"
                                                     style={{ transform: controlsOpen ? 'rotate(0deg)' : 'rotate(180deg)' }}>
                                                    <path d="M6 9l6 6 6-6"/>
                                                </svg>
                                                <span>{controlsOpen ? 'Dölj reglage' : 'Reglage'}</span>
                                            </button>
                                        </React.Fragment>
                                    )}

                                    <button className="fs-btn" onClick={toggleFullscreen} aria-label="Fullskärm"
                                            title={isFullscreen ? 'Lämna fullskärm' : 'Fullskärm'}>
                                        {isFullscreen ? (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M9 3v6H3" /><path d="M15 21v-6h6" /><path d="M21 9h-6V3" /><path d="M3 15h6v6" />
                                            </svg>
                                        ) : (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M3 9V3h6" /><path d="M21 9V3h-6" /><path d="M3 15v6h6" /><path d="M21 15v6h-6" />
                                            </svg>
                                        )}
                                    </button>
                                </div>
                            </div>

                            {/* Kontroller */}
                            <div className="lg:w-2/5 order-2">
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <Slider label="Frekvens (<em>f</em>)"
                                            sub={mode === 'vag'
                                                ? 'Hur många svängningar handen gör per sekund. Högre frekvens ger kortare våglängd.'
                                                : 'Styr pulsens bredd — pulsen är en halv svängning.'}
                                            value={f} min={FMIN} max={FMAX} step={0.05} unit="Hz" onChange={setF} decimals={2} />
                                    <Slider label="Utbredningshastighet (<em>v</em>)"
                                            sub="En egenskap hos mediet (repets spänning och massa) — inte hos handen."
                                            value={v} min={VMIN} max={VMAX} step={0.1} unit="m/s" onChange={setV} decimals={1} />
                                    <Slider label="Amplitud (<em>A</em>)"
                                            sub="Svängningens största utslag från jämviktsläget. Påverkar varken <em>v</em> eller <em>λ</em>."
                                            value={A} min={AMIN} max={AMAX} step={0.01} unit="m" onChange={setA} decimals={2} />
                                    <div className="flex gap-2 mt-1">
                                        {mode === 'puls' && (
                                            <button className="btn-toggle flex-1" onClick={sendPulse}>Skicka puls</button>
                                        )}
                                        <button className="btn-toggle flex-1" onClick={() => setRunning(r => !r)}>{running ? 'Pausa' : 'Fortsätt'}</button>
                                        <button className="btn-toggle flex-1" onClick={reset}>Börja om</button>
                                    </div>
                                </div>

                                {/* Live-beräkning */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    {mode === 'vag' ? (
                                        <React.Fragment>
                                            <div className="flbl mb-2">Beräkning av våglängden</div>
                                            <div className="flex flex-wrap items-center gap-x-2 gap-y-2"
                                                 style={{ color: 'var(--lab-ink)', fontSize: 15 }}>
                                                <span><em>λ</em></span>
                                                <span>=</span>
                                                <FracP top={<em>v</em>} bot={<em>f</em>} />
                                                <span>=</span>
                                                <FracP top={`${fmt(v, 1)} m/s`} bot={`${fmt(f, 2)} Hz`} />
                                                <span>=</span>
                                                <span className="font-bold" style={{ color: 'var(--lab-accent)' }}>{fmtLam(lam)}{' '}m</span>
                                            </div>
                                        </React.Fragment>
                                    ) : (
                                        <React.Fragment>
                                            <div className="flbl mb-2">Pulsens bredd (en halv svängning)</div>
                                            <div className="flex flex-wrap items-center gap-x-2 gap-y-2"
                                                 style={{ color: 'var(--lab-ink)', fontSize: 15 }}>
                                                <span><em>v</em></span>
                                                <span>·</span>
                                                <FracP top={<em>T</em>} bot={<React.Fragment>2</React.Fragment>} />
                                                <span>=</span>
                                                <FracP top={`${fmt(v, 1)} m/s · ${fmt(T, 2)} s`} bot="2" />
                                                <span>=</span>
                                                <span className="font-bold" style={{ color: 'var(--lab-accent)' }}>{fmt(pulseW, 1)}{' '}m</span>
                                            </div>
                                        </React.Fragment>
                                    )}
                                </div>

                                {/* Avläsning */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <div className="flbl mb-2">Avläsning</div>
                                    <div className="grid grid-cols-2 gap-2">
                                        {mode === 'vag' ? (
                                            <Readout label="Våglängd <em>λ</em> = <em>v</em>/<em>f</em>" value={fmtLam(lam)} unit="m" color="var(--lab-accent)" />
                                        ) : (
                                            <Readout label="Pulsens bredd" value={fmt(pulseW, 1)} unit="m" color="var(--lab-accent)" />
                                        )}
                                        <Readout label="Periodtid <em>T</em> = 1/<em>f</em>" value={fmt(T, 2)} unit="s" />
                                        <Readout label="Frekvens <em>f</em>" value={fmt(f, 2)} unit="Hz" />
                                        <Readout label="Utbredningshastighet <em>v</em>" value={fmt(v, 1)} unit="m/s" />
                                    </div>
                                    <div className="mt-2 p-2 rounded-lg text-xs" style={{ background: 'rgba(13,148,136,0.08)', color: 'var(--lab-ink-soft)' }}>
                                        Testa: dubbla frekvensen och se att våglängden halveras — hastigheten <em>v</em> ändras
                                        inte, för den bestäms av mediet. Ändra sedan <em>v</em> och se att våglängden följer med.
                                    </div>
                                </div>
                            </div>
                        </main>

                        {/* Pedagogiska sektioner */}
                        <div className="grid md:grid-cols-3 gap-4 mt-6">
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Vågen flyttar energi — inte materia</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Slå på den markerade delen av mediet och följ den röda punkten: den svänger bara kring
                                    sitt jämviktsläge och följer aldrig med vågen. Det som färdas längs repet är
                                    rörelsen — en energitransport. Ljudvågor transporterar energi som ljud och ljusvågor
                                    som strålning.
                                </p>
                            </div>
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Transversell eller longitudinell</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    I en <strong>transversell</strong> våg rör sig varje del av mediet vinkelrätt mot
                                    utbredningsriktningen — som i ett rep eller en sträng. I en <strong>longitudinell</strong> våg
                                    rör sig delarna i samma längdriktning som vågen, och pulsen fortplantas som en
                                    förtätning följd av en förtunning — som ljudvågor i luft.
                                </p>
                            </div>
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Hastigheten bestäms av mediet</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Hur fort vågen rör sig beror på mediet — inte på hur handen skakar. Skakar du
                                    snabbare (högre <em>f</em>) packas vågbergen tätare så att <em>λ</em> minskar,
                                    men varje vågberg färdas precis lika fort. Sambandet <em>v</em> = <em>f</em> · <em>λ</em> håller
                                    alltid ihop de tre storheterna.
                                </p>
                            </div>
                        </div>

                        <details className="glass-card rounded-xl p-4 mt-4">
                            <summary className="accordion-head" style={{ color: 'var(--lab-ink)' }}>
                                <span>Var kommer formeln ifrån?</span><span style={{ color: 'var(--lab-ink-muted)' }}>▾</span>
                            </summary>
                            <p className="mt-3 text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                Utgå från hastighetsformeln <span style={{ whiteSpace: 'nowrap' }}><em>v</em> = <em>s</em>/<em>t</em></span>.
                                Under en periodtid <em>T</em> (tiden för en hel svängning) hinner vågen röra sig exakt
                                en våglängd <em>λ</em>. Sätter vi in <span style={{ whiteSpace: 'nowrap' }}><em>s</em> = <em>λ</em></span> och
                                <span style={{ whiteSpace: 'nowrap' }}> <em>t</em> = <em>T</em></span> får
                                vi <span style={{ whiteSpace: 'nowrap' }}><em>v</em> = <em>λ</em>/<em>T</em></span>. Eftersom
                                frekvensen är <span style={{ whiteSpace: 'nowrap' }}><em>f</em> = 1/<em>T</em></span> kan
                                formeln också skrivas <span style={{ whiteSpace: 'nowrap' }}><em>v</em> = <em>f</em> · <em>λ</em></span>.
                                Hela härledningen finns steg för steg i teorigenomgången för avsnitt 2.7.
                            </p>
                        </details>

                        <details className="glass-card rounded-xl p-4 mt-4">
                            <summary className="accordion-head" style={{ color: 'var(--lab-ink)' }}>
                                <span>Vanliga missuppfattningar</span><span style={{ color: 'var(--lab-ink-muted)' }}>▾</span>
                            </summary>
                            <ul className="mt-3 space-y-2 text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                <li><strong>"Materian följer med vågen."</strong> Nej — varje del av repet svänger bara kring sitt jämviktsläge. En kork som flyter på vattenvågor guppar upp och ned men driver inte iväg med vågen. Det är energi som transporteras, inte materia.</li>
                                <li><strong>"Skakar man snabbare går vågen fortare."</strong> Nej — utbredningshastigheten är en egenskap hos mediet. Högre frekvens ger i stället kortare våglängd, så att <em>v</em> = <em>f</em> · <em>λ</em> fortfarande ger samma <em>v</em>.</li>
                                <li><strong>"Större amplitud ger högre hastighet."</strong> Nej — amplituden beskriver svängningens styrka (och vågens energi), men vågberget färdas precis lika fort oavsett hur högt det är.</li>
                            </ul>
                        </details>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
