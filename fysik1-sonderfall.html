                items.push({ color: '#94a3b8', label: 'Antineutrino (ν̄ₑ)' });
            }
            if (decayType === 'betaPlus') {
                items.push({ color: '#ec4899', label: 'Positron (e⁺)' });
                items.push({ color: '#94a3b8', label: 'Neutrino (νₑ)' });
            }
            if (decayType === 'gamma') {
                items.push({ color: '#fbbf24', label: 'Gammafoton (γ)' });
            }
            return (
                <div className="flex flex-wrap gap-4 justify-center">
                    {items.map(item => (
                        <div key={item.label} className="flex items-center gap-2">
                            <span
                                className="legend-dot"
                                style={{ background: item.color, boxShadow: `0 0 6px ${item.color}88` }}
                            />
                            <span className="text-slate-300 text-sm" style={{ fontFamily: 'Poppins, sans-serif' }}>
                                {item.label}
                            </span>
                        </div>
                    ))}
                </div>
            );
        }

        // ─── Nucleus info display ─────────────────────────────────────────────
        function NucleusInfo({ decayType }) {
            const info = {
                alpha: {
                    before: { name: 'Radium-226', symbol: '²²⁶₈₈Ra', protons: 88, neutrons: 138 },
                    after:  { name: 'Radon-222',  symbol: '²²²₈₆Rn', protons: 86, neutrons: 136 },
                },
                betaMinus: {
                    before: { name: 'Kol-14',    symbol: '¹⁴₆C', protons: 6, neutrons: 8 },
                    after:  { name: 'Kväve-14',  symbol: '¹⁴₇N', protons: 7, neutrons: 7 },
                },
                betaPlus: {
                    before: { name: 'Fluor-18',  symbol: '¹⁸₉F',  protons: 9,  neutrons: 9  },
                    after:  { name: 'Syre-18',   symbol: '¹⁸₈O',  protons: 8,  neutrons: 10 },
                },
                gamma: {
                    before: { name: 'Teknetium-99', symbol: '⁹⁹₄₃Tc*', protons: 43, neutrons: 56 },
                    after:  { name: 'Teknetium-99',  symbol: '⁹⁹₄₃Tc',  protons: 43, neutrons: 56 },
                },
            };
            const d = info[decayType];
            return (
                <div className="flex flex-wrap gap-4 justify-center text-sm" style={{ fontFamily: 'Poppins, sans-serif' }}>
                    <div className="glass-card-light rounded-lg px-4 py-3 text-center min-w-[160px]">
                        <div className="text-slate-400 text-xs mb-1">Moderkärna</div>
                        <div className="text-white font-semibold">{d.before.name}</div>
                        <div className="text-slate-300 text-xs mt-1">
                            <span style={{ color: '#ef4444' }}>{d.before.protons}p</span>
                            {' '}&middot;{' '}
                            <span style={{ color: '#60a5fa' }}>{d.before.neutrons}n</span>
                        </div>
                    </div>
                    <div className="flex items-center text-slate-400 text-xl">&rarr;</div>
                    <div className="glass-card-light rounded-lg px-4 py-3 text-center min-w-[160px]">
                        <div className="text-slate-400 text-xs mb-1">Dotterkärna</div>
                        <div className="text-white font-semibold">{d.after.name}</div>
                        <div className="text-slate-300 text-xs mt-1">
                            <span style={{ color: '#ef4444' }}>{d.after.protons}p</span>
                            {' '}&middot;{' '}
                            <span style={{ color: '#60a5fa' }}>{d.after.neutrons}n</span>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── Tab definitions ──────────────────────────────────────────────────
        const TABS = [
            { key: 'alpha',     label: 'Alfasönderfall' },
            { key: 'betaMinus', label: 'Beta\u207B-sönderfall' },
            { key: 'betaPlus',  label: 'Beta\u207A-sönderfall' },
            { key: 'gamma',     label: 'Gammasönderfall' },
        ];

        // ─── Main App ─────────────────────────────────────────────────────────
        function App() {
            const [activeTab, setActiveTab] = useState('alpha');

            function handleTabChange(key) {
                if (key !== activeTab) setActiveTab(key);
            }

            return (
                <div className="min-h-screen" style={{ background: 'linear-gradient(135deg, #0a0a1a 0%, #0d1526 50%, #0a1020 100%)' }}>
                    <div className="max-w-4xl mx-auto px-4 py-8">

                        {/* Breadcrumb */}
                        <div className="breadcrumb mb-4">
                            <a href="index.html">Hem</a>
                            <span className="mx-2">/</span>
                            <a href="fysik1.html">Fysik 1</a>
                            <span className="mx-2">/</span>
                            <span className="text-slate-300">Radioaktivt sönderfall</span>
                        </div>

                        {/* Heading */}
                        <div className="mb-8 text-center">
                            <h1 className="text-3xl font-bold glow-text mb-2" style={{ fontFamily: 'Poppins, sans-serif' }}>
                                Radioaktivt sönderfall
                            </h1>
                            <p className="text-slate-400 text-sm max-w-xl mx-auto" style={{ fontFamily: 'Poppins, sans-serif' }}>
                                Utforska de fyra typerna av radioaktivt sönderfall. Varje atom är uppbyggd av
                                individuella protoner (röda) och neutroner (blå) i kärnan.
                            </p>
                        </div>

                        {/* Tabs */}
                        <div className="flex flex-wrap gap-2 justify-center mb-6">
                            {TABS.map(tab => (
                                <button
                                    key={tab.key}
                                    className={`tab-btn ${activeTab === tab.key ? 'active' : ''}`}
                                    onClick={() => handleTabChange(tab.key)}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </div>

                        {/* Main card */}
                        <div className="glass-card rounded-2xl p-5 mb-6">
                            <DecayCanvas key={activeTab} decayType={activeTab} />

                            {/* Legend is now drawn on the canvas */}
                        </div>

                        {/* Nucleus info */}
                        <div className="mb-5">
                            <NucleusInfo decayType={activeTab} />
                        </div>

                        {/* Equation */}
                        <div className="mb-4">
                            <div className="text-xs text-slate-500 uppercase tracking-widest mb-2 text-center"
                                 style={{ fontFamily: 'Poppins, sans-serif' }}>
                                Kärnreaktionsformel
                            </div>
                            <DecayEquation decayType={activeTab} />
                        </div>

                        {/* Explanation */}
                        <div className="mb-8">
                            <div className="text-xs text-slate-500 uppercase tracking-widest mb-2"
                                 style={{ fontFamily: 'Poppins, sans-serif' }}>
                                Förklaring
                            </div>
                            <DecayExplanation decayType={activeTab} />
                        </div>

                        {/* Info cards */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                            <div className="glass-card-light rounded-xl p-4">
                                <h3 className="text-sm font-semibold text-sky-400 mb-2" style={{ fontFamily: 'Poppins, sans-serif' }}>
                                    Om visualiseringen
                                </h3>
                                <p className="text-slate-400 text-xs leading-relaxed" style={{ fontFamily: 'Poppins, sans-serif' }}>
                                    Kärnorna ritas med hexagonal packning för att efterlikna hur nukleoner sitter
                                    tätt packade i verkligheten. Storlekarna är inte i skala – en riktig atomkärna
                                    är ungefär 100&nbsp;000 gånger mindre än atomen.
                                </p>
                            </div>
                            <div className="glass-card-light rounded-xl p-4">
                                <h3 className="text-sm font-semibold text-sky-400 mb-2" style={{ fontFamily: 'Poppins, sans-serif' }}>
                                    Bevaringslagen
                                </h3>
                                <p className="text-slate-400 text-xs leading-relaxed" style={{ fontFamily: 'Poppins, sans-serif' }}>
                                    Vid alla typer av sönderfall bevaras det totala masstalet (antal nukleoner) och
                                    den totala laddningen. Energi och rörelsemängd bevaras också – det är kärn­fysikens
                                    grundlagar.
                                </p>
                            </div>
                        </div>
                    </div>

                    <footer class="footer">
                        <p>&copy; 2025 Fysiklabbet. Skapad för gymnasieelever.</p>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
