    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TAU = 2 * Math.PI;

        // ── Glidarintervall (T är den kanoniska storheten; f och ω följer) ──
        const TMIN = 1.0, TMAX = 10.0;       // period (s)
        const RMIN = 0.6, RMAX = 1.5;        // banradie (m)

        // ── Scen-geometri (viewBox-koordinater) ──
        const VBW = 820, VBH = 540;
        const CX = 195, CY = 300;            // cirkelns medelpunkt
        const PXM = 78;                      // pixlar per meter
        const SV = 12;                       // pixlar per m/s (fartpilen, skalenlig)
        const BALLX = 385;                   // den svängande punktens lodräta bana
        const GX0 = 445;                     // y-axelns läge (grafen)
        const PXS = 27;                      // pixlar per sekund i grafen
        const GXEND = 792;                   // t-axelns pilspets
        const TCURVE = (750 - GX0) / PXS;    // hur många sekunder kurvan ritas
        const GAXTOP = 168, GAXBOT = 435;    // y-axelns ändar
        const DIMY = 444;                    // måttlinjen för T

        const fmt = (num, decimals = 1) => {
            if (!isFinite(num)) return '–';
            const s = num.toFixed(decimals);
            if (parseFloat(s) === 0) return '0';
            return s.replace('.', ',').replace('-', '−');
        };

        const COL = {
            punkt:  '#d13b2e',  // röd — punkten i cirkelbanan (samma som teorifigurerna)
            fart:   '#2563c9',  // blå — fart v (samma som teorifigurerna)
            vinkel: '#3f9d5a',  // grön — vinkelsektorn (samma som radian-figuren)
            vinkelT:'#2f7d49',  // mörkare grön för α-etiketten
            bage:   '#d13b2e',  // röd — cirkelbågen (båglängden α · r)
            ink:    '#0f1620',
            muted:  '#7c828c',
            boll:   '#6ba3d6',  // den svängande punkten (samma blå som vikterna)
            bollK:  '#2f6db0',
            axel:   '#38bdf8',  // diagramaxlar (svensk standard)
        };

        // ── SVG-pil — mot ljus papperscen behövs ingen vit kontur ──
        const Arrow = ({ x1, y1, x2, y2, color, width = 5, head = 14, opacity = 1 }) => {
            const ang = Math.atan2(y2 - y1, x2 - x1);
            const len = Math.hypot(x2 - x1, y2 - y1);
            if (len < 3) return null;
            const hw = 0.42;
            const hd = Math.max(8, Math.min(head, len * 0.9));
            const bx = x2 - hd * 0.82 * Math.cos(ang);
            const by = y2 - hd * 0.82 * Math.sin(ang);
            const pL = [x2 - hd * Math.cos(ang - hw), y2 - hd * Math.sin(ang - hw)];
            const pR = [x2 - hd * Math.cos(ang + hw), y2 - hd * Math.sin(ang + hw)];
            return (
                <g opacity={opacity}>
                    <line x1={x1} y1={y1} x2={bx} y2={by} stroke={color} strokeWidth={width}
                          strokeLinecap="butt" />
                    <polygon points={`${x2},${y2} ${pL[0]},${pL[1]} ${pR[0]},${pR[1]}`} fill={color}
                             stroke="rgba(15,22,32,0.18)" strokeWidth="1" strokeLinejoin="round" />
                </g>
            );
        };

        const Slider = ({ label, sub, value, min, max, step, unit, onChange, decimals = 1 }) => (
            <div className="mb-3">
                <div className="flex justify-between items-baseline mb-1">
                    <label className="text-sm font-bold" style={{ color: 'var(--lab-ink)' }}
                           dangerouslySetInnerHTML={{ __html: label }} />
                    <div className="font-mono font-semibold text-sm" style={{ color: 'var(--lab-accent)' }}>
                        {fmt(value, decimals)} <span style={{ color: 'var(--lab-ink-muted)' }}>{unit}</span>
                    </div>
                </div>
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))}
                       className="w-full cursor-pointer" />
                <div className="flex justify-between mt-1 text-xs font-mono" style={{ color: 'var(--lab-ink-muted)' }}>
                    <span>{fmt(min, decimals)} {unit}</span>
                    <span>{fmt(max, decimals)} {unit}</span>
                </div>
                {sub && <div className="text-xs mt-1" style={{ color: 'var(--lab-ink-muted)' }}
                             dangerouslySetInnerHTML={{ __html: sub }} />}
            </div>
        );

        // Kompakt reglage-rad för fullskärms-dropdownen i underkant
        const FsSlider = ({ label, value, min, max, step, unit, onChange, decimals = 1 }) => (
            <div className="fs-row">
                <span className="fs-label" style={{ minWidth: 150 }} dangerouslySetInnerHTML={{ __html: label }} />
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))} />
                <span className="fs-value" style={{ minWidth: 90, textAlign: 'right' }}>
                    {fmt(value, decimals)} {unit}
                </span>
            </div>
        );

        // Formelkort-hjälpare: variabel med ord-etikett ovanför (+ osynlig
        // spacer under så symbolen centreras på radens mittlinje)
        const Vbl = ({ label, children }) => (
            <div className="flex flex-col items-center" style={{ lineHeight: 1.1 }}>
                <span className="flbl">{label}</span>
                <span className="fnum">{children}</span>
                <span className="flbl" aria-hidden="true" style={{ visibility: 'hidden' }}>{label}</span>
            </div>
        );
        // Bråk med rakt divisionsstreck och ord-etiketter över täljaren/under
        // nämnaren. Osynliga spacer-etiketter håller strecket på radens mittlinje.
        const FracL = ({ topLbl, top, botLbl, bot }) => (
            <div className="flex flex-col items-center" style={{ lineHeight: 1.15 }}>
                <span className="flbl" style={topLbl ? {} : { visibility: 'hidden' }}>{topLbl || '·'}</span>
                <span className="fnum" style={{ padding: '0 8px 3px' }}>{top}</span>
                <span className="fnum" style={{ padding: '3px 8px 0', borderTop: '2px solid currentColor', alignSelf: 'stretch', textAlign: 'center' }}>{bot}</span>
                <span className="flbl" style={botLbl ? {} : { visibility: 'hidden' }}>{botLbl || '·'}</span>
            </div>
        );

        const FormulaCard = () => (
            <div className="glass-card rounded-xl p-4 mb-6 flex flex-wrap items-center gap-x-3 gap-y-3" style={{ color: 'var(--lab-ink)' }}>
                <Vbl label="Period"><em>T</em></Vbl>
                <span className="fnum">=</span>
                <FracL top="1" botLbl="Frekvens" bot={<em>f</em>} />
                <span className="fnum" style={{ margin: '0 10px', color: 'var(--lab-ink-muted)' }}>|</span>
                <Vbl label="Vinkelhastighet"><em>ω</em></Vbl>
                <span className="fnum">=</span>
                <FracL top={<span>2<em>π</em></span>} botLbl="Period" bot={<em>T</em>} />
                <span className="fnum">=</span>
                <span className="fnum">2<em>π</em></span>
                <span className="fnum">·</span>
                <Vbl label="Frekvens"><em>f</em></Vbl>
                <span className="fnum" style={{ margin: '0 10px', color: 'var(--lab-ink-muted)' }}>|</span>
                <Vbl label="Fart"><em>v</em></Vbl>
                <span className="fnum">=</span>
                <Vbl label="Vinkelhastighet"><em>ω</em></Vbl>
                <span className="fnum">·</span>
                <Vbl label="Banradie"><em>r</em></Vbl>
            </div>
        );

        // ── Huvudapp ─────────────────────────────────────────────
        const App = () => {
            const [T, setT] = useState(4.0);         // period (s) — kanonisk storhet
            const [r, setR] = useState(1.2);         // banradie (m)
            const [running, setRunning] = useState(true);
            const [show, setShow] = useState({
                fart: true, vinkel: true, radskala: true, boll: true, graf: true, inre: false,
            });
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [controlsOpen, setControlsOpen] = useState(true);
            const [, setTick] = useState(0);

            const sceneWrapRef = useRef(null);
            const angRef = useRef(0.9);              // total rotationsvinkel (rad)
            const pRef = useRef({});

            // ── Härledda storheter ──
            const f = 1 / T;                         // frekvens (Hz)
            const om = TAU / T;                      // vinkelhastighet (rad/s)
            const v = om * r;                        // fart i banan (m/s)
            pRef.current = { om, running };

            // De tre reglagen är sammanlänkade: alla styr perioden T
            const setTc = (val) => setT(Math.min(TMAX, Math.max(TMIN, val)));
            const setFromF = (fv) => setTc(1 / fv);
            const setFromOm = (ov) => setTc(TAU / ov);

            // ── Fysikloop (rAF) ──
            useEffect(() => {
                let raf, last = performance.now();
                const loop = (now) => {
                    raf = requestAnimationFrame(loop);
                    const dt = Math.min((now - last) / 1000, 0.05);
                    last = now;
                    const p = pRef.current;
                    if (p.running) angRef.current += p.om * dt;
                    setTick(t => t + 1);
                };
                raf = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(raf);
            }, []);

            // ── Fullskärm ──
            useEffect(() => {
                const handler = () => setIsFullscreen(
                    document.fullscreenElement === sceneWrapRef.current ||
                    document.webkitFullscreenElement === sceneWrapRef.current
                );
                document.addEventListener('fullscreenchange', handler);
                document.addEventListener('webkitfullscreenchange', handler);
                return () => {
                    document.removeEventListener('fullscreenchange', handler);
                    document.removeEventListener('webkitfullscreenchange', handler);
                };
            }, []);
            const toggleFullscreen = () => {
                const el = sceneWrapRef.current;
                if (!el) return;
                if (document.fullscreenElement || document.webkitFullscreenElement)
                    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
                else (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
            };

            const tShow = (key) => setShow(sh => ({ ...sh, [key]: !sh[key] }));
            const reset = () => { angRef.current = 0; setRunning(true); };

            // ── Aktuellt tillstånd ──
            const angTot = angRef.current;
            const alpha = ((angTot % TAU) + TAU) % TAU;   // vinkel inom varvet (rad)
            const varv = Math.floor(angTot / TAU);
            const deg = alpha * 180 / Math.PI;
            const bage = alpha * r;                       // båglängd (m)

            const Rpx = r * PXM;
            const px = CX + Rpx * Math.cos(alpha);
            const py = CY - Rpx * Math.sin(alpha);
            const dir = [-Math.sin(alpha), -Math.cos(alpha)];   // tangentriktning (moturs)

            // Grafens punkt: vik tillbaka vinkeln vid en hel periodmultipel som
            // ryms i fönstret, så att kurvpunkten aldrig hoppar i höjdled
            const kWrap = Math.max(1, Math.floor(TCURVE / T));
            const tau = (angTot % (kWrap * TAU)) / om;    // "grafens tid" (s)
            const dotX = GX0 + tau * PXS;

            const primaryLabel = running ? 'Pausa' : 'Fortsätt';

            // ── Kryssrutor (uppe till höger på scenen) ──
            const sceneToggles = () => (
                <div className="scene-toggles">
                    <div className="st-title">Visa</div>
                    <label><input type="checkbox" checked={show.fart} onChange={() => tShow('fart')} />
                        <span className="st-swatch" style={{ background: COL.fart }}></span>
                        <span>Fart <em>v</em></span></label>
                    <label><input type="checkbox" checked={show.vinkel} onChange={() => tShow('vinkel')} />
                        <span className="st-swatch" style={{ background: COL.vinkel }}></span>
                        <span>Vinkeln <em>α</em> och bågen</span></label>
                    <label><input type="checkbox" checked={show.radskala} onChange={() => tShow('radskala')} />
                        <span className="st-swatch" style={{ background: COL.muted }}></span>
                        <span>Radianskala</span></label>
                    <label><input type="checkbox" checked={show.boll} onChange={() => tShow('boll')} />
                        <span className="st-swatch" style={{ background: COL.boll }}></span>
                        <span>Svängande punkt</span></label>
                    <label><input type="checkbox" checked={show.graf} onChange={() => tShow('graf')} />
                        <span className="st-swatch" style={{ background: COL.ink }}></span>
                        <span><em>y</em>–<em>t</em>-graf</span></label>
                    <label><input type="checkbox" checked={show.inre} onChange={() => tShow('inre')} />
                        <span className="st-swatch" style={{ background: COL.punkt }}></span>
                        <span>Inre punkt (<em>r</em>/2)</span></label>
                    {/* Styrknappar visas här BARA i fullskärm — i normalläget finns
                        de i sidopanelen (aldrig dubblerade). */}
                    {isFullscreen && (
                        <div className="st-actions">
                            <button className="btn-toggle" onClick={() => setRunning(rr => !rr)}>{primaryLabel}</button>
                            <button className="btn-toggle" onClick={reset}>Börja om</button>
                        </div>
                    )}
                </div>
            );

            // ── Scenen ──
            const scene = () => {
                // sinuskurvan y(t) = r · sin(ω · t)
                const pts = [];
                for (let t = 0; t <= TCURVE + 1e-9; t += 0.04) {
                    pts.push(`${(GX0 + t * PXS).toFixed(1)},${(CY - Rpx * Math.sin(om * t)).toFixed(1)}`);
                }
                const curve = pts.join(' ');

                // vinkelsektor + cirkelbåge (moturs från vinkeln 0)
                const laf = alpha > Math.PI ? 1 : 0;
                const ex = CX + Rpx * Math.cos(alpha), ey = CY - Rpx * Math.sin(alpha);
                const sectorPath = `M ${CX} ${CY} L ${CX + Rpx} ${CY} A ${Rpx} ${Rpx} 0 ${laf} 0 ${ex.toFixed(1)} ${ey.toFixed(1)} Z`;
                const arcPath = `M ${CX + Rpx} ${CY} A ${Rpx} ${Rpx} 0 ${laf} 0 ${ex.toFixed(1)} ${ey.toFixed(1)}`;

                // radianskalans streck och siffror (1–6 rad)
                const radTicks = [];
                for (let k = 1; k <= 6; k++) {
                    const c = Math.cos(k), s = Math.sin(k);
                    radTicks.push(
                        <g key={k}>
                            <line x1={CX + (Rpx - 5) * c} y1={CY - (Rpx - 5) * s}
                                  x2={CX + (Rpx + 5) * c} y2={CY - (Rpx + 5) * s}
                                  stroke={COL.muted} strokeWidth="1.3" />
                            {/* siffrorna inuti cirkeln — utanför sveper v-pilen förbi varje varv */}
                            <text x={CX + (Rpx - 16) * c} y={CY - (Rpx - 16) * s + 4}
                                  textAnchor="middle" fontSize="11" fill="var(--lab-ink-muted, #5a6170)">
                                {k}
                            </text>
                        </g>
                    );
                }

                // fartpilen — startar vid punktens KANT i rörelseriktningen
                const vLen = v * SV;
                const vx1 = px + 6.5 * dir[0], vy1 = py + 6.5 * dir[1];
                const vx2 = vx1 + vLen * dir[0], vy2 = vy1 + vLen * dir[1];
                const vlx = vx2 + 15 * dir[0], vly = vy2 + 15 * dir[1];

                // inre punkten på halva radien — samma vinkel, halva farten
                const p2x = CX + 0.5 * Rpx * Math.cos(alpha);
                const p2y = CY - 0.5 * Rpx * Math.sin(alpha);
                const v2Len = 0.5 * vLen;

                // måttlinje för perioden T under grafen
                const dimX1 = GX0, dimX2 = GX0 + T * PXS;
                const dimW = dimX2 - dimX1;

                const projTargetX = show.graf ? dotX : BALLX + 9;

                return (
                    <svg viewBox={`0 0 ${VBW} ${VBH}`} preserveAspectRatio="xMidYMid meet"
                         fontFamily="Poppins, sans-serif">
                        <defs>
                            <linearGradient id="paperG" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0" stopColor="#f7f2e8" />
                                <stop offset="1" stopColor="#ece3d2" />
                            </linearGradient>
                        </defs>
                        <rect x="0" y="0" width={VBW} height={VBH} fill="url(#paperG)" />

                        {/* Vinkelsektor + cirkelbåge (båglängden är α · r) */}
                        {show.vinkel && alpha > 0.02 && (
                            <g>
                                <path d={sectorPath} fill={COL.vinkel} fillOpacity="0.22" stroke="none" />
                                <path d={arcPath} fill="none" stroke={COL.bage} strokeWidth="3" />
                            </g>
                        )}
                        {show.vinkel && (
                            <line x1={CX} y1={CY} x2={CX + Rpx} y2={CY}
                                  stroke="rgba(15,22,32,0.32)" strokeWidth="1" strokeDasharray="4 4" />
                        )}

                        {/* Cirkelbanan (samma stil som teorifigurerna) */}
                        <circle cx={CX} cy={CY} r={Rpx} fill="none" stroke="#1f2530" strokeWidth="1.6" />
                        <circle cx={CX} cy={CY} r="2.6" fill="#1f2530" />
                        <line x1={CX} y1={CY} x2={px} y2={py}
                              stroke={COL.muted} strokeWidth="1.5" strokeDasharray="5 4" />

                        {/* Radianskala */}
                        {show.radskala && radTicks}

                        {/* α-etikett inuti sektorn (på bisektrisen — fri yta) */}
                        {show.vinkel && alpha > 0.45 && alpha < 6.0 && Rpx > 55 && (
                            <text x={CX + 0.56 * Rpx * Math.cos(alpha / 2)}
                                  y={CY - 0.56 * Rpx * Math.sin(alpha / 2) + 5}
                                  textAnchor="middle" fontSize="15" fontStyle="italic"
                                  fill={COL.vinkelT}>α</text>
                        )}

                        {/* Projektionslinje: cirkelpunkt → svängande punkt → grafpunkt */}
                        {(show.boll || show.graf) && (
                            <line x1={px + 7} y1={py} x2={projTargetX} y2={py}
                                  stroke="rgba(15,22,32,0.35)" strokeWidth="1" strokeDasharray="5 4" />
                        )}

                        {/* Den svängande punkten (harmonisk svängning) */}
                        {show.boll && (
                            <g>
                                <line x1={BALLX} y1={CY - Rpx - 12} x2={BALLX} y2={CY + Rpx + 12}
                                      stroke="rgba(15,22,32,0.25)" strokeWidth="1.2" />
                                <line x1={BALLX - 6} y1={CY - Rpx} x2={BALLX + 6} y2={CY - Rpx}
                                      stroke="rgba(15,22,32,0.35)" strokeWidth="1.2" />
                                <line x1={BALLX - 6} y1={CY + Rpx} x2={BALLX + 6} y2={CY + Rpx}
                                      stroke="rgba(15,22,32,0.35)" strokeWidth="1.2" />
                                <circle cx={BALLX} cy={py} r="9" fill={COL.boll} stroke={COL.bollK} strokeWidth="2" />
                            </g>
                        )}

                        {/* y–t-grafen */}
                        {show.graf && (
                            <g>
                                {/* axlar (ljusblå enligt svensk diagramstandard) */}
                                <line x1={GX0 - 10} y1={CY} x2={GXEND} y2={CY} stroke={COL.axel} strokeWidth="1.6" />
                                <polygon points={`${GXEND},${CY} ${GXEND - 9},${CY - 3.6} ${GXEND - 9},${CY + 3.6}`} fill={COL.axel} />
                                <line x1={GX0} y1={GAXBOT} x2={GX0} y2={GAXTOP} stroke={COL.axel} strokeWidth="1.6" />
                                <polygon points={`${GX0},${GAXTOP} ${GX0 - 3.6},${GAXTOP + 9} ${GX0 + 3.6},${GAXTOP + 9}`} fill={COL.axel} />
                                <text x={GX0} y={GAXTOP - 10} textAnchor="middle" fontSize="13" fill={COL.ink}>
                                    <tspan fontStyle="italic">y</tspan> (m)
                                </text>
                                <text x={GXEND - 2} y={CY + 20} textAnchor="end" fontSize="13" fill={COL.ink}>
                                    <tspan fontStyle="italic">t</tspan> (s)
                                </text>

                                {/* kurvan y(t) = r · sin(ω · t) */}
                                <polyline points={curve} fill="none" stroke={COL.ink} strokeWidth="1.8" />

                                {/* måttlinje för perioden T (i fri yta under grafen) */}
                                <line x1={dimX1} y1={CY} x2={dimX1} y2={DIMY}
                                      stroke="rgba(15,22,32,0.3)" strokeWidth="1" strokeDasharray="4 4" />
                                <line x1={dimX2} y1={CY} x2={dimX2} y2={DIMY}
                                      stroke="rgba(15,22,32,0.3)" strokeWidth="1" strokeDasharray="4 4" />
                                {dimW > 22 ? (
                                    <g>
                                        <line x1={dimX1 + 7} y1={DIMY} x2={dimX2 - 7} y2={DIMY}
                                              stroke={COL.ink} strokeWidth="1.4" strokeLinecap="butt" />
                                        <polygon points={`${dimX1},${DIMY} ${dimX1 + 7},${DIMY - 3.4} ${dimX1 + 7},${DIMY + 3.4}`} fill={COL.ink} />
                                        <polygon points={`${dimX2},${DIMY} ${dimX2 - 7},${DIMY - 3.4} ${dimX2 - 7},${DIMY + 3.4}`} fill={COL.ink} />
                                    </g>
                                ) : (
                                    <line x1={dimX1} y1={DIMY} x2={dimX2} y2={DIMY}
                                          stroke={COL.ink} strokeWidth="1.4" strokeLinecap="butt" />
                                )}
                                <text x={(dimX1 + dimX2) / 2} y={DIMY + 18} textAnchor="middle" fontSize="13" fill={COL.ink}>
                                    <tspan fontStyle="italic">T</tspan> = {fmt(T, 1)} s
                                </text>

                                {/* punkten på kurvan */}
                                <circle cx={dotX} cy={py} r="5" fill={COL.punkt} />
                            </g>
                        )}

                        {/* Inre punkten (r/2) — samma ω, halva farten */}
                        {show.inre && (
                            <g>
                                <circle cx={p2x} cy={p2y} r="5" fill={COL.punkt} />
                                {show.fart && (
                                    <Arrow x1={p2x + 5.5 * dir[0]} y1={p2y + 5.5 * dir[1]}
                                           x2={p2x + 5.5 * dir[0] + v2Len * dir[0]}
                                           y2={p2y + 5.5 * dir[1] + v2Len * dir[1]}
                                           color={COL.fart} width="4" head="11" />
                                )}
                            </g>
                        )}

                        {/* Punkten i cirkelbanan + fartpilen (tangentiell, från kanten) */}
                        <circle cx={px} cy={py} r="6" fill={COL.punkt} />
                        {show.fart && (
                            <g>
                                <Arrow x1={vx1} y1={vy1} x2={vx2} y2={vy2} color={COL.fart} />
                                <text x={vlx} y={vly + 4} textAnchor="middle" fontSize="15"
                                      fontStyle="italic" fill={COL.fart}>v</text>
                            </g>
                        )}

                        {/* Bildtexter */}
                        <text x={CX} y="480" textAnchor="middle" fontSize="13"
                              fill="var(--lab-ink-muted, #5a6170)">
                            Cirkulär rörelse{show.radskala ? ' (skala i radianer)' : ''}
                        </text>
                        {show.boll && (
                            <text x={BALLX} y="480" textAnchor="middle" fontSize="13"
                                  fill="var(--lab-ink-muted, #5a6170)">Svängning</text>
                        )}
                    </svg>
                );
            };

            const Readout = ({ label, value, unit, color }) => (
                <div className="p-2 rounded-lg" style={{ background: 'var(--lab-bg)', border: '1px solid var(--lab-line-strong)' }}>
                    <div className="text-xs" style={{ color: 'var(--lab-ink-muted)' }} dangerouslySetInnerHTML={{ __html: label }} />
                    <div className="font-mono font-bold text-sm" style={{ color: color || 'var(--lab-ink)' }}>
                        {value} <span className="font-normal text-xs" style={{ color: 'var(--lab-ink-muted)' }}>{unit}</span>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen dark-container px-4 md:px-8 pb-12" style={{ fontFamily: "'DM Sans', sans-serif" }}>
                    <div className="max-w-6xl mx-auto pt-6">
                        <div className="breadcrumb mb-4" style={{ fontSize: 13 }}>
                            <a href="index.html">Hem</a> / <a href="katalog.html#fy2">Fysik nivå 2</a> / Period, frekvens och vinkelhastighet
                        </div>
                        <h1 className="text-3xl md:text-4xl font-black tracking-tight" style={{ color: 'var(--lab-ink)' }}>Period, frekvens, radianer och vinkelhastighet</h1>
                        <p className="mt-2 mb-5" style={{ color: 'var(--lab-ink-soft)', maxWidth: 820 }}>
                            En punkt rör sig i en cirkelbana. Dess höjdläge utför samtidigt en <strong>harmonisk
                            svängning</strong> som ritar en sinuskurva i grafen. De tre reglagen för
                            perioden <em>T</em>, frekvensen <em>f</em> och vinkelhastigheten <em>ω</em> är
                            sammanlänkade — ändra ett av dem och se hur de andra två följer med. Visa vinkeln
                            i radianer, cirkelbågen och farten <em>v</em> = <em>ω</em>&thinsp;·&thinsp;<em>r</em>.
                        </p>

                        <FormulaCard />

                        <main className="flex flex-col lg:flex-row gap-6">
                            {/* Scen */}
                            <div className="lg:w-3/5 order-1">
                                <div className="scene-wrap" data-theme="ljusPapper" ref={sceneWrapRef}>
                                    {scene()}

                                    <div className="scene-info">
                                        <span className="si-lbl">Vinkel <em style={{ textTransform: 'none' }}>α</em></span>
                                        <span className="si-val">{fmt(alpha, 2)} rad ≈ {fmt(deg, 0)}°</span>
                                        <span className="si-lbl" style={{ marginTop: 4 }}>Antal varv</span>
                                        <span className="si-val">{varv}</span>
                                    </div>

                                    <div className="scene-hint">Reglagen för <em>T</em>, <em>f</em> och <em>ω</em> hänger ihop — ändra ett så följer de andra</div>
                                    {sceneToggles()}

                                    {/* Fullskärm: glidarna i en hopfällbar panel i underkant */}
                                    {isFullscreen && (
                                        <React.Fragment>
                                            <div className={`fs-controls ${controlsOpen ? '' : 'collapsed'}`}>
                                                <FsSlider label="Period (<em>T</em>)" value={T}
                                                          min={TMIN} max={TMAX} step={0.1} unit="s" onChange={setTc} />
                                                <FsSlider label="Frekvens (<em>f</em>)" value={f}
                                                          min={0.10} max={1.00} step={0.01} unit="Hz" onChange={setFromF} decimals={2} />
                                                <FsSlider label="Vinkelhastighet (<em>ω</em>)" value={om}
                                                          min={0.6} max={6.3} step={0.01} unit="rad/s" onChange={setFromOm} decimals={2} />
                                                <FsSlider label="Banradie (<em>r</em>)" value={r}
                                                          min={RMIN} max={RMAX} step={0.05} unit="m" onChange={setR} decimals={2} />
                                            </div>
                                            <button className="fs-toggle-handle" onClick={() => setControlsOpen(o => !o)}
                                                    title={controlsOpen ? 'Dölj reglage' : 'Visa reglage'}
                                                    aria-expanded={controlsOpen}>
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                     strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"
                                                     style={{ transform: controlsOpen ? 'rotate(0deg)' : 'rotate(180deg)' }}>
                                                    <path d="M6 9l6 6 6-6"/>
                                                </svg>
                                                <span>{controlsOpen ? 'Dölj reglage' : 'Reglage'}</span>
                                            </button>
                                        </React.Fragment>
                                    )}

                                    <button className="fs-btn" onClick={toggleFullscreen} aria-label="Fullskärm"
                                            title={isFullscreen ? 'Lämna fullskärm' : 'Fullskärm'}>
                                        {isFullscreen ? (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M9 3v6H3" /><path d="M15 21v-6h6" /><path d="M21 9h-6V3" /><path d="M3 15h6v6" />
                                            </svg>
                                        ) : (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M3 9V3h6" /><path d="M21 9V3h-6" /><path d="M3 15v6h6" /><path d="M21 15v6h-6" />
                                            </svg>
                                        )}
                                    </button>
                                </div>
                            </div>

                            {/* Kontroller */}
                            <div className="lg:w-2/5 order-2">
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <div className="text-xs mb-2 p-2 rounded-lg" style={{ background: 'rgba(63,157,90,0.10)', color: 'var(--lab-ink-soft)' }}>
                                        De tre översta reglagen beskriver <strong>samma sak</strong> på tre sätt —
                                        ändrar du ett, följer de andra två med.
                                    </div>
                                    <Slider label="Period (<em>T</em>)"
                                            sub="Tiden för ett helt varv."
                                            value={T} min={TMIN} max={TMAX} step={0.1} unit="s" onChange={setTc} />
                                    <Slider label="Frekvens (<em>f</em>)"
                                            sub="Antal varv per sekund — <em>f</em> = 1/<em>T</em>."
                                            value={f} min={0.10} max={1.00} step={0.01} unit="Hz" onChange={setFromF} decimals={2} />
                                    <Slider label="Vinkelhastighet (<em>ω</em>)"
                                            sub="Vinkel per sekund — <em>ω</em> = 2π/<em>T</em> = 2π&thinsp;·&thinsp;<em>f</em>."
                                            value={om} min={0.6} max={6.3} step={0.01} unit="rad/s" onChange={setFromOm} decimals={2} />
                                    <Slider label="Banradie (<em>r</em>)"
                                            sub="Påverkar varken <em>T</em>, <em>f</em> eller <em>ω</em> — men farten <em>v</em> = <em>ω</em>&thinsp;·&thinsp;<em>r</em> växer med radien."
                                            value={r} min={RMIN} max={RMAX} step={0.05} unit="m" onChange={setR} decimals={2} />
                                    <div className="flex gap-2 mt-1">
                                        <button className="btn-toggle flex-1" onClick={() => setRunning(rr => !rr)}>{primaryLabel}</button>
                                        <button className="btn-toggle flex-1" onClick={reset}>Börja om</button>
                                    </div>
                                </div>

                                {/* Avläsning */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <div className="flbl mb-2">Avläsning</div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <Readout label="Period <em>T</em>" value={fmt(T, 1)} unit="s" />
                                        <Readout label="Frekvens <em>f</em>" value={fmt(f, 2)} unit="Hz" />
                                        <Readout label="Vinkelhastighet <em>ω</em>" value={fmt(om, 2)} unit="rad/s" />
                                        <Readout label="I grader: <em>ω</em>" value={fmt(360 / T, 1)} unit="°/s" />
                                        <Readout label="Fart <em>v</em> = <em>ω</em> · <em>r</em>" value={fmt(v, 2)} unit="m/s" color={COL.fart} />
                                        <Readout label="Vinkel <em>α</em>" value={fmt(alpha, 2)} unit="rad" color={COL.vinkelT} />
                                        <Readout label="Båglängd <em>α</em> · <em>r</em>" value={fmt(bage, 2)} unit="m" color={COL.bage} />
                                        <Readout label="Antal varv" value={varv} unit="" />
                                    </div>
                                    <div className="mt-2 p-2 rounded-lg text-xs" style={{ background: 'rgba(63,157,90,0.08)', color: 'var(--lab-ink-soft)' }}>
                                        Ett varv är 2π&nbsp;rad&nbsp;≈&nbsp;6,28&nbsp;rad och tar
                                        tiden <span style={{ whiteSpace: 'nowrap' }}><em>T</em> = {fmt(T, 1)}&nbsp;s</span>.
                                        Alltså: <span style={{ whiteSpace: 'nowrap' }}><em>ω</em> = 2π/<em>T</em> = {fmt(om, 2)}&nbsp;rad/s</span>
                                        {' '}och <span style={{ whiteSpace: 'nowrap' }}><em>f</em> = 1/<em>T</em> = {fmt(f, 2)}&nbsp;Hz</span>.
                                    </div>
                                </div>

                                {/* Insikt */}
                                <div className="glass-card rounded-xl p-3">
                                    <div className="flbl mb-1">Tre bilder av samma rörelse</div>
                                    <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                        Punkten i cirkelbanan, den <span style={{ color: COL.bollK, fontWeight: 600 }}>svängande
                                        punkten</span> och kurvan i grafen har exakt samma
                                        period <em>T</em>, frekvens <em>f</em> och vinkelhastighet <em>ω</em>.
                                        Den streckade linjen visar att de hela tiden ligger på samma höjd —
                                        en harmonisk svängning är helt enkelt en cirkelrörelse sedd från sidan.
                                    </p>
                                </div>
                            </div>
                        </main>

                        {/* Pedagogiska sektioner */}
                        <div className="grid md:grid-cols-3 gap-4 mt-6">
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Period och frekvens</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    En rörelse som upprepas kallas <strong>periodisk</strong>. Tiden för en
                                    upprepning — ett varv eller en svängning — är <strong>perioden</strong> <em>T</em> (enhet s),
                                    och antalet upprepningar per sekund är <strong>frekvensen</strong> <em>f</em> (enhet Hz).
                                    De är varandras inverser: <em>T</em> = 1/<em>f</em>. Roterar något med
                                    frekvensen 10&nbsp;Hz tar ett varv 1/10&nbsp;sekund.
                                </p>
                            </div>
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Radianer</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    I radianmåttet är vinkeln lika med <strong>cirkelbågens längd mätt i
                                    radier</strong> — bågen för 1&nbsp;rad är exakt en radie lång
                                    (1&nbsp;rad&nbsp;≈&nbsp;57,3°). Slå på radianskalan och jämför med den röda
                                    bågen: båglängden är alltid <em>α</em>&thinsp;·&thinsp;<em>r</em>. Ett helt
                                    varv är 2π&nbsp;rad, eftersom omkretsen är
                                    2π&thinsp;·&thinsp;<em>r</em>.
                                </p>
                            </div>
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Vinkelhastighet och fart</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Vinkelhastigheten <em>ω</em> = 2π/<em>T</em> anger hur stor vinkel som hinns
                                    med per sekund (rad/s). Farten i banan
                                    är <em>v</em> = <em>ω</em>&thinsp;·&thinsp;<em>r</em> — slå på den inre punkten
                                    och se att alla punkter på samma skiva har <strong>samma <em>ω</em></strong> men
                                    olika fart: längre ut hinner punkten en längre båge på samma tid.
                                </p>
                            </div>
                        </div>

                        <details className="glass-card rounded-xl p-4 mt-4">
                            <summary className="accordion-head" style={{ color: 'var(--lab-ink)' }}>
                                <span>Vanliga missuppfattningar</span><span style={{ color: 'var(--lab-ink-muted)' }}>▾</span>
                            </summary>
                            <ul className="mt-3 space-y-2 text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                <li><strong>"Frekvens och vinkelhastighet är samma sak."</strong> Nästan — men inte riktigt. Frekvensen räknar <em>varv</em> per sekund (Hz), vinkelhastigheten räknar <em>radianer</em> per sekund. Eftersom ett varv är 2π rad gäller <em>ω</em> = 2π&thinsp;·&thinsp;<em>f</em>.</li>
                                <li><strong>"Vinkelhastigheten beror på radien."</strong> Nej. Alla punkter på en roterande skiva sveper samma vinkel på samma tid — samma <em>ω</em>, <em>T</em> och <em>f</em>. Det är farten <em>v</em> = <em>ω</em>&thinsp;·&thinsp;<em>r</em> som växer med radien.</li>
                                <li><strong>"Hastigheten är konstant i en jämn cirkelrörelse."</strong> Farten (beloppet) är konstant, men hastigheten är en vektor med riktning — och riktningen ändras hela tiden. Titta på <em>v</em>-pilen: den pekar alltid längs banan, vinkelrätt mot radien.</li>
                                <li><strong>"Radianer är en godtycklig gradskala."</strong> Radianen är definierad direkt ur cirkelns geometri: vinkeln vars båge är lika lång som radien. Därför blir båglängden så enkel som <em>α</em>&thinsp;·&thinsp;<em>r</em> — det fungerar bara i radianer, inte i grader.</li>
                            </ul>
                        </details>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <script src="feedback.js" defer></script>
    <script src="data/katalog.js"></script>
    <script src="section-nav.js"></script>
</body>
</html>
