    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const AccelerationTimeSimulation = () => {
            // 'constant' = konstant acceleration (horisontell linje)
            // 'linear'   = linjärt föränderlig acceleration (lutande linje, kan korsa noll)
            // 'two-phase'= två faser: acceleration följt av inbromsning
            const [accelType, setAccelType] = useState('constant');
            const [aStart, setAStart] = useState(3);   // acceleration (konstant) / startvärde (linjär) / fas 1 (två faser)
            const [aSecond, setASecond] = useState(-3); // slutvärde (linjär) / fas 2 (två faser)
            const [phaseTime, setPhaseTime] = useState(5); // brytpunkt (två faser)
            const [v0, setV0] = useState(0);           // starthastighet
            const [showArea, setShowArea] = useState(true);
            const [areaStart, setAreaStart] = useState(0);
            const [areaEnd, setAreaEnd] = useState(10);

            // Fullskärm
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [controlsOpen, setControlsOpen] = useState(false);
            const sceneWrapRef = useRef(null);
            useEffect(() => {
                const handler = () => setIsFullscreen(
                    document.fullscreenElement === sceneWrapRef.current ||
                    document.webkitFullscreenElement === sceneWrapRef.current
                );
                document.addEventListener('fullscreenchange', handler);
                document.addEventListener('webkitfullscreenchange', handler);
                return () => {
                    document.removeEventListener('fullscreenchange', handler);
                    document.removeEventListener('webkitfullscreenchange', handler);
                };
            }, []);
            const toggleFullscreen = () => {
                const el = sceneWrapRef.current;
                if (!el) return;
                if (document.fullscreenElement || document.webkitFullscreenElement)
                    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
                else (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
            };

            // Helper function to format numbers with comma as decimal separator (Swedish standard)
            const formatNumber = (num, decimals = 1) => {
                return num.toFixed(decimals).replace('.', ',');
            };
            // en decimal för värden — men exakt 0 skrivs utan decimal ("0")
            const fmt = (num) => {
                const s = formatNumber(num, 1);
                return (s === '0,0' || s === '-0,0') ? '0' : s;
            };

            // Kursiv variabel (HTML)
            const V = ({ children }) => <em>{children}</em>;
            // Bråk med rakt divisionsstreck (HTML) – täljare över nämnare
            const Frac = ({ num, den }) => (
                <span style={{ display: 'inline-flex', flexDirection: 'column', alignItems: 'center', verticalAlign: 'middle', margin: '0 0.3em' }}>
                    <span style={{ padding: '0 0.45em', lineHeight: 1.15 }}>{num}</span>
                    <span style={{ borderTop: '1.6px solid currentColor', padding: '0 0.45em', lineHeight: 1.25, width: '100%', textAlign: 'center' }}>{den}</span>
                </span>
            );

            // SVG parameters
            const svgWidth = 700;
            const svgHeight = 400;
            const padding = 60;
            const topBand = 100; // band ovanför diagrammet där bilen rör sig
            const graphWidth = svgWidth - 2 * padding;
            const graphHeight = svgHeight - 2 * padding;

            // Fast skala för pedagogisk tydlighet
            const FIXED_MAX_TIME = 10;     // alltid 0–10 s
            const FIXED_MAX_A = 10;        // alltid −10 … +10 m/s²
            const FIXED_MIN_A = -10;

            const minA = FIXED_MIN_A;
            const maxA = FIXED_MAX_A;

            // Acceleration vid tid t (m/s²)
            const getAcceleration = (t) => {
                switch (accelType) {
                    case 'constant':
                        return aStart;
                    case 'linear':
                        return aStart + (aSecond - aStart) * (t / FIXED_MAX_TIME);
                    case 'two-phase':
                        return t < phaseTime ? aStart : aSecond;
                    default:
                        return aStart;
                }
            };

            // Y-axel: jämna 2-steg (−10 … 0 … 10)
            const aStep = 2;
            const yAxisValues = [];
            for (let a = minA; a <= maxA; a += aStep) {
                yAxisValues.push(a);
            }
            // X-axel: rutnät och etiketter var sekund (0 … 10)
            const tStep = 1;
            const xAxisValues = [];
            for (let t = 0; t <= FIXED_MAX_TIME; t += tStep) {
                xAxisValues.push(t);
            }

            // Skalfunktioner
            const scaleX = (t) => padding + (t / FIXED_MAX_TIME) * graphWidth;
            const scaleY = (a) => svgHeight - padding - ((a - minA) / (maxA - minA)) * graphHeight;

            // Graf-path
            const generatePath = () => {
                if (accelType === 'two-phase') {
                    // Två horisontella segment med ett vertikalt hopp vid brytpunkten
                    const x0 = scaleX(0), xb = scaleX(phaseTime), xe = scaleX(FIXED_MAX_TIME);
                    const y1 = scaleY(aStart), y2 = scaleY(aSecond);
                    return `M ${x0},${y1} L ${xb},${y1} L ${xb},${y2} L ${xe},${y2}`;
                }
                const points = [];
                const steps = 100;
                for (let i = 0; i <= steps; i++) {
                    const t = (i / steps) * FIXED_MAX_TIME;
                    points.push(`${scaleX(t)},${scaleY(getAcceleration(t))}`);
                }
                return `M ${points.join(' L ')}`;
            };

            // Integrera acceleration över [t0, t1] — EXAKT för de tre graftyperna.
            // net  = hastighetsändring Δv (positiv area − negativ area)
            // pos  = sammanlagd area ovanför t-axeln (magnitud)
            // neg  = sammanlagd area under t-axeln (magnitud)
            const integrate = (t0, t1) => {
                let net = 0, pos = 0, neg = 0;
                const addConst = (c, w) => {
                    net += c * w;
                    if (c >= 0) pos += c * w; else neg += -c * w;
                };
                // En linjär bit a1→a2 över bredden w; delas exakt vid ev. nollställe.
                const addLinear = (a1, a2, w) => {
                    const seg = (a1 + a2) / 2 * w;
                    net += seg;
                    if (a1 >= 0 && a2 >= 0) pos += seg;
                    else if (a1 <= 0 && a2 <= 0) neg += -seg;
                    else {
                        const wc = w * Math.abs(a1) / (Math.abs(a1) + Math.abs(a2)); // bredd till nollstället
                        const s1 = a1 / 2 * wc;
                        const s2 = a2 / 2 * (w - wc);
                        if (a1 > 0) { pos += s1; neg += -s2; }
                        else { neg += -s1; pos += s2; }
                    }
                };
                if (accelType === 'constant') {
                    addConst(aStart, t1 - t0);
                } else if (accelType === 'linear') {
                    addLinear(getAcceleration(t0), getAcceleration(t1), t1 - t0);
                } else { // two-phase: styckvis konstant, dela exakt vid brytpunkten
                    const b = phaseTime;
                    if (t1 <= b) addConst(aStart, t1 - t0);
                    else if (t0 >= b) addConst(aSecond, t1 - t0);
                    else { addConst(aStart, b - t0); addConst(aSecond, t1 - b); }
                }
                return { net, pos, neg };
            };

            // Area-polygoner (delade i positiv/negativ del, med korrekt klippning vid t-axeln)
            const generateAreaPolygons = () => {
                const steps = 240;
                const positiveSegments = [];
                const negativeSegments = [];
                const y0 = scaleY(0);
                const pushSeg = (arr, x1, yy1, x2, yy2) =>
                    arr.push(`${x1},${y0} ${x1},${yy1} ${x2},${yy2} ${x2},${y0}`);
                for (let i = 0; i < steps; i++) {
                    const ta = areaStart + (i / steps) * (areaEnd - areaStart);
                    const tb = areaStart + ((i + 1) / steps) * (areaEnd - areaStart);
                    const a1 = getAcceleration(ta);
                    const a2 = getAcceleration(tb);
                    if (a1 >= 0 && a2 >= 0) {
                        pushSeg(positiveSegments, scaleX(ta), scaleY(a1), scaleX(tb), scaleY(a2));
                    } else if (a1 <= 0 && a2 <= 0) {
                        pushSeg(negativeSegments, scaleX(ta), scaleY(a1), scaleX(tb), scaleY(a2));
                    } else {
                        const tc = ta + (tb - ta) * Math.abs(a1) / (Math.abs(a1) + Math.abs(a2));
                        const xc = scaleX(tc);
                        if (a1 > 0) {
                            pushSeg(positiveSegments, scaleX(ta), scaleY(a1), xc, y0);
                            pushSeg(negativeSegments, xc, y0, scaleX(tb), scaleY(a2));
                        } else {
                            pushSeg(negativeSegments, scaleX(ta), scaleY(a1), xc, y0);
                            pushSeg(positiveSegments, xc, y0, scaleX(tb), scaleY(a2));
                        }
                    }
                }
                return { positiveSegments, negativeSegments };
            };

            // Dra area-gränserna (start/slut) med musen/fingret
            const svgRef = useRef(null);
            const draggingRef = useRef(null); // 'start' | 'end' | null
            const [dragging, setDragging] = useState(null);

            const clientToTime = (clientX) => {
                const svg = svgRef.current;
                if (!svg || !svg.getScreenCTM) return null;
                const ctm = svg.getScreenCTM();
                if (!ctm) return null;
                const pt = svg.createSVGPoint();
                pt.x = clientX; pt.y = 0;
                const loc = pt.matrixTransform(ctm.inverse());
                let t = ((loc.x - padding) / graphWidth) * FIXED_MAX_TIME;
                t = Math.round(t * 2) / 2; // halvsekundssteg
                return Math.max(0, Math.min(FIXED_MAX_TIME, t));
            };
            const startBoundaryDrag = (which) => (e) => {
                draggingRef.current = which;
                setDragging(which);
                e.preventDefault();
                e.stopPropagation();
            };
            useEffect(() => {
                const move = (e) => {
                    if (!draggingRef.current) return;
                    const t = clientToTime(e.clientX);
                    if (t === null) return;
                    if (draggingRef.current === 'start') {
                        setAreaStart(Math.min(t, areaEnd - 0.5));
                    } else {
                        setAreaEnd(Math.max(t, areaStart + 0.5));
                    }
                };
                const up = () => {
                    if (!draggingRef.current) return;
                    draggingRef.current = null;
                    setDragging(null);
                };
                window.addEventListener('pointermove', move);
                window.addEventListener('pointerup', up);
                return () => {
                    window.removeEventListener('pointermove', move);
                    window.removeEventListener('pointerup', up);
                };
            }, [areaStart, areaEnd]);

            // ── Rörelsesimulering: ett objekt som rör sig som grafen beskriver ──
            // Hastigheten är v(t) = v₀ + arean under a-t-grafen fram till t,
            // och läget x(t) = integralen av hastigheten. Vi förberäknar en
            // tabell över (t, v, x) och interpolerar under uppspelningen.
            const [isPlaying, setIsPlaying] = useState(false);
            const [simTime, setSimTime] = useState(0);
            const simTimeRef = useRef(0);
            const rafRef = useRef(null);
            const lastTsRef = useRef(null);

            const motion = useMemo(() => {
                const N = 400;
                const dt = FIXED_MAX_TIME / N;
                const arr = [{ t: 0, v: v0, x: 0 }];
                let x = 0, vPrev = v0;
                for (let i = 1; i <= N; i++) {
                    const tb = i * dt;
                    const v = v0 + integrate(0, tb).net; // exakt hastighet (area upp till tb)
                    x += (vPrev + v) / 2 * dt;            // läge via trapets av hastigheten
                    vPrev = v;
                    arr.push({ t: tb, v, x });
                }
                let xMin = Infinity, xMax = -Infinity;
                for (const p of arr) { if (p.x < xMin) xMin = p.x; if (p.x > xMax) xMax = p.x; }
                return { arr, xMin: Math.min(xMin, 0), xMax: Math.max(xMax, 0) };
            }, [accelType, aStart, aSecond, phaseTime, v0]);

            const sampleAt = (t) => {
                const arr = motion.arr;
                const N = arr.length - 1;
                const f = Math.max(0, Math.min(N, (t / FIXED_MAX_TIME) * N));
                const i = Math.floor(f);
                if (i >= N) return arr[N];
                const frac = f - i, a = arr[i], b = arr[i + 1];
                return { t, v: a.v + (b.v - a.v) * frac, x: a.x + (b.x - a.x) * frac };
            };

            useEffect(() => {
                if (!isPlaying) return;
                const SIM_PER_SEC = 1.0; // sim-sekunder per realsekund (realtid: 1 s ≈ 1 s)
                const tick = (ts) => {
                    if (lastTsRef.current == null) lastTsRef.current = ts;
                    const dts = (ts - lastTsRef.current) / 1000;
                    lastTsRef.current = ts;
                    const next = simTimeRef.current + dts * SIM_PER_SEC;
                    if (next >= FIXED_MAX_TIME) {
                        simTimeRef.current = FIXED_MAX_TIME;
                        setSimTime(FIXED_MAX_TIME);
                        setIsPlaying(false);
                        return;
                    }
                    simTimeRef.current = next;
                    setSimTime(next);
                    rafRef.current = requestAnimationFrame(tick);
                };
                rafRef.current = requestAnimationFrame(tick);
                return () => { cancelAnimationFrame(rafRef.current); lastTsRef.current = null; };
            }, [isPlaying]);

            const togglePlay = () => {
                if (isPlaying) { setIsPlaying(false); return; }
                if (simTimeRef.current >= FIXED_MAX_TIME - 0.001) { simTimeRef.current = 0; setSimTime(0); }
                setIsPlaying(true);
            };
            const resetSim = () => { setIsPlaying(false); simTimeRef.current = 0; setSimTime(0); };
            const scrub = (t) => { setIsPlaying(false); simTimeRef.current = t; setSimTime(t); };

            // Beräkningar
            const area = integrate(areaStart, areaEnd);          // över valt intervall
            const deltaV = area.net;                              // hastighetsändring Δv
            const vAtStart = v0 + integrate(0, areaStart).net;    // hastighet vid intervallets start
            const vAtEnd = v0 + integrate(0, areaEnd).net;        // hastighet vid intervallets slut
            const areaPolygons = generateAreaPolygons();

            // Aktuell tidpunkt i rörelsen (driver bilen + punkten på grafen)
            const cur = sampleAt(simTime);
            const curA = getAcceleration(simTime);
            // FAST skala för rörelsebanan (meter → pixlar). Viktigt: en auto-skalning
            // som anpassar banan efter rörelsens storlek skulle dölja accelerationen —
            // x(t)/x_max blir t²/T², oberoende av a, så alla rörelser ser likadana ut.
            // Med fast skala rör sig bilen synligt längre/snabbare vid högre acceleration.
            // x = 0 ligger i mitten; vid hög acceleration åker bilen ur bild (den
            // stannar INTE vid kanten — det skulle se ut som a = 0). Halva banan
            // motsvarar FULL_SCALE_M så att vanliga accelerationer ändå ryms.
            const trackPad = padding;
            const trackW = svgWidth - 2 * padding;
            const FULL_SCALE_M = 250;     // halva banans bredd motsvarar 250 m
            const CENTER_FRAC = 0.5;      // x = 0 i mitten
            const PPM = (trackW * (1 - CENTER_FRAC)) / FULL_SCALE_M; // pixlar per meter
            const worldToScreen = (xm) => trackPad + CENTER_FRAC * trackW + xm * PPM;
            const startX = worldToScreen(0);
            const carX = worldToScreen(cur.x); // ingen klampning — bilen får åka ur bild
            const carVisible = carX >= trackPad - 20 && carX <= trackPad + trackW + 20;

            // Geometriskt "snyggt" uttryck för konstant acceleration (rektangel)
            const widthT = areaEnd - areaStart;
            const aConst = aStart; // gäller vid 'constant'

            const x0px = scaleX(0);
            const y0px = scaleY(0);

            return (
                <div className="min-h-screen bg-gray-50 py-8 px-4">
                    <div className="max-w-7xl mx-auto">
                        {/* Header */}
                        <div className="text-center mb-8">
                            <h1 className="text-5xl font-bold text-gray-900 mb-4">Acceleration-tid-diagram</h1>
                            <p className="text-xl text-gray-600 max-w-3xl mx-auto">
                                Utforska hur accelerationen förändras över tid. Lär dig att <strong>arean mellan grafen och tidsaxeln ger hastighetsändringen</strong> — area under axeln räknas som negativ.
                            </p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* Main Graph Area */}
                            <div className="lg:col-span-2 space-y-6">
                                {/* Graph */}
                                <div className="bg-white rounded-xl shadow-lg p-6">
                                    <h2 className="text-2xl font-bold mb-4 text-gray-800">Acceleration-tid-graf</h2>
                                    <div className="scene-wrap" data-theme="ljusPapper" ref={sceneWrapRef}>
                                    <svg ref={svgRef} viewBox={`0 ${-topBand} ${svgWidth} ${svgHeight + topBand}`} preserveAspectRatio="xMidYMid meet" className="bg-white">
                                        <defs>
                                            <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                                                <polygon points="0 0, 10 3, 0 6" fill="#38bdf8" />
                                            </marker>
                                        </defs>

                                        {/* ── Rörelsebana ovanför diagrammet (syns även i fullskärm) ── */}
                                        <g>
                                            <rect x={trackPad - 16} y={-54} width={trackW + 32} height="32" rx="6" fill="#374151" />
                                            <line x1={trackPad - 16} y1={-38} x2={trackPad + trackW + 16} y2={-38} stroke="#fbbf24" strokeWidth="2.5" strokeDasharray="14,12" />

                                    <h3 className="text-xl font-bold mb-4 text-gray-800">⚙️ Parametrar</h3>

                                    {/* aStart */}
                                    <div className="mb-6">
                                        <div className="flex justify-between items-center mb-2">
                                            <label className="font-semibold text-gray-700">
                                                {accelType === 'linear' ? <>Start-acceleration (<em>a</em>₀)</> : accelType === 'two-phase' ? <>Acceleration fas 1 (<em>a</em>₁)</> : <>Acceleration (<em>a</em>)</>}
                                            </label>
                                            <span className="text-lg font-bold text-blue-600">{fmt(aStart)} m/s²</span>
                                        </div>
                                        <input type="range" min="-8" max="8" step="0.5" value={aStart}
                                               onChange={(e) => setAStart(parseFloat(e.target.value))}
                                               className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                                        <div className="flex justify-between text-xs text-gray-500 mt-1">
                                            <span>−8,0 m/s²</span><span>8,0 m/s²</span>
                                        </div>
                                    </div>

                                    {/* aSecond */}
                                    {accelType !== 'constant' && (
                                        <div className="mb-6">
                                            <div className="flex justify-between items-center mb-2">
                                                <label className="font-semibold text-gray-700">
                                                    {accelType === 'linear' ? <>Slut-acceleration (<em>a</em>₁)</> : <>Acceleration fas 2 (<em>a</em>₂)</>}
                                                </label>
                                                <span className="text-lg font-bold text-blue-600">{fmt(aSecond)} m/s²</span>
                                            </div>
                                            <input type="range" min="-8" max="8" step="0.5" value={aSecond}
                                                   onChange={(e) => setASecond(parseFloat(e.target.value))}
                                                   className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                                            <div className="flex justify-between text-xs text-gray-500 mt-1">
                                                <span>−8,0 m/s²</span><span>8,0 m/s²</span>
                                            </div>
                                        </div>
                                    )}

                                    {/* phaseTime */}
                                    {accelType === 'two-phase' && (
                                        <div className="mb-6">
                                            <div className="flex justify-between items-center mb-2">
                                                <label className="font-semibold text-gray-700">Brytpunkt (<em>t</em>)</label>
                                                <span className="text-lg font-bold text-purple-600">{fmt(phaseTime)} s</span>
                                            </div>
                                            <input type="range" min="1" max="9" step="0.5" value={phaseTime}
                                                   onChange={(e) => setPhaseTime(parseFloat(e.target.value))}
                                                   className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                                            <div className="flex justify-between text-xs text-gray-500 mt-1">
                                                <span>1,0 s</span><span>9,0 s</span>
                                            </div>
                                        </div>
                                    )}

                                    {/* v0 */}
                                    <div className="mb-2">
                                        <div className="flex justify-between items-center mb-2">
                                            <label className="font-semibold text-gray-700">Starthastighet (<em>v</em>₀)</label>
                                            <span className="text-lg font-bold text-green-600">{fmt(v0)} m/s</span>
                                        </div>
                                        <input type="range" min="-10" max="20" step="1" value={v0}
                                               onChange={(e) => setV0(parseFloat(e.target.value))}
                                               className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                                        <div className="flex justify-between text-xs text-gray-500 mt-1">
                                            <span>−10,0 m/s</span><span>20,0 m/s</span>
                                        </div>
                                        <p className="text-xs text-gray-500 mt-1">Påverkar bara sluthastigheten, inte arean.</p>
                                    </div>
                                </div>

                                {/* Display options */}
                                <div className="bg-white rounded-xl shadow-lg p-6">
                                    <h3 className="text-xl font-bold mb-4 text-gray-800">👁️ Visningsalternativ</h3>

                                    <label className="flex items-center mb-4 cursor-pointer">
                                        <input type="checkbox" checked={showArea} onChange={(e) => setShowArea(e.target.checked)} className="w-5 h-5 text-blue-600" />
                                        <span className="ml-3 font-medium">Visa area (hastighetsändring)</span>
                                    </label>

                                    {showArea && (
                                        <div className="mt-4 p-4 bg-blue-50 rounded-lg">
                                            <p className="font-semibold mb-3 text-blue-900">Tidsintervall för area:</p>
                                            <p className="text-xs text-gray-600 mb-3">Tips: du kan också dra de blå punkterna på tidsaxeln.</p>

                                            <div className="mb-4">
                                                <div className="flex justify-between items-center mb-2">
                                                    <label className="text-sm font-medium">Starttid</label>
                                                    <span className="font-bold text-blue-600">{fmt(areaStart)} s</span>
                                                </div>
                                                <input type="range" min="0" max={FIXED_MAX_TIME - 0.5} step="0.5" value={areaStart}
                                                       onChange={(e) => { const val = parseFloat(e.target.value); setAreaStart(Math.min(val, areaEnd - 0.5)); }}
                                                       className="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer" />
                                            </div>

                                            <div>
                                                <div className="flex justify-between items-center mb-2">
                                                    <label className="text-sm font-medium">Sluttid</label>
                                                    <span className="font-bold text-blue-600">{fmt(areaEnd)} s</span>
                                                </div>
                                                <input type="range" min="0.5" max={FIXED_MAX_TIME} step="0.5" value={areaEnd}
                                                       onChange={(e) => { const val = parseFloat(e.target.value); setAreaEnd(Math.max(val, areaStart + 0.5)); }}
                                                       className="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer" />
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* Formulas */}
                                <div className="bg-gradient-to-br from-purple-50 to-pink-50 rounded-xl shadow-lg p-6 border-2 border-purple-200">
                                    <h3 className="text-xl font-bold mb-4 text-purple-900">📚 Formelsamling</h3>
                                    <div className="space-y-3 text-sm">
                                        <div className="bg-white p-3 rounded shadow">
                                            <p className="font-bold text-purple-800">Hastighetsändring från area:</p>
                                            <p className="font-mono mt-1">Δ<em>v</em> = area mellan <em>a</em>-<em>t</em>-grafen och <em>t</em>-axeln</p>
                                            <p className="text-xs text-gray-600 mt-1">area under axeln räknas negativ</p>
                                        </div>
                                        <div className="bg-white p-3 rounded shadow">
                                            <p className="font-bold text-purple-800">Vid konstant acceleration:</p>
                                            <p className="font-mono mt-1">Δ<em>v</em> = <em>a</em>⋅Δ<em>t</em></p>
                                        </div>
                                        <div className="bg-white p-3 rounded shadow">
                                            <p className="font-bold text-purple-800">Sluthastighet:</p>
                                            <p className="font-mono mt-1"><em>v</em> = <em>v</em>₀ + Δ<em>v</em></p>
                                        </div>
                                        <div className="bg-white p-3 rounded shadow">
                                            <p className="font-bold text-purple-800">Allmänt (integral):</p>
                                            <p className="font-mono mt-1">Δ<em>v</em> = ∫ <em>a</em>(<em>t</em>) d<em>t</em></p>
                                        </div>
                                    </div>
                                </div>

                                {/* Info box */}
                                <div className="bg-amber-50 rounded-xl shadow-lg p-6 border-2 border-amber-200">
                                    <h3 className="text-xl font-bold mb-3 text-amber-900">💡 Kom ihåg!</h3>
                                    <ul className="space-y-2 text-sm text-amber-900">
                                        <li>✓ <strong>Area</strong> under <em>a</em>-<em>t</em>-graf = <strong>Hastighetsändring</strong> Δ<em>v</em></li>
                                        <li>✓ Area <strong>ovanför</strong> tidsaxeln är positiv (<em>v</em> ökar)</li>
                                        <li>✓ Area <strong>under</strong> tidsaxeln är negativ (<em>v</em> minskar)</li>
                                        <li>✓ Δ<em>v</em> = positiv area − negativ area</li>
                                        <li>✓ Horisontell linje = konstant acceleration → rektangelarea</li>
                                        <li>✓ <em>v</em> = <em>v</em>₀ + Δ<em>v</em></li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<AccelerationTimeSimulation />, document.getElementById('root'));
    </script>
    <script src="feedback.js" defer></script>
    <script src="data/katalog.js"></script>
    <script src="section-nav.js"></script>
</body>
</html>
