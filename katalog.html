    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo, useRef } = React;
        const K = window.KATALOG;
        const KF = window.KATALOG_FLAT;
        const TEORI = window.TEORI || {};

        // --- Skydda math-block ($$..$$ och $..$) från markdown-parsern.
        // Annars tolkar marked LaTeX-escape som \; \, \! och dyl. som vanlig
        // text, vilket gör att t.ex. \; blir ";". Vi byter ut math mot
        // placeholders före marked och stoppar tillbaka efter.
        function protectMath(md) {
            const tokens = [];
            md = md.replace(/\$\$([\s\S]+?)\$\$/g, (m) => {
                tokens.push(m);
                return '@@LABMATH' + (tokens.length - 1) + '@@';
            });
            md = md.replace(/\$([^\n$]+?)\$/g, (m) => {
                tokens.push(m);
                return '@@LABMATH' + (tokens.length - 1) + '@@';
            });
            return { md, tokens };
        }
        function restoreMath(html, tokens) {
            html = html.replace(/@@LABMATH(\d+)@@/g, (_, i) => tokens[+i]);
            // Förhindra att en öppningsparentes hamnar ensam i radslutet före
            // en inline-formel. KaTeX renderar formeln som inline-block, och
            // webbläsaren får då bryta raden mellan "(" och formeln. Vi limmar
            // ihop parentesen med den efterföljande math-rutan i en nowrap-span.
            // Gäller bara inline-math ($…$), inte display-math ($$…$$).
            html = html.replace(/\(( *)(\$(?!\$)[^$\n]+?\$)/g, '<span class="math-paren">($1$2</span>');
            return html;
        }

        // --- Konvertera Unicode-superscript (⁻²⁷, ³⁰, …) till <sup>-27</sup>.
        // Skälet: tecken som ¹²³ kommer från Latin-1 Supplement, medan ⁰⁴-⁹
        // kommer från blocket "Superscripts and Subscripts". I de flesta
        // fonter renderas de med något olika baseline/storlek, vilket gör att
        // siffrorna i t.ex. 10⁻²⁷ eller 10⁻³⁰ hamnar på olika höjd. Genom att
        // göra om dem till ett <sup>-element med ASCII-siffror får vi en
        // konsekvent rendering. Math-block ($...$, $$...$$) har redan ersatts
        // med placeholders innan denna körs, så de påverkas inte.
        const SUP_MAP = {
            '⁻': '-', '⁺': '+',
            '⁰': '0', '¹': '1', '²': '2', '³': '3',
            '⁴': '4', '⁵': '5', '⁶': '6', '⁷': '7',
            '⁸': '8', '⁹': '9',
            '⁽': '(', '⁾': ')', 'ⁿ': 'n',
        };
        const SUP_RE = /[⁻⁺⁰¹²³⁴-⁹⁽⁾ⁿ]+/g;
        function preprocessSuperscripts(md) {
            // Skydda HTML-attributvärden (t.ex. data-tip="...m/s²...") så att
            // ² inte konverteras till "<sup>2</sup>" som plain text i tooltip.
            // Skydda även hela inline-SVG-figurer: ett <sup> inuti ett SVG
            // <text> renderas inte, så Unicode-superscript i figurer måste
            // lämnas orört (figuren använder <tspan> för exponenter).
            const tokens = [];
            md = md.replace(/<svg[\s\S]*?<\/svg>/g, (m) => {
                tokens.push(m);
                return '@@ATTR' + (tokens.length - 1) + '@@';
            });
            md = md.replace(/\b(data-tip|title|aria-label)="([^"]*)"/g, (m) => {
                tokens.push(m);
                return '@@ATTR' + (tokens.length - 1) + '@@';
            });
            md = md.replace(SUP_RE, (run) => {
                let ascii = '';
                for (const ch of run) ascii += (SUP_MAP[ch] || ch);
                return '<sup>' + ascii + '</sup>';
            });
            md = md.replace(/@@ATTR(\d+)@@/g, (_, i) => tokens[+i]);
            return md;
        }

        // --- Markdown-preprocessor: gruppera deluppgifter (a/b/c/d-frågor).
        // Två eller fler konsekutiva rader på formen **a) ... ?** läggs i en
        // grid (.lab-deluppgifter) så att de visas i två kolumner — c) under
        // a), d) under b) — istället för att smälta ihop till en rad.
        function preprocessSubproblems(md) {
            const lines = md.split('\n');
            const isSub = (l) => /^\*\*[a-d]\)\s+.+\*\*\s*$/i.test(l);
            const out = [];
            let i = 0;
            while (i < lines.length) {
                if (isSub(lines[i])) {
                    const group = [];
                    let j = i;
                    while (j < lines.length && isSub(lines[j])) {
                        group.push(lines[j]);
                        j++;
                    }
                    if (group.length >= 2) {
                        out.push('<div class="lab-deluppgifter">');
                        out.push('');
                        for (const g of group) {
                            out.push(g);
                            out.push('');
                        }
                        out.push('</div>');
                        out.push('');
                        i = j;
                        continue;
                    }
                }
                out.push(lines[i]);
                i++;
            }
            return out.join('\n');
        }

        // --- Mät-och-bryt: efter KaTeX renderat formler kontrollerar vi varje
        // .katex-display. Om en spiller över sin behållare extraherar vi
        // original-LaTeX:n från KaTeX:s <annotation> och bryter formeln vid en
        // top-level = i taget, renderar om, och kontrollerar på nytt — tills
        // den ryms eller alla bryt-punkter använts. Sista utvägen: skala.
        function findTopLevelEquals(latex) {
            const positions = [];
            let depth = 0;
            for (let i = 0; i < latex.length; i++) {
                const ch = latex[i];
                if (ch === '\\') { i++; continue; }
                if (ch === '{') depth++;
                else if (ch === '}') depth--;
                else if (ch === '=' && depth === 0) positions.push(i);
            }
            return positions;
        }

        function buildAligned(latex, breakPositions) {
            const segs = [];
            let prev = 0;
            for (const pos of breakPositions) {
                segs.push(latex.slice(prev, pos).trim());
                prev = pos + 1;
            }
            segs.push(latex.slice(prev).trim());
            const lines = [segs[0] + ' &= ' + segs[1]];
            for (let i = 2; i < segs.length; i++) lines.push('&= ' + segs[i]);
            return '\\begin{aligned}\n' + lines.join(' \\\\\n') + '\n\\end{aligned}';
        }

        function dispOverflows(disp) {
            const avail = disp.clientWidth;
            if (avail === 0) return false;
            const inner = disp.querySelector('.katex');
            const natural = inner
                ? Math.max(disp.scrollWidth, inner.scrollWidth, inner.offsetWidth)
                : disp.scrollWidth;
            return natural > avail + 0.5;
        }

        function renderDisplayMath(latex) {
            const wrapper = document.createElement('div');
            wrapper.innerHTML = window.katex.renderToString(latex, {
                displayMode: true,
                throwOnError: false,
            });
            return wrapper.firstElementChild;
        }

        function scaleDownDisplay(disp) {
            const inner = disp.querySelector('.katex');
            if (!inner) return;
            const avail = disp.clientWidth;
            const natural = Math.max(disp.scrollWidth, inner.scrollWidth, inner.offsetWidth);
            if (avail === 0 || natural <= avail + 0.5) return;
            const scale = avail / natural;
            inner.style.transformOrigin = 'center top';
            inner.style.transform = 'scale(' + scale + ')';
            disp.style.height = Math.ceil(inner.offsetHeight * scale) + 'px';
        }

        function fitMathDisplays(root) {
            if (!root || !window.katex) return;
            const displays = Array.from(root.querySelectorAll('.katex-display'));
            displays.forEach((disp) => {
                // Återställ ev. tidigare scale-justering
                disp.style.height = '';
                const inner0 = disp.querySelector('.katex');
                if (inner0) {
                    inner0.style.transform = '';
                    inner0.style.transformOrigin = '';
                }
                if (!dispOverflows(disp)) return;
                // Plocka ut original-LaTeX från KaTeX:s annotation
                const ann = disp.querySelector('annotation[encoding="application/x-tex"]');
                const orig = ann ? ann.textContent : null;
                let current = disp;
                if (orig) {
                    const eqs = findTopLevelEquals(orig);
                    // Bryt vid de första n =, n=2..eqs.length. (n=1 ger samma
                    // visuella resultat som originalet — hoppa över.)
                    for (let n = 2; n <= eqs.length; n++) {
                        const broken = buildAligned(orig, eqs.slice(0, n));
                        const newDisp = renderDisplayMath(broken);
                        current.replaceWith(newDisp);
                        current = newDisp;
                        if (!dispOverflows(current)) break;
                    }
                }
                // Om något fortfarande sticker ut: skala som sista utväg
                if (dispOverflows(current)) scaleDownDisplay(current);
            });
        }

        // --- Markdown-preprocessor: ::: typ "Titel" ... ::: → HTML-blockruta
        function preprocessBlocks(md) {
            const lines = md.split('\n');
            const out = [];
            const stack = [];
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const open = line.match(/^:::\s*([a-zåäö]+)(?:\s+"([^"]*)")?\s*$/i);
                const close = line.match(/^:::\s*$/);
                if (open) {
                    const [, type, title] = open;
                    stack.push(type.toLowerCase());
                    out.push('<div class="lab-block lab-block-' + type.toLowerCase() + '">');
                    if (title) {
                        out.push('<div class="lab-block-title">' + escapeHtml(title) + '</div>');
                    }
                    out.push('');
                } else if (close && stack.length > 0) {
                    stack.pop();
                    out.push('');
                    out.push('</div>');
                } else {
                    out.push(line);
                }
            }
            return out.join('\n');
        }

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function parseFrontmatter(md) {
            // Normalisera radslut först — en CRLF-sparad md-fil (`---\r\n`)
            // matchar annars inte och hela YAML-blocket läcker ut som text.
            md = md.replace(/\r\n?/g, '\n');
            if (!md.startsWith('---\n')) return { fm: {}, body: md };
            const end = md.indexOf('\n---\n', 4);
            if (end === -1) return { fm: {}, body: md };
            const block = md.slice(4, end);
            const fm = {};
            for (const line of block.split('\n')) {
                const m = line.match(/^([a-zA-Z]+):\s*(.*)$/);
                if (m) {
                    let v = m[2].trim();
                    if (v.startsWith("'") && v.endsWith("'")) v = v.slice(1, -1);
                    if (v.startsWith('"') && v.endsWith('"')) v = v.slice(1, -1);
                    fm[m[1]] = v;
                }
            }
            return { fm, body: md.slice(end + 5) };
        }

        marked.setOptions({ gfm: true, breaks: false });

        // id-konvention för teori-uppslag — t.ex. Fysik + "2.3" → "fy1-2.3"
        function teoriId(courseName, num) {
            if (courseName === 'Fysik nivå 1') return 'fy1-' + num;
            if (courseName === 'Fysik nivå 2') return 'fy2-' + num;
            return null;
        }

        const normalize = (text) => text.toLowerCase()
            .replace(/å/g, 'a').replace(/ä/g, 'a').replace(/ö/g, 'o')
            .replace(/é/g, 'e').replace(/è/g, 'e');

        const HAYSTACKS = KF.map(sim =>
            normalize([sim.title, sim.description, sim.course, sim.chapter, ...(sim.keywords || [])].join(' '))
        );

        function Topbar() {
            return (

                    </div>
                </div>
            );
        }

        function Header() {
            return (
                <div className="lab-header">

                    </g>
                    <circle cx="18" cy="18" r="2.8" fill="var(--lab-accent)" />
                            </svg>
                            <span className="lab-logo-text">Fysiklabbet</span>
                        </a>
                        <SearchBar />
                        <nav className="lab-nav" aria-label="Huvudnavigation">
                            <a href="index.html">Start</a>
                            <div className="lab-nav-dd">
                                <button type="button" className="lab-nav-dd-trigger" aria-haspopup="true">
                                    Ämne
                                    <svg className="lab-nav-dd-caret" width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><path d="M2.5 4.5 6 8l3.5-3.5"/></svg>
                                </button>
                                <div className="lab-nav-dd-menu">
                                    <a href="katalog.html#fy1">Fysik nivå 1</a>
                                    <a href="katalog.html#fy2">Fysik nivå 2</a>
                                </div>
                            </div>
                            <a href="simuleringar.html">Simuleringar</a>
                            <a href="nyheter.html">Nyheter</a>
                            <a href="om.html">Om</a>
                            <a href="kontakt.html">Kontakt</a>
