    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const G = 9.82;                 // tyngdfaktorn (N/kg)
        const DEG = Math.PI / 180;
        const ALPHA_MAX = 45;

        const fmt = (num, decimals = 1) => {
            if (!isFinite(num)) return '–';
            const s = num.toFixed(decimals);
            if (parseFloat(s) === 0) return '0';
            return s.replace('.', ',');
        };

        const COL = {
            tyngd: '#c8324a',  // crimson — tyngdkraft & dess komposanter
            norm:  '#0d9488',  // teal — normalkraft
            frik:  '#e0701a',  // orange — friktionskraft
            acc:   '#7c3aed',  // violett — acceleration
            ink:   '#0f1620',
        };

        // ── SVG-pil — mot ljus papperscen behövs ingen vit kontur. ──
        const Arrow = ({ x1, y1, x2, y2, color, width = 7, head = 20, dash = false, opacity = 1 }) => {
            const ang = Math.atan2(y2 - y1, x2 - x1);
            const len = Math.hypot(x2 - x1, y2 - y1);
            if (len < 0.5) return null;
            const hw = 0.42;
            const bx = x2 - head * 0.82 * Math.cos(ang);
            const by = y2 - head * 0.82 * Math.sin(ang);
            const pL = [x2 - head * Math.cos(ang - hw), y2 - head * Math.sin(ang - hw)];
            const pR = [x2 - head * Math.cos(ang + hw), y2 - head * Math.sin(ang + hw)];
            return (
                <g opacity={opacity}>
                    <line x1={x1} y1={y1} x2={bx} y2={by} stroke={color} strokeWidth={width}
                          strokeLinecap="round" strokeDasharray={dash ? '7 6' : undefined} />
                    <polygon points={`${x2},${y2} ${pL[0]},${pL[1]} ${pR[0]},${pR[1]}`} fill={color}
                             stroke="rgba(15,22,32,0.18)" strokeWidth="1" strokeLinejoin="round" />
                </g>
            );
        };

        const Tag = ({ x, y, color, size = 15, anchor = 'middle', weight = 700, children }) => (
            <text x={x} y={y} textAnchor={anchor} fontSize={size} fontWeight={weight} fill={color}>
                {children}
            </text>
        );

        // Liten kvadrat som markerar rät vinkel mellan ytan (d1) och normalen (d2).
        const RightAngle = ({ x, y, d1, d2, size = 12, color = 'rgba(15,22,32,0.7)' }) => {
            const a = { x: x + d1.x * size, y: y + d1.y * size };
            const c = { x: x + (d1.x + d2.x) * size, y: y + (d1.y + d2.y) * size };
            const b = { x: x + d2.x * size, y: y + d2.y * size };
            return <polyline points={`${a.x},${a.y} ${c.x},${c.y} ${b.x},${b.y}`}
                             fill="none" stroke={color} strokeWidth="1.7"
                             strokeLinejoin="round" strokeLinecap="round" />;
        };

        // Markmönster (snedstreck) under en vågrät linje
        const Hatch = ({ x0, x1, y, step = 22, len = 9, color = 'rgba(15,22,32,0.34)' }) => {
            const items = [];
            for (let x = x0; x <= x1; x += step) {
                items.push(<line key={x} x1={x} y1={y} x2={x - len} y2={y + len} stroke={color} strokeWidth="1.5" />);
            }
            return <g>{items}</g>;
        };

        const Slider = ({ label, value, min, max, step, onChange, children }) => (
            <div className="flex items-center gap-2 mb-2">
                <span className="text-xs flex-shrink-0" style={{ minWidth: 118, color: 'var(--lab-ink-soft)' }}
                      dangerouslySetInnerHTML={{ __html: label }} />
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))}
                       className="flex-1 cursor-pointer" />
                {children}
            </div>
        );

        const StSlider = ({ label, value, min, max, step, onChange, display }) => (
            <div className="st-slider">
                <div className="st-slider-top">
                    <span dangerouslySetInnerHTML={{ __html: label }} />
                    <span className="v">{display}</span>
                </div>
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))} />
            </div>
        );

        // ════════════════════════════════════════════════════════
        //  SCEN — lutande plan
        // ════════════════════════════════════════════════════════
        const VBW = 820, VBH = 540;
        const GROUND_Y = 452;
        const AX = 96;                  // foten (A) x — vinkeln α ligger här
        const LHYP = 540;               // hypotenusans (planets) längd i px
        const kF = 1.35;                // px per N (kraftpilar)
        const kA = 17;                  // px per (m/s²) (accelerationspil)
        const lenF = (F) => (F <= 0.1 ? 0 : Math.max(11, Math.min(F * kF, 172)));

        const PlaneScene = ({ alpha, m, mu, mode, tCur, sliding, atLimit, FG, FN, Fpar, Ff, aPhys, show, svgRef }) => {
            const aRad = alpha * DEG;
            const sinA = Math.sin(aRad), cosA = Math.cos(aRad);
            const A = { x: AX, y: GROUND_Y };
            const u = { x: cosA, y: -sinA };          // uppför planet (mot höger)
            const nout = { x: -sinA, y: -cosA };      // utåtnormal (upp-vänster)
            const nin = { x: sinA, y: cosA };         // inåt (ned i planet)
            const dn = { x: -cosA, y: sinA };         // nedför planet (ned-vänster)
            const top = { x: A.x + LHYP * u.x, y: A.y + LHYP * u.y };
            const Bx = A.x + LHYP * cosA;             // toppens fotpunkt
            const B = { x: Bx, y: GROUND_Y };

            // objektets storlek
            const HALF = 42 + (m - 1) * 1.3;          // halv längd längs planet
            const HH = 52 + (m - 1) * 1.1;            // höjd
            // kontaktpunkt (basens mitt) på hypotenusan, och tyngdpunkt C
            const S = { x: A.x + tCur * LHYP * u.x, y: A.y + tCur * LHYP * u.y };
            const C = { x: S.x + nout.x * (HH / 2), y: S.y + nout.y * (HH / 2) };

            // pillängder (samma skala för alla krafter → längderna jämförbara)
            const Lg = lenF(FG), Ln = lenF(FN), Lp = lenF(Fpar), Lf = lenF(Ff);
            const La = (sliding && aPhys > 0.01) ? Math.max(14, Math.min(aPhys * kA, 172)) : 0;

            // spetsar
            const gTip = { x: C.x, y: C.y + Lg };                       // F_G rakt ned
            const perpTip = { x: C.x + nin.x * Ln, y: C.y + nin.y * Ln };   // F_G·cosα (ned i planet)
            const parTip = { x: C.x + dn.x * Lp, y: C.y + dn.y * Lp };      // F_G·sinα (nedför)
            const normTip = { x: C.x + nout.x * Ln, y: C.y + nout.y * Ln }; // F_N (ut, lika lång som perp)

            // vinkelbåge vid A
            const R = 40;
            const arc = `M ${A.x + R} ${A.y} A ${R} ${R} 0 0 0 ${A.x + R * u.x} ${A.y + R * u.y}`;

            const stateText = mode === 'vagn'
                ? (alpha < 0.5 ? 'Vågrätt — vagnen står still' : 'Vagnen rullar fritt nedför — ingen friktion')
                : (sliding ? 'Lådan glider — glidfriktion'
                           : (atLimit ? 'På gränsen — maximal statisk friktion' : 'I vila — statisk friktion håller emot'));
            const stateCol = sliding ? COL.acc : (atLimit ? COL.frik : 'rgba(15,22,32,0.7)');

            // hjul för vagnen
            const wheelR = Math.min(13, HH * 0.34);
            const wy = C.y + HH / 2 - wheelR;         // hjulens centrumhöjd (lokal, oroterad)

            return (
                <svg ref={svgRef} viewBox={`0 0 ${VBW} ${VBH}`} preserveAspectRatio="xMidYMid meet"
                     style={{ fontFamily: "'DM Sans', sans-serif" }}>
                    <defs>
                        <linearGradient id="wallG" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor="#f7f2e8" />
                            <stop offset="100%" stopColor="#ece3d2" />
                        </linearGradient>
                        <linearGradient id="planeG" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor="#d9c9a8" />
                            <stop offset="100%" stopColor="#c2ad84" />
                        </linearGradient>
                        <linearGradient id="boxG" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor="#d2a25c" />
                            <stop offset="100%" stopColor="#b9863f" />
                        </linearGradient>
                        <linearGradient id="cartG" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor="#5b9bd1" />
                            <stop offset="100%" stopColor="#3f7cb4" />
                        </linearGradient>
                    </defs>

                    <rect x="0" y="0" width={VBW} height={VBH} fill="url(#wallG)" />

                    {/* lutande planet (triangel) */}
                    <polygon points={`${A.x},${A.y} ${B.x},${B.y} ${top.x},${top.y}`}
                             fill="url(#planeG)" stroke={COL.ink} strokeWidth="2.5" strokeLinejoin="round" />
                    {/* mark + snedstreck under marken */}
                    <line x1="30" y1={GROUND_Y} x2={VBW - 20} y2={GROUND_Y} stroke={COL.ink} strokeWidth="3" strokeLinecap="round" />
                    <Hatch x0="44" x1={VBW - 28} y={GROUND_Y} />

                    {/* vinkel α vid foten */}
                    <path d={arc} fill="none" stroke={COL.ink} strokeWidth="1.6" />
                    <text x={A.x + R + 13} y={A.y - 13} fontSize="22" fontWeight="700" fill={COL.ink}>
                        <tspan fontStyle="italic">α</tspan> = {fmt(alpha, 0)}°
                    </text>

                    {/* tillståndstext överst */}
                    <Tag x={VBW / 2} y={40} color={stateCol} size={21}>{stateText}</Tag>

                    {/* ── OBJEKTET (roterat längs planet) ── */}
                    <g transform={`rotate(${-alpha} ${C.x} ${C.y})`}>
                        {mode === 'lada' ? (
                            <g>
                                <rect x={C.x - HALF} y={C.y - HH / 2} width={HALF * 2} height={HH} rx="6"
                                      fill="url(#boxG)" stroke="#8a5f24" strokeWidth="2.5" />
                                <line x1={C.x - HALF + 6} y1={C.y - HH / 2 + 8} x2={C.x + HALF - 6} y2={C.y - HH / 2 + 8}
                                      stroke="#8a5f24" strokeWidth="1.5" opacity="0.45" />
                                <line x1={C.x - HALF + 6} y1={C.y + HH / 2 - 8} x2={C.x + HALF - 6} y2={C.y + HH / 2 - 8}
                                      stroke="#8a5f24" strokeWidth="1.5" opacity="0.45" />
                            </g>
                        ) : (
                            <g>
                                <rect x={C.x - HALF} y={C.y - HH / 2} width={HALF * 2} height={HH - wheelR} rx="5"
                                      fill="url(#cartG)" stroke="#2c5a86" strokeWidth="2.5" />
                                <circle cx={C.x - HALF + wheelR + 3} cy={wy} r={wheelR} fill="#2b2f36" stroke="#15181d" strokeWidth="2" />
                                <circle cx={C.x + HALF - wheelR - 3} cy={wy} r={wheelR} fill="#2b2f36" stroke="#15181d" strokeWidth="2" />
                                <circle cx={C.x - HALF + wheelR + 3} cy={wy} r="2.6" fill="#c9ced6" />
                                <circle cx={C.x + HALF - wheelR - 3} cy={wy} r="2.6" fill="#c9ced6" />
                            </g>
                        )}
                        <text x={C.x} y={C.y + 6} textAnchor="middle" fontSize={HALF > 60 ? 20 : 18}
                              fontWeight="700" fill={mode === 'lada' ? '#3a2a10' : '#eaf2fb'}>
                            <tspan fontStyle="italic">m</tspan> = {fmt(m, 1)} kg
                        </text>
                    </g>

                    {/* ── TYNGDKRAFT (diagonal) — visas med krafter ELLER komposanter ── */}
                    {(show.forces || show.components) && (
                        <g>
                            <Arrow x1={C.x} y1={C.y} x2={gTip.x} y2={gTip.y} color={COL.tyngd} />
                            <circle cx={C.x} cy={C.y} r="3" fill={COL.tyngd} />
                            {/* När komposanterna visas är F_G diagonalen — ingen etikett
                                 (annars krockar den med F_2). Bara i ren kraftvy får den värde. */}
                            {!show.components && (
                                <Tag x={gTip.x + 13} y={gTip.y + 5} color={COL.tyngd} size={18} anchor="start">
                                    <tspan fontStyle="italic">F</tspan><tspan dy="4" fontSize="13">G</tspan>
                                    <tspan dy="-4"> = {fmt(FG)} N</tspan>
                                </Tag>
                            )}
                        </g>
                    )}

                    {/* ── KOMPOSANTER (parallellogram + två streckade komposanter) ── */}
                    {show.components && (
                        <g>
                            <line x1={perpTip.x} y1={perpTip.y} x2={gTip.x} y2={gTip.y}
                                  stroke={COL.tyngd} strokeWidth="1.3" strokeDasharray="3 4" opacity="0.4" />
                            <line x1={parTip.x} y1={parTip.y} x2={gTip.x} y2={gTip.y}
                                  stroke={COL.tyngd} strokeWidth="1.3" strokeDasharray="3 4" opacity="0.4" />
                            <Arrow x1={C.x} y1={C.y} x2={parTip.x} y2={parTip.y} color={COL.tyngd} width={5.5} head={16} dash opacity={0.95} />
                            <Arrow x1={C.x} y1={C.y} x2={perpTip.x} y2={perpTip.y} color={COL.tyngd} width={5.5} head={16} dash opacity={0.95} />
                            {/* F_1 (parallell komposant, nedför) — etikett nedanför pilspetsen, till vänster */}
                            <Tag x={parTip.x - 8} y={parTip.y + 20} color={COL.tyngd} size={17} anchor="end">
                                <tspan fontStyle="italic">F</tspan><tspan dy="4" fontSize="13">1</tspan>
                                <tspan dy="-4"> = {fmt(Fpar)} N</tspan>
                            </Tag>
                            {/* F_2 (vinkelrät komposant, in i planet) — etikett till höger om pilspetsen */}
                            <Tag x={perpTip.x + 11} y={perpTip.y + 6} color={COL.tyngd} size={17} anchor="start">
                                <tspan fontStyle="italic">F</tspan><tspan dy="4" fontSize="13">2</tspan>
                                <tspan dy="-4"> = {fmt(FN)} N</tspan>
                            </Tag>
                        </g>
                    )}

                    {/* ── NORMALKRAFT & FRIKTION ── */}
                    {show.forces && (
                        <g>
                            {/* Normalkraft — ut från ytan, lika lång som vinkelräta komposanten */}
                            <Arrow x1={C.x} y1={C.y} x2={normTip.x} y2={normTip.y} color={COL.norm} />
                            <Tag x={normTip.x + nout.x * 14} y={normTip.y + nout.y * 14 + 5} color={COL.norm} size={18} anchor="end">
                                <tspan fontStyle="italic">F</tspan><tspan dy="4" fontSize="13">N</tspan>
                                <tspan dy="-4"> = {fmt(FN)} N</tspan>
                            </Tag>
                            <RightAngle x={S.x} y={S.y} d1={u} d2={nout} />
                            {/* Friktionskraft — uppför planet, med angreppspunkt i lådans
                                 NEDRE HÖGRA HÖRN (uppför-änden av baskanten). Då hamnar pilen
                                 i fri yta uppför planet, utan att tränga ihop sig i mitten. */}
                            {mode === 'lada' && Ff > 0.05 && (() => {
                                const cR = { x: S.x + u.x * HALF, y: S.y + u.y * HALF };
                                const ft = { x: cR.x + u.x * Lf, y: cR.y + u.y * Lf };
                                return (
                                    <g>
                                        <Arrow x1={cR.x} y1={cR.y} x2={ft.x} y2={ft.y} color={COL.frik} width={7} head={20} />
                                        <circle cx={cR.x} cy={cR.y} r="5" fill={COL.frik} />
                                        <Tag x={ft.x + nout.x * 17 + u.x * 5} y={ft.y + nout.y * 17 + 5} color={COL.frik} size={17} anchor="middle">
                                            <tspan fontStyle="italic">F</tspan><tspan dy="4" fontSize="13">f</tspan>
                                            <tspan dy="-4"> = {fmt(Ff)} N</tspan>
                                        </Tag>
                                    </g>
                                );
                            })()}
                        </g>
                    )}

                    {/* ── ACCELERATION ── nedför planet, lyft strax ovanför ytan så den
                         inte ligger ovanpå den parallella komposanten. */}
                    {show.accel && La > 0 && (() => {
                        const a0 = { x: C.x + nout.x * 18, y: C.y + nout.y * 18 };
                        const a1 = { x: a0.x + dn.x * La, y: a0.y + dn.y * La };
                        return (
                            <g>
                                <Arrow x1={a0.x} y1={a0.y} x2={a1.x} y2={a1.y} color={COL.acc} width={7} head={20} />
                                <Tag x={a1.x + dn.x * 4 - 4} y={a1.y + dn.y * 4 - 11} color={COL.acc} size={18} anchor="end">
                                    <tspan fontStyle="italic">a</tspan> = {fmt(aPhys, 2)} m/s²
                                </Tag>
                            </g>
                        );
                    })()}
                </svg>
            );
        };

        // ── Live-diagram: drivkraft & maxfriktion mot vinkeln α ──
        const AngleGraph = ({ alpha, m, mu, mode, FG }) => {
            const W = 320, H = 210, padL = 42, padR = 14, padT = 14, padB = 34;
            const gw = W - padL - padR, gh = H - padT - padB;
            const yMax = Math.max(FG * 1.05, 12);
            const px = (deg) => padL + (deg / ALPHA_MAX) * gw;
            const py = (f) => padT + gh - (f / yMax) * gh;

            const par = (deg) => FG * Math.sin(deg * DEG);
            const fmax = (deg) => mu * FG * Math.cos(deg * DEG);

            const N = 48;
            const parPts = [], fmaxPts = [];
            for (let i = 0; i <= N; i++) {
                const deg = (i / N) * ALPHA_MAX;
                parPts.push(`${px(deg)},${py(par(deg))}`);
                fmaxPts.push(`${px(deg)},${py(fmax(deg))}`);
            }
            // tröskel: tan α = μ
            const thr = Math.atan(mu) / DEG;
            const showThr = mode === 'lada' && thr <= ALPHA_MAX;

            return (
                <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', fontFamily: "'DM Sans', sans-serif" }}>
                    <line x1={padL} y1={py(0)} x2={W - padR} y2={py(0)} stroke="#38bdf8" strokeWidth="1.6" />
                    <line x1={padL} y1={py(0)} x2={padL} y2={padT} stroke="#38bdf8" strokeWidth="1.6" />
                    {/* tröskelvinkel */}
                    {showThr && (
                        <g>
                            <line x1={px(thr)} y1={py(0)} x2={px(thr)} y2={padT} stroke="rgba(124,58,237,0.55)" strokeWidth="1.3" strokeDasharray="5 4" />
                            <text x={px(thr) + 4} y={padT + 10} fontSize="10" fill={COL.acc} fontWeight="600">glider →</text>
                        </g>
                    )}
                    {/* maxfriktion (endast låda) */}
                    {mode === 'lada' && (
                        <polyline points={fmaxPts.join(' ')} fill="none" stroke={COL.frik} strokeWidth="2.4" />
                    )}
                    {/* drivkraft nedför */}
                    <polyline points={parPts.join(' ')} fill="none" stroke={COL.tyngd} strokeWidth="2.4" />
                    {/* aktuell vinkel */}
                    <line x1={px(alpha)} y1={py(0)} x2={px(alpha)} y2={padT} stroke="rgba(15,22,32,0.26)" strokeWidth="1" strokeDasharray="3 3" />
                    <circle cx={px(alpha)} cy={py(par(alpha))} r="4.5" fill={COL.tyngd} />
                    {mode === 'lada' && <circle cx={px(alpha)} cy={py(fmax(alpha))} r="4.5" fill={COL.frik} />}
                    {/* etiketter */}
                    <text x={padL + gw / 2} y={H - 6} textAnchor="middle" fontSize="11.5" fill="var(--lab-ink-soft)">
                        lutningsvinkel <tspan fontStyle="italic">α</tspan> (°)
                    </text>
                    <text x={padL - 6} y={padT + 2} textAnchor="end" fontSize="11.5" fill="var(--lab-ink-soft)">kraft (N)</text>
                </svg>
            );
        };

        // ── Formelkort med ord-etiketter ──
        const Vbl = ({ label, children }) => (
            <div className="flex flex-col items-center" style={{ lineHeight: 1.1 }}>
                <span className="flbl">{label}</span>
                <span className="fnum">{children}</span>
                <span className="flbl" aria-hidden="true" style={{ visibility: 'hidden' }}>{label}</span>
            </div>
        );
        const FormulaCard = ({ alpha, m, Fpar }) => (
            <div className="glass-card rounded-xl p-4 mb-6 flex flex-wrap items-center gap-x-3 gap-y-2" style={{ color: 'var(--lab-ink)' }}>
                <Vbl label="Komposant nedför"><em>F</em><sub>1</sub></Vbl>
                <span className="fnum">=</span>
                <Vbl label="Massa"><em>m</em></Vbl>
                <span className="fnum">·</span>
                <Vbl label="Tyngdfaktor"><em>g</em></Vbl>
                <span className="fnum">·</span>
                <Vbl label="sin lutningsvinkel">sin <em>α</em></Vbl>
                <span className="fnum">=</span>
                <span className="fnum">{fmt(m, 1)} · 9,82 · sin {fmt(alpha, 0)}°</span>
                <span className="fnum">=</span>
                <span className="fnum" style={{ fontWeight: 700 }}>{fmt(Fpar)} N</span>
            </div>
        );

        // ── Huvudapp ─────────────────────────────────────────────
        const App = () => {
            const [alpha, setAlpha] = useState(12);     // lutningsvinkel (°) — under tröskeln, lådan vilar
            const [m, setM] = useState(5);              // massa (kg)
            const [mu, setMu] = useState(0.30);         // friktionstal
            const [mode, setMode] = useState('lada');   // 'lada' (friktion) | 'vagn' (utan)
            const [running, setRunning] = useState(true);
            const [show, setShow] = useState({ forces: true, components: false, accel: false });

            const [tCur, setTCur] = useState(0.66);     // position längs planet (0=foten, 1=toppen)
            const [v, setV] = useState(0);              // fart längs planet (px/s, internt)

            const [isFullscreen, setIsFullscreen] = useState(false);
            const sceneWrapRef = useRef(null);
            const svgRef = useRef(null);
            const rafRef = useRef(null);
            const lastRef = useRef(null);
            const vRef = useRef(0);
            const tRef = useRef(0.66);

            const T0 = 0.66;
            const HALF0 = 30 + (m - 1) * 1.1;
            const tFoot = (HALF0 + 10) / LHYP;          // stannar strax före foten

            const aRad = alpha * DEG;
            const sinA = Math.sin(aRad), cosA = Math.cos(aRad);
            const FG = m * G;
            const FN = FG * cosA;
            const Fpar = FG * sinA;                     // drivkraft nedför
            const Ffmax = mode === 'lada' ? mu * FN : 0;
            const sliding = v > 0.001;
            const Ff = mode === 'lada' ? (sliding ? Ffmax : Math.min(Fpar, Ffmax)) : 0;
            const atLimit = mode === 'lada' && !sliding && Fpar > 0.05 && Fpar >= Ffmax - 0.05;
            const Fnet = Fpar - Ff;                     // nedför positiv
            const aPhys = sliding ? Fnet / m : 0;       // m/s²

            // animationsloop
            useEffect(() => {
                if (!running) { lastRef.current = null; return; }
                const PXPM = 58;                        // px per meter (animationsskala)
                const step = (ts) => {
                    if (lastRef.current == null) lastRef.current = ts;
                    const dt = Math.min((ts - lastRef.current) / 1000, 0.05);
                    lastRef.current = ts;

                    const sA = Math.sin(alpha * DEG), cA = Math.cos(alpha * DEG);
                    const fg = m * G, fpar = fg * sA;
                    const ffmax = mode === 'lada' ? mu * fg * cA : 0;
                    let nv = vRef.current;              // px/s
                    if (nv <= 0.001) {
                        if (fpar > ffmax + 0.001) {
                            const aP = (fpar - ffmax) / m;        // m/s²
                            nv = aP * PXPM * dt;
                        } else nv = 0;
                    } else {
                        const aP = (fpar - ffmax) / m;
                        nv = nv + aP * PXPM * dt;
                        if (nv < 0) nv = 0;
                    }
                    if (nv > 1400) nv = 1400;
                    let nt = tRef.current - (nv / LHYP) * dt;
                    const footT = (30 + (m - 1) * 1.1 + 10) / LHYP;
                    if (nt <= footT) { nt = footT; nv = 0; }
                    vRef.current = nv; tRef.current = nt;
                    setV(nv); setTCur(nt);
                    rafRef.current = requestAnimationFrame(step);
                };
                rafRef.current = requestAnimationFrame(step);
                return () => cancelAnimationFrame(rafRef.current);
            }, [running, alpha, m, mu, mode]);

            // fullskärm
            useEffect(() => {
                const handler = () => setIsFullscreen(
                    document.fullscreenElement === sceneWrapRef.current ||
                    document.webkitFullscreenElement === sceneWrapRef.current
                );
                document.addEventListener('fullscreenchange', handler);
                document.addEventListener('webkitfullscreenchange', handler);
                return () => {
                    document.removeEventListener('fullscreenchange', handler);
                    document.removeEventListener('webkitfullscreenchange', handler);
                };
            }, []);
            const toggleFullscreen = () => {
                const el = sceneWrapRef.current;
                if (!el) return;
                if (document.fullscreenElement || document.webkitFullscreenElement)
                    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
                else (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
            };

            const tShow = (k) => setShow((sh) => ({ ...sh, [k]: !sh[k] }));
            const resetPos = () => { vRef.current = 0; tRef.current = T0; setV(0); setTCur(T0); };
            const reset = () => { resetPos(); setRunning(true); };
            const setModeReset = (mo) => { setMode(mo); resetPos(); };

            const primaryLabel = running ? 'Pausa' : 'Fortsätt';

            const sceneToggles = () => (
                <div className="scene-toggles">
                    <div className="st-title">Visa</div>
                    <label><input type="checkbox" checked={show.forces} onChange={() => tShow('forces')} /><span>Krafter</span></label>
                    <label><input type="checkbox" checked={show.components} onChange={() => tShow('components')} /><span>Dela upp tyngdkraften</span></label>
                    <label><input type="checkbox" checked={show.accel} onChange={() => tShow('accel')} /><span>Acceleration</span></label>
                    <div className="st-title mt">Objekt</div>
                    <label><input type="radio" name="mode" checked={mode === 'lada'} onChange={() => setModeReset('lada')} /><span>Låda (med friktion)</span></label>
                    <label><input type="radio" name="mode" checked={mode === 'vagn'} onChange={() => setModeReset('vagn')} /><span>Vagn (utan friktion)</span></label>
                    {isFullscreen && (
                        <React.Fragment>
                            <div className="st-title mt">Reglage</div>
                            <StSlider label="Lutningsvinkel <em>α</em>" value={alpha} min={0} max={ALPHA_MAX} step={1} onChange={setAlpha} display={`${fmt(alpha, 0)}°`} />
                            <StSlider label="Massa <em>m</em>" value={m} min={1} max={12} step={0.5} onChange={setM} display={`${fmt(m, 1)} kg`} />
                            {mode === 'lada' && (
                                <StSlider label="Friktionstal <em>μ</em>" value={mu} min={0} max={1} step={0.01} onChange={setMu} display={fmt(mu, 2)} />
                            )}
                            <div className="st-actions">
                                <button className="btn-toggle" onClick={() => setRunning((r) => !r)}>{primaryLabel}</button>
                                <button className="btn-toggle" onClick={reset}>Börja om</button>
                            </div>
                        </React.Fragment>
                    )}
                </div>
            );

            return (
                <div className="min-h-screen dark-container px-4 md:px-8 pb-12" style={{ fontFamily: "'DM Sans', sans-serif" }}>
                    <div className="max-w-6xl mx-auto pt-6">
                        <div className="breadcrumb mb-4" style={{ fontSize: 13 }}>
                            <a href="index.html">Hem</a> / <a href="katalog.html#fy1">Fysik nivå 1</a> / Lutande plan
                        </div>
                        <h1 className="text-3xl md:text-4xl font-black tracking-tight" style={{ color: 'var(--lab-ink)' }}>Lutande plan</h1>
                        <p className="mt-2 mb-5" style={{ color: 'var(--lab-ink-soft)', maxWidth: 820 }}>
                            På ett lutande plan delas tyngdkraften upp i två komposanter: en <strong>parallell</strong> med
                            planet som drar föremålet nedför (<em>F</em><sub>1</sub> = <em>F</em><sub>G</sub> · sin <em>α</em>),
                            och en <strong>vinkelrät</strong> mot planet (<em>F</em><sub>2</sub> = <em>F</em><sub>G</sub> · cos <em>α</em>)
                            som balanseras av normalkraften <em>F</em><sub>N</sub>. En <strong>vagn</strong> rullar
                            fritt (ingen friktion) medan en <strong>låda</strong> hålls kvar av friktionen — ända tills
                            lutningen blir så brant att drivkraften nedför överstiger den maximala friktionen. Öka vinkeln
                            <em> α</em> och se när lådan släpper.
                        </p>

                        <FormulaCard alpha={alpha} m={m} Fpar={Fpar} />

                        <main className="flex flex-col lg:flex-row gap-6">
                            {/* Scen */}
                            <div className="lg:w-3/5 order-1">
                                <div className="scene-wrap" data-theme="ljusPapper" ref={sceneWrapRef}>
                                    <PlaneScene alpha={alpha} m={m} mu={mu} mode={mode} tCur={tCur}
                                                sliding={sliding} atLimit={atLimit} FG={FG} FN={FN}
                                                Fpar={Fpar} Ff={Ff} aPhys={aPhys} show={show} svgRef={svgRef} />
                                    <div className="scene-hint">
                                        Öka <em>α</em> tills <em>F</em><sub>1</sub> &gt; <em>μ</em>·<em>F</em><sub>N</sub> — då börjar lådan glida. Luftmotstånd försummas.
                                    </div>
                                    {sceneToggles()}
                                    <button className="fs-btn" onClick={toggleFullscreen} aria-label="Fullskärm"
                                            title={isFullscreen ? 'Lämna fullskärm' : 'Fullskärm'}>
                                        {isFullscreen ? (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M9 3v6H3" /><path d="M15 21v-6h6" /><path d="M21 9h-6V3" /><path d="M3 15h6v6" />
                                            </svg>
                                        ) : (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M3 9V3h6" /><path d="M21 9V3h-6" /><path d="M3 15v6h6" /><path d="M21 15v6h-6" />
                                            </svg>
                                        )}
                                    </button>
                                </div>
                            </div>

                            {/* Kontroller */}
                            <div className="lg:w-2/5 order-2">
                                {/* Objektläge */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <div className="flbl mb-2">Objekt på planet</div>
                                    <div className="mode-seg">
                                        <button className={mode === 'vagn' ? 'active' : ''} onClick={() => setModeReset('vagn')}>
                                            Vagn<span className="sub">utan friktion</span>
                                        </button>
                                        <button className={mode === 'lada' ? 'active' : ''} onClick={() => setModeReset('lada')}>
                                            Låda<span className="sub">med friktion</span>
                                        </button>
                                    </div>
                                </div>

                                {/* Reglage */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <Slider label="Lutningsvinkel <em>α</em>" value={alpha} min={0} max={ALPHA_MAX} step={1} onChange={setAlpha}>
                                        <span className="font-mono font-semibold text-sm flex-shrink-0" style={{ minWidth: 60, textAlign: 'right', color: 'var(--lab-accent)' }}>{fmt(alpha, 0)}°</span>
                                    </Slider>
                                    <Slider label="Massa <em>m</em>" value={m} min={1} max={12} step={0.5} onChange={setM}>
                                        <span className="font-mono font-semibold text-sm flex-shrink-0" style={{ minWidth: 60, textAlign: 'right', color: 'var(--lab-accent)' }}>{fmt(m, 1)} kg</span>
                                    </Slider>
                                    {mode === 'lada' && (
                                        <Slider label="Friktionstal <em>μ</em>" value={mu} min={0} max={1} step={0.01} onChange={setMu}>
                                            <span className="font-mono font-semibold text-sm flex-shrink-0" style={{ minWidth: 60, textAlign: 'right', color: COL.frik }}>{fmt(mu, 2)}</span>
                                        </Slider>
                                    )}
                                    <div className="flex gap-2 mt-2">
                                        <button className="btn-toggle flex-1" onClick={() => setRunning((r) => !r)}>{primaryLabel}</button>
                                        <button className="btn-toggle flex-1" onClick={reset}>Börja om</button>
                                    </div>
                                </div>

                                {/* Visningsval */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <div className="flbl mb-2">Visa i scenen</div>
                                    <div className="flex flex-wrap gap-2">
                                        <button className={`btn-toggle ${show.forces ? 'active' : ''}`} onClick={() => tShow('forces')}>Krafter</button>
                                        <button className={`btn-toggle ${show.components ? 'active' : ''}`} onClick={() => tShow('components')}>Komposanter</button>
                                        <button className={`btn-toggle ${show.accel ? 'active' : ''}`} onClick={() => tShow('accel')}>Acceleration</button>
                                    </div>
                                </div>

                                {/* Avläsning */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <div className="flbl mb-2">Avläsning</div>
                                    <div className="grid grid-cols-4 gap-2 text-center">
                                        <div>
                                            <div style={{ color: COL.tyngd, fontWeight: 700, fontSize: 16 }}>{fmt(Fpar)} N</div>
                                            <div className="text-xs" style={{ color: 'var(--lab-ink-muted)' }}>nedför <em>F</em><sub>1</sub></div>
                                        </div>
                                        <div>
                                            <div style={{ color: COL.norm, fontWeight: 700, fontSize: 16 }}>{fmt(FN)} N</div>
                                            <div className="text-xs" style={{ color: 'var(--lab-ink-muted)' }}>normal <em>F</em><sub>N</sub></div>
                                        </div>
                                        <div>
                                            <div style={{ color: COL.frik, fontWeight: 700, fontSize: 16 }}>{mode === 'lada' ? fmt(Ff) + ' N' : '–'}</div>
                                            <div className="text-xs" style={{ color: 'var(--lab-ink-muted)' }}>friktion <em>F</em><sub>f</sub></div>
                                        </div>
                                        <div>
                                            <div style={{ color: COL.acc, fontWeight: 700, fontSize: 16 }}>{sliding ? fmt(aPhys, 2) : '0'}</div>
                                            <div className="text-xs" style={{ color: 'var(--lab-ink-muted)' }}>accel. (m/s²)</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Diagram */}
                                <div className="glass-card rounded-xl p-3">
                                    <div className="flbl mb-1">Drivkraft &amp; maxfriktion mot vinkeln</div>
                                    <AngleGraph alpha={alpha} m={m} mu={mu} mode={mode} FG={FG} />
                                    <p className="text-xs mt-1" style={{ color: 'var(--lab-ink-soft)' }}>
                                        Drivkraften nedför (<span style={{ color: COL.tyngd, fontWeight: 600 }}><em>F</em><sub>G</sub>·sin <em>α</em></span>) växer med vinkeln,
                                        {mode === 'lada'
                                            ? <span> medan maxfriktionen (<span style={{ color: COL.frik, fontWeight: 600 }}><em>μ</em>·<em>F</em><sub>G</sub>·cos <em>α</em></span>) avtar. Där de korsas (tan <em>α</em> = <em>μ</em>) börjar lådan glida.</span>
                                            : <span> och utan friktion glider vagnen vid minsta lutning.</span>}
                                    </p>
                                </div>
                            </div>
                        </main>

                        {/* Pedagogiska sektioner */}
                        <div className="grid md:grid-cols-3 gap-4 mt-6">
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Tyngdkraften delas upp</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Tyngdkraften <em>F</em><sub>G</sub> = <em>m</em>·<em>g</em> pekar alltid rakt ned. På planet är
                                    det praktiskt att dela upp den i en komposant <em>längs</em> planet (<em>F</em><sub>G</sub>·sin <em>α</em>)
                                    och en <em>vinkelrät</em> mot planet (<em>F</em><sub>G</sub>·cos <em>α</em>). Bara den parallella
                                    komposanten kan sätta föremålet i rörelse.
                                </p>
                            </div>
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Vagn utan friktion</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Utan friktion finns inget som håller emot — vagnen accelererar nedför så fort planet lutar.
                                    Accelerationen blir <em>a</em> = <em>g</em>·sin <em>α</em>, oberoende av massan: en tung och en
                                    lätt vagn rullar lika fort.
                                </p>
                            </div>
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Låda med friktion</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Friktionen håller lådan kvar så länge <em>F</em><sub>G</sub>·sin <em>α</em> ≤ <em>μ</em>·<em>F</em><sub>N</sub>.
                                    Vid gränsen gäller tan <em>α</em> = <em>μ</em>. Därefter glider lådan med accelerationen
                                    <em> a</em> = <em>g</em>(sin <em>α</em> − <em>μ</em>·cos <em>α</em>).
                                </p>
                            </div>
                        </div>

                        <details className="glass-card rounded-xl p-4 mt-4">
                            <summary className="accordion-head" style={{ color: 'var(--lab-ink)' }}>
                                <span>Vanliga missuppfattningar</span><span style={{ color: 'var(--lab-ink-muted)' }}>▾</span>
                            </summary>
                            <ul className="mt-3 space-y-2 text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                <li><strong>”Normalkraften är lika med tyngdkraften.”</strong> Nej — på ett lutande plan balanserar
                                    normalkraften bara den vinkelräta komposanten: <em>F</em><sub>N</sub> = <em>F</em><sub>G</sub>·cos <em>α</em>,
                                    alltså mindre än <em>F</em><sub>G</sub>.</li>
                                <li><strong>”Tyngre föremål glider lättare.”</strong> Nej — gränsen för glidning beror bara på
                                    vinkeln och friktionstalet (tan <em>α</em> = <em>μ</em>), inte på massan. Både drivkraften och
                                    maxfriktionen är proportionella mot <em>m</em>, så massan ”stryks bort”.</li>
                                <li><strong>”En tung vagn rullar fortare nedför.”</strong> Nej — utan friktion är accelerationen
                                    <em> g</em>·sin <em>α</em> för alla massor. Massan påverkar kraften, men inte accelerationen.</li>
                                <li><strong>”Friktionen är alltid <em>μ</em>·<em>F</em><sub>N</sub>.”</strong> Nej — det är maxvärdet.
                                    Står lådan still är friktionen precis lika stor som drivkraften nedför, och kan vara mindre.</li>
                            </ul>
                        </details>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
