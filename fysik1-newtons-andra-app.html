    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const fmt = (num, decimals = 1) => {
            if (!isFinite(num)) return '–';
            const s = num.toFixed(decimals);
            if (parseFloat(s) === 0) return '0';     // exakt/avrundat noll → "0"
            return s.replace('.', ',');
        };
        // Signerad term till resultant-uttrycket: negativa krafter i parentes.
        const fmtTerm = (n) => n < 0 ? `(−${fmt(Math.abs(n), 1)} N)` : `${fmt(n, 1)} N`;

        // Scengeometri
        const VBW = 900, VBH = 560;
        const CX = 450;
        const FLOOR_Y = 452;          // golvets ovankant
        const WHEEL_R = 22;
        const WHEEL_CY = FLOOR_Y - WHEEL_R;
        const DECK_TOP = 398;         // kärrans flak (ovansida)
        const PXPM = 26;              // px per meter (golvets skrollhastighet)

        // Fysik
        const M_CART = 1.0;           // kärrans massa (kg)
        const VMAX = 25;              // begränsa farten för rimlig animation
        // Luftmotstånd: F_luft = DRAG_K · v (proportionell mot farten, motriktad
        // rörelsen). DRAG_K vald så att vid v = VMAX (25 m/s) ger den 20 N — lika
        // med den maximala drivkraften → resulterande kraft 0 och konstant fart
        // (terminalfart).
        const DRAG_K = 20 / VMAX;   // = 0,8 N per (m/s)

        const COL = {
            f: '#0284c7',  // blå — drivkraft F₁ (vänstra motorn)
            f2: '#0d9488', // teal — drivkraft F₂ (högra motorn)
            res: '#c8324a', // crimson — resulterande kraft F_R
            a: '#e0701a',  // orange — acceleration
            v: '#16a34a',  // grön — hastighet
            air: '#8b3a9e', // lila — luftmotstånd
            chock: '#9333ea', // lila — kraft från bromsklossen
            ink: '#0f1620',
        };

        // Luftpartiklar — fasta (deterministiska) startpositioner som strömmar
        // förbi kärran och visualiserar luften i luftmotståndsläget.
        const AIR_PARTICLES = (() => {
            let seed = 1337;
            const rnd = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; };
            return Array.from({ length: 70 }, () => ({
                x: rnd() * VBW,
                y: 60 + rnd() * 376,        // över scenluften, ovanför golvet
                spd: 0.8 + rnd() * 0.5,     // parallax-variation
                r: 1.5 + rnd() * 1.1,       // liten variation i prickstorlek
                op: 0.18 + rnd() * 0.26,
            }));
        })();

        // ── SVG-pil — mot den ljusa papperscenen behövs ingen vit
        // kontur; färgen syns gott mot vägg/golv. En tunn bläckfärgad
        // kantlinje ger ändå lite separation där pilen korsar kärran/hjulen.
        const Arrow = ({ x1, y1, x2, y2, color, width = 6, head = 18, opacity = 1 }) => {
            const ang = Math.atan2(y2 - y1, x2 - x1);
            const len = Math.hypot(x2 - x1, y2 - y1);
            if (len < 0.5) return null;
            const hw = 0.42;
            const bx = x2 - head * 0.82 * Math.cos(ang);
            const by = y2 - head * 0.82 * Math.sin(ang);
            const pL = [x2 - head * Math.cos(ang - hw), y2 - head * Math.sin(ang - hw)];
            const pR = [x2 - head * Math.cos(ang + hw), y2 - head * Math.sin(ang + hw)];
            const headPts = `${x2},${y2} ${pL[0]},${pL[1]} ${pR[0]},${pR[1]}`;
            return (
                <g opacity={opacity}>
                    <line x1={x1} y1={y1} x2={bx} y2={by} stroke={color} strokeWidth={width} strokeLinecap="round" />
                    <polygon points={headPts} fill={color} stroke="rgba(15,22,32,0.18)" strokeWidth="1" strokeLinejoin="round" />
                </g>
            );
        };

        // ── SVG-textetikett — på den ljusa papperscenen räcker den
        // mörka/mättade textfärgen för god kontrast, så ingen kontur
        // ritas som standard (en tjock vit gloria blir bara suddig på
        // ljus botten). Sätt `halo` där etiketten kan korsa rörliga
        // figurdelar (golvmarkeringar, luftpartiklar) — då ritas en
        // mycket diskret halo i scenens egen papperston bakom texten.
        const Tag = ({ x, y, color, size = 15, anchor = 'middle', weight = 700, halo = false, children }) => (
            <text x={x} y={y} textAnchor={anchor} fontSize={size} fontWeight={weight} fill={color}
                  {...(halo ? { style: { paintOrder: 'stroke' }, stroke: '#f3eee4', strokeWidth: '3', strokeLinejoin: 'round' } : {})}>
                {children}
            </text>
        );

        // ── Reglage ──────────────────────────────────────────────
        const Slider = ({ label, value, min, max, step, onChange, children }) => (
            <div className="flex items-center gap-2 mb-2">
                <span className="text-xs flex-shrink-0" style={{ minWidth: 92, color: 'var(--lab-ink-soft)' }}
                      dangerouslySetInnerHTML={{ __html: label }} />
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))}
                       className="flex-1 cursor-pointer" />
                {children}
            </div>
        );

        const FsSlider = ({ label, value, min, max, step, unit, onChange, decimals = 1 }) => (
            <div className="fs-row">
                <span className="fs-label" style={{ minWidth: 120 }} dangerouslySetInnerHTML={{ __html: label }} />
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))} />
                <span className="fs-value" style={{ minWidth: 76, textAlign: 'right' }}>
                    {fmt(value, decimals)} {unit}
                </span>
            </div>
        );

        // Kompakt glidare för verktygsrutan (label + värde på en rad, glidaren under).
        const StSlider = ({ label, value, min, max, step, onChange, display }) => (
            <div className="st-slider">
                <div className="st-slider-top">
                    <span dangerouslySetInnerHTML={{ __html: label }} />
                    <span className="v">{display}</span>
                </div>
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))} />
            </div>
        );

        // ════════════════════════════════════════════════════════
        //  SCEN
        // ════════════════════════════════════════════════════════
        const CartScene = ({ scroll, cartOff, v, massObj, f1, f2, fair, airMode, show, svgRef }) => {
            const mTot = M_CART + massObj;
            const Fres = f1 + f2 + fair;                // resulterande kraft (F₁ + F₂ + luftmotstånd)
            const forceDir = Math.sign(Fres);           // -1 vänster, 0, +1 höger
            const appliedF = Math.abs(Fres);            // resulterande kraftens storlek
            const aMag = appliedF / mTot;

            // Vagnens mitt — förskjuts (cartOff) när den drar ifrån kameran och lämnar bild.
            const cartCX = CX + cartOff;

            // objektets storlek växer med massan
            const s = 46 + (massObj - 1) * 4;
            const objTop = DECK_TOP - s;

            // hjulrotation (rullar utan att slira) — total sträcka = kameraskroll + vagnens egen förskjutning
            const wheelAng = ((scroll + cartOff) / WHEEL_R) * 180 / Math.PI;

            // golvmarkeringar som skrollar (visar rörelsen)
            const gap = 70;
            const marks = [];
            for (let i = -1; i < VBW / gap + 2; i++) {
                const x = i * gap - (((scroll % gap) + gap) % gap);
                marks.push(<rect key={'m' + i} x={x} y={FLOOR_Y + 16} width="30" height="6" rx="3" fill="#b9ad97" opacity="0.9" />);
            }

            // accelerationspilens längd (kapad så att spetsen aldrig når
            // visningsrutan uppe till höger)
            const La = Math.min(aMag * 22, 120);

            const DRIVE_X = -58;          // vänstra hjulet, rel. kärrans mitt (−DRIVE_X = höger)
            // Drivkrafterna angriper i kontaktytan mellan hjul och mark: F₁ vid
            // vänster hjul (golvlinjen), F₂ vid höger hjul men en bit längre ner så
            // att de två pilarna aldrig krockar. Resulterande kraft och acceleration
            // ritas ovanför kärran.
            const A_Y  = 150;             // acceleration (överst, centrerad etikett)
            const FR_Y = 196;             // resulterande kraft F_R
            const AIR_Y = 240;            // luftmotstånd F_luft
            const F1_Y = FLOOR_Y;         // F₁ — vänster hjuls kontaktyta mot marken
            const F2_Y = FLOOR_Y + 42;    // F₂ — höger hjul, lite längre ner

            // En enskild vågrät kraftpil. Angreppspunkten x0 är kärrans mitt om inget
            // annat anges. Längden är proportionell mot kraftens storlek (kapad för
            // mycket stora krafter). Etiketten hamnar strax TILL HÖGER om pilspetsen
            // (i pilens riktning), i nivå med pilen, så att den hör tydligt ihop med
            // sin vektor. `clearCart` håller etiketten utanför kärran/hjulen för de
            // krafter vars pilspets kan hamna under vagnen (F₁, F₂).
            const forceArrow = (fi, y, color, sub, { x0 = cartCX, labelDY = -9, clearCart = false } = {}) => {
                if (!(Math.abs(fi) > 0.05)) return null;
                const dir = Math.sign(fi);
                const L = Math.min(Math.abs(fi) * 6.5, 165);
                const tipX = x0 + dir * L;
                let labelX = tipX + dir * 14;
                if (clearCart) labelX = dir > 0 ? Math.max(labelX, cartCX + 88) : Math.min(labelX, cartCX - 88);
                return (
                    <g>
                        <Arrow x1={x0} y1={y} x2={tipX} y2={y} color={color} width={6} head={18} />
                        <circle cx={x0} cy={y} r="4.5" fill={color} stroke="#f3eee4" strokeWidth="1.5" />
                        <Tag x={labelX} y={y + labelDY} color={color} size={14} anchor={dir > 0 ? 'start' : 'end'}>
                            <tspan fontStyle="italic">F</tspan><tspan dy="3" fontSize="10">{sub}</tspan><tspan dy="-3"> = {fmt(Math.abs(fi), 1)} N</tspan>
                        </Tag>
                    </g>
                );
            };

            // En motor som driver hjulet vid sign·58 (sign −1 = vänster, +1 = höger).
            const motorG = (sign) => {
                const wx = sign * 58, px = sign * 32, boxX = sign < 0 ? -36 : 4;
                return (
                    <g>
                        <line x1={px} y1={WHEEL_CY - 5} x2={wx} y2={WHEEL_CY - 7} stroke="#2c2f35" strokeWidth="2.5" />
                        <line x1={px} y1={WHEEL_CY + 5} x2={wx} y2={WHEEL_CY + 7} stroke="#2c2f35" strokeWidth="2.5" />
                        <circle cx={wx} cy={WHEEL_CY} r="7" fill="none" stroke="#2c2f35" strokeWidth="2.5" />
                        <rect x={boxX} y={DECK_TOP + 18} width="32" height="26" rx="4" fill="#4a4f58" stroke="#23262c" strokeWidth="2" />
                        <text x={boxX + 17} y={DECK_TOP + 35} textAnchor="middle" fontSize="11" fontWeight="700"
                              fill="#e9edf3" fontFamily="'DM Sans', sans-serif">M</text>
                        <g transform={`translate(${px}, ${WHEEL_CY}) rotate(${wheelAng * WHEEL_R / 5})`}>
                            <circle r="5" fill="#c8ccd4" stroke="#23262c" strokeWidth="1.5" />
                            <line x1="0" y1="0" x2="0" y2="-3.2" stroke="#5b606a" strokeWidth="1.6" />
                        </g>
                    </g>
                );
            };

            // Hastighetsvektor — startar vid lådans KANT i rörelseriktningen (inte
            // i mitten) och växer med farten. Etiketten hamnar bortom pilspetsen.
            const velocityArrow = () => {
                if (!(Math.abs(v) > 0.05)) return null;
                const dir = Math.sign(v);
                const yc = objTop + s / 2;            // lådans vertikala mitt
                const x0 = cartCX + dir * (s / 2);    // lådans kant i rörelseriktningen
                const Lv = Math.max(14, Math.min(Math.abs(v) * 4.5, 140));
                const labelX = x0 + dir * (Lv + 10);
                return (
                    <g>
                        <Arrow x1={x0} y1={yc} x2={x0 + dir * Lv} y2={yc} color={COL.v} width={6} head={18} />
                        <Tag x={labelX} y={yc - 11} color={COL.v} size={14} anchor={dir > 0 ? 'start' : 'end'}>
                            <tspan fontStyle="italic">v</tspan> = {fmt(Math.abs(v), 1)} m/s
                        </Tag>
                    </g>
                );
            };

            // Träffeffekter ("smatter") — visas ENDAST när en faktiskt utritad
            // luftpartikel når kärrans frontyta, och ritas PÅ ytan: lådans kant,
            // flakets kant eller hjulets rundning. En träff upptäcks när
            // partikelns x just passerat frontprofilen vid dess y, och tonar ut
            // medan partikeln fortsätter in bakom kärran. Allt är deterministiska
            // funktioner av scroll → träfftakten växer naturligt med farten.
            const speedAbs = Math.abs(v);
            const cartDir = Math.sign(v) || 1;
            const crateHalf = s / 2;
            const HIT_DEPTH = 24;   // px bakom ytan som träffen syns (uttoning)
            // Frontprofil vid höjden yy: halvbredd från kärrans mitt + ytnormal.
            // null = ingen yta på den höjden (partikeln passerar fritt).
            const frontProfileAt = (yy) => {
                if (yy >= objTop && yy <= DECK_TOP)
                    return { hw: crateHalf, nx: cartDir, ny: 0 };       // lådans kant
                if (yy > DECK_TOP && yy <= DECK_TOP + 16)
                    return { hw: 96, nx: cartDir, ny: 0 };              // flakets kant
                const dy = yy - WHEEL_CY;
                if (Math.abs(dy) <= WHEEL_R) {                          // hjulets rundning
                    const w = Math.sqrt(WHEEL_R * WHEEL_R - dy * dy);
                    return { hw: 58 + w, nx: cartDir * (w / WHEEL_R), ny: dy / WHEEL_R };
                }
                return null;
            };
            const hits = [];
            if (airMode && show.airParticles && speedAbs > 0.4) {
                AIR_PARTICLES.forEach((p, i) => {
                    const prof = frontProfileAt(p.y);
                    if (!prof) return;
                    const x = (((p.x - scroll * p.spd) % VBW) + VBW) % VBW;
                    const xSurf = cartCX + cartDir * prof.hw;
                    const depth = cartDir * (xSurf - x);   // >0 = partikeln har passerat ytan
                    if (depth <= 0 || depth > HIT_DEPTH) return;
                    hits.push({ x: xSurf, y: p.y, nx: prof.nx, ny: prof.ny,
                                op: 1 - depth / HIT_DEPTH, key: i });
                });
            }

            return (
                <svg ref={svgRef} viewBox={`0 0 ${VBW} ${VBH}`} preserveAspectRatio="xMidYMid slice"
                     style={{ fontFamily: "'DM Sans', sans-serif" }}>
                    <defs>
                        <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor="#f7f2e8" />
                            <stop offset="100%" stopColor="#ece3d2" />
                        </linearGradient>
                        <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor="#d9cfb9" />
                            <stop offset="100%" stopColor="#cabfa6" />
                        </linearGradient>
                        <linearGradient id="deck" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor="#9aa0a9" />
                            <stop offset="100%" stopColor="#767c86" />
                        </linearGradient>
                        <linearGradient id="crate" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor="#d2a25c" />
                            <stop offset="100%" stopColor="#b9863f" />
                        </linearGradient>
                    </defs>

                    {/* bakgrund: vägg + golv */}
                    <rect x="0" y="0" width={VBW} height={VBH} fill="url(#wall)" />
                    <rect x="0" y={FLOOR_Y} width={VBW} height={VBH - FLOOR_Y} fill="url(#floor)" />
                    <rect x="0" y={FLOOR_Y} width={VBW} height="3" fill="#a89c84" />
                    {marks}

                    {/* luftpartiklar — prickar som driver baklänges relativt kärran */}
                    {airMode && show.airParticles && (
                        <g>
                            {AIR_PARTICLES.map((p, i) => {
                                const x = (((p.x - scroll * p.spd) % VBW) + VBW) % VBW;
                                return <circle key={'air' + i} cx={x} cy={p.y} r={p.r} fill="#6b7280" opacity={p.op} />;
                            })}
                        </g>
                    )}

                    {/* Resulterande kraft — utskriven ovanför vagnen */}
                    <Tag x={cartCX} y={72} color={COL.ink} size={19}>
                        <tspan fontStyle="italic">F</tspan><tspan dy="4" fontSize="13">R</tspan><tspan dy="-4"> = {fmt(appliedF, 1)} N</tspan>
                    </Tag>

                    {/* ── KÄRRAN (golvet skrollar; vid hög fart drar vagnen ifrån via cartOff) ── */}
                    <g transform={`translate(${cartCX}, 0)`}>
                        {/* skugga */}
                        <ellipse cx="0" cy={FLOOR_Y + 6} rx="120" ry="9" fill="rgba(15,22,32,0.16)" />

                        {/* objektet på flaket */}
                        <g>
                            <rect x={-s / 2} y={objTop} width={s} height={s} rx="5"
                                  fill="url(#crate)" stroke="#8a5f24" strokeWidth="2.5" />
                            <line x1={-s / 2 + 4} y1={objTop + 7} x2={s / 2 - 4} y2={objTop + 7}
                                  stroke="#8a5f24" strokeWidth="1.5" opacity="0.5" />
                            <Tag x="0" y={objTop + s / 2 + 6} color="#3a2a10" size={s > 60 ? 17 : 14}>
                                <tspan fontStyle="italic">m</tspan> = {fmt(massObj, 1)} kg
                            </Tag>
                        </g>

                        {/* flak */}
                        <rect x="-96" y={DECK_TOP} width="192" height="16" rx="4" fill="url(#deck)" stroke="#5b606a" strokeWidth="2" />
                        <rect x="-96" y={DECK_TOP} width="192" height="5" rx="2" fill="#aeb4bd" opacity="0.7" />
                        {/* flak-kanter (liten list så objektet "ligger" på kärran) */}
                        <rect x="-96" y={DECK_TOP - 6} width="6" height="8" rx="2" fill="#6b7079" />
                        <rect x="90" y={DECK_TOP - 6} width="6" height="8" rx="2" fill="#6b7079" />

                        {/* hjul */}
                        {[DRIVE_X, -DRIVE_X].map((wx) => (
                            <g key={'w' + wx} transform={`translate(${wx}, ${WHEEL_CY})`}>
                                <circle r={WHEEL_R} fill="#1b1e24" stroke="#0d0f12" strokeWidth="3" />
                                <circle r={WHEEL_R - 4} fill="none" stroke="#2c313a" strokeWidth="3" />
                                <g transform={`rotate(${wheelAng})`}>
                                    <circle r="8" fill="#c8ccd4" />
                                    <circle r="3" fill="#7b8290" />
                                    {[0, 60, 120, 180, 240, 300].map((ang) => (
                                        <rect key={ang} x="-1.8" y="-8" width="3.6" height="7" rx="1.4"
                                              fill="#9aa1ad" transform={`rotate(${ang})`} />
                                    ))}
                                </g>
                            </g>
                        ))}

                        {/* två motorer under flaket — en driver vänstra hjulet (F₁),
                            en driver högra hjulet (F₂), var och en via rem till navet */}
                        {motorG(-1)}
                        {motorG(1)}
                    </g>

                    {/* ── KRAFTER ── F₁ vid vänster hjuls kontaktyta, F₂ vid höger
                        hjul en bit längre ner, F_luft ovanför kärran ── */}
                    {show.forces && (
                        <g>
                            {forceArrow(f1, F1_Y, COL.f, '1', { x0: cartCX + DRIVE_X, labelDY: 4, clearCart: true })}
                            {forceArrow(f2, F2_Y, COL.f2, '2', { x0: cartCX - DRIVE_X, labelDY: 4, clearCart: true })}
                            {airMode && forceArrow(fair, AIR_Y, COL.air, 'luft')}
                        </g>
                    )}

                    {/* ── RESULTERANDE KRAFT F_R (summan av krafterna) ── */}
                    {show.resultant && forceArrow(Fres, FR_Y, COL.res, 'R')}

                    {/* ── ACCELERATION ── */}
                    {show.accel && (
                        aMag > 0.001 ? (
                            <g>
                                <Arrow x1={cartCX} y1={A_Y} x2={cartCX + forceDir * La} y2={A_Y} color={COL.a} width={6} head={18} />
                                <Tag x={cartCX + forceDir * (La / 2)} y={A_Y - 14} color={COL.a} size={15}>
                                    <tspan fontStyle="italic">a</tspan> = {fmt(aMag)} m/s²
                                </Tag>
                            </g>
                        ) : (
                            <Tag x={cartCX} y={A_Y} color="var(--lab-ink-muted)" size={14}>
                                <tspan fontStyle="italic">a</tspan> = 0 ⟺ konstant fart (eller i vila)
                            </Tag>
                        )
                    )}

                    {/* hastighetsvektor från lådans kant */}
                    {show.velocity && velocityArrow()}

                    {/* träffeffekter PÅ kärrans frontyta — en per faktisk partikelträff.
                        Sprayen riktas längs ytnormalen (utåt från hjulets rundning,
                        horisontellt från låd-/flakkant). */}
                    {hits.length > 0 && (
                        <g>
                            {hits.map((h) => {
                                const tx = -h.ny, ty = h.nx;   // tangentriktning (⊥ normalen)
                                return (
                                    <g key={'hit' + h.key} opacity={h.op}>
                                        {[-1, -0.4, 0.4, 1].map((a, j) => (
                                            <line key={j} x1={h.x} y1={h.y}
                                                  x2={h.x + h.nx * 3 + tx * a * 6}
                                                  y2={h.y + h.ny * 3 + ty * a * 6}
                                                  stroke="#5a6370" strokeWidth="1.5" strokeLinecap="round" />
                                        ))}
                                        <circle cx={h.x} cy={h.y} r={1.4 + 1.6 * h.op} fill="#5a6370" />
                                    </g>
                                );
                            })}
                        </g>
                    )}
                </svg>
            );
        };

        // ── Formelkort: F_R = m · a  ⟺  a = F_R / m = värden = resultat ──
        // Mönster enligt CLAUDE.md (densiteten är referens): varje variabel får
        // sitt NAMN som etikett över symbolen. F_R = den RESULTERANDE kraften.
        // ALLT ligger på EN items-center-rad så att operatorer (=, ·, ⟺), bråk
        // och variabler hamnar på samma mittlinje (ingen del högre/lägre).
        // Variabel med ord-etikett ovanför. En osynlig spacer-etikett UNDER
        // symbolen (lika hög som etiketten) centrerar själva symbolen i rutan,
        // så att den linjerar med bråkens mittlinje på items-center-raden.
        const Vbl = ({ label, children }) => (
            <div className="flex flex-col items-center" style={{ lineHeight: 1.1 }}>
                <span className="flbl">{label}</span>
                <span className="fnum">{children}</span>
                <span className="flbl" aria-hidden="true" style={{ visibility: 'hidden' }}>{label}</span>
            </div>
        );
        // Bråk med rakt divisionsstreck (täljare över nämnare).
        const Frac = ({ top, bottom, size = 19 }) => (
            <div className="flex flex-col items-center" style={{ lineHeight: 1.15, fontSize: size }}>
                <span style={{ padding: '0 8px 3px' }}>{top}</span>
                <span style={{ padding: '3px 8px 0', borderTop: '2px solid currentColor', alignSelf: 'stretch', textAlign: 'center' }}>{bottom}</span>
            </div>
        );
        const FormulaCard = ({ Fres, m, a }) => (
            <div className="glass-card rounded-xl p-4 mb-6 flex flex-wrap items-center gap-x-3 gap-y-3" style={{ color: 'var(--lab-ink)' }}>
                <Vbl label="Resulterande kraft"><em>F</em><sub>R</sub></Vbl>
                <span className="fnum">=</span>
                <Vbl label="Massa"><em>m</em></Vbl>
                <span className="fnum">·</span>
                <Vbl label="Acceleration"><em>a</em></Vbl>
                <span className="fnum" style={{ margin: '0 4px' }}>⟺</span>
                <span className="fnum"><em>a</em> =</span>
                <Frac top={<span><em>F</em><sub>R</sub></span>} bottom={<em>m</em>} />
                <span className="fnum">=</span>
                <Frac top={`${fmt(Fres, 1)} N`} bottom={`${fmt(m, 1)} kg`} size={15} />
                <span className="fnum">=</span>
                <span className="fnum">{fmt(a)} m/s²</span>
            </div>
        );

        // ── Huvudapp ─────────────────────────────────────────────
        const App = () => {
            const [massObj, setMassObj] = useState(3);     // objektets massa (kg)
            const [force1, setForce1] = useState(0);       // drivkraft F₁ (vänster motor), signerad −20 … +20 N
            const [force2, setForce2] = useState(0);       // drivkraft F₂ (höger motor), signerad −20 … +20 N
            const [airMode, setAirMode] = useState(false); // false = idealt, true = med luftmotstånd
            const [running, setRunning] = useState(true);
            const [v, setV] = useState(0);
            const [scroll, setScroll] = useState(0);
            const [cartOff, setCartOff] = useState(0);     // vagnens offset när den drar ifrån kameran
            const [show, setShow] = useState({ forces: true, resultant: true, accel: true, velocity: true, airParticles: true });

            const [isFullscreen, setIsFullscreen] = useState(false);
            const sceneWrapRef = useRef(null);
            const svgRef = useRef(null);
            const rafRef = useRef(null);
            const lastRef = useRef(null);
            const vRef = useRef(0);
            const cartOffRef = useRef(0);

            const mTot = M_CART + massObj;
            const Fapplied = force1 + force2;                   // summan av de pålagda drivkrafterna
            const Fair = airMode ? -DRAG_K * v : 0;             // luftmotstånd, motriktat farten
            const Fres = Fapplied + Fair;                       // resulterande kraft (signerad)
            const forceDir = Math.sign(Fres);                   // -1 vänster, 0, +1 höger
            const appliedF = Math.abs(Fres);                    // resulterande kraftens storlek
            const aMag = appliedF / mTot;

            // animationsloop — kraften driver rörelsen direkt (a → v → golvskroll)
            useEffect(() => {
                if (!running) { lastRef.current = null; return; }
                const step = (ts) => {
                    if (lastRef.current == null) lastRef.current = ts;
                    const dt = Math.min((ts - lastRef.current) / 1000, 0.05);
                    lastRef.current = ts;
                    const drag = airMode ? -DRAG_K * vRef.current : 0;
                    const a = (force1 + force2 + drag) / (M_CART + massObj);
                    let nv = vRef.current + a * dt;
                    if (nv > 999) nv = 999;
                    if (nv < -999) nv = -999;   // säkerhetsgräns mot orimliga tal
                    vRef.current = nv;
                    setV(nv);
                    // Kameran följer vagnen upp till sin pan-gräns (VMAX). Går vagnen
                    // fortare drar den ifrån (cartOff växer) och försvinner ur bild —
                    // farten fortsätter öka. Naturligt slut när vagnen är helt ute.
                    const camV = Math.max(-VMAX, Math.min(VMAX, nv));
                    setScroll((sc) => sc + camV * PXPM * dt);
                    cartOffRef.current += (nv - camV) * PXPM * dt;
                    setCartOff(cartOffRef.current);
                    if (Math.abs(cartOffRef.current) > VBW / 2 + 160) {
                        setRunning(false);
                        return;
                    }
                    rafRef.current = requestAnimationFrame(step);
                };
                rafRef.current = requestAnimationFrame(step);
                return () => cancelAnimationFrame(rafRef.current);
            }, [running, force1, force2, massObj, airMode]);

            // fullskärm
            useEffect(() => {
                const handler = () => setIsFullscreen(
                    document.fullscreenElement === sceneWrapRef.current ||
                    document.webkitFullscreenElement === sceneWrapRef.current
                );
                document.addEventListener('fullscreenchange', handler);
                document.addEventListener('webkitfullscreenchange', handler);
                return () => {
                    document.removeEventListener('fullscreenchange', handler);
                    document.removeEventListener('webkitfullscreenchange', handler);
                };
            }, []);
            const toggleFullscreen = () => {
                const el = sceneWrapRef.current;
                if (!el) return;
                if (document.fullscreenElement || document.webkitFullscreenElement)
                    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
                else (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
            };

            const tShow = (k) => setShow((sh) => ({ ...sh, [k]: !sh[k] }));
            // Nollställ enbart rörelsen (kärran tillbaka i vila i bildens mitt).
            const resetMotion = () => { vRef.current = 0; setV(0); setScroll(0); cartOffRef.current = 0; setCartOff(0); setRunning(true); };
            // Börja om: nollställ rörelsen OCH båda kraftreglagen (F₁ = F₂ = 0).
            const reset = () => { resetMotion(); setForce1(0); setForce2(0); };
            // Byt läge (utan/med luftmotstånd) och starta om rörelsen från vila
            // så att jämförelsen blir ren. Kraftreglaget behålls.
            const switchMode = (air) => { if (air === airMode) return; setAirMode(air); resetMotion(); };

            // Primärknapp: pausar/fortsätter rörelsen (kraften driver den direkt).
            const primaryLabel = running ? '⏸ Pausa' : '▶ Fortsätt';
            const primaryAction = () => setRunning((r) => !r);

            // Visningsval (kryssrutor) uppe till höger — i BÅDE normalt läge och
            // fullskärm. Anropas som funktion {sceneToggles()} (inte <SceneToggles/>)
            // så att noderna inte monteras om varje bildruta (≈60 fps).
            const sceneToggles = () => (
                <div className="scene-toggles">
                    <div className="st-title">Visa</div>
                    <label>
                        <input type="checkbox" checked={show.forces} onChange={() => tShow('forces')} />
                        <span>Visa krafter</span>
                    </label>
                    <label>
                        <input type="checkbox" checked={show.resultant} onChange={() => tShow('resultant')} />
                        <span>Visa resulterande kraft</span>
                    </label>
                    <label>
                        <input type="checkbox" checked={show.accel} onChange={() => tShow('accel')} />
                        <span>Visa acceleration</span>
                    </label>
                    <label>
                        <input type="checkbox" checked={show.velocity} onChange={() => tShow('velocity')} />
                        <span>Visa hastighet</span>
                    </label>
                    {airMode && (
                        <label>
                            <input type="checkbox" checked={show.airParticles} onChange={() => tShow('airParticles')} />
                            <span>Visa luftpartiklar</span>
                        </label>
                    )}
                    {/* I fullskärm bor glidarna i verktygsrutan (sidopanelen syns inte då). */}
                    {isFullscreen && (
                        <React.Fragment>
                            <div className="st-title mt">Reglage</div>
                            <StSlider label="Objektets massa" value={massObj} min={1} max={10} step={0.5}
                                      onChange={setMassObj} display={`${fmt(massObj, 1)} kg`} />
                            <StSlider label="Drivkraft <em>F</em>&#8321;" value={force1} min={-20} max={20} step={1}
                                      onChange={setForce1}
                                      display={force1 === 0 ? '0 N' : (force1 < 0 ? '◀ ' : '▶ ') + fmt(Math.abs(force1), 1) + ' N'} />
                            <StSlider label="Drivkraft <em>F</em>&#8322;" value={force2} min={-20} max={20} step={1}
                                      onChange={setForce2}
                                      display={force2 === 0 ? '0 N' : (force2 < 0 ? '◀ ' : '▶ ') + fmt(Math.abs(force2), 1) + ' N'} />
                            <div className="st-actions">
                                <button className="btn-toggle" onClick={primaryAction}>{primaryLabel}</button>
                                <button className="btn-toggle" onClick={reset}>↻ Börja om</button>
                            </div>
                        </React.Fragment>
                    )}
                </div>
            );

            return (
                <div className="min-h-screen dark-container px-4 md:px-8 pb-12" style={{ fontFamily: "'DM Sans', sans-serif" }}>
                    <div className="max-w-6xl mx-auto pt-6">
                        <div className="breadcrumb mb-4" style={{ fontSize: 13 }}>
                            <a href="index.html">Hem</a> / <a href="katalog.html#fy1">Fysik nivå 1</a> / Newtons andra lag
                        </div>
                        <div className="flex flex-wrap items-start justify-between gap-4">
                            <h1 className="text-3xl md:text-4xl font-black tracking-tight" style={{ color: 'var(--lab-ink)' }}>Newtons andra lag</h1>
                            <div className="p-1 flex gap-1 flex-shrink-0"
                                 style={{ background: 'var(--lab-bg, #f3eee4)', border: '1px solid var(--lab-line-strong, rgba(15,22,32,0.28))', borderRadius: '6px' }}>
                                <button onClick={() => switchMode(false)}
                                        className={`tab-button px-4 py-2 rounded text-sm font-semibold border ${!airMode ? 'active-explore' : ''}`}>
                                    Utan luftmotstånd
                                </button>
                                <button onClick={() => switchMode(true)}
                                        className={`tab-button px-4 py-2 rounded text-sm font-semibold border ${airMode ? 'active-buoyancy' : ''}`}>
                                    Med luftmotstånd
                                </button>
                            </div>
                        </div>
                        <p className="mt-2 mb-5" style={{ color: 'var(--lab-ink-soft)', maxWidth: 820 }}>
                            En <strong>kraft</strong> ger en kropp en <strong>acceleration</strong> i kraftens riktning. Ju större
                            massa, desto trögare är kroppen att sätta i rörelse. Kärran drivs av <strong>två motorer</strong> — en
                            på vänster hjul (drivkraft <em>F</em><sub>1</sub>) och en på höger hjul (drivkraft <em>F</em><sub>2</sub>).
                            Ställ in varje kraft åt vänster eller höger och se hur de <strong>adderas</strong> (eller tar ut varandra)
                            till en <strong>resulterande kraft</strong> <em>F</em><sub>R</sub> som bestämmer accelerationen och farten.
                            {airMode
                                ? <span> I läget <strong>med luftmotstånd</strong> tillkommer en bromsande kraft <em>F</em><sub>luft</sub> som
                                    växer med farten — till slut tar den ut den pålagda kraften och kärran håller <strong>konstant fart</strong>.</span>
                                : <span> Slå på <strong>luftmotstånd</strong> för att se hur farten i stället planar ut mot en terminalfart.</span>}
                        </p>

                        <FormulaCard Fres={Fres} m={mTot} a={aMag} />

                        <main className="flex flex-col lg:flex-row gap-6">
                            {/* Scen */}
                            <div className="lg:w-3/5 order-1">
                                <div className="scene-wrap" data-theme="ljusPapper" ref={sceneWrapRef}>
                                    <CartScene scroll={scroll} cartOff={cartOff} v={v} massObj={massObj}
                                               f1={force1} f2={force2} fair={Fair} airMode={airMode}
                                               show={show} svgRef={svgRef} />

                                    <div className="scene-hint">
                                        {airMode ? 'Luftmotståndet ökar med farten. Friktion försummas.' : 'Luftmotstånd och friktionskrafter försummas.'}
                                    </div>

                                    {/* Visningsval + glidare uppe till höger (glidarna bara i fullskärm) */}
                                    {sceneToggles()}

                                    <button className="fs-btn" onClick={toggleFullscreen} aria-label="Fullskärm"
                                            title={isFullscreen ? 'Lämna fullskärm' : 'Fullskärm'}>
                                        {isFullscreen ? (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M9 3v6H3" /><path d="M15 21v-6h6" /><path d="M21 9h-6V3" /><path d="M3 15h6v6" />
                                            </svg>
                                        ) : (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M3 9V3h6" /><path d="M21 9V3h-6" /><path d="M3 15v6h6" /><path d="M21 15v6h-6" />
                                            </svg>
                                        )}
                                    </button>
                                </div>
                            </div>

                            {/* Kontroller */}
                            <div className="lg:w-2/5 order-2">
                                {/* Reglage */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <Slider label="Objektets massa <em>m</em>" value={massObj} min={1} max={10} step={0.5} onChange={setMassObj}>
                                        <span className="font-mono font-semibold text-sm flex-shrink-0"
                                              style={{ minWidth: 64, textAlign: 'right', color: 'var(--lab-accent)' }}>
                                            {fmt(massObj, 1)} kg
                                        </span>
                                    </Slider>
                                    <Slider label="Drivkraft <em>F</em>&#8321; (◀ vänster / höger ▶)" value={force1} min={-20} max={20} step={1} onChange={setForce1}>
                                        <span className="font-mono font-semibold text-sm flex-shrink-0"
                                              style={{ minWidth: 70, textAlign: 'right', color: COL.f }}>
                                            {force1 === 0 ? '0 N' : (force1 < 0 ? '◀ ' : '▶ ') + fmt(Math.abs(force1), 1) + ' N'}
                                        </span>
                                    </Slider>
                                    <Slider label="Drivkraft <em>F</em>&#8322; (◀ vänster / höger ▶)" value={force2} min={-20} max={20} step={1} onChange={setForce2}>
                                        <span className="font-mono font-semibold text-sm flex-shrink-0"
                                              style={{ minWidth: 70, textAlign: 'right', color: COL.f2 }}>
                                            {force2 === 0 ? '0 N' : (force2 < 0 ? '◀ ' : '▶ ') + fmt(Math.abs(force2), 1) + ' N'}
                                        </span>
                                    </Slider>
                                </div>

                                {/* Styrning */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <div className="flbl mb-2">Styrning</div>
                                    <div className="flex gap-2">
                                        <button className="btn-toggle flex-1" onClick={primaryAction}>{primaryLabel}</button>
                                        <button className="btn-toggle flex-1" onClick={reset}>↻ Börja om</button>
                                    </div>
                                </div>

                                {/* Avläsning */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <div className="flbl mb-2">Avläsning</div>
                                    <div className="text-center text-sm mb-3 pb-3"
                                         style={{ borderBottom: '1px solid var(--lab-line)', color: 'var(--lab-ink-soft)' }}>
                                        <em>F</em><sub>R</sub> = <em>F</em><sub>1</sub> + <em>F</em><sub>2</sub>
                                        {airMode && <span> + <em>F</em><sub>luft</sub></span>} ={' '}
                                        <span style={{ color: COL.f, fontWeight: 600 }}>{fmtTerm(force1)}</span>
                                        {' + '}<span style={{ color: COL.f2, fontWeight: 600 }}>{fmtTerm(force2)}</span>
                                        {airMode && <span> + <span style={{ color: COL.air, fontWeight: 600 }}>{fmtTerm(Fair)}</span></span>} ={' '}
                                        <strong style={{ color: 'var(--lab-ink)' }}>{fmt(Fres, 1)} N</strong>
                                    </div>
                                    <div className="grid grid-cols-3 gap-2 text-center">
                                        <div>
                                            <div style={{ color: COL.f, fontWeight: 700, fontSize: 18 }}>{fmt(Fres, 1)} N</div>
                                            <div className="text-xs" style={{ color: 'var(--lab-ink-muted)' }}>resulterande <em>F</em><sub>R</sub></div>
                                        </div>
                                        <div>
                                            <div style={{ color: COL.a, fontWeight: 700, fontSize: 18 }}>{fmt(aMag)} m/s²</div>
                                            <div className="text-xs" style={{ color: 'var(--lab-ink-muted)' }}>accel. <em>a</em></div>
                                        </div>
                                        <div>
                                            <div style={{ color: 'var(--lab-ink)', fontWeight: 700, fontSize: 18 }}>{fmt(Math.abs(v))} m/s</div>
                                            <div className="text-xs" style={{ color: 'var(--lab-ink-muted)' }}>fart <em>v</em></div>
                                        </div>
                                    </div>
                                </div>

                                {/* Info */}
                                <div className="glass-card rounded-xl p-4">
                                    <h3 className="font-bold text-sm mb-2" style={{ color: 'var(--lab-ink)' }}>
                                        Så hänger det ihop
                                    </h3>
                                    {airMode ? (
                                        <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                            Luftmotståndet <em>F</em><sub>luft</sub> = <em>k</em> · <em>v</em> växer med farten och är
                                            riktat mot rörelsen. Allteftersom farten ökar minskar den resulterande kraften, tills
                                            luftmotståndet precis tar ut den pålagda kraften (<em>F</em><sub>R</sub> = 0). Då är
                                            accelerationen noll och kärran håller en <em>konstant</em> <strong>terminalfart</strong>.
                                        </p>
                                    ) : (
                                        <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                            Accelerationen är konstant så länge kraften ligger på — farten ökar då jämnt. Tar du
                                            bort kraften (<em>F</em><sub>R</sub> = 0) blir accelerationen noll och kärran rullar vidare med
                                            <em> konstant</em> fart (Newtons första lag). Lägg kraften åt motsatt håll mot rörelsen
                                            för att bromsa.
                                        </p>
                                    )}
                                    <p className="text-sm mt-2 pt-2" style={{ color: 'var(--lab-ink-soft)', borderTop: '1px solid var(--lab-line)' }}>
                                        {airMode
                                            ? <span>💡 Proportionalitetskonstanten är <em>k</em> = 0,8 N per m/s. Vid 25 m/s ger
                                                luftmotståndet 20 N — lika med den största drivkraften. Friktion försummas.</span>
                                            : <span>💡 Luftmotstånd och friktionskrafter försummas, så drivkraften är den enda
                                                horisontella kraften på systemet (kärra + objekt).</span>}
                                    </p>
                                </div>
                            </div>
                        </main>

                        {/* Pedagogiska sektioner */}
                        <div className="grid md:grid-cols-3 gap-4 mt-6">
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>⚖️ Kraft och massa</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Dubbelt så stor kraft ger dubbelt så stor acceleration. Dubbelt så stor massa ger
                                    hälften så stor acceleration. Sambandet är <em>a</em> = <em>F</em><sub>R</sub> / <em>m</em>,
                                    där <em>F</em><sub>R</sub> är den resulterande kraften.
                                </p>
                            </div>
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>➡️ Riktning</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Accelerationen pekar alltid åt samma håll som den resulterande kraften. Pekar kraften
                                    mot rörelsen bromsas kroppen in, byter riktning och accelererar åt andra hållet.
                                </p>
                            </div>
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>🧭 Enheten newton</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    1 N är den kraft som ger massan 1 kg accelerationen 1 m/s². Alltså
                                    1 N = 1 kg·m/s² — det följer direkt ur <em>F</em><sub>R</sub> = <em>m</em> · <em>a</em>.
                                </p>
                            </div>
                        </div>

                        <details className="glass-card rounded-xl p-4 mt-4">
                            <summary className="accordion-head" style={{ color: 'var(--lab-ink)' }}>
                                <span>⚠️ Vanliga missuppfattningar</span><span style={{ color: 'var(--lab-ink-muted)' }}>▾</span>
                            </summary>
                            <ul className="mt-3 space-y-2 text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                <li><strong>”Kraft ger fart.”</strong> Nej — en kraft ger <em>acceleration</em>, alltså en
                                    <em> ändring</em> av farten. En konstant kraft ger ständigt ökande fart, inte en konstant fart.</li>
                                <li><strong>”Ingen kraft betyder att kroppen stannar.”</strong> Nej — utan resulterande kraft
                                    fortsätter kroppen med konstant fart (Newtons första lag). Här rullar kärran vidare när du tar bort kraften.</li>
                                <li><strong>”Tunga föremål accelererar lika lätt som lätta.”</strong> Nej — vid samma kraft får
                                    det tyngre föremålet mindre acceleration, eftersom <em>a</em> = <em>F</em><sub>R</sub> / <em>m</em>.</li>
                            </ul>
                        </details>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <script src="feedback.js" defer></script>
    <script src="data/katalog.js"></script>
    <script src="section-nav.js"></script>
</body>
</html>
