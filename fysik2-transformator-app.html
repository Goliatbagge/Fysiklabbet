    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // ── Glidarintervall ──
        const U1MIN = 5, U1MAX = 400;          // primärspänning U1 (V)
        const NMIN = 50, NMAX = 1500;          // varvtal N1, N2
        const RMIN = 10, RMAX = 500;           // lampans resistans (ohm)

        const VBW = 820, VBH = 540;

        const fmt = (num, decimals = 1) => {
            if (!isFinite(num)) return '–';
            const s = num.toFixed(decimals);
            if (parseFloat(s) === 0) return '0';
            return s.replace('.', ',').replace('-', '−');
        };
        // heltal med hårt mellanslag som tusentalsavgränsare (1 150)
        const fmtN = (n) => {
            const s = Math.round(n).toString();
            return s.replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        };
        const fmtU = (U) => {
            if (U >= 1000) return `${fmt(U / 1000, U < 10000 ? 2 : 1)} kV`;
            return `${fmt(U, U >= 100 ? 0 : 1)} V`;
        };
        const fmtI = (I) => {
            if (I >= 1) return `${fmt(I, 2)} A`;
            const m = I * 1e3; return `${fmt(m, m < 10 ? 1 : 0)} mA`;
        };
        const fmtP = (P) => {
            if (P >= 1000) return `${fmt(P / 1000, 2)} kW`;
            if (P >= 1) return `${fmt(P, 1)} W`;
            const m = P * 1e3; return `${fmt(m, m < 10 ? 1 : 0)} mW`;
        };

        const COL = {
            ink:   '#1f2530',
            flux:  '#2563c9',    // magnetiska flödet (blått, som teorifiguren)
            spole: '#c87f3a',    // spolarna (koppar, som teorifiguren)
            karna: '#d7dbe0',    // järnkärnan
            u2:    '#c8324a',    // sekundärkurvan i grafen (accent)
        };

        // Position längs en polylinje vid båglängden s (för AC-punkterna)
        const pathPos = (pts, s) => {
            let acc = 0;
            for (let i = 1; i < pts.length; i++) {
                const dx = pts[i][0] - pts[i - 1][0], dy = pts[i][1] - pts[i - 1][1];
                const seg = Math.hypot(dx, dy);
                if (s <= acc + seg) {
                    const f = (s - acc) / seg;
                    return [pts[i - 1][0] + f * dx, pts[i - 1][1] + f * dy];
                }
                acc += seg;
            }
            return pts[pts.length - 1];
        };
        const pathLen = (pts) => {
            let acc = 0;
            for (let i = 1; i < pts.length; i++)
                acc += Math.hypot(pts[i][0] - pts[i - 1][0], pts[i][1] - pts[i - 1][1]);
            return acc;
        };

        const Slider = ({ label, sub, value, min, max, step, onChange, valueText }) => (
            <div className="mb-3">
                <div className="flex justify-between items-baseline mb-1">
                    <label className="text-sm font-bold" style={{ color: 'var(--lab-ink)' }}
                           dangerouslySetInnerHTML={{ __html: label }} />
                    <div className="font-mono font-semibold text-sm" style={{ color: 'var(--lab-accent)' }}>{valueText}</div>
                </div>
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))}
                       className="w-full cursor-pointer" />
                {sub && <div className="text-xs mt-1" style={{ color: 'var(--lab-ink-muted)' }}
                             dangerouslySetInnerHTML={{ __html: sub }} />}
            </div>
        );

        const FsSlider = ({ label, value, min, max, step, onChange, valueText }) => (
            <div className="fs-row">
                <span className="fs-label" style={{ minWidth: 170 }} dangerouslySetInnerHTML={{ __html: label }} />
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))} />
                <span className="fs-value" style={{ minWidth: 90, textAlign: 'right' }}>{valueText}</span>
            </div>
        );

        // Bråk med vågrätt divisionsstreck (aldrig snedstreck)
        const Frac = ({ top, bot, size = 19 }) => (
            <div className="flex flex-col items-center" style={{ lineHeight: 1.15 }}>
                <span style={{ color: 'var(--lab-ink)', fontSize: size, padding: '0 7px' }}>{top}</span>
                <span style={{ alignSelf: 'stretch', borderTop: '2px solid currentColor' }} />
                <span style={{ color: 'var(--lab-ink)', fontSize: size, padding: '0 7px' }}>{bot}</span>
            </div>
        );
        // Bråk med ord-etikett över täljaren och under nämnaren
        const LFrac = ({ topLbl, top, botLbl, bot }) => (
            <div className="flex flex-col items-center" style={{ lineHeight: 1.15 }}>
                <span className="flbl">{topLbl}</span>
                <span className="fnum" style={{ padding: '0 7px' }}>{top}</span>
                <span style={{ alignSelf: 'stretch', borderTop: '2px solid currentColor', color: 'var(--lab-ink)' }} />
                <span className="fnum" style={{ padding: '0 7px' }}>{bot}</span>
                <span className="flbl">{botLbl}</span>
            </div>
        );

        const FormulaCard = () => (
            <div className="glass-card rounded-xl p-4 mb-6 flex flex-wrap items-center gap-x-8 gap-y-3" style={{ color: 'var(--lab-ink)' }}>
                <div className="flex items-center gap-x-3">
                    <LFrac topLbl="Varv i primärspolen" top={<span><em>N</em>₁</span>}
                           botLbl="Varv i sekundärspolen" bot={<span><em>N</em>₂</span>} />
                    <span className="fnum">=</span>
                    <LFrac topLbl="Spänning primär" top={<span><em>U</em>₁</span>}
                           botLbl="Spänning sekundär" bot={<span><em>U</em>₂</span>} />
                </div>
                <div className="flex items-center gap-x-3">
                    <LFrac topLbl="Varv i primärspolen" top={<span><em>N</em>₁</span>}
                           botLbl="Varv i sekundärspolen" bot={<span><em>N</em>₂</span>} />
                    <span className="fnum">=</span>
                    <LFrac topLbl="Ström sekundär" top={<span><em>I</em>₂</span>}
                           botLbl="Ström primär" bot={<span><em>I</em>₁</span>} />
                </div>
                <div style={{ color: 'var(--lab-ink-muted)', fontSize: 13 }}>
                    gäller ideal transformator (utan energiförluster)
                </div>
            </div>
        );

        // ── Scen-geometri ──
        // Järnkärnan ligger nere till vänster så att scen-panelerna inte skymmer den
        const CORE = { x0: 220, x1: 490, y0: 135, y1: 435, ix0: 260, ix1: 450, iy0: 175, iy1: 395 };
        const LEG1 = 240, LEG2 = 470;              // benens mittlinjer
        const COILY0 = 220, COILY1 = 370;          // spolarnas översta/nedersta varv
        const SRC = { x: 100, y: 295, r: 17 };     // växelspänningskällan

        const App = () => {
            const q = new URLSearchParams(location.search);
            const [U1, setU1] = useState(isFinite(parseFloat(q.get('u1'))) ? parseFloat(q.get('u1')) : 230);
            const [N1, setN1] = useState(isFinite(parseFloat(q.get('n1'))) ? parseFloat(q.get('n1')) : 1150);
            const [N2, setN2] = useState(isFinite(parseFloat(q.get('n2'))) ? parseFloat(q.get('n2')) : 100);
            const [R, setR] = useState(isFinite(parseFloat(q.get('r'))) ? parseFloat(q.get('r')) : 50);
            const [load, setLoad] = useState(q.get('last') === '1');
            const [show, setShow] = useState({ graf: true, flux: true });
            const [running, setRunning] = useState(true);
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [controlsOpen, setControlsOpen] = useState(true);
            const [, setTick] = useState(0);

            const sceneWrapRef = useRef(null);
            const phiRef = useRef(0);              // fasvinkeln i AC-cykeln
            const pRef = useRef({});
            pRef.current = { running };

            // ── Härledda storheter (exakt enligt genomgången) ──
            const U2 = U1 * N2 / N1;               // N1/N2 = U1/U2
            const I2 = load ? U2 / R : 0;          // Ohms lag i lampan
            const I1 = load ? I2 * N2 / N1 : 0;    // N1/N2 = I2/I1
            const P = U2 * I2;                     // P1 = P2

            // ── Animationsloop: fasen i växelspänningens cykel ──
            useEffect(() => {
                let raf, last = performance.now();
                const loop = (now) => {
                    raf = requestAnimationFrame(loop);
                    const dt = Math.min((now - last) / 1000, 0.05);
                    last = now;
                    if (pRef.current.running) {
                        phiRef.current = (phiRef.current + 1.6 * dt) % (2 * Math.PI);
                        setTick(t => t + 1);
                    }
                };
                raf = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(raf);
            }, []);

            // ── Fullskärm ──
            useEffect(() => {
                const handler = () => setIsFullscreen(
                    document.fullscreenElement === sceneWrapRef.current ||
                    document.webkitFullscreenElement === sceneWrapRef.current
                );
                document.addEventListener('fullscreenchange', handler);
                document.addEventListener('webkitfullscreenchange', handler);
                return () => {
                    document.removeEventListener('fullscreenchange', handler);
                    document.removeEventListener('webkitfullscreenchange', handler);
                };
            }, []);
            const toggleFullscreen = () => {
                const el = sceneWrapRef.current;
                if (!el) return;
                if (document.fullscreenElement || document.webkitFullscreenElement)
                    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
                else (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
            };

            const tShow = (key) => setShow(sh => ({ ...sh, [key]: !sh[key] }));
            const setExample1 = () => { setU1(230); setN1(1150); setN2(100); };
            const setDemo = () => { setU1(10); setN1(300); setN2(1500); };

            // ── Spolarna: antal ritade varv växer med N (schematiskt) ──
            const loopsFor = (N) => Math.max(2, Math.min(12,
                Math.round(2 + 10 * (N - NMIN) / (NMAX - NMIN))));

            const coil = (cx, N, key) => {
                const n = loopsFor(N);
                const els = [];
                for (let i = 0; i < n; i++) {
                    const cy = COILY0 + (n === 1 ? 0 : i * (COILY1 - COILY0) / (n - 1));
                    els.push(<ellipse key={i} cx={cx} cy={cy} rx="27" ry="7.5"
                                      fill="none" stroke={COL.spole} strokeWidth="3.2" />);
                }
                return <g key={key}>{els}</g>;
            };

            // ── Scenen ──
            const phi = phiRef.current;
            const s = Math.sin(phi);               // momentanvärdet (normerat)

            const scene = () => {
                const els = [];

                // järnkärnan (rektangulär ram, som teorifiguren)
                els.push(
                    <g key="karna">
                        <path d={`M ${CORE.x0} ${CORE.y0} L ${CORE.x1} ${CORE.y0} L ${CORE.x1} ${CORE.y1} L ${CORE.x0} ${CORE.y1} Z
                                  M ${CORE.ix0} ${CORE.iy0} L ${CORE.ix1} ${CORE.iy0} L ${CORE.ix1} ${CORE.iy1} L ${CORE.ix0} ${CORE.iy1} Z`}
                              fillRule="evenodd" fill={COL.karna} stroke="#8d939c" strokeWidth="1.6" />
                        <text x={(CORE.x0 + CORE.x1) / 2} y={(CORE.y1 + CORE.iy1) / 2 + 4} textAnchor="middle"
                              fontSize="12" fill="var(--lab-ink-muted, #5a6170)">järnkärna</text>
                    </g>
                );

                // det varierande magnetiska flödet Φ(t) längs kärnans ovansida
                if (show.flux) {
                    const mid = (CORE.x0 + CORE.x1) / 2;
                    const y = (CORE.y0 + CORE.iy0) / 2;
                    const half = 68 * Math.max(0.12, Math.abs(s));
                    const dir = s >= 0 ? 1 : -1;
                    const tip = mid + dir * half, tail = mid - dir * half;
                    const base = tip - dir * 10;
                    els.push(
                        <g key="flux" opacity={0.35 + 0.65 * Math.abs(s)}>
                            <line x1={tail} y1={y} x2={base} y2={y} stroke={COL.flux}
                                  strokeWidth={2 + 2.2 * Math.abs(s)} strokeLinecap="butt" />
                            <polygon points={`${tip},${y} ${base},${y - 5.5} ${base},${y + 5.5}`} fill={COL.flux} />
                        </g>
                    );
                    els.push(
                        <text key="fluxlbl" x={mid} y={CORE.y0 - 12} textAnchor="middle" fontSize="15" fill={COL.flux}>
                            <tspan fontStyle="italic">Φ</tspan>(<tspan fontStyle="italic">t</tspan>)
                        </text>
                    );
                }

                // primärkretsen: växelspänningskälla + ledningar
                const topWire1 = [[SRC.x, SRC.y - SRC.r], [SRC.x, COILY0], [LEG1 - 27, COILY0]];
                const botWire1 = [[LEG1 - 27, COILY1], [SRC.x, COILY1], [SRC.x, SRC.y + SRC.r]];
                els.push(
                    <g key="krets1" stroke={COL.ink} strokeWidth="1.9" fill="none">
                        <polyline points={topWire1.map(p => p.join(',')).join(' ')} />
                        <polyline points={botWire1.map(p => p.join(',')).join(' ')} />
                        <circle cx={SRC.x} cy={SRC.y} r={SRC.r} />
                        <path d={`M ${SRC.x - 9} ${SRC.y} Q ${SRC.x - 4.5} ${SRC.y - 8} ${SRC.x} ${SRC.y} Q ${SRC.x + 4.5} ${SRC.y + 8} ${SRC.x + 9} ${SRC.y}`}
                              strokeWidth="1.6" />
                    </g>
                );
                els.push(
                    <text key="u1lbl" x={SRC.x + 24} y={SRC.y + 5} textAnchor="start" fontSize="14" fill={COL.ink}>
                        <tspan fontStyle="italic">U</tspan><tspan fontSize="10" dy="3">1</tspan>
                        <tspan dy="-3"> = {fmtU(U1)}</tspan>
                    </text>
                );

                // sekundärkretsen: öppna uttag eller lampa (belastning)
                const lampX = 640, lampY = 300, lampR = 17;
                if (load) {
                    const topWire2 = [[LEG2 + 27, COILY0], [lampX, COILY0], [lampX, lampY - lampR]];
                    const botWire2 = [[lampX, lampY + lampR], [lampX, COILY1], [LEG2 + 27, COILY1]];
                    const glow = P / (P + 25);
                    els.push(
                        <g key="krets2">
                            <g stroke={COL.ink} strokeWidth="1.9" fill="none">
                                <polyline points={topWire2.map(p => p.join(',')).join(' ')} />
                                <polyline points={botWire2.map(p => p.join(',')).join(' ')} />
                            </g>
                            {glow > 0.04 && (
                                <circle cx={lampX} cy={lampY} r={lampR + 14 * glow} fill="#e8b64c"
                                        opacity={0.5 * glow} />
                            )}
                            <circle cx={lampX} cy={lampY} r={lampR} fill={glow > 0.04 ? `rgba(238,196,96,${0.25 + 0.6 * glow})` : '#f7f2e8'}
                                    stroke={COL.ink} strokeWidth="1.9" />
                            <line x1={lampX - 12} y1={lampY - 12} x2={lampX + 12} y2={lampY + 12} stroke={COL.ink} strokeWidth="1.7" />
                            <line x1={lampX + 12} y1={lampY - 12} x2={lampX - 12} y2={lampY + 12} stroke={COL.ink} strokeWidth="1.7" />
                            <text x={lampX + 24} y={lampY + 5} textAnchor="start" fontSize="14" fill={COL.ink}>
                                <tspan fontStyle="italic">U</tspan><tspan fontSize="10" dy="3">2</tspan>
                                <tspan dy="-3"> = {fmtU(U2)}</tspan>
                            </text>
                        </g>
                    );
                } else {
                    els.push(
                        <g key="krets2">
                            <g stroke={COL.ink} strokeWidth="1.9" fill="none">
                                <polyline points={`${LEG2 + 27},${COILY0} 640,${COILY0}`} />
                                <polyline points={`640,${COILY1} ${LEG2 + 27},${COILY1}`} />
                            </g>
                            <circle cx="644" cy={COILY0} r="3.5" fill="none" stroke={COL.ink} strokeWidth="1.7" />
                            <circle cx="644" cy={COILY1} r="3.5" fill="none" stroke={COL.ink} strokeWidth="1.7" />
                            <text x="700" y="300" textAnchor="middle" fontSize="14" fill={COL.ink}>
                                <tspan fontStyle="italic">U</tspan><tspan fontSize="10" dy="3">2</tspan>
                                <tspan dy="-3"> = {fmtU(U2)}</tspan>
                            </text>
                        </g>
                    );
                }

                // spolarna (ritas efter ledningarna så varven ligger överst)
                els.push(coil(LEG1, N1, 'spole1'));
                els.push(coil(LEG2, N2, 'spole2'));

                // varvtalsetiketter under benen
                els.push(
                    <g key="varv" fontSize="14" fill={COL.ink}>
                        <text x={LEG1} y={CORE.y1 + 33} textAnchor="middle">
                            <tspan fontStyle="italic">N</tspan><tspan fontSize="10" dy="3">1</tspan>
                            <tspan dy="-3"> = {fmtN(N1)}</tspan>
                        </text>
                        <text x={LEG2} y={CORE.y1 + 33} textAnchor="middle">
                            <tspan fontStyle="italic">N</tspan><tspan fontSize="10" dy="3">2</tspan>
                            <tspan dy="-3"> = {fmtN(N2)}</tspan>
                        </text>
                        <text x={LEG1} y={CORE.y1 + 54} textAnchor="middle" fontSize="12" fill="var(--lab-ink-muted, #5a6170)">primärspole</text>
                        <text x={LEG2} y={CORE.y1 + 54} textAnchor="middle" fontSize="12" fill="var(--lab-ink-muted, #5a6170)">sekundärspole</text>
                    </g>
                );

                // AC-laddningar som svänger fram och tillbaka i ledningarna
                if (load && I1 > 0) {
                    const A1 = 6 + 22 * I1 / (I1 + 0.5);
                    const A2 = 6 + 22 * I2 / (I2 + 0.5);
                    const d1 = -A1 * Math.cos(phi);
                    const d2 = A2 * Math.cos(phi);          // motfas (Lenz)
                    const dots = [];
                    [topWire1, botWire1].forEach((pts, wi) => {
                        const L = pathLen(pts);
                        [0.25, 0.55, 0.85].forEach((f, di) => {
                            const [x, y] = pathPos(pts, Math.max(4, Math.min(L - 4, f * L + d1)));
                            dots.push(<circle key={`p${wi}-${di}`} cx={x} cy={y} r="3.6" fill={COL.ink} />);
                        });
                    });
                    const w2t = [[LEG2 + 27, COILY0], [lampX, COILY0], [lampX, lampY - lampR]];
                    const w2b = [[lampX, lampY + lampR], [lampX, COILY1], [LEG2 + 27, COILY1]];
                    [w2t, w2b].forEach((pts, wi) => {
                        const L = pathLen(pts);
                        [0.25, 0.55, 0.85].forEach((f, di) => {
                            const [x, y] = pathPos(pts, Math.max(4, Math.min(L - 4, f * L + d2)));
                            dots.push(<circle key={`s${wi}-${di}`} cx={x} cy={y} r="3.6" fill={COL.ink} />);
                        });
                    });
                    els.push(<g key="dots">{dots}</g>);
                }

                // spänningsgraf u1(t), u2(t) (infälld ruta uppe till vänster)
                if (show.graf) {
                    const G = { x0: 18, y0: 58, w: 220, h: 116 };
                    const midY = G.y0 + G.h / 2;
                    const uMax = Math.max(U1, U2);
                    const amp1 = 42 * U1 / uMax, amp2 = 42 * U2 / uMax;
                    const pts1 = [], pts2 = [];
                    for (let px = 0; px <= G.w - 46; px += 3) {
                        const arg = phi - px * 0.055;
                        pts1.push(`${G.x0 + 34 + px},${(midY - amp1 * Math.sin(arg)).toFixed(1)}`);
                        pts2.push(`${G.x0 + 34 + px},${(midY - amp2 * Math.sin(arg)).toFixed(1)}`);
                    }
                    els.push(
                        <g key="graf">
                            <rect x={G.x0} y={G.y0} width={G.w} height={G.h} rx="8"
                                  fill="rgba(246,242,234,0.94)" stroke="rgba(15,22,32,0.28)" strokeWidth="1" />
                            <line x1={G.x0 + 34} y1={midY} x2={G.x0 + G.w - 10} y2={midY}
                                  stroke="#38bdf8" strokeWidth="1.2" />
                            <line x1={G.x0 + 34} y1={G.y0 + 10} x2={G.x0 + 34} y2={G.y0 + G.h - 10}
                                  stroke="#38bdf8" strokeWidth="1.2" />
                            <text x={G.x0 + G.w - 10} y={midY - 5} textAnchor="end" fontSize="11" fill={COL.ink}>
                                <tspan fontStyle="italic">t</tspan>
                            </text>
                            <polyline points={pts1.join(' ')} fill="none" stroke={COL.ink} strokeWidth="1.8" />
                            <polyline points={pts2.join(' ')} fill="none" stroke={COL.u2} strokeWidth="1.8" />
                            <text x={G.x0 + 10} y={G.y0 + 20} textAnchor="start" fontSize="11.5" fill={COL.ink}>
                                <tspan fontStyle="italic">u</tspan><tspan fontSize="8.5" dy="2">1</tspan>
                            </text>
                            <text x={G.x0 + 10} y={G.y0 + 36} textAnchor="start" fontSize="11.5" fill={COL.u2}>
                                <tspan fontStyle="italic">u</tspan><tspan fontSize="8.5" dy="2">2</tspan>
                            </text>
                        </g>
                    );
                }

                return (
                    <svg viewBox={`0 0 ${VBW} ${VBH}`} preserveAspectRatio="xMidYMid meet"
                         fontFamily="Poppins, sans-serif">
                        <defs>
                            <linearGradient id="paperG" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0" stopColor="#f7f2e8" />
                                <stop offset="1" stopColor="#ece3d2" />
                            </linearGradient>
                        </defs>
                        <rect x="0" y="0" width={VBW} height={VBH} fill="url(#paperG)" />
                        {els}
                    </svg>
                );
            };

            // ── Kryssrutor och styrknappar (uppe till höger på scenen) ──
            const sceneToggles = () => (
                <div className="scene-toggles">
                    <div className="st-title">Visa</div>
                    <label><input type="checkbox" checked={show.flux} onChange={() => tShow('flux')} />
                        <span className="st-swatch" style={{ background: COL.flux }}></span>
                        <span>Flödet <em>Φ</em>(<em>t</em>)</span></label>
                    <label><input type="checkbox" checked={show.graf} onChange={() => tShow('graf')} />
                        <span>Spänningsgraf <em>u</em>₁, <em>u</em>₂</span></label>
                    <div className="st-title st-group">Belastning</div>
                    <label><input type="checkbox" checked={load} onChange={() => setLoad(l => !l)} />
                        <span>Anslut lampa till sekundärspolen</span></label>
                    <div className="st-actions">
                        <button className={`btn-toggle ${running ? '' : 'active'}`}
                                onClick={() => setRunning(r => !r)}>
                            {running ? 'Pausa' : 'Fortsätt'}
                        </button>
                    </div>
                </div>
            );

            const Readout = ({ label, value, unit, color }) => (
                <div className="p-2 rounded-lg" style={{ background: 'var(--lab-bg)', border: '1px solid var(--lab-line-strong)' }}>
                    <div className="text-xs" style={{ color: 'var(--lab-ink-muted)' }} dangerouslySetInnerHTML={{ __html: label }} />
                    <div className="font-mono font-bold text-sm" style={{ color: color || 'var(--lab-ink)' }}>
                        {value} <span className="font-normal text-xs" style={{ color: 'var(--lab-ink-muted)' }}>{unit}</span>
                    </div>
                </div>
            );

            const ratioText = N1 >= N2
                ? `${fmt(N1 / N2, N1 / N2 >= 10 ? 1 : 2)} : 1`
                : `1 : ${fmt(N2 / N1, N2 / N1 >= 10 ? 1 : 2)}`;

            return (
                <div className="min-h-screen dark-container px-4 md:px-8 pb-12" style={{ fontFamily: "'DM Sans', sans-serif" }}>
                    <div className="max-w-6xl mx-auto pt-6">
                        <div className="breadcrumb mb-4" style={{ fontSize: 13 }}>
                            <a href="index.html">Hem</a> / <a href="katalog.html#fy2">Fysik nivå 2</a> / Transformator
                        </div>
                        <h1 className="text-3xl md:text-4xl font-black tracking-tight" style={{ color: 'var(--lab-ink)' }}>Transformator</h1>
                        <p className="mt-2 mb-5" style={{ color: 'var(--lab-ink-soft)', maxWidth: 820 }}>
                            Två spolar på en gemensam järnkärna. Växelströmmen i primärspolen skapar ett
                            varierande magnetiskt flöde <em>Φ</em> genom kärnan, som inducerar en ny spänning i
                            sekundärspolen. Ändra varvtalen <em>N</em>₁ och <em>N</em>₂ och se hur
                            spänningen transformeras upp eller ner — anslut sedan en lampa och se att
                            strömmen ändras åt <strong>motsatt</strong> håll, så att effekten bevaras.
                        </p>

                        <FormulaCard />

                        <main className="flex flex-col lg:flex-row gap-6">
                            {/* Scen */}
                            <div className="lg:w-3/5 order-1">
                                <div className="scene-wrap" data-theme="ljusPapper" ref={sceneWrapRef}>
                                    {scene()}

                                    <div className="scene-info">
                                        <span className="si-lbl">Sekundärspänning <em style={{ textTransform: 'none' }}>U</em>₂</span>
                                        <span className="si-val">{fmtU(U2)}</span>
                                        <span className="si-lbl" style={{ marginTop: 4 }}>Omsättning <em style={{ textTransform: 'none' }}>N</em>₁ : <em style={{ textTransform: 'none' }}>N</em>₂</span>
                                        <span className="si-val" style={{ fontSize: 13 }}>{ratioText}</span>
                                        {load && (
                                            <React.Fragment>
                                                <span className="si-lbl" style={{ marginTop: 4 }}>Effekt <em style={{ textTransform: 'none' }}>P</em></span>
                                                <span className="si-val" style={{ fontSize: 13 }}>{fmtP(P)}</span>
                                            </React.Fragment>
                                        )}
                                    </div>

                                    {sceneToggles()}

                                    {/* Fullskärm: glidarna i en hopfällbar panel i underkant */}
                                    {isFullscreen && (
                                        <React.Fragment>
                                            <div className={`fs-controls ${controlsOpen ? '' : 'collapsed'}`}>
                                                <FsSlider label="Primärspänning (<em>U</em>₁)" value={U1}
                                                          min={U1MIN} max={U1MAX} step={5} onChange={setU1}
                                                          valueText={fmtU(U1)} />
                                                <FsSlider label="Varv primär (<em>N</em>₁)" value={N1}
                                                          min={NMIN} max={NMAX} step={25} onChange={setN1}
                                                          valueText={fmtN(N1)} />
                                                <FsSlider label="Varv sekundär (<em>N</em>₂)" value={N2}
                                                          min={NMIN} max={NMAX} step={25} onChange={setN2}
                                                          valueText={fmtN(N2)} />
                                                {load && (
                                                    <FsSlider label="Lampans resistans (<em>R</em>)" value={R}
                                                              min={RMIN} max={RMAX} step={5} onChange={setR}
                                                              valueText={`${fmt(R, 0)} Ω`} />
                                                )}
                                            </div>
                                            <button className="fs-toggle-handle" onClick={() => setControlsOpen(o => !o)}
                                                    title={controlsOpen ? 'Dölj reglage' : 'Visa reglage'}
                                                    aria-expanded={controlsOpen}>
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                     strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"
                                                     style={{ transform: controlsOpen ? 'rotate(0deg)' : 'rotate(180deg)' }}>
                                                    <path d="M6 9l6 6 6-6"/>
                                                </svg>
                                                <span>{controlsOpen ? 'Dölj reglage' : 'Reglage'}</span>
                                            </button>
                                        </React.Fragment>
                                    )}

                                    <button className="fs-btn" onClick={toggleFullscreen} aria-label="Fullskärm"
                                            title={isFullscreen ? 'Lämna fullskärm' : 'Fullskärm'}>
                                        {isFullscreen ? (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M9 3v6H3" /><path d="M15 21v-6h6" /><path d="M21 9h-6V3" /><path d="M3 15h6v6" />
                                            </svg>
                                        ) : (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M3 9V3h6" /><path d="M21 9V3h-6" /><path d="M3 15v6h6" /><path d="M21 15v6h-6" />
                                            </svg>
                                        )}
                                    </button>
                                </div>
                            </div>

                            {/* Kontroller */}
                            <div className="lg:w-2/5 order-2">
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <Slider label="Primärspänning (<em>U</em>₁)"
                                            sub="Växelspänningen som läggs över primärspolen (effektivvärde)."
                                            value={U1} min={U1MIN} max={U1MAX} step={5} onChange={setU1}
                                            valueText={fmtU(U1)} />
                                    <Slider label="Varv i primärspolen (<em>N</em>₁)"
                                            sub="Fler varv i primärspolen ⟹ lägre sekundärspänning."
                                            value={N1} min={NMIN} max={NMAX} step={25} onChange={setN1}
                                            valueText={fmtN(N1)} />
                                    <Slider label="Varv i sekundärspolen (<em>N</em>₂)"
                                            sub="Fler varv i sekundärspolen ⟹ högre sekundärspänning."
                                            value={N2} min={NMIN} max={NMAX} step={25} onChange={setN2}
                                            valueText={fmtN(N2)} />
                                    {load && (
                                        <Slider label="Lampans resistans (<em>R</em>)"
                                                sub="Belastningen bestämmer strömmen: <em>I</em>₂ = <em>U</em>₂ / <em>R</em> (Ohms lag)."
                                                value={R} min={RMIN} max={RMAX} step={5} onChange={setR}
                                                valueText={`${fmt(R, 0)} Ω`} />
                                    )}
                                </div>

                                {/* Live-beräkning */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <div className="flbl mb-2">Beräkning av sekundärspänningen</div>
                                    <div className="flex flex-wrap items-center gap-x-2 gap-y-2"
                                         style={{ color: 'var(--lab-ink)', fontSize: 15 }}>
                                        <span><em>U</em>₂</span>
                                        <span>=</span>
                                        <span><em>U</em>₁</span>
                                        <span>·</span>
                                        <Frac size={14} top={<span><em>N</em>₂</span>} bot={<span><em>N</em>₁</span>} />
                                        <span>=</span>
                                        <span style={{ whiteSpace: 'nowrap' }}>{fmtU(U1)}</span>
                                        <span>·</span>
                                        <Frac size={14} top={fmtN(N2)} bot={fmtN(N1)} />
                                        <span>=</span>
                                        <span className="font-bold" style={{ color: 'var(--lab-accent)', whiteSpace: 'nowrap' }}>{fmtU(U2)}</span>
                                    </div>
                                    <div className="flex gap-2 mt-3">
                                        <button className="btn-toggle flex-1 text-sm" onClick={setExample1}
                                                title="U₁ = 230 V, N₁ = 1 150, N₂ = 100 ⟹ U₂ = 20 V">
                                            Exempel 1 ur teorin (230 V → 20 V)
                                        </button>
                                        <button className="btn-toggle flex-1 text-sm" onClick={setDemo}
                                                title="N₁ = 300, N₂ = 1 500 ⟹ spänningen 5 gånger så stor">
                                            Demonstrationen (300 → 1 500 varv)
                                        </button>
                                    </div>
                                </div>

                                {/* Avläsning */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <div className="flbl mb-2">Avläsning</div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <Readout label="Sekundärspänning <em>U</em>₂" value={fmtU(U2)} unit="" color="var(--lab-accent)" />
                                        <Readout label="Omsättning <em>N</em>₁ : <em>N</em>₂" value={ratioText} unit="" />
                                        {load ? (
                                            <React.Fragment>
                                                <Readout label="Ström primär <em>I</em>₁" value={fmtI(I1)} unit="" />
                                                <Readout label="Ström sekundär <em>I</em>₂" value={fmtI(I2)} unit="" />
                                                <Readout label="Effekt <em>P</em> = <em>U</em>₂ · <em>I</em>₂" value={fmtP(P)} unit="" />
                                                <Readout label="Kontroll: <em>U</em>₁ · <em>I</em>₁" value={fmtP(U1 * I1)} unit="" />
                                            </React.Fragment>
                                        ) : (
                                            <div className="col-span-2 p-2 rounded-lg text-xs"
                                                 style={{ background: 'rgba(13,148,136,0.08)', color: 'var(--lab-ink-soft)' }}>
                                                Utan belastning går (nästan) ingen ström — anslut lampan i
                                                scenen för att se strömmarna <em>I</em>₁ och <em>I</em>₂.
                                            </div>
                                        )}
                                    </div>
                                    {load && (
                                        <div className="mt-2 p-2 rounded-lg text-xs" style={{ background: 'rgba(13,148,136,0.08)', color: 'var(--lab-ink-soft)' }}>
                                            Lägg märke till att <em>U</em>₁ · <em>I</em>₁ = <em>U</em>₂ · <em>I</em>₂ —
                                            effekten är densamma på båda sidor. Transformatorn kan inte "skapa" energi.
                                        </div>
                                    )}
                                </div>
                            </div>
                        </main>

                        {/* Pedagogiska sektioner */}
                        <div className="grid md:grid-cols-3 gap-4 mt-6">
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Primär och sekundär</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Spolen som ansluts till den ingående spänningen kallas <strong>primärspole</strong>,
                                    och spolen som inducerar den nya spänningen kallas <strong>sekundärspole</strong>.
                                    Järnkärnan binder ihop dem: den leder det magnetiska flödet <em>Φ</em> så att
                                    (nästan) allt flöde från primärspolen också går genom sekundärspolen.
                                </p>
                            </div>
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Effekten bevaras</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Energiprincipen gäller: bortser vi från förluster är effekten i primärspolen
                                    samma som i sekundärspolen, <span style={{ whiteSpace: 'nowrap' }}><em>U</em>₁ · <em>I</em>₁ = <em>U</em>₂ · <em>I</em>₂</span>.
                                    Transformeras spänningen upp 10 gånger blir strömmen samtidigt en tiondel
                                    så stor — det är därför strömförhållandet är "upp och ner":
                                    <span style={{ whiteSpace: 'nowrap' }}> <em>N</em>₁/<em>N</em>₂ = <em>I</em>₂/<em>I</em>₁</span>.
                                </p>
                            </div>
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Hög eller låg spänning?</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    En <strong>hög spänning med låg ström</strong> ger små energiförluster i
                                    ledningarna när elen transporteras — men ökar risken för oönskade urladdningar.
                                    En <strong>låg spänning med hög ström</strong> är säkrare men ger större
                                    förluster. Därför transformeras spänningen upp till hundratals kilovolt i
                                    kraftnätet och ner igen nära hemmen.
                                </p>
                            </div>
                        </div>

                        <details className="glass-card rounded-xl p-4 mt-4">
                            <summary className="accordion-head" style={{ color: 'var(--lab-ink)' }}>
                                <span>Var kommer formeln ifrån?</span><span style={{ color: 'var(--lab-ink-muted)' }}>▾</span>
                            </summary>
                            <div className="mt-3 text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                <p>
                                    Samma flödesändring går genom båda spolarna, och den inducerade spänningen i en
                                    spole är proportionell mot antalet varv:
                                </p>
                                <div className="flex items-center gap-x-2 my-3" style={{ color: 'var(--lab-ink)' }}>
                                    <span><em>e</em>₁ = <em>N</em>₁ ·</span>
                                    <Frac size={14} top={<span>Δ<em>Φ</em></span>} bot={<span>Δ<em>t</em></span>} />
                                    <span className="mx-2" style={{ color: 'var(--lab-ink-muted)' }}>respektive</span>
                                    <span><em>e</em>₂ = <em>N</em>₂ ·</span>
                                    <Frac size={14} top={<span>Δ<em>Φ</em></span>} bot={<span>Δ<em>t</em></span>} />
                                </div>
                                <p>
                                    Delar man uttrycken med varandra förkortas flödesändringen bort och kvar
                                    står <span style={{ whiteSpace: 'nowrap' }}><em>e</em>₁/<em>e</em>₂ = <em>N</em>₁/<em>N</em>₂</span>.
                                    Eftersom transformatorns inre resistans är liten
                                    gäller <span style={{ whiteSpace: 'nowrap' }}><em>U</em>₁ ≈ <em>e</em>₁</span> och <span style={{ whiteSpace: 'nowrap' }}><em>U</em>₂ ≈ <em>e</em>₂</span>, alltså <span style={{ whiteSpace: 'nowrap' }}><em>N</em>₁/<em>N</em>₂ = <em>U</em>₁/<em>U</em>₂</span>.
                                    Strömsambandet följer sedan ur energiprincipen: <span style={{ whiteSpace: 'nowrap' }}><em>P</em>₁ = <em>P</em>₂</span> ger <span style={{ whiteSpace: 'nowrap' }}><em>U</em>₁ · <em>I</em>₁ = <em>U</em>₂ · <em>I</em>₂</span>.
                                </p>
                            </div>
                        </details>

                        <details className="glass-card rounded-xl p-4 mt-4">
                            <summary className="accordion-head" style={{ color: 'var(--lab-ink)' }}>
                                <span>Vanliga missuppfattningar</span><span style={{ color: 'var(--lab-ink-muted)' }}>▾</span>
                            </summary>
                            <ul className="mt-3 space-y-2 text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                <li><strong>"En transformator kan förstärka energin."</strong> Nej — höjs spänningen sänks strömmen i samma grad. Effekten ut kan aldrig bli större än effekten in (i verkligheten blir den något mindre på grund av förluster).</li>
                                <li><strong>"Den fungerar med likström också."</strong> Nej — en konstant ström ger ett konstant flöde, och utan flödesändring induceras ingen spänning i sekundärspolen. Det är därför transformatorn kräver <em>växel</em>spänning.</li>
                                <li><strong>"Fler varv är alltid bättre."</strong> Nej — det är <em>förhållandet</em> mellan varvtalen som avgör spänningen. 1 150 : 100 ger exakt samma omsättning som 230 : 20.</li>
                            </ul>
                        </details>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
