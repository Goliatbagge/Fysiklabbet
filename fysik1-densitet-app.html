    <style>
        /* ── Sid-layout ────────────────────────────────────────────── */
        /* dark-container täcks av styles-laborans-sim.css; lämnar transparent */
        .dark-container {
            background: transparent;
        }

        /* ── Kortkomponenter ──────────────────────────────────────── */
        /* glass-card och glass-card-light täcks av styles-laborans-sim.css
           (cream papper + border). Dessa är platshållardeklarationer
           för fall där CSS-filen inte laddas. */
        .glass-card {
            background: var(--lab-bg, #f3eee4);
            border: 1px solid var(--lab-line-strong, rgba(15,22,32,0.28));
        }
        .glass-card-light {
            background: var(--lab-bg, #f3eee4);
            border: 1px solid var(--lab-line-strong, rgba(15,22,32,0.28));
        }

        /* ── Lägesflikar (Densitet / Flytförmåga) ────────────────── */
        .tab-button {
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
            background: transparent;
            color: var(--lab-ink-soft, #3a4151);
            border-color: transparent;
        }
        .tab-button.active-explore,
        .tab-button.active-buoyancy {
            background: var(--lab-ink, #0f1620);
            border-color: var(--lab-ink, #0f1620);
            color: var(--lab-bg, #f3eee4);
            box-shadow: none;
        }
        .tab-button:hover:not(.active-explore):not(.active-buoyancy) {
            color: var(--lab-ink, #0f1620);
            border-color: var(--lab-line-strong, rgba(15,22,32,0.28));
            background: var(--lab-bg-panel, #ffffff);
        }

        /* ── Material-knappar ─────────────────────────────────────── */
        /* Grundstil hanteras av styles-laborans-sim.css (.material-btn).
           Aktiv-variant (vald material) visas med accent-tint + kant. */
        .material-btn-active {
            background: rgba(200, 50, 74, 0.10);
            border: 1px solid var(--lab-accent, #c8324a);
            color: var(--lab-ink, #0f1620);
            box-shadow: none;
        }

        /* ── Våganimationer (flytförmåge-läget) ───────────────────── */
        .water-wave.wave1 {
            animation: waveShift1 3s ease-in-out infinite;
        }
        .water-wave.wave2 {
            animation: waveShift2 4s ease-in-out infinite;
        }
        @keyframes waveShift1 {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-15px); }
        }
        @keyframes waveShift2 {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(10px); }
        }

        /* ── Guppande animation för flytande kuber ─────────────────── */
        @keyframes bobbing {
            0%, 100% { transform: var(--bob-base) translateY(0px); }
            50% { transform: var(--bob-base) translateY(-6px); }
        }
    </style>
</head>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Formatera tal med komma som decimaltecken och mellanslag som tusentalsavgränsare
        const formatNum = (num, decimals = 0) => {
          const parts = num.toFixed(decimals).split('.');
          parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '\u00A0');
          return parts.join(',');
        };

        // Constants
        const MATERIALS = [
          { name: 'Frigolit', density: 50, color: 'bg-slate-100 border-slate-300', dotColor: 'bg-slate-300' },
          { name: 'Trä (Furu)', density: 500, color: 'bg-amber-200 border-amber-400', dotColor: 'bg-amber-700' },
          { name: 'Is', density: 917, color: 'bg-cyan-100 border-cyan-300', dotColor: 'bg-cyan-400' },
          { name: 'Vatten', density: 1000, color: 'bg-blue-300 border-blue-500', dotColor: 'bg-blue-700' },
          { name: 'Tegel', density: 1900, color: 'bg-orange-700 border-orange-900', dotColor: 'bg-stone-800' },
          { name: 'Aluminium', density: 2700, color: 'bg-gray-300 border-gray-400', dotColor: 'bg-gray-600' },
          { name: 'Järn', density: 7870, color: 'bg-gray-500 border-gray-700', dotColor: 'bg-gray-900' },
          { name: 'Silver', density: 10490, color: 'bg-slate-200 border-slate-400', dotColor: 'bg-slate-500' },
          { name: 'Bly', density: 11340, color: 'bg-slate-600 border-slate-800', dotColor: 'bg-slate-900' },
          { name: 'Guld', density: 19300, color: 'bg-yellow-400 border-yellow-600', dotColor: 'bg-yellow-700' },
        ];

        // Volym i cm³: minsta kuben ~3 cm sida (≈30 cm³, förenklat),
        // största skalenligt utifrån den. Massa i gram.
        const MIN_VOLUME_CM3 = 30;
        const MAX_VOLUME_CM3 = 4700;
        const MAX_MASS_G = 100000;
        const MIN_MASS_G = 1;
        const WATER_DENSITY = 1000;   // kg/m³ (SI), används för flytlogik

        // Pre-generate random positions for atoms (separate sets per face)
        const MAX_DOTS = 1000;
        const STATIC_ATOM_POSITIONS = Array.from({ length: MAX_DOTS }).map(() => ({
          left: `${Math.random() * 100}%`,
          top: `${Math.random() * 100}%`,
        }));
        const STATIC_ATOM_POSITIONS_TOP = Array.from({ length: MAX_DOTS }).map(() => ({
          left: `${Math.random() * 100}%`,
          top: `${Math.random() * 100}%`,
        }));
        const STATIC_ATOM_POSITIONS_RIGHT = Array.from({ length: MAX_DOTS }).map(() => ({
          left: `${Math.random() * 100}%`,
          top: `${Math.random() * 100}%`,
        }));
        // Volymetriska atomer: fördelade i hela kubens volym (x, y, djup)
        // depth: 0 = bakre väggen, 1 = främre väggen
        const STATIC_ATOM_3D = Array.from({ length: MAX_DOTS }).map(() => ({
          x: Math.random(),
          y: Math.random(),
          depth: Math.random(),
        }));

        // SliderControl Component
        const SliderControl = ({ label, value, min, max, step = 1, unit, onChange, colorClass, disabled = false, decimals = 1 }) => {
          return (
            <div className={`p-4 glass-card ${disabled ? 'opacity-50' : ''}`} style={{borderRadius: '6px'}}>
              <div className="flex justify-between items-center mb-2">
                <label className="text-sm font-semibold uppercase tracking-wide" style={{color: 'var(--lab-ink-soft, #3a4151)', letterSpacing: '0.06em', fontFamily: 'var(--lab-font-mono, monospace)'}}>{label}</label>
                <div className="text-lg font-mono font-semibold" style={{color: 'var(--lab-accent, #c8324a)'}}>
                  {formatNum(value, decimals)} <span className="text-sm" style={{color: 'var(--lab-ink-muted, #8a8579)'}}>{unit}</span>
                </div>
              </div>
              <input
                type="range"
                min={min}
                max={max}
                step={step}
                value={value}
                disabled={disabled}
                onChange={(e) => onChange(parseFloat(e.target.value))}
                className={`w-full rounded appearance-none cursor-pointer accent-${colorClass}-600 transition-all`}
              />
              <div className="flex justify-between mt-1 text-xs font-mono" style={{color: 'var(--lab-ink-muted, #8a8579)'}}>
                <span>{formatNum(min, min % 1 !== 0 ? 1 : 0)} {unit}</span>
                <span>{formatNum(max)} {unit}</span>
              </div>
            </div>
          );
        };

        // CubeVisualizer Component
        const DEFAULT_CUBE_COLOR = 'bg-slate-300 border-slate-400';
        const DEFAULT_DOT_COLOR = 'bg-slate-500';

        const CubeVisualizer = React.memo(({ volume, mass, density, mode, selectedMaterialName }) => {
          // Kubens visuella sida är ÄKTA proportionell mot den fysiska sidan
          // (∝ ∛V): minsta kuben (MIN_VOLUME_CM3) blir en liten tärning,
          // största (MAX_VOLUME_CM3) fyller plattan. Volym i cm³.
          const MIN_SIDE = 32;
          const sideLength = MIN_SIDE * Math.pow(volume / MIN_VOLUME_CM3, 1/3);
          // Vågen har FAST storlek, dimensionerad efter den största kuben.
          const maxSide = MIN_SIDE * Math.pow(MAX_VOLUME_CM3 / MIN_VOLUME_CM3, 1/3);
          const SCALE_W = maxSide * 1.22;   // plattans bredd – största kuben får precis plats
          const SCALE_DP = maxSide * 1.16;  // plattans djup
          const SCALE_HH = 34;              // våghusets höjd
          const SCALE_TOP = 232;            // fast vertikal placering i scenen

          const selectedMaterial = selectedMaterialName
            ? MATERIALS.find(m => m.name === selectedMaterialName)
            : null;

          const cubeColor = selectedMaterial ? selectedMaterial.color : DEFAULT_CUBE_COLOR;
          const dotColor = selectedMaterial ? selectedMaterial.dotColor : DEFAULT_DOT_COLOR;

          const numDots = Math.min(Math.floor(density * 0.045), 700);
          const activeDots = STATIC_ATOM_3D.slice(0, numDots);
          // Inset så att atomerna håller sig en bit innanför kubens väggar
          const ATOM_INSET = 0.08;

          const NEUTRAL_TOLERANCE = 0.5; // kg/m³ – krymper floating-point-glapp kring 1000
          const isNeutralBuoyant = Math.abs(density - WATER_DENSITY) < NEUTRAL_TOLERANCE;
          const isFloating = !isNeutralBuoyant && density < WATER_DENSITY;
          const containerHeight = 400;
          const waterHeight = 280; // px vatten
          const waterSurfaceY = containerHeight - waterHeight; // 120px from top

          // Arkimedes princip: andel under vatten = ρ_objekt / ρ_vatten
          let buoyancyTop;
          const bottomThickness = 70;
          if (isNeutralBuoyant) {
            // Samma densitet som vatten – svävar mitt i vattnet
            buoyancyTop = waterSurfaceY + (waterHeight - bottomThickness - sideLength) / 2;
          } else if (isFloating) {
            const submergedFraction = density / WATER_DENSITY;
            buoyancyTop = waterSurfaceY - sideLength * (1 - submergedFraction);
          } else {
            // Sjunker till botten, vilar på sandbotten
            // Extra offset för att 3D-rotationen gör att hörnen sticker ut ~20px
            buoyancyTop = Math.max(waterSurfaceY, containerHeight - bottomThickness - sideLength + 20);
          }
          // Kuben vilar på den fasta vågplattan: underkanten hamnar på samma
          // nivå oavsett kubstorlek → currentTop härleds ur SCALE_TOP.
          const exploreTop = SCALE_TOP + 6 - sideLength;
          const exploreLeft = (400 - sideLength) / 2;

          const currentTop = mode === 'BUOYANCY' ? buoyancyTop : exploreTop;
          const currentLeft = mode === 'BUOYANCY' ? (400 - sideLength) / 2 : exploreLeft;

          return (
            <div className="relative w-[400px] h-[400px] rounded-xl overflow-hidden shadow-inner"
                 style={{ background: '#e7ded0', border: '1px solid rgba(200, 50, 74, 0.18)', perspective: '800px', boxShadow: 'inset 0 3px 12px rgba(15,22,32,0.16)' }}>

              {mode === 'BUOYANCY' && (
                <>
                  {/* Sandbotten – bakom kuben (z-0) */}
                  <div className="absolute bottom-0 w-full pointer-events-none" style={{ height: '70px', zIndex: 0 }}>
                    {/* Bottenyta med perspektiv */}
                    <div className="absolute bottom-0 w-full" style={{
                      height: '70px',
                      background: 'linear-gradient(180deg, rgba(160, 140, 95, 0.25) 0%, rgba(130, 110, 70, 0.55) 30%, rgba(100, 85, 55, 0.7) 70%, rgba(80, 65, 40, 0.8) 100%)',
                      borderTop: '1px solid rgba(180, 160, 110, 0.25)',
                    }}>
                      {/* Sandtextur */}
                      <div className="absolute inset-0 opacity-25" style={{ backgroundImage: 'radial-gradient(circle 1.5px, rgba(210, 190, 140, 0.5) 0%, transparent 100%)', backgroundSize: '10px 8px' }}></div>
                      {/* Små stenar / ojämnheter */}
                      <div className="absolute opacity-20" style={{ top: '4px', left: '15%', width: '12px', height: '6px', borderRadius: '50%', background: 'rgba(140, 120, 80, 0.8)' }}></div>
                      <div className="absolute opacity-15" style={{ top: '6px', left: '55%', width: '8px', height: '4px', borderRadius: '50%', background: 'rgba(160, 140, 90, 0.7)' }}></div>
                      <div className="absolute opacity-20" style={{ top: '3px', left: '80%', width: '10px', height: '5px', borderRadius: '50%', background: 'rgba(130, 110, 70, 0.8)' }}></div>
                    </div>
                  </div>

                  {/* Vattenkropp – bakom kuben (z-1) */}
                  <div className="absolute bottom-0 w-full pointer-events-none" style={{ height: `${waterHeight}px`, zIndex: 1, background: 'linear-gradient(180deg, rgba(200, 50, 74, 0.2) 0%, rgba(30, 64, 175, 0.35) 80%, rgba(25, 55, 140, 0.3) 100%)' }}>
                  </div>

                  {/* Vågyta – framför kuben (z-20) */}
                  <div className="absolute w-full pointer-events-none" style={{ bottom: `${waterHeight - 6}px`, height: '20px', zIndex: 20 }}>
                    <svg className="absolute bottom-0 left-0 w-full" style={{ height: '14px' }}
                         viewBox="0 0 400 14" preserveAspectRatio="none">
                      <path d="M0,8 C30,2 60,12 100,6 C140,0 170,12 200,8 C230,4 260,14 300,6 C340,-2 370,10 400,8 L400,14 L0,14 Z"
                            fill="rgba(200, 50, 74, 0.3)" className="water-wave wave1" />
                      <path d="M0,6 C40,12 80,2 120,8 C160,14 200,2 240,6 C280,10 320,0 360,8 C380,12 390,4 400,6 L400,14 L0,14 Z"
                            fill="rgba(96, 165, 250, 0.2)" className="water-wave wave2" />
                    </svg>
                  </div>

                  {/* Etikett */}
                  <div className="absolute pointer-events-none" style={{ bottom: `${waterHeight - 2}px`, right: '8px', zIndex: 21 }}>
                    <span className="font-semibold text-sm" style={{color: 'var(--lab-ink-soft, #3a4151)'}}>Vatten (1 000 kg/m³)</span>
                  </div>
                </>
              )}

              {/* Digital våg – kuben vilar på vågplattan (endast densitets-läget) */}
              {mode === 'EXPLORE' && (() => {
                const W = SCALE_W;            // fast plattbredd
                const Dp = SCALE_DP;          // fast plattdjup
                const Hh = SCALE_HH;          // våghusets höjd
                const scaleLeft = (400 - W) / 2;
                const scaleTop = SCALE_TOP;
                const grams = mass;
                return (
                  <div className="absolute transition-all duration-300 ease-out"
                       style={{ width: `${W}px`, height: `${Hh}px`,
                                transform: `translate(${scaleLeft}px, ${scaleTop}px)`,
                                transformStyle: 'preserve-3d', zIndex: 6 }}>
                    <div style={{ width: '100%', height: '100%', position: 'relative',
                                  transformStyle: 'preserve-3d',
                                  transform: 'rotateX(-20deg) rotateY(-30deg)' }}>
                      {/* Höger sida (mörk graphite) */}
                      <div className="absolute" style={{
                        width: `${Dp}px`, height: `${Hh}px`, left: `${(W - Dp) / 2}px`, top: 0,
                        transform: `rotateY(90deg) translateZ(${W / 2}px)`,
                        background: 'linear-gradient(180deg, #2a2f37 0%, #14171c 100%)',
                        borderRadius: '3px', backfaceVisibility: 'hidden' }} />
                      {/* Bakkant (svag, för djup) */}
                      <div className="absolute" style={{
                        width: `${W}px`, height: `${Hh}px`, left: 0, top: 0,
                        transform: `translateZ(${-Dp / 2}px)`,
                        background: '#0e1115', backfaceVisibility: 'hidden' }} />
                      {/* Vågplatta (borstad metall) – ytan kuben står på */}
                      <div className="absolute" style={{
                        width: `${W}px`, height: `${Dp}px`, left: 0, top: `${(Hh - Dp) / 2}px`,
                        transform: `rotateX(90deg) translateZ(${Hh / 2}px)`,
                        background: 'linear-gradient(135deg, #e9edf2 0%, #b9c1cc 45%, #d6dce3 60%, #a7b0bc 100%)',
                        borderRadius: '6px',
                        boxShadow: 'inset 0 0 0 1px rgba(255,255,255,0.5), inset 0 0 14px rgba(60,70,85,0.35)',
                        backfaceVisibility: 'hidden' }}>
                        {/* borstad-metall-streck */}
                        <div className="absolute inset-1 opacity-30" style={{ borderRadius: '5px',
                          backgroundImage: 'repeating-linear-gradient(90deg, rgba(120,130,145,0.4) 0px, rgba(120,130,145,0.4) 1px, transparent 1px, transparent 4px)' }} />
                      </div>
                      {/* Framsida (våghus + display) */}
                      <div className="absolute inset-0" style={{
                        transform: `translateZ(${Dp / 2}px)`,
                        background: 'linear-gradient(180deg, #3b414b 0%, #23272e 55%, #1a1d23 100%)',
                        borderRadius: '4px',
                        boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.12)',
                        backfaceVisibility: 'hidden',
                        display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                        {/* LCD-display */}
                        <div style={{
                          minWidth: '62%', padding: '2px 8px',
                          background: 'linear-gradient(180deg, #07261c 0%, #04130e 100%)',
                          border: '1px solid rgba(0,0,0,0.6)',
                          borderRadius: '4px',
                          boxShadow: 'inset 0 0 6px rgba(0,0,0,0.7), 0 0 4px rgba(80,255,170,0.15)',
                          textAlign: 'center', whiteSpace: 'nowrap' }}>
                          <span style={{
                            fontFamily: "'Courier New', monospace", fontWeight: 700,
                            fontSize: `${Math.max(10, Math.min(15, W * 0.11))}px`,
                            letterSpacing: '0.5px',
                            color: '#7CFFB2',
                            textShadow: '0 0 5px rgba(124,255,178,0.8)' }}>
                            {formatNum(grams)} g
                          </span>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })()}

              <div
                className={`absolute ${mode === 'BUOYANCY' ? 'transition-transform duration-300 ease-out' : ''}`}
                style={{
                  width: `${sideLength}px`,
                  height: `${sideLength}px`,
                  '--bob-base': `translate(${currentLeft}px, ${currentTop}px)`,
                  transform: `translate(${currentLeft}px, ${currentTop}px)`,
                  transformStyle: 'preserve-3d',
                  zIndex: 10,
                  ...(mode === 'BUOYANCY' && density <= WATER_DENSITY ? { animation: 'bobbing 3s ease-in-out infinite' } : {}),
                }}
              >
                {/* 3D cube with CSS transforms */}
                <div style={{ width: '100%', height: '100%', position: 'relative', transformStyle: 'preserve-3d', transform: 'rotateX(-20deg) rotateY(-30deg)' }}>
                  {/* Bakre/dolda ytor – ogenomskinliga så volymen syns mot dem */}
                  {/* Back face */}
                  <div className={`absolute inset-0 ${cubeColor}`}
                       style={{ transform: `translateZ(${-sideLength/2}px) rotateY(180deg)`, borderWidth: '2px', backfaceVisibility: 'hidden', filter: 'brightness(0.7)' }}>
                  </div>
                  {/* Left face */}
                  <div className={`absolute ${cubeColor}`}
                       style={{ width: `${sideLength}px`, height: `${sideLength}px`, transform: `rotateY(-90deg) translateZ(${sideLength/2}px)`, borderWidth: '2px', backfaceVisibility: 'hidden', filter: 'brightness(0.85)' }}>
                  </div>
                  {/* Bottom face */}
                  <div className={`absolute ${cubeColor}`}
                       style={{ width: `${sideLength}px`, height: `${sideLength}px`, transform: `rotateX(-90deg) translateZ(${sideLength/2}px)`, borderWidth: '2px', backfaceVisibility: 'hidden', filter: 'brightness(0.7)' }}>
                  </div>

                  {/* Volymetriska atomer – fördelade på olika djup i hela kuben.
                      De bakre tonas ner (djupdimmer) → tydlig 3D-känsla. */}
                  {activeDots.map((dot, i) => {
                    const x = ATOM_INSET + dot.x * (1 - 2 * ATOM_INSET);
                    const y = ATOM_INSET + dot.y * (1 - 2 * ATOM_INSET);
                    const z = (dot.depth - 0.5) * sideLength * (1 - 2 * ATOM_INSET);
                    const op = 0.22 + 0.6 * dot.depth;       // främre ljusare
                    const sc = 0.7 + 0.45 * dot.depth;       // främre lite större
                    return (
                      <div key={`v${i}`}
                           className={`absolute rounded-full ${dotColor}`}
                           style={{
                             left: `${x * 100}%`, top: `${y * 100}%`,
                             width: '6px', height: '6px',
                             marginLeft: '-3px', marginTop: '-3px',
                             opacity: op,
                             transform: `translateZ(${z}px) scale(${sc})`,
                           }} />
                    );
                  })}

                  {/* Främre/sidoytor – translucenta skal så att volymen syns igenom */}
                  {/* Right face */}
                  <div className={`absolute ${cubeColor}`}
                       style={{ width: `${sideLength}px`, height: `${sideLength}px`, transform: `rotateY(90deg) translateZ(${sideLength/2}px)`, borderWidth: '2px', backfaceVisibility: 'hidden', filter: 'brightness(0.8)', opacity: 0.4 }}>
                  </div>
                  {/* Top face */}
                  <div className={`absolute ${cubeColor}`}
                       style={{ width: `${sideLength}px`, height: `${sideLength}px`, transform: `rotateX(90deg) translateZ(${sideLength/2}px)`, borderWidth: '2px', backfaceVisibility: 'hidden', filter: 'brightness(1.2)', opacity: 0.4 }}>
                  </div>
                  {/* Front face */}
                  <div className={`absolute inset-0 ${cubeColor}`}
                       style={{ transform: `translateZ(${sideLength/2}px)`, borderWidth: '2px', backfaceVisibility: 'hidden', opacity: 0.32 }}>
                  </div>
                </div>
              </div>

            </div>
          );
        });

        // Main App Component
        const App = () => {
          const [mass, setMass] = useState(1000);     // gram
          const [volume, setVolume] = useState(1000);  // cm³
          const [mode, setMode] = useState('EXPLORE');
          const [selectedMaterialName, setSelectedMaterialName] = useState(null);

          // mass i g, volume i cm³ → densitet i g/cm³, och i SI (kg/m³).
          const densityGcm3 = mass / volume;       // g/cm³
          const density = densityGcm3 * 1000;       // kg/m³ (SI)

          const handleVolumeChange = (newVolume) => {
            setVolume(newVolume);
            setSelectedMaterialName(null);
          };

          const handleMassChange = (newMass) => {
            setMass(newMass);
            setSelectedMaterialName(null);
          };

          const handleDensityChange = (newDensity) => {
            // newDensity i kg/m³ → massa i g = ρ_kgm3 · V_cm3 / 1000
            let newMass = newDensity * volume / 1000;

            if (newMass > MAX_MASS_G) {
              newMass = MAX_MASS_G;
            } else if (newMass < MIN_MASS_G) {
              newMass = MIN_MASS_G;
            }

            setMass(newMass);
            setSelectedMaterialName(null);
          };

          const selectMaterial = (material) => {
            // material.density i kg/m³ → massa i g = ρ_kgm3 · V_cm3 / 1000
            setSelectedMaterialName(material.name);
            let newMass = material.density * volume / 1000;

            if (newMass > MAX_MASS_G) {
                newMass = MAX_MASS_G;
                const newVolume = newMass * 1000 / material.density;
                setVolume(Math.max(MIN_VOLUME_CM3, Math.min(newVolume, MAX_VOLUME_CM3)));
            } else if (newMass < MIN_MASS_G) {
                newMass = MIN_MASS_G;
                const newVolume = newMass * 1000 / material.density;
                setVolume(Math.max(MIN_VOLUME_CM3, Math.min(newVolume, MAX_VOLUME_CM3)));
            }
            setMass(newMass);
          };

          return (
            <div className="min-h-screen dark-container px-4 md:px-8 pb-8 pt-4 font-sans" style={{ fontFamily: 'Poppins, sans-serif' }}>

              <div className="max-w-6xl mx-auto">
                <div className="breadcrumb mb-6">
                  <a href="index.html">Hem</a> / <a href="katalog.html#fy1">Fysik nivå 1</a> / Densitet
                </div>
              </div>

              <header className="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                  <h1 className="text-3xl md:text-4xl font-black text-slate-100 tracking-tight glow-text">
                    Densitet
                  </h1>
                  <div className="mt-3 flex items-center gap-3 flex-wrap" style={{fontFamily: 'Poppins, sans-serif', color: 'var(--lab-ink, #0f1620)'}}>
                    <div style={{textAlign: 'center'}}>
                      <div className="text-xs font-semibold mb-1" style={{color: 'var(--lab-ink-muted, #8a8579)', letterSpacing: '0.06em', textTransform: 'uppercase'}}>Densitet</div>
                      <div className="text-2xl font-bold"><em>ρ</em></div>
                    </div>
                    <div className="text-xl" style={{color: 'var(--lab-ink-muted, #8a8579)'}}>=</div>
                    <div style={{textAlign: 'center'}}>
                      <div className="text-xs font-semibold mb-1" style={{color: 'var(--lab-ink-muted, #8a8579)', letterSpacing: '0.06em', textTransform: 'uppercase'}}>Massa</div>
                      <div className="text-2xl font-bold"><em>m</em></div>
                      <div style={{borderTop: '2px solid var(--lab-ink, #0f1620)', marginTop: '3px', paddingTop: '3px'}}>
                        <div className="text-2xl font-bold"><em>V</em></div>
                      </div>
                      <div className="text-xs font-semibold mt-1" style={{color: 'var(--lab-ink-muted, #8a8579)', letterSpacing: '0.06em', textTransform: 'uppercase'}}>Volym</div>
                    </div>
                    <div className="text-xl" style={{color: 'var(--lab-ink-muted, #8a8579)'}}>=</div>
                    <div style={{textAlign: 'center', color: 'var(--lab-ink-soft, #3a4151)'}}>
                      <div className="text-lg font-mono">{formatNum(mass, 0)} g</div>
                      <div style={{borderTop: '2px solid var(--lab-ink-soft, #3a4151)', marginTop: '3px', paddingTop: '3px'}}>
                        <div className="text-lg font-mono">{formatNum(volume, 0)} cm³</div>
                      </div>
                    </div>
                    <div className="text-xl" style={{color: 'var(--lab-ink-muted, #8a8579)'}}>=</div>
                    <div className="text-2xl font-bold font-mono" style={{color: 'var(--lab-accent, #c8324a)'}}>
                      {formatNum(densityGcm3, 2)} g/cm³
                    </div>
                    <div className="text-xl" style={{color: 'var(--lab-ink-muted, #8a8579)'}}>=</div>
                    <div className="text-2xl font-bold font-mono" style={{color: 'var(--lab-accent, #c8324a)'}}>
                      {formatNum(density)} kg/m³
                    </div>
                  </div>
                  <p className="mt-2" style={{color: 'var(--lab-ink-soft, #3a4151)'}}>Utforska sambandet mellan massa, volym och densitet.</p>
                </div>

                <div className="p-1 flex gap-1" style={{background: 'var(--lab-bg, #f3eee4)', border: '1px solid var(--lab-line-strong, rgba(15,22,32,0.28))', borderRadius: '6px'}}>
                  <button
                    onClick={() => setMode('EXPLORE')}
                    className={`tab-button px-4 py-2 rounded text-sm font-semibold border ${
                      mode === 'EXPLORE' ? 'active-explore' : ''
                    }`}
                  >
                    Densitet
                  </button>
                  <button
                     onClick={() => setMode('BUOYANCY')}
                     className={`tab-button px-4 py-2 rounded text-sm font-semibold border ${
                       mode === 'BUOYANCY' ? 'active-buoyancy' : ''
                     }`}
                  >
                    Flytförmåga
                  </button>
                </div>
              </header>

              <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">

                <div className="lg:col-span-5 flex flex-col gap-6">
                  <div className="glass-card rounded-2xl overflow-hidden">
                     <div className="p-3 flex flex-wrap gap-1.5" style={{ borderBottom: '1px solid rgba(200, 50, 74, 0.1)' }}>
                       {MATERIALS.map((mat) => (
                         <button
                           key={mat.name}
                           onClick={() => selectMaterial(mat)}
                           className={`px-2 py-1 rounded-md text-xs font-semibold transition-all flex items-center gap-1.5 ${
                             selectedMaterialName === mat.name
                               ? 'material-btn-active'
                               : 'material-btn'
                           }`}
                           title={`${mat.name} – ${formatNum(mat.density)} kg/m³`}
                         >
                           <div className={`w-3 h-3 rounded-full ${mat.dotColor} flex-shrink-0`} style={{ boxShadow: '0 0 0 1px rgba(15,22,32,0.18)' }}></div>
                           <span>{mat.name}</span>
                         </button>
                       ))}
                     </div>
                     <div className="p-6 flex justify-center items-center"
                          style={{ backgroundImage: 'linear-gradient(rgba(200, 50, 74, 0.18) 1px, transparent 1px), linear-gradient(90deg, rgba(200, 50, 74, 0.18) 1px, transparent 1px)', backgroundSize: '20px 20px' }}>
                       <CubeVisualizer
                          mass={mass}
                          volume={volume}
                          density={density}
                          mode={mode}
                          selectedMaterialName={selectedMaterialName}
                       />
                     </div>
                  </div>

                </div>

                <div className="lg:col-span-7 flex flex-col gap-6">


                  <div className="grid gap-4">
                    <SliderControl
                      label="Massa"
                      value={mass}
                      min={MIN_MASS_G}
                      max={MAX_MASS_G}
                      step={1}
                      unit="g"
                      onChange={handleMassChange}
                      colorClass="emerald"
                      decimals={0}
                    />

                    <SliderControl
                      label="Volym"
                      value={volume}
                      min={MIN_VOLUME_CM3}
                      max={MAX_VOLUME_CM3}
                      step={10}
                      unit="cm³"
                      onChange={handleVolumeChange}
                      colorClass="purple"
                      decimals={0}
                    />

                    <SliderControl
                      label="Densitet (resulterande)"
                      value={density}
                      min={50}
                      max={20000}
                      step={10}
                      unit="kg/m³"
                      onChange={handleDensityChange}
                      colorClass="orange"
                      decimals={0}
                    />
                  </div>

                  <div className="p-4 text-sm" style={{background: 'var(--lab-bg, #f3eee4)', border: '1px solid var(--lab-line-strong, rgba(15,22,32,0.28))', borderLeft: '3px solid var(--lab-accent, #c8324a)', borderRadius: '0 4px 4px 0'}}>
                    <strong style={{color: 'var(--lab-accent, #c8324a)'}}>Tips:</strong>
                    <span style={{color: 'var(--lab-ink-soft, #3a4151)'}}> Observera hur atomerna (prickarna) packas tätare när densiteten ökar. Testa "Flytförmåga"-läget för att se vad som händer när du lägger kuben i vatten!</span>
                  </div>

                </div>
              </main>
            </div>
          );
        };

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="feedback.js" defer></script>
    <script src="data/katalog.js"></script>
    <script src="section-nav.js"></script>
</body>
</html>
