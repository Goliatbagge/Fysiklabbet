<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Fysiklabbet — Fliksystem (Laborans)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300..700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#f3eee4; font-family:"DM Sans", system-ui, sans-serif; }
  * { box-sizing: border-box; }
  button { font: inherit; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// Designsystem — variant "Laborans" (pappersljust katalog)
const t = {
  bg: '#f3eee4',
  bgRaised: '#ebe4d4',
  bgPanel: '#ffffff',
  ink: '#0f1620',
  inkSoft: '#3f4a5c',
  inkMuted: '#8a8579',
  line: 'rgba(15,22,32,0.12)',
  lineStrong: 'rgba(15,22,32,0.28)',
  accent: '#c8324a',
  accentSoft: 'rgba(200,50,74,0.10)',
  accent2: '#1c3d6b',
  fonts: {
    sans: '"DM Sans", "Söhne", -apple-system, system-ui, sans-serif',
    mono: '"JetBrains Mono", ui-monospace, "Menlo", monospace',
    display: '"Instrument Serif", "Fraunces", "Times New Roman", serif',
  },
};

const TAB_SECTIONS = {
  'Fysik 1': {
    'Rörelse': [
      ['1.1', 'Konstant hastighet', 'Likformig rörelse, s = v·t.'],
      ['1.2', 'Acceleration', 'Hastighetsändring per tidsenhet.'],
      ['1.3', 'Fritt fall', 'Rörelse under tyngdkraftens inverkan.'],
      ['1.4', 'Rörelsediagram', 'Sträcka-, hastighets- och accelerationsgrafer.'],
    ],
    'Krafter': [
      ['2.1', 'Newtons första lag', 'Tröghetslagen.'],
      ['2.2', 'Newtons andra lag', 'F = m·a.'],
      ['2.3', 'Newtons tredje lag', 'Aktion och reaktion.'],
      ['2.4', 'Gravitationslagen', 'Kraften mellan två kroppar.'],
      ['2.5', 'Friktion', 'Statisk och kinetisk friktion.'],
    ],
    'Densitet': [
      ['3.1', 'Densitet', 'ρ = m/V.'],
      ['3.2', 'Tryck', 'p = F/A.'],
      ['3.3', 'Arkimedes princip', 'Lyftkraft i vätskor och gaser.'],
      ['3.4', 'Ideala gaslagen', 'pV = nRT.'],
    ],
    'Värmelära': [
      ['4.1', 'Temperatur och inre energi', 'Termodynamikens grunder.'],
      ['4.2', 'Värmekapacitet', 'Q = c·m·ΔT.'],
      ['4.3', 'Fasövergångar', 'Smält- och ångbildningsentalpi.'],
    ],
    'Elektricitet': [
      ['5.1', 'Laddning och Coulombs lag', 'Elektrostatik.'],
      ['5.2', 'Elektriska kretsar', 'Spänning, ström och resistans.'],
      ['5.3', 'Serie- och parallellkoppling', 'Kopplingsscheman.'],
      ['5.4', 'Kirchhoffs lagar', 'Ström- och spänningslagarna.'],
      ['5.5', 'Effekt och energi', 'P = U·I.'],
    ],
    'Kärnfysik': [
      ['6.1', 'Atomens uppbyggnad', 'Protoner, neutroner och elektroner.'],
      ['6.2', 'Sönderfall', 'Alfa, beta och gamma.'],
      ['6.3', 'Halveringstid', 'Exponentiellt sönderfall.'],
      ['6.4', 'Massdefekt', 'E = Δm·c².'],
    ],
  },
  'Fysik 2': {
    'Rörelse': [
      ['1.1', 'Snett kast', 'Projektilrörelse.'],
      ['1.2', 'Cirkelrörelse', 'Centripetalkraft och vinkelhastighet.'],
    ],
    'Vågor': [
      ['2.1', 'Mekaniska vågor', 'Tvärgående och längsgående vågor.'],
      ['2.2', 'Stående vågor', 'Resonans och övertoner.'],
      ['2.3', 'Brytningslagen', 'Snells lag.'],
      ['2.4', 'Plan pendel', 'Periodens beroende av längd och g.'],
    ],
    'Elektromagnetism': [
      ['3.1', 'Magnetfält', 'Kring rak ledare och i spole.'],
      ['3.2', 'Induktion', 'Faradays induktionslag.'],
      ['3.3', 'EM-strålning', 'Spektrumet från radio till gamma.'],
    ],
    'Modern fysik': [
      ['4.1', 'Fotoelektrisk effekt', 'Einsteins fotonteori.'],
      ['4.2', 'Dubbelspalt', 'Våg-partikeldualitet.'],
      ['4.3', 'Spektrallinjer', 'Grundämnenas fingeravtryck.'],
      ['4.4', 'Energinivåer', 'Bohrs atommodell.'],
    ],
    'Astronomi': [
      ['5.1', 'Månens faser', 'Omloppsbanan ger faserna.'],
      ['5.2', 'Hubblelagen', 'Universums expansion.'],
    ],
  },
  'Matematik 1': {
    'Aritmetik': [['1.1', 'Tal och räkning', 'Heltal, decimaltal, bråk.']],
    'Algebra': [['2.1', 'Variabler och uttryck', 'Förenkla algebraiska uttryck.']],
    'Geometri': [['3.1', 'Areor och omkretsar', 'Klassiska figurer.']],
  },
  'Matematik 2': {
    'Algebra': [['1.1', 'Andragradsekvationer', 'pq-formeln.']],
    'Funktioner': [['2.1', 'Linjära funktioner', 'k och m.']],
  },
  'Matematik 3': {
    'Derivata': [['1.1', 'Derivatans definition', 'Gränsvärde.']],
  },
  'Matematik 4': {
    'Integraler': [['1.1', 'Primitiva funktioner', 'Integralens definition.']],
  },
};

const TAB_SUBJECTS = ['Fysik', 'Matematik'];
const TAB_COURSES = {
  'Fysik': ['Fysik 1', 'Fysik 2'],
  'Matematik': ['Matematik 1', 'Matematik 2', 'Matematik 3', 'Matematik 4'],
};

function TabExplorerLaborans() {
  const [subject, setSubject] = useState('Fysik');
  const [course, setCourse] = useState('Fysik 1');
  const courseChapters = TAB_SECTIONS[course] ? Object.keys(TAB_SECTIONS[course]) : [];
  const [chapter, setChapter] = useState(courseChapters[0]);
  const [section, setSection] = useState('1.1');

  useEffect(() => {
    const courses = TAB_COURSES[subject] || [];
    if (!courses.includes(course)) setCourse(courses[0]);
  }, [subject]);

  useEffect(() => {
    const chs = TAB_SECTIONS[course] ? Object.keys(TAB_SECTIONS[course]) : [];
    if (!chs.includes(chapter)) setChapter(chs[0]);
  }, [course]);

  useEffect(() => {
    const secs = (TAB_SECTIONS[course]?.[chapter]) || [];
    if (!secs.find(s => s[0] === section)) setSection(secs[0]?.[0]);
  }, [course, chapter]);

  const sections = TAB_SECTIONS[course]?.[chapter] || [];
  const active = sections.find(s => s[0] === section);
  const chapterIdx = courseChapters.indexOf(chapter) + 1;

  return (
    <div style={{ background: t.bg, color: t.ink, fontFamily: t.fonts.sans, minHeight: '100vh', width: '100%' }}>
      <div style={{ background: t.ink, color: t.bg, padding: '8px 0' }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 56px', display: 'flex', justifyContent: 'space-between', fontFamily: t.fonts.mono, fontSize: 10, letterSpacing: '0.18em' }}>
          <span>FYSIKLABBET — KATALOG ÖVER INTERAKTIVA EXPERIMENT</span>
          <span>NAVIGATION · FYRA NIVÅER</span>
        </div>
      </div>

      <div style={{ borderBottom: `2px solid ${t.ink}` }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '20px 56px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
            <svg width="36" height="36" viewBox="0 0 36 36">
              <circle cx="18" cy="18" r="17" fill="none" stroke={t.ink} strokeWidth="1" />
              <circle cx="18" cy="18" r="11" fill="none" stroke={t.ink} strokeWidth="1" />
              <circle cx="18" cy="18" r="3" fill={t.accent} />
            </svg>
            <div style={{ fontFamily: t.fonts.display, fontSize: 26, letterSpacing: '-0.01em' }}>Fysiklabbet</div>
          </div>
          <div style={{ display: 'flex', gap: 28, fontSize: 13 }}>
            {['Katalog', 'Senaste', 'Om', 'Kontakt'].map(n => (
              <a key={n} style={{ color: t.ink, cursor: 'pointer' }}>{n}</a>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1280, margin: '0 auto', padding: '24px 56px 4px', fontFamily: t.fonts.mono, fontSize: 11, color: t.inkMuted, letterSpacing: '0.14em' }}>
        KATALOG <span style={{ margin: '0 8px', color: t.inkSoft }}>/</span>
        <span style={{ color: t.ink }}>{subject.toUpperCase()}</span> <span style={{ margin: '0 8px', color: t.inkSoft }}>/</span>
        <span style={{ color: t.ink }}>{course.toUpperCase()}</span> <span style={{ margin: '0 8px', color: t.inkSoft }}>/</span>
        <span style={{ color: t.ink }}>{(chapter || '').toUpperCase()}</span> <span style={{ margin: '0 8px', color: t.inkSoft }}>/</span>
        <span style={{ color: t.accent }}>{section}</span>
      </div>
      <div style={{ maxWidth: 1280, margin: '0 auto', padding: '8px 56px 24px' }}>
        <h1 style={{ fontFamily: t.fonts.display, fontSize: 64, fontWeight: 400, letterSpacing: '-0.025em', lineHeight: 1, margin: 0 }}>
          Bläddra i <span style={{ fontStyle: 'italic', color: t.accent }}>katalogen</span>.
        </h1>
        <p style={{ fontSize: 15, color: t.inkSoft, marginTop: 12, maxWidth: 620, lineHeight: 1.55 }}>
          Fyra register, varandra inkapslade — välj ämne, kurs, kapitel och avsnitt. Som ett bibliotek.
        </p>
      </div>

      <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 56px 80px' }}>
        {/* Nivå 1: Ämne */}
        <div style={{ display: 'flex', alignItems: 'flex-end', gap: 4, marginBottom: -1, position: 'relative', zIndex: 4 }}>
          {TAB_SUBJECTS.map(s => (
            <button key={s} onClick={() => setSubject(s)} style={{
              background: subject === s ? t.bgPanel : t.bgRaised,
              color: subject === s ? t.ink : t.inkSoft,
              border: `1px solid ${t.lineStrong}`,
              borderBottom: subject === s ? `1px solid ${t.bgPanel}` : `1px solid ${t.lineStrong}`,
              padding: '14px 28px',
              fontSize: 15,
              fontFamily: t.fonts.display,
              fontWeight: 500,
              letterSpacing: '-0.005em',
              cursor: 'pointer',
              position: 'relative',
              top: 1,
            }}>
              <span style={{ fontFamily: t.fonts.mono, fontSize: 10, color: t.inkMuted, letterSpacing: '0.14em', marginRight: 10 }}>NIVÅ 1</span>
              {s}
            </button>
          ))}
          <div style={{ flex: 1, borderBottom: `1px solid ${t.lineStrong}`, marginBottom: 0 }} />
        </div>

        {/* Nivå 2: Kurs */}
        <div style={{ background: t.bgPanel, border: `1px solid ${t.lineStrong}`, borderTop: 'none', padding: '20px 28px 0', position: 'relative', zIndex: 3 }}>
          <div style={{ fontFamily: t.fonts.mono, fontSize: 10, color: t.inkMuted, letterSpacing: '0.16em', marginBottom: 12 }}>
            NIVÅ 2 · KURS
          </div>
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 0, marginBottom: -1, borderBottom: `1px solid ${t.lineStrong}` }}>
            {(TAB_COURSES[subject] || []).map(c => (
              <button key={c} onClick={() => setCourse(c)} style={{
                background: course === c ? t.bg : 'transparent',
                color: course === c ? t.ink : t.inkSoft,
                border: `1px solid ${course === c ? t.lineStrong : 'transparent'}`,
                borderBottom: course === c ? `1px solid ${t.bg}` : 'none',
                padding: '10px 22px',
                fontSize: 14,
                fontFamily: t.fonts.sans,
                fontWeight: course === c ? 600 : 400,
                cursor: 'pointer',
                position: 'relative',
                top: 1,
                letterSpacing: '-0.005em',
              }}>{c}</button>
            ))}
          </div>

          {/* Nivå 3: Kapitel */}
          <div style={{ background: t.bg, padding: '24px 28px 0', borderLeft: `1px solid ${t.lineStrong}`, borderRight: `1px solid ${t.lineStrong}` }}>
            <div style={{ fontFamily: t.fonts.mono, fontSize: 10, color: t.inkMuted, letterSpacing: '0.16em', marginBottom: 12 }}>
              NIVÅ 3 · KAPITEL
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 0, borderBottom: `2px solid ${t.ink}` }}>
              {courseChapters.map((ch, i) => (
                <button key={ch} onClick={() => setChapter(ch)} style={{
                  background: 'transparent',
                  color: chapter === ch ? t.ink : t.inkSoft,
                  border: 'none',
                  borderBottom: chapter === ch ? `3px solid ${t.accent}` : `3px solid transparent`,
                  padding: '12px 18px 10px',
                  fontSize: 14,
                  fontFamily: t.fonts.sans,
                  fontWeight: chapter === ch ? 600 : 400,
                  cursor: 'pointer',
                  marginBottom: -2,
                  letterSpacing: '-0.005em',
                  display: 'flex', alignItems: 'baseline', gap: 8,
                }}>
                  <span style={{ fontFamily: t.fonts.mono, fontSize: 11, color: chapter === ch ? t.accent : t.inkMuted }}>
                    {String(i + 1).padStart(2, '0')}
                  </span>
                  {ch}
                </button>
              ))}
            </div>

            {/* Nivå 4 + innehåll */}
            <div style={{ display: 'grid', gridTemplateColumns: '280px 1fr', gap: 0, minHeight: 460 }}>
              <aside style={{ borderRight: `1px solid ${t.lineStrong}`, padding: '24px 0 24px 0' }}>
                <div style={{ fontFamily: t.fonts.mono, fontSize: 10, color: t.inkMuted, letterSpacing: '0.16em', marginBottom: 14, paddingLeft: 4 }}>
                  NIVÅ 4 · AVSNITT
                </div>
                {sections.map((s) => {
                  const isActive = s[0] === section;
                  return (
                    <button key={s[0]} onClick={() => setSection(s[0])} style={{
                      width: '100%',
                      textAlign: 'left',
                      background: isActive ? t.ink : 'transparent',
                      color: isActive ? t.bg : t.ink,
                      border: 'none',
                      borderTop: `1px solid ${t.line}`,
                      padding: '14px 18px 14px 4px',
                      cursor: 'pointer',
                      display: 'grid',
                      gridTemplateColumns: '48px 1fr 14px',
                      gap: 8,
                      alignItems: 'baseline',
                    }}>
                      <span style={{ fontFamily: t.fonts.mono, fontSize: 13, color: isActive ? t.accent : t.inkMuted, letterSpacing: '0.04em' }}>
                        {s[0]}
                      </span>
                      <span style={{ fontSize: 14, fontWeight: isActive ? 600 : 400, lineHeight: 1.2 }}>
                        {s[1]}
                      </span>
                      <span style={{ fontFamily: t.fonts.mono, fontSize: 12, color: isActive ? t.accent : t.inkMuted }}>
                        {isActive ? '●' : '→'}
                      </span>
                    </button>
                  );
                })}
                <div style={{ borderTop: `1px solid ${t.line}` }} />
              </aside>

              <section style={{ padding: '32px 36px 36px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 12 }}>
                  <div style={{ fontFamily: t.fonts.mono, fontSize: 10, color: t.inkMuted, letterSpacing: '0.16em' }}>
                    KAPITEL {chapterIdx} · {(chapter || '').toUpperCase()} · AVSNITT {active?.[0]}
                  </div>
                  <div style={{ fontFamily: t.fonts.mono, fontSize: 10, color: t.inkMuted, letterSpacing: '0.16em' }}>
                    {sections.findIndex(s => s[0] === section) + 1} / {sections.length}
                  </div>
                </div>
                <h2 style={{ fontFamily: t.fonts.display, fontSize: 56, fontWeight: 400, letterSpacing: '-0.02em', lineHeight: 1, margin: '4px 0 8px' }}>
                  <span style={{ color: t.accent, fontStyle: 'italic' }}>{active?.[0]}</span>  {active?.[1]}
                </h2>
                <p style={{ fontSize: 16, color: t.inkSoft, lineHeight: 1.6, marginTop: 12, marginBottom: 28, maxWidth: 560 }}>
                  {active?.[2]} Avsnittet innehåller en kort genomgång, en
                  interaktiv simulering och tre övningar att räkna på.
                </p>

                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, marginBottom: 28 }}>
                  {[
                    ['Genomgång', '6 min', 'läsning'],
                    ['Simulering', 'Interaktiv', 'experiment'],
                    ['Övningar', '3 stycken', 'räkna'],
                  ].map(([k, v, tag]) => (
                    <div key={k} style={{ border: `1px solid ${t.lineStrong}`, padding: '16px 16px', background: t.bgRaised }}>
                      <div style={{ fontFamily: t.fonts.mono, fontSize: 10, color: t.inkMuted, letterSpacing: '0.14em', marginBottom: 10 }}>
                        {tag.toUpperCase()}
                      </div>
                      <div style={{ fontFamily: t.fonts.display, fontSize: 22, fontWeight: 500, letterSpacing: '-0.01em', marginBottom: 4 }}>
                        {k}
                      </div>
                      <div style={{ fontSize: 13, color: t.inkSoft }}>{v}</div>
                    </div>
                  ))}
                </div>

                <div style={{ display: 'flex', gap: 10 }}>
                  <button style={{
                    background: t.accent, color: '#fff', border: 'none', padding: '12px 22px',
                    fontSize: 14, fontFamily: t.fonts.sans, fontWeight: 600, cursor: 'pointer',
                  }}>Öppna avsnitt →</button>
                  <button style={{
                    background: 'transparent', color: t.ink, border: `1px solid ${t.lineStrong}`,
                    padding: '12px 22px', fontSize: 14, cursor: 'pointer',
                  }}>Bokmärk</button>
                  <div style={{ flex: 1 }} />
                  <button style={{
                    background: 'transparent', color: t.inkSoft, border: `1px solid ${t.line}`,
                    padding: '12px 16px', fontSize: 13, cursor: 'pointer',
                  }}>← Föregående</button>
                  <button style={{
                    background: 'transparent', color: t.inkSoft, border: `1px solid ${t.line}`,
                    padding: '12px 16px', fontSize: 13, cursor: 'pointer',
                  }}>Nästa →</button>
                </div>
              </section>
            </div>
          </div>

          <div style={{ height: 28 }} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TabExplorerLaborans />);
</script>
</body>
</html>
