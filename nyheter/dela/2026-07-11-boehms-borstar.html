    <title>Forskare avslöjar ett dolt mönster i ögat med skräddarsytt ljus — och vill göra det till ett nytt ögontest — Fysiklabbet</title>
    <meta name="description" content="De flesta har aldrig lagt märke till det, men långt ute i synfältets periferi döljer sig ett svagt, tvåflikigt ljusmönster som bara dyker upp när ljuset är polariserat. Forskare vid University at Buffalo och University of Waterloo har nu, med en teknik hämtad från kvantoptiken, förstärkt mönstret till tydliga figurer med flera flikar. Studien, publicerad i Proceedings of the National Academy of Sciences, är ett första steg mot ett helt nytt sätt att undersöka näthinnans hälsa.">
