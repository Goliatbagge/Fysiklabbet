    <script type="text/babel">
        const { useState, useRef, useCallback, useMemo, useEffect } = React;

        const Slider = ({ id, label, value, min, max, step, onChange, displayPrecision = 2, suffix = '' }) => {
            return (
                <div className="flex flex-col gap-2">
                    <div className="flex justify-between text-sm">
                        <label htmlFor={id} className="text-slate-400">{label}</label>
                        <span className="font-mono text-cyan-400">{value.toFixed(displayPrecision).replace('.', ',')}{suffix}</span>
                    </div>
                    <input
                        id={id}
                        type="range"
                        min={min}
                        max={max}
                        step={step}
                        value={value}
                        onChange={onChange}
                        className="w-full appearance-none cursor-pointer"
                    />
                </div>
            );
        };

        const MATERIALS = [
            { name: 'Luft', n: 1.00 },
            { name: 'Vatten', n: 1.33 },
            { name: 'Glas', n: 1.52 },
            { name: 'Diamant', n: 2.42 }
        ];

        const MaterialButtons = ({ value, onSelect }) => (
            <div className="flex gap-1.5 flex-wrap">
                {MATERIALS.map(m => {
                    const active = Math.abs(value - m.n) < 0.005;
                    return (
                        <button
                            key={m.name}
                            type="button"
                            onClick={() => onSelect(m.n)}
                            className="px-2.5 py-1 text-xs rounded-md transition"
                            style={active ? {
                                background: 'rgba(200, 50, 74, 0.18)',
                                border: '1px solid rgba(200, 50, 74, 0.7)',
                                color: '#c8324a'
                            } : {
                                background: 'rgba(30, 41, 59, 0.6)',
                                border: '1px solid rgba(15, 22, 32, 0.28)',
                                color: 'var(--lab-ink-soft)'
                            }}
                        >
                            {m.name}
                        </button>
                    );
                })}
            </div>
        );

        const ControlsView = ({ n1, setN1, n2, setN2, incidentAngle, setIncidentAngle, showReflected, setShowReflected, showAngles, setShowAngles, angleDisplay, setAngleDisplay, laserColor, setLaserColor, layerMode, setLayerMode }) => {
            const theta1Rad = incidentAngle * (Math.PI / 180);
            const sinTheta2 = (n1 / n2) * Math.sin(theta1Rad);
            const isTIR = Math.abs(sinTheta2) > 1;
            const theta2 = isTIR ? 0 : -Math.asin(sinTheta2) * (180 / Math.PI);

            return (
                <div className="glass-card p-6 h-full flex flex-col gap-6">
                    <div>
                        <h2 className="text-xl font-semibold text-cyan-400 mb-2">Inställningar</h2>
                        <p className="text-sm text-slate-400">
                            Justera parametrarna med reglagen nedan, eller dra i ljusstrålen för att ändra infallsvinkeln.
                        </p>
                    </div>

                    <div className="space-y-6">
                        <Slider
                            id="incident-angle"
                            label={<>Infallsvinkel (<i>i</i><sub>1</sub>)</>}
                            min={-89.9}
                            max={89.9}
                            step={0.1}
                            value={incidentAngle}
                            onChange={(e) => setIncidentAngle(parseFloat(e.target.value))}
                            displayPrecision={1}
                            suffix="°"
                        />
                        <div className="flex flex-col gap-2">
                            <Slider
                                id="n1-slider"
                                label={<>Brytningsindex medium 1 (<i>n</i>₁)</>}
                                min={1.00}
                                max={2.50}
                                step={0.01}
                                value={n1}
                                onChange={(e) => setN1(parseFloat(e.target.value))}
                            />
                            <MaterialButtons value={n1} onSelect={setN1} />
                        </div>
                        <div className="flex flex-col gap-2">
                            <Slider
                                id="n2-slider"
                                label={<>Brytningsindex block (<i>n</i>₂)</>}
                                min={1.00}
                                max={2.50}
                                step={0.01}
                                value={n2}
                                onChange={(e) => setN2(parseFloat(e.target.value))}
                            />
                            <MaterialButtons value={n2} onSelect={setN2} />
                        </div>

                        <div className="pt-1">
                            <span className="text-sm text-slate-400 block mb-2">Antal skikt</span>
                            <div className="flex flex-col gap-1.5">
                                <label className="flex items-center gap-2 cursor-pointer select-none">
                                    <input
                                        type="radio"
                                        name="layer-mode"
                                        value="three"
                                        checked={layerMode === 'three'}
                                        onChange={() => setLayerMode('three')}
                                        className="w-4 h-4 cursor-pointer"
                                        style={{ accentColor: '#38bdf8' }}
                                    />
                                    <span className="text-sm text-slate-300">Tre skikt (medium 1 + 2 + 1)</span>
                                </label>
                                <label className="flex items-center gap-2 cursor-pointer select-none">
                                    <input
                                        type="radio"
                                        name="layer-mode"
                                        value="two"
                                        checked={layerMode === 'two'}
                                        onChange={() => setLayerMode('two')}
                                        className="w-4 h-4 cursor-pointer"
                                        style={{ accentColor: '#38bdf8' }}
                                    />
                                    <span className="text-sm text-slate-300">Två skikt (medium 1 + 2)</span>
                                </label>
                            </div>
                        </div>

                        <label htmlFor="show-reflected" className="flex items-center gap-3 cursor-pointer select-none pt-1">
                            <input
                                id="show-reflected"
                                type="checkbox"
                                checked={showReflected}
                                onChange={(e) => setShowReflected(e.target.checked)}
                                className="w-4 h-4 cursor-pointer"
                                style={{ accentColor: '#38bdf8' }}
                            />
                            <span className="text-sm text-slate-300">Visa reflekterade strålar</span>
                        </label>

                        <div className="flex flex-col gap-2">
                            <label htmlFor="show-angles" className="flex items-center gap-3 cursor-pointer select-none">
                                <input
                                    id="show-angles"
                                    type="checkbox"
                                    checked={showAngles}
                                    onChange={(e) => setShowAngles(e.target.checked)}
                                    className="w-4 h-4 cursor-pointer"
                                    style={{ accentColor: '#38bdf8' }}
                                />
                                <span className="text-sm text-slate-300">Visa vinklar</span>
                            </label>
                            {showAngles && (
                                <div className="flex flex-col gap-1.5 ml-7">
                                    <label className="flex items-center gap-2 cursor-pointer select-none">
                                        <input
                                            type="radio"
                                            name="angle-display"
                                            value="labels"
                                            checked={angleDisplay === 'labels'}
                                            onChange={() => setAngleDisplay('labels')}
                                            className="w-4 h-4 cursor-pointer"
                                            style={{ accentColor: '#38bdf8' }}
                                        />
                                        <span className="text-sm text-slate-300">Beteckningar</span>
                                    </label>
                                    <label className="flex items-center gap-2 cursor-pointer select-none">
                                        <input
                                            type="radio"
                                            name="angle-display"
                                            value="values"
                                            checked={angleDisplay === 'values'}
                                            onChange={() => setAngleDisplay('values')}
                                            className="w-4 h-4 cursor-pointer"
                                            style={{ accentColor: '#38bdf8' }}
                                        />
                                        <span className="text-sm text-slate-300">Värden</span>
                                    </label>
                                </div>
                            )}
                        </div>

                        <div className="pt-1">
                            <span className="text-sm text-slate-400 block mb-2">Laserfärg</span>
                            <div className="flex gap-4">
                                <label className="flex items-center gap-2 cursor-pointer select-none">
                                    <input
                                        type="radio"
                                        name="laser-color"
                                        value="green"
                                        checked={laserColor === 'green'}
                                        onChange={() => setLaserColor('green')}
                                        className="w-4 h-4 cursor-pointer"
                                        style={{ accentColor: '#22c55e' }}
                                    />
                                    <span className="text-sm text-slate-300">Grön</span>
                                </label>
                                <label className="flex items-center gap-2 cursor-pointer select-none">
                                    <input
                                        type="radio"
                                        name="laser-color"
                                        value="red"
                                        checked={laserColor === 'red'}
                                        onChange={() => setLaserColor('red')}
                                        className="w-4 h-4 cursor-pointer"
                                        style={{ accentColor: '#ef4444' }}
                                    />
                                    <span className="text-sm text-slate-300">Röd</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div className="mt-4 pt-6 space-y-3" style={{ borderTop: '1px solid rgba(200, 50, 74, 0.2)' }}>
                        <div className="flex justify-between items-center p-3 rounded-lg"
                             style={{ background: 'rgba(30, 41, 59, 0.6)', border: '1px solid rgba(15, 22, 32, 0.21)' }}>
                            <span className="text-slate-300">Infallsvinkel (<i>i</i><sub>1</sub>):</span>
                            <span className="font-mono text-lg text-cyan-300">{incidentAngle.toFixed(1).replace('.', ',')}°</span>
                        </div>
                        <div className="flex justify-between items-center p-3 rounded-lg"
                             style={{ background: 'rgba(30, 41, 59, 0.6)', border: '1px solid rgba(15, 22, 32, 0.21)' }}>
                            <span className="text-slate-300">Brytningsvinkel (<i>b</i><sub>1</sub>):</span>
                            {isTIR ? (
                                <span className="font-bold text-lg text-red-400">Total intern reflektion</span>
                            ) : (
                                <span className="font-mono text-lg text-cyan-300">{theta2.toFixed(1).replace('.', ',')}°</span>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const SimulationView = ({ n1, setN1, n2, setN2, incidentAngle, setIncidentAngle, showReflected, showAngles, setShowAngles, angleDisplay, setAngleDisplay, laserColor, setLaserColor, layerMode, setLayerMode }) => {
            const svgRef = useRef(null);
            const sceneWrapRef = useRef(null);
            const [isDragging, setIsDragging] = useState(false);
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [controlsOpen, setControlsOpen] = useState(false);

            const isRedLaser = laserColor === 'red';
            const rayColor = isRedLaser ? '#ff1f3d' : '#39ff14';
            const apertureCenterColor = isRedLaser ? '#ffd5d5' : '#bbffaa';
            const glowEdgeColor = isRedLaser ? '#ff1f3d' : '#39ff14';

            useEffect(() => {
                const handler = () => {
                    setIsFullscreen(
                        document.fullscreenElement === sceneWrapRef.current ||
                        document.webkitFullscreenElement === sceneWrapRef.current
                    );
                };
                document.addEventListener('fullscreenchange', handler);
                document.addEventListener('webkitfullscreenchange', handler);
                return () => {
                    document.removeEventListener('fullscreenchange', handler);
                    document.removeEventListener('webkitfullscreenchange', handler);
                };
            }, []);

            const toggleFullscreen = () => {
                const el = sceneWrapRef.current;
                if (!el) return;
                const isFs = document.fullscreenElement || document.webkitFullscreenElement;
                if (isFs) {
                    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
                } else {
                    (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
                }
            };

            const isTwoLayer = layerMode === 'two';

            const VIEWBOX_WIDTH = 800;
            const VIEWBOX_HEIGHT = 450;
            const BLOCK_Y = isTwoLayer ? VIEWBOX_HEIGHT / 2 : 125;
            const BLOCK_HEIGHT = 200;
            const ENTRY_X = VIEWBOX_WIDTH / 2;
            const RAY_LENGTH = 175;
            const PEN_DIST = 95;
            const PEN_BODY_LEN = 84;
            const PEN_BODY_H = 14;

            const effectiveBlockHeight = isTwoLayer ? VIEWBOX_HEIGHT - BLOCK_Y : BLOCK_HEIGHT;

            const calculations = useMemo(() => {
                const theta1Rad = incidentAngle * (Math.PI / 180);
                const sinTheta2 = (n1 / n2) * Math.sin(theta1Rad);
                const isTIR = n1 > n2 && Math.abs(sinTheta2) > 1;
                const theta2Rad = isTIR ? 0 : -Math.asin(sinTheta2);

                const penTip = {
                    x: ENTRY_X + PEN_DIST * Math.sin(theta1Rad),
                    y: BLOCK_Y - PEN_DIST * Math.cos(theta1Rad)
                };
                const p2 = { x: ENTRY_X, y: BLOCK_Y };

                let p3, p4;

                if (isTIR) {
                    p3 = {
                        x: ENTRY_X - RAY_LENGTH * Math.sin(theta1Rad),
                        y: BLOCK_Y - RAY_LENGTH * Math.cos(theta1Rad)
                    };
                    p4 = p3;
                } else if (isTwoLayer) {
                    const dy = VIEWBOX_HEIGHT - BLOCK_Y;
                    const internalDx = dy * Math.tan(theta2Rad);
                    p3 = { x: ENTRY_X + internalDx, y: VIEWBOX_HEIGHT };
                    p4 = p3;
                } else {
                    const internalDx = BLOCK_HEIGHT * Math.tan(theta2Rad);
                    p3 = { x: ENTRY_X + internalDx, y: BLOCK_Y + BLOCK_HEIGHT };

                    p4 = {
                        x: p3.x - RAY_LENGTH * Math.sin(theta1Rad),
                        y: p3.y + RAY_LENGTH * Math.cos(theta1Rad)
                    };
                }

                // Reflekterad stråle vid övre gränsytan (partiell reflektion, tillbaka in i medium 1)
                const pR = {
                    x: ENTRY_X - RAY_LENGTH * Math.sin(theta1Rad),
                    y: BLOCK_Y - RAY_LENGTH * Math.cos(theta1Rad)
                };

                // Reflekterad stråle vid undre gränsytan (partiell reflektion, tillbaka in i medium 2)
                let pR2 = null;
                if (!isTIR && !isTwoLayer) {
                    pR2 = {
                        x: p3.x + RAY_LENGTH * Math.sin(theta2Rad),
                        y: p3.y - RAY_LENGTH * Math.cos(theta2Rad)
                    };
                }

                return { penTip, p2, p3, p4, pR, pR2, theta1Rad, theta2Rad, isTIR };
            }, [incidentAngle, n1, n2, isTwoLayer]);

            const { penTip, p2, p3, p4, pR, pR2, theta1Rad, theta2Rad, isTIR } = calculations;

            // Materialberoende opacitet: luft (n=1) → nästan osynlig medium-effekt,
            // glas/diamant → tydlig och briljant. Skalar specular och kropp gemensamt.
            const glassOpacity = Math.min(1.0, Math.max(0.18, (n2 - 1) * 1.05 + 0.18));
            const medium1Opacity = Math.min(1.0, Math.max(0.10, (n1 - 1) * 1.05 + 0.10));

            const theta1Deg = Math.abs(incidentAngle);
            const theta2Deg = isTIR ? 0 : Math.abs(theta2Rad * 180 / Math.PI);
            const showAngleValues = angleDisplay === 'values';
            const fmtDeg = (d) => d.toFixed(1).replace('.', ',');
            const getMediumLabel = (n, fallback) => {
                const mat = MATERIALS.find(m => Math.abs(n - m.n) < 0.005);
                return mat ? mat.name : fallback;
            };

            const handleInteraction = useCallback((e) => {
                if (!svgRef.current) return;

                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                const svg = svgRef.current;
                const ctm = svg.getScreenCTM();
                if (!ctm) return;
                const pt = svg.createSVGPoint();
                pt.x = clientX;
                pt.y = clientY;
                const svgP = pt.matrixTransform(ctm.inverse());

                const dx = svgP.x - p2.x;
                let dy = svgP.y - p2.y;
                if (dy >= 0) dy = -0.01;

                const angleRad = Math.atan2(dx, -dy);
                const angleDeg = angleRad * (180 / Math.PI);

                const clampedAngle = Math.max(-89.9, Math.min(89.9, angleDeg));
                setIncidentAngle(clampedAngle);

            }, [p2.x, p2.y, setIncidentAngle]);

            const handleMouseDown = (e) => {
                setIsDragging(true);
                handleInteraction(e);
            };

            const handleMouseUp = () => setIsDragging(false);

            const handleMouseMove = (e) => {
                if (isDragging) {
                    handleInteraction(e);
                }
            };

            const handleTouchStart = (e) => {
                setIsDragging(true);
                handleInteraction(e);
            };

            const handleTouchMove = (e) => {
                if (isDragging) {
                    e.preventDefault();
                    handleInteraction(e);
                }
            };

            const getArcPath = (cx, cy, radius, angle1Rad, angle2Rad) => {
                const startAngleRad = Math.min(angle1Rad, angle2Rad);
                const endAngleRad = Math.max(angle1Rad, angle2Rad);

                const startX = cx + radius * Math.sin(startAngleRad);
                const startY = cy - radius * Math.cos(startAngleRad);
                const endX = cx + radius * Math.sin(endAngleRad);
                const endY = cy - radius * Math.cos(endAngleRad);

                return `M ${startX} ${startY} A ${radius} ${radius} 0 0 1 ${endX} ${endY}`;
            };

            const getDownwardArcPath = (cx, cy, radius, angle1Rad, angle2Rad) => {
                const startAngleRad = Math.min(angle1Rad, angle2Rad);
                const endAngleRad = Math.max(angle1Rad, angle2Rad);

                const startX = cx + radius * Math.sin(startAngleRad);
                const startY = cy + radius * Math.cos(startAngleRad);
                const endX = cx + radius * Math.sin(endAngleRad);
                const endY = cy + radius * Math.cos(endAngleRad);

                return `M ${startX} ${startY} A ${radius} ${radius} 0 0 0 ${endX} ${endY}`;
            };

            return (
                <div className="scene-wrap" data-theme="ljusPapper"
                    ref={sceneWrapRef}
                    onMouseUp={handleMouseUp}
                    onMouseLeave={handleMouseUp}
                    onMouseMove={handleMouseMove}
                    onTouchEnd={handleMouseUp}
                    onTouchCancel={handleMouseUp}
                    onTouchMove={handleTouchMove}
                >
                    <svg
                        ref={svgRef}
                        viewBox={`0 0 ${VIEWBOX_WIDTH} ${VIEWBOX_HEIGHT}`}
                        preserveAspectRatio="xMidYMid meet"
                        className="cursor-pointer"
                        onMouseDown={handleMouseDown}
                        onTouchStart={handleTouchStart}
                    >
                        <defs>
                            <marker
                                id="arrow"
                                viewBox="0 0 10 10"
                                refX="8"
                                refY="5"
                                markerWidth="4"
                                markerHeight="4"
                                orient="auto"
                            >
                                <path d="M 0 0 L 10 5 L 0 10 z" fill={rayColor} />
                            </marker>
                            {/* Glaskropp - vertikal djupgradient (ljusare vid kanterna, Fresnel-känsla) */}
                            <linearGradient id="glassBodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stopColor="rgba(155, 215, 255, 0.20)"/>
                                <stop offset="18%" stopColor="rgba(90, 160, 220, 0.07)"/>
                                <stop offset="50%" stopColor="rgba(35, 75, 130, 0.05)"/>
                                <stop offset="82%" stopColor="rgba(90, 160, 220, 0.07)"/>
                                <stop offset="100%" stopColor="rgba(155, 215, 255, 0.18)"/>
                            </linearGradient>
                            {/* Diagonal sheen - ljusvariation över glaset */}
                            <linearGradient id="glassSheen" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stopColor="rgba(186, 230, 253, 0)"/>
                                <stop offset="35%" stopColor="rgba(186, 230, 253, 0.06)"/>
                                <stop offset="55%" stopColor="rgba(255, 255, 255, 0.04)"/>
                                <stop offset="80%" stopColor="rgba(186, 230, 253, 0.03)"/>
                                <stop offset="100%" stopColor="rgba(186, 230, 253, 0)"/>
                            </linearGradient>
                            {/* Specular highlight vid övre kant - ljust band som tonas ut nedåt */}
                            <linearGradient id="topEdgeSpecular" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stopColor="rgba(224, 242, 254, 0.6)"/>
                                <stop offset="35%" stopColor="rgba(200, 50, 74, 0.10)"/>
                                <stop offset="100%" stopColor="rgba(200, 50, 74, 0)"/>
                            </linearGradient>
                            {/* Specular highlight vid undre kant - ljust band som tonas ut uppåt */}
                            <linearGradient id="bottomEdgeSpecular" x1="0%" y1="100%" x2="0%" y2="0%">
                                <stop offset="0%" stopColor="rgba(224, 242, 254, 0.55)"/>
                                <stop offset="35%" stopColor="rgba(200, 50, 74, 0.10)"/>
                                <stop offset="100%" stopColor="rgba(200, 50, 74, 0)"/>
                            </linearGradient>
                            {/* Mikrotextur för polerad glasyta */}
                            <filter id="glassNoise" x="0%" y="0%" width="100%" height="100%">
                                <feTurbulence type="fractalNoise" baseFrequency="2.2" numOctaves="2" seed="11" stitchTiles="stitch"/>
                                <feColorMatrix values="0 0 0 0 0.78
                                                       0 0 0 0 0.88
                                                       0 0 0 0 1
                                                       0 0 0 0.05 0"/>
                            </filter>
                            {/* Medium 1 (övre region) - tonas mörkare upptill, ljusare nära gränsytan */}
                            <linearGradient id="medium1UpperGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stopColor="rgba(155, 215, 255, 0.10)"/>
                                <stop offset="50%" stopColor="rgba(60, 110, 180, 0.04)"/>
                                <stop offset="100%" stopColor="rgba(155, 215, 255, 0.20)"/>
                            </linearGradient>
                            {/* Medium 1 (nedre region, tre-skiktsläge) - inverterad */}
                            <linearGradient id="medium1LowerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stopColor="rgba(155, 215, 255, 0.20)"/>
                                <stop offset="50%" stopColor="rgba(60, 110, 180, 0.04)"/>
                                <stop offset="100%" stopColor="rgba(155, 215, 255, 0.10)"/>
                            </linearGradient>
                            {/* Medium 1 specular vid gränsytan ovanifrån (fading uppåt från BLOCK_Y) */}
                            <linearGradient id="medium1BottomSpecular" x1="0%" y1="100%" x2="0%" y2="0%">
                                <stop offset="0%" stopColor="rgba(224, 242, 254, 0.45)"/>
                                <stop offset="40%" stopColor="rgba(200, 50, 74, 0.09)"/>
                                <stop offset="100%" stopColor="rgba(200, 50, 74, 0)"/>
                            </linearGradient>
                            {/* Medium 1 specular vid undre gränsytan (fading nedåt) */}
                            <linearGradient id="medium1TopSpecular" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stopColor="rgba(224, 242, 254, 0.45)"/>
                                <stop offset="40%" stopColor="rgba(200, 50, 74, 0.09)"/>
                                <stop offset="100%" stopColor="rgba(200, 50, 74, 0)"/>
                            </linearGradient>
                            {/* Glint vid laserns interaktion med glasytan */}
                            <radialGradient id="glassSparkle" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stopColor="rgba(255, 255, 255, 1)"/>
                                <stop offset="18%" stopColor="rgba(255, 255, 255, 0.7)"/>
                                <stop offset="45%" stopColor="rgba(186, 230, 253, 0.25)"/>
                                <stop offset="100%" stopColor="rgba(200, 50, 74, 0)"/>
                            </radialGradient>
                            <linearGradient id="penBodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stopColor="#64748b"/>
                                <stop offset="35%" stopColor="#334155"/>
                                <stop offset="55%" stopColor="#1e293b"/>
                                <stop offset="100%" stopColor="#020617"/>
                            </linearGradient>
                            <radialGradient id="penTipGlow" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stopColor={apertureCenterColor} stopOpacity="1"/>
                                <stop offset="60%" stopColor={glowEdgeColor} stopOpacity="0.9"/>
                                <stop offset="100%" stopColor={glowEdgeColor} stopOpacity="0"/>
                            </radialGradient>
                            <filter id="laserGlow" x="-50%" y="-50%" width="200%" height="200%">
                                <feGaussianBlur stdDeviation="4" result="blur1"/>
                                <feGaussianBlur stdDeviation="8" in="SourceGraphic" result="blur2"/>
                                <feMerge>
                                    <feMergeNode in="blur2"/>
                                    <feMergeNode in="blur1"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                        </defs>

                        {/* Bakgrundsruta - övre medium */}
                        <rect x="0" y="0" width={VIEWBOX_WIDTH} height={BLOCK_Y} fill="rgb(10, 15, 30)"/>
                        {/* Bakgrundsruta - nedre medium (endast i tre-skikts-läget) */}
                        {!isTwoLayer && <rect x="0" y={BLOCK_Y + BLOCK_HEIGHT} width={VIEWBOX_WIDTH} height={VIEWBOX_HEIGHT - BLOCK_Y - BLOCK_HEIGHT} fill="rgb(10, 15, 30)"/>}

                        {/* === MEDIUM 1 - SKIKTAD FÖR AUTENTISK MATERIALKÄNSLA === */}
                        <g opacity={medium1Opacity}>
                            {/* Övre region - bas: vertikal djupgradient */}
                            <rect x="0" y="0" width={VIEWBOX_WIDTH} height={BLOCK_Y} fill="url(#medium1UpperGradient)"/>
                            {/* Mikrotextur */}
                            <rect x="0" y="0" width={VIEWBOX_WIDTH} height={BLOCK_Y}
                                  filter="url(#glassNoise)" opacity="0.45"/>
                            {/* Diagonal sheen */}
                            <rect x="0" y="0" width={VIEWBOX_WIDTH} height={BLOCK_Y} fill="url(#glassSheen)"/>
                            {/* Specular band vid gränsytan (fading uppåt) */}
                            <rect x="0" y={BLOCK_Y - 24} width={VIEWBOX_WIDTH} height="24" fill="url(#medium1BottomSpecular)"/>

                            {/* Nedre region - endast tre-skiktsläge */}
                            {!isTwoLayer && <>
                                <rect x="0" y={BLOCK_Y + BLOCK_HEIGHT} width={VIEWBOX_WIDTH} height={VIEWBOX_HEIGHT - BLOCK_Y - BLOCK_HEIGHT} fill="url(#medium1LowerGradient)"/>
                                <rect x="0" y={BLOCK_Y + BLOCK_HEIGHT} width={VIEWBOX_WIDTH} height={VIEWBOX_HEIGHT - BLOCK_Y - BLOCK_HEIGHT}
                                      filter="url(#glassNoise)" opacity="0.45"/>
                                <rect x="0" y={BLOCK_Y + BLOCK_HEIGHT} width={VIEWBOX_WIDTH} height={VIEWBOX_HEIGHT - BLOCK_Y - BLOCK_HEIGHT} fill="url(#glassSheen)"/>
                                {/* Specular band vid undre gränsytan (fading nedåt) */}
                                <rect x="0" y={BLOCK_Y + BLOCK_HEIGHT} width={VIEWBOX_WIDTH} height="24" fill="url(#medium1TopSpecular)"/>
                            </>}
                        </g>

                        {/* === GLASKROPP - SKIKTAD FÖR AUTENTISK GLASKÄNSLA === */}
                        <g opacity={glassOpacity}>
                            {/* Bas: vertikal djupgradient (Fresnel-känsla med ljusare kanter) */}
                            <rect x="0" y={BLOCK_Y} width={VIEWBOX_WIDTH} height={effectiveBlockHeight} fill="url(#glassBodyGradient)"/>

                            {/* Mikrotextur - polerad glasyta */}
                            <rect x="0" y={BLOCK_Y} width={VIEWBOX_WIDTH} height={effectiveBlockHeight}
                                  filter="url(#glassNoise)" opacity="0.55"/>

                            {/* Diagonal sheen - fångat ljus över glaset */}
                            <rect x="0" y={BLOCK_Y} width={VIEWBOX_WIDTH} height={effectiveBlockHeight} fill="url(#glassSheen)"/>

                            {/* Specular band vid övre kant */}
                            <rect x="0" y={BLOCK_Y} width={VIEWBOX_WIDTH} height="24" fill="url(#topEdgeSpecular)"/>

                            {/* Specular band vid undre kant (endast tre-skiktsläge) */}
                            {!isTwoLayer && <rect x="0" y={BLOCK_Y + BLOCK_HEIGHT - 24} width={VIEWBOX_WIDTH} height="24" fill="url(#bottomEdgeSpecular)"/>}

                            {/* Övre kant - ljus specular-linje (polerad yta) */}
                            <line x1="0" y1={BLOCK_Y} x2={VIEWBOX_WIDTH} y2={BLOCK_Y} stroke="rgba(224, 242, 254, 0.95)" strokeWidth="1.6"/>
                            <line x1="0" y1={BLOCK_Y + 1.4} x2={VIEWBOX_WIDTH} y2={BLOCK_Y + 1.4} stroke="rgba(200, 50, 74, 0.5)" strokeWidth="0.7"/>

                            {/* Undre kant - ljus specular-linje (polerad yta) */}
                            {!isTwoLayer && <>
                                <line x1="0" y1={BLOCK_Y + BLOCK_HEIGHT} x2={VIEWBOX_WIDTH} y2={BLOCK_Y + BLOCK_HEIGHT} stroke="rgba(224, 242, 254, 0.95)" strokeWidth="1.6"/>
                                <line x1="0" y1={BLOCK_Y + BLOCK_HEIGHT - 1.4} x2={VIEWBOX_WIDTH} y2={BLOCK_Y + BLOCK_HEIGHT - 1.4} stroke="rgba(200, 50, 74, 0.5)" strokeWidth="0.7"/>
                            </>}
                        </g>

                        {/* Medium-texter */}
                        <text x="20" y="85" fill="#7dd3fc" fontSize="24" fontWeight="500" fontFamily="Poppins, sans-serif">
                            {getMediumLabel(n1, 'Medium 1')} (<tspan fontStyle="italic">n</tspan>
                            <tspan fontSize="16" dy="4">1</tspan>
                            <tspan dy="-4"> = {n1.toFixed(2).replace('.', ',')}</tspan>)
                        </text>
                        <text x="20" y={BLOCK_Y + 40} fill="#5a6170" fontSize="24" fontWeight="500" fontFamily="Poppins, sans-serif">
                            {getMediumLabel(n2, 'Medium 2')} (<tspan fontStyle="italic">n</tspan>
                            <tspan fontSize="16" dy="4">2</tspan>
                            <tspan dy="-4"> = {n2.toFixed(2).replace('.', ',')}</tspan>)
                        </text>

                        {/* Normallinjer (streckade) */}
                        {showAngles && <line x1={p2.x} y1="0" x2={p2.x} y2={VIEWBOX_HEIGHT} stroke="#475569" strokeWidth="2" strokeDasharray="5,5" />}
                        {showAngles && !isTIR && !isTwoLayer && <line x1={p3.x} y1={BLOCK_Y} x2={p3.x} y2={VIEWBOX_HEIGHT} stroke="#475569" strokeWidth="2" strokeDasharray="5,5" />}

                        {/* Ljusstrålar - grön laser med glow */}
                        <g filter="url(#laserGlow)">
                            <g stroke={rayColor} strokeWidth="3" strokeLinecap="round">
                                <line x1={penTip.x} y1={penTip.y} x2={p2.x} y2={p2.y} />
                                <line x1={p2.x} y1={p2.y} x2={p3.x} y2={p3.y} />
                                {!isTIR && !isTwoLayer && <line x1={p3.x} y1={p3.y} x2={p4.x} y2={p4.y} />}
                            </g>

                            {/* Reflekterade strålar (streckade, partiell reflektion) */}
                            {showReflected && !isTIR && (
                                <g stroke={rayColor} strokeWidth="2.5" strokeLinecap="round" strokeDasharray="8,5" opacity="0.4">
                                    <line x1={p2.x} y1={p2.y} x2={pR.x} y2={pR.y} />
                                    {pR2 && <line x1={p3.x} y1={p3.y} x2={pR2.x} y2={pR2.y} />}
                                </g>
                            )}
                        </g>

                        {/* Glints/sparkles där lasern träffar och lämnar glasytan */}
                        <g style={{ pointerEvents: 'none' }} opacity={glassOpacity}>
                            {/* Övre yta - alltid en träffpunkt (även vid TIR) */}
                            <circle cx={p2.x} cy={p2.y} r={20} fill="url(#glassSparkle)"/>
                            <circle cx={p2.x} cy={p2.y} r={4.5} fill="rgba(255, 255, 255, 0.9)"/>

                            {/* Undre yta - endast i tre-skiktsläge utan TIR */}
                            {!isTIR && !isTwoLayer && <>
                                <circle cx={p3.x} cy={p3.y} r={20} fill="url(#glassSparkle)"/>
                                <circle cx={p3.x} cy={p3.y} r={4.5} fill="rgba(255, 255, 255, 0.9)"/>
                            </>}
                        </g>

                        {/* Pilar på strålar */}
                        <g>
                            {(() => {
                                const mid1x = (penTip.x + p2.x) / 2;
                                const mid1y = (penTip.y + p2.y) / 2;
                                const dx1 = p2.x - penTip.x;
                                const dy1 = p2.y - penTip.y;
                                const len1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);
                                const arrowLen = 1;
                                return <line x1={mid1x} y1={mid1y} x2={mid1x + (dx1 / len1) * arrowLen} y2={mid1y + (dy1 / len1) * arrowLen} stroke={rayColor} strokeWidth="3" markerEnd="url(#arrow)" />;
                            })()}
                            {(() => {
                                const mid2x = (p2.x + p3.x) / 2;
                                const mid2y = (p2.y + p3.y) / 2;
                                const dx2 = p3.x - p2.x;
                                const dy2 = p3.y - p2.y;
                                const len2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
                                const arrowLen = 1;
                                return <line x1={mid2x} y1={mid2y} x2={mid2x + (dx2 / len2) * arrowLen} y2={mid2y + (dy2 / len2) * arrowLen} stroke={rayColor} strokeWidth="3" markerEnd="url(#arrow)" />;
                            })()}
                            {!isTIR && !isTwoLayer && (() => {
                                const mid3x = (p3.x + p4.x) / 2;
                                const mid3y = (p3.y + p4.y) / 2;
                                const dx3 = p4.x - p3.x;
                                const dy3 = p4.y - p3.y;
                                const len3 = Math.sqrt(dx3 * dx3 + dy3 * dy3);
                                const arrowLen = 1;
                                return <line x1={mid3x} y1={mid3y} x2={mid3x + (dx3 / len3) * arrowLen} y2={mid3y + (dy3 / len3) * arrowLen} stroke={rayColor} strokeWidth="3" markerEnd="url(#arrow)" />;
                            })()}
                            {showReflected && !isTIR && (() => {
                                const midRx = (p2.x + pR.x) / 2;
                                const midRy = (p2.y + pR.y) / 2;
                                const dxR = pR.x - p2.x;
                                const dyR = pR.y - p2.y;
                                const lenR = Math.sqrt(dxR * dxR + dyR * dyR);
                                const arrowLen = 1;
                                return <line x1={midRx} y1={midRy} x2={midRx + (dxR / lenR) * arrowLen} y2={midRy + (dyR / lenR) * arrowLen} stroke={rayColor} strokeWidth="2.5" opacity="0.4" markerEnd="url(#arrow)" />;
                            })()}
                            {showReflected && !isTIR && pR2 && (() => {
                                const midR2x = (p3.x + pR2.x) / 2;
                                const midR2y = (p3.y + pR2.y) / 2;
                                const dxR2 = pR2.x - p3.x;
                                const dyR2 = pR2.y - p3.y;
                                const lenR2 = Math.sqrt(dxR2 * dxR2 + dyR2 * dyR2);
                                const arrowLen = 1;
                                return <line x1={midR2x} y1={midR2y} x2={midR2x + (dxR2 / lenR2) * arrowLen} y2={midR2y + (dyR2 / lenR2) * arrowLen} stroke={rayColor} strokeWidth="2.5" opacity="0.4" markerEnd="url(#arrow)" />;
                            })()}
                        </g>

                        {/* Laserpenna - sitter vid penTip och pekar mot p2 */}
                        {(() => {
                            const angleDeg = 90 + incidentAngle;
                            const L = PEN_BODY_LEN;
                            const H = PEN_BODY_H;
                            const capLen = 6;
                            const bodyLen = L - capLen;
                            return (
                                <g transform={`translate(${penTip.x} ${penTip.y}) rotate(${angleDeg})`}>
                                    {/* Visuella element - klick passerar igenom till SVG-drag */}
                                    <g style={{ pointerEvents: 'none' }}>
                                        {/* Mjukt halo runt aperturen (laserkällan) */}
                                        <circle cx={0} cy={0} r={9} fill="url(#penTipGlow)"/>
                                        {/* Pennans huvudkropp */}
                                        <rect x={-L} y={-H/2} width={bodyLen} height={H}
                                              fill="url(#penBodyGrad)" stroke="#f3eee4" strokeWidth="0.8" rx="3" ry="3"/>
                                        {/* Främre kapsel (där lasern kommer ut) */}
                                        <rect x={-capLen} y={-H/2 - 1.2} width={capLen} height={H + 2.4}
                                              fill="#f3eee4" stroke="#f3eee4" strokeWidth="0.8" rx="1.6" ry="1.6"/>
                                        {/* Aperturen (källan) */}
                                        <circle cx={-1.5} cy={0} r={2.4} fill={apertureCenterColor}/>
                                        <circle cx={-1.5} cy={0} r={1.4} fill="#ffffff"/>
                                        {/* Subtil ljusstrimma längs ovansidan för metallisk känsla */}
                                        <line x1={-L + 4} y1={-H/2 + 2} x2={-capLen - 3} y2={-H/2 + 2}
                                              stroke="rgba(15, 22, 32, 0.3)" strokeWidth="0.8" strokeLinecap="round"/>
                                    </g>
                                    {/* Grön laserknapp på baksidan av pennan */}
                                    {(() => {
                                        const cx = -L + 7;
                                        const cy = 0;
                                        const r = 2.5;
                                        const active = !isRedLaser;
                                        return (
                                            <g style={{ cursor: 'pointer' }}
                                               onClick={(e) => { e.stopPropagation(); setLaserColor('green'); }}
                                               onMouseDown={(e) => e.stopPropagation()}
                                               onTouchStart={(e) => e.stopPropagation()}>
                                                {/* Träffyta */}
                                                <circle cx={cx} cy={cy} r={6} fill="#f3eee4"/>
                                                {/* Bas/kant */}
                                                <circle cx={cx} cy={cy} r={r + 0.7} fill="#f3eee4"/>
                                                {/* Knappens framsida */}
                                                <circle cx={cx} cy={cy} r={r} fill={active ? '#22c55e' : '#14532d'}/>
                                                {/* Glow när aktiv */}
                                                {active && <circle cx={cx} cy={cy} r={r + 1.4} fill="none" stroke="#22c55e" strokeWidth="0.4" opacity="0.7"/>}
                                                {/* Inre skugga */}
                                                <circle cx={cx} cy={cy} r={r} fill="none"
                                                        stroke={active ? '#166534' : '#022c22'} strokeWidth="0.4"/>
                                                {/* Ljusstrimma */}
                                                <ellipse cx={cx - 0.7} cy={cy - 0.7} rx={0.8} ry={0.5}
                                                         fill={active ? 'rgba(220,255,220,0.8)' : 'rgba(160,200,160,0.35)'}/>
                                            </g>
                                        );
                                    })()}
                                    {/* Röd laserknapp på baksidan av pennan */}
                                    {(() => {
                                        const cx = -L + 14;
                                        const cy = 0;
                                        const r = 2.5;
                                        const active = isRedLaser;
                                        return (
                                            <g style={{ cursor: 'pointer' }}
                                               onClick={(e) => { e.stopPropagation(); setLaserColor('red'); }}
                                               onMouseDown={(e) => e.stopPropagation()}
                                               onTouchStart={(e) => e.stopPropagation()}>
                                                {/* Träffyta */}
                                                <circle cx={cx} cy={cy} r={6} fill="#f3eee4"/>
                                                {/* Bas/kant */}
                                                <circle cx={cx} cy={cy} r={r + 0.7} fill="#f3eee4"/>
                                                {/* Knappens framsida */}
                                                <circle cx={cx} cy={cy} r={r} fill={active ? '#ef4444' : '#450a0a'}/>
                                                {/* Glow när aktiv */}
                                                {active && <circle cx={cx} cy={cy} r={r + 1.4} fill="none" stroke="#ef4444" strokeWidth="0.4" opacity="0.7"/>}
                                                {/* Inre skugga */}
                                                <circle cx={cx} cy={cy} r={r} fill="none"
                                                        stroke={active ? '#7f1d1d' : '#1c0606'} strokeWidth="0.4"/>
                                                {/* Ljusstrimma */}
                                                <ellipse cx={cx - 0.7} cy={cy - 0.7} rx={0.8} ry={0.5}
                                                         fill={active ? 'rgba(255,220,220,0.8)' : 'rgba(200,160,160,0.35)'}/>
                                            </g>
                                        );
                                    })()}
                                </g>
                            );
                        })()}

                        {/* TIR-etikett */}
                        {isTIR && <text x={p2.x + 15} y={p2.y - 40} fill="#ef4444" fontSize="18" fontWeight="bold" fontFamily="Poppins, sans-serif">Total intern reflektion</text>}

                        {/* Vinkelbågar - övre gränsyta */}
                        {showAngles && <g>
                            <path d={getArcPath(p2.x, p2.y, 40, 0, theta1Rad)} stroke="#0ea5e9" strokeWidth="2" fill="none"/>
                            <text x={p2.x + 55 * Math.sin(theta1Rad/2)} y={p2.y - 55 * Math.cos(theta1Rad/2)} fill="#0ea5e9" fontSize="16" fontStyle="italic" textAnchor="middle" fontFamily="Poppins, sans-serif">
                                {showAngleValues
                                    ? <tspan fontSize="14" fontStyle="normal">{fmtDeg(theta1Deg)}°</tspan>
                                    : <><tspan>i</tspan><tspan fontSize="12" dy="4">1</tspan></>
                                }
                            </text>

                            {isTIR ? (
                                <g>
                                    <path d={getArcPath(p2.x, p2.y, 60, 0, -theta1Rad)} stroke="#ec4899" strokeWidth="2" fill="none"/>
                                    <text x={p2.x + 75 * Math.sin(-theta1Rad/2)} y={p2.y - 75 * Math.cos(-theta1Rad/2)} fill="#ec4899" fontSize="18" fontStyle="italic" textAnchor="middle" fontFamily="Poppins, sans-serif">
                                        {showAngleValues
                                            ? <tspan fontSize="14" fontStyle="normal">{fmtDeg(theta1Deg)}°</tspan>
                                            : <><tspan>r</tspan><tspan fontSize="13" dy="4">1</tspan></>
                                        }
                                    </text>
                                </g>
                            ) : (
                                <g>
                                    <path d={getDownwardArcPath(p2.x, p2.y, 40, 0, theta2Rad)} stroke="#8b5cf6" strokeWidth="2" fill="none" />
                                    <text x={p2.x + 60 * Math.sin(theta2Rad/2)} y={p2.y + 60 * Math.cos(theta2Rad/2)} fill="#8b5cf6" fontSize="16" fontStyle="italic" textAnchor="middle" fontFamily="Poppins, sans-serif">
                                        {showAngleValues
                                            ? <tspan fontSize="14" fontStyle="normal">{fmtDeg(theta2Deg)}°</tspan>
                                            : <><tspan>b</tspan><tspan fontSize="12" dy="4">1</tspan></>
                                        }
                                    </text>
                                </g>
                            )}
                        </g>}

                        {/* Vinkelbågar - nedre gränsyta */}
                        {showAngles && !isTIR && !isTwoLayer && (
                            <g>
                                <path d={getArcPath(p3.x, p3.y, 40, 0, -theta2Rad)} stroke="#8b5cf6" strokeWidth="2" fill="none"/>
                                <text x={p3.x - 55 * Math.sin(theta2Rad/2)} y={p3.y - 55 * Math.cos(theta2Rad/2)} fill="#8b5cf6" fontSize="16" fontStyle="italic" textAnchor="middle" fontFamily="Poppins, sans-serif">
                                    {showAngleValues
                                        ? <tspan fontSize="14" fontStyle="normal">{fmtDeg(theta2Deg)}°</tspan>
                                        : <><tspan>i</tspan><tspan fontSize="12" dy="4">2</tspan></>
                                    }
                                </text>

                                <path d={getDownwardArcPath(p3.x, p3.y, 40, 0, -theta1Rad)} stroke="#0ea5e9" strokeWidth="2" fill="none" />
                                <text x={p3.x - 60 * Math.sin(theta1Rad/2)} y={p3.y + 60 * Math.cos(theta1Rad/2)} fill="#0ea5e9" fontSize="16" fontStyle="italic" textAnchor="middle" fontFamily="Poppins, sans-serif">
                                    {showAngleValues
                                        ? <tspan fontSize="14" fontStyle="normal">{fmtDeg(theta1Deg)}°</tspan>
                                        : <><tspan>b</tspan><tspan fontSize="12" dy="4">2</tspan></>
                                    }
                                </text>
                            </g>
                        )}

                        {/* Reflektionsvinklar - visas när reflekterade strålar och vinklar båda är på */}
                        {showAngles && showReflected && !isTIR && (
                            <g>
                                {/* Reflektion vid övre gränsytan (spegelvänd kring normalen från i₁) */}
                                <path d={getArcPath(p2.x, p2.y, 60, 0, -theta1Rad)} stroke="#0ea5e9" strokeWidth="2" fill="none" strokeDasharray="4,3" opacity="0.7"/>
                                <text x={p2.x + 75 * Math.sin(-theta1Rad/2)} y={p2.y - 75 * Math.cos(-theta1Rad/2)} fill="#0ea5e9" fontSize="16" fontStyle="italic" textAnchor="middle" fontFamily="Poppins, sans-serif" opacity="0.85">
                                    {showAngleValues
                                        ? <tspan fontSize="14" fontStyle="normal">{fmtDeg(theta1Deg)}°</tspan>
                                        : <><tspan>r</tspan><tspan fontSize="12" dy="4">1</tspan></>
                                    }
                                </text>

                                {/* Reflektion vid undre gränsytan (endast tre-skiktsläge) */}
                                {!isTwoLayer && pR2 && (
                                    <g>
                                        <path d={getArcPath(p3.x, p3.y, 60, 0, theta2Rad)} stroke="#8b5cf6" strokeWidth="2" fill="none" strokeDasharray="4,3" opacity="0.7"/>
                                        <text x={p3.x + 75 * Math.sin(theta2Rad/2)} y={p3.y - 75 * Math.cos(theta2Rad/2)} fill="#8b5cf6" fontSize="16" fontStyle="italic" textAnchor="middle" fontFamily="Poppins, sans-serif" opacity="0.85">
                                            {showAngleValues
                                                ? <tspan fontSize="14" fontStyle="normal">{fmtDeg(theta2Deg)}°</tspan>
                                                : <><tspan>r</tspan><tspan fontSize="12" dy="4">2</tspan></>
                                            }
                                        </text>
                                    </g>
                                )}
                            </g>
                        )}

                        {/* Vinkelsamband-rutan */}
                        {showAngles && !isTIR && !isTwoLayer && (
                            <g>
                                <rect x={VIEWBOX_WIDTH - 170} y="15" width="155" height="70"
                                      fill="#f3eee4"
                                      stroke="rgba(200, 50, 74, 0.4)"
                                      strokeWidth="1.5"
                                      rx="8"/>
                                <text x={VIEWBOX_WIDTH - 92.5} y="38" fill="#5a6170" fontSize="16" fontWeight="bold" textAnchor="middle" fontFamily="Poppins, sans-serif">Vinkelsamband:</text>
                                <text x={VIEWBOX_WIDTH - 92.5} y="58" fill="#0ea5e9" fontSize="15" textAnchor="middle" fontFamily="Poppins, sans-serif">
                                    <tspan fontStyle="italic">i</tspan><tspan fontSize="11" dy="3">1</tspan><tspan dy="-3"> = </tspan>
                                    <tspan fontStyle="italic">b</tspan><tspan fontSize="11" dy="3">2</tspan>
                                </text>
                                <text x={VIEWBOX_WIDTH - 92.5} y="76" fill="#8b5cf6" fontSize="15" textAnchor="middle" fontFamily="Poppins, sans-serif">
                                    <tspan fontStyle="italic">b</tspan><tspan fontSize="11" dy="3">1</tspan><tspan dy="-3"> = </tspan>
                                    <tspan fontStyle="italic">i</tspan><tspan fontSize="11" dy="3">2</tspan>
                                </text>
                            </g>
                        )}

                    </svg>

                    {/* Flytande kontrollpanel - visas endast i fullskärmsläge */}
                    {isFullscreen && <div className={`fs-controls ${controlsOpen ? '' : 'collapsed'}`}>
                        <div className="fs-row">
                            <span className="fs-label">Infallsvinkel <em style={{fontStyle: 'italic'}}>i</em><sub>1</sub></span>
                            <input
                                type="range"
                                style={{ flex: 1 }}
                                min={-89.9}
                                max={89.9}
                                step={0.1}
                                value={incidentAngle}
                                onChange={e => setIncidentAngle(parseFloat(e.target.value))}
                            />
                            <span className="fs-value">{incidentAngle.toFixed(1).replace('.', ',')}°</span>
                        </div>
                        <div className="fs-row">
                            <span className="fs-label">Medium 1 <em style={{fontStyle: 'italic'}}>n</em><sub>1</sub></span>
                            <div className="fs-materials" style={{ flex: 1 }}>
                                {MATERIALS.map(m => (
                                    <button key={m.name}
                                        type="button"
                                        className={`fs-mat-btn ${Math.abs(n1 - m.n) < 0.005 ? 'active' : ''}`}
                                        onClick={() => setN1(m.n)}>
                                        {m.name}
                                    </button>
                                ))}
                            </div>
                            <span className="fs-value">{n1.toFixed(2).replace('.', ',')}</span>
                        </div>
                        <div className="fs-row">
                            <span className="fs-label">Medium 2 <em style={{fontStyle: 'italic'}}>n</em><sub>2</sub></span>
                            <div className="fs-materials" style={{ flex: 1 }}>
                                {MATERIALS.map(m => (
                                    <button key={m.name}
                                        type="button"
                                        className={`fs-mat-btn ${Math.abs(n2 - m.n) < 0.005 ? 'active' : ''}`}
                                        onClick={() => setN2(m.n)}>
                                        {m.name}
                                    </button>
                                ))}
                            </div>
                            <span className="fs-value">{n2.toFixed(2).replace('.', ',')}</span>
                        </div>
                        <div className="fs-row">
                            <span className="fs-label">Laserfärg</span>
                            <div style={{ flex: 1, display: 'flex', gap: 16 }}>
                                <label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', color: 'var(--lab-ink-soft)', fontSize: '0.9rem' }}>
                                    <input type="radio" name="fs-laser-color" value="green"
                                        checked={laserColor === 'green'}
                                        onChange={() => setLaserColor('green')}
                                        style={{ accentColor: '#22c55e', cursor: 'pointer' }}/>
                                    Grön
                                </label>
                                <label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', color: 'var(--lab-ink-soft)', fontSize: '0.9rem' }}>
                                    <input type="radio" name="fs-laser-color" value="red"
                                        checked={laserColor === 'red'}
                                        onChange={() => setLaserColor('red')}
                                        style={{ accentColor: '#ef4444', cursor: 'pointer' }}/>
                                    Röd
                                </label>
                                <label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', color: 'var(--lab-ink-soft)', fontSize: '0.9rem', marginLeft: 'auto' }}>
                                    <input type="checkbox"
                                        checked={showAngles}
                                        onChange={(e) => setShowAngles(e.target.checked)}
                                        style={{ accentColor: '#38bdf8', cursor: 'pointer', width: 14, height: 14 }}/>
                                    Visa vinklar
                                </label>
                            </div>
                        </div>
                        {showAngles && (
                            <div className="fs-row">
                                <span className="fs-label">Vinkelvisning</span>
                                <div style={{ flex: 1, display: 'flex', gap: 16 }}>
                                    <label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', color: 'var(--lab-ink-soft)', fontSize: '0.9rem' }}>
                                        <input type="radio" name="fs-angle-display" value="labels"
                                            checked={angleDisplay === 'labels'}
                                            onChange={() => setAngleDisplay('labels')}
                                            style={{ accentColor: '#38bdf8', cursor: 'pointer' }}/>
                                        Beteckningar
                                    </label>
                                    <label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', color: 'var(--lab-ink-soft)', fontSize: '0.9rem' }}>
                                        <input type="radio" name="fs-angle-display" value="values"
                                            checked={angleDisplay === 'values'}
                                            onChange={() => setAngleDisplay('values')}
                                            style={{ accentColor: '#38bdf8', cursor: 'pointer' }}/>
                                        Värden
                                    </label>
                                </div>
                            </div>
                        )}
                        <div className="fs-row">
                            <span className="fs-label">Antal skikt</span>
                            <div style={{ flex: 1, display: 'flex', gap: 16 }}>
                                <label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', color: 'var(--lab-ink-soft)', fontSize: '0.9rem' }}>
                                    <input type="radio" name="fs-layer-mode" value="three"
                                        checked={layerMode === 'three'}
                                        onChange={() => setLayerMode('three')}
                                        style={{ accentColor: '#38bdf8', cursor: 'pointer' }}/>
                                    Tre (1+2+1)
                                </label>
                                <label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', color: 'var(--lab-ink-soft)', fontSize: '0.9rem' }}>
                                    <input type="radio" name="fs-layer-mode" value="two"
                                        checked={layerMode === 'two'}
                                        onChange={() => setLayerMode('two')}
                                        style={{ accentColor: '#38bdf8', cursor: 'pointer' }}/>
                                    Två (1+2)
                                </label>
                            </div>
                        </div>
                    </div>}

                    {isFullscreen && <button
                        className="fs-toggle-handle"
                        onClick={() => setControlsOpen(o => !o)}
                        title={controlsOpen ? 'Dölj reglage' : 'Visa reglage'}
                        aria-label={controlsOpen ? 'Dölj reglage' : 'Visa reglage'}
                        aria-expanded={controlsOpen}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"
                             style={{ transform: controlsOpen ? 'rotate(0deg)' : 'rotate(180deg)' }}>
                            <path d="M6 9l6 6 6-6"/>
                        </svg>
                        <span>{controlsOpen ? 'Dölj reglage' : 'Reglage'}</span>
                    </button>}

                    <button className="fs-btn" onClick={toggleFullscreen} aria-label="Fullskärm" title={isFullscreen ? 'Lämna fullskärm' : 'Fullskärm'}>{isFullscreen ? (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 3v6H3"/><path d="M15 21v-6h6"/><path d="M21 9h-6V3"/><path d="M3 15h6v6"/></svg>) : (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9V3h6"/><path d="M21 9V3h-6"/><path d="M3 15v6h6"/><path d="M21 15v6h-6"/></svg>)}</button>
                </div>
            );
        };

        const App = () => {
            const [n1, setN1] = useState(1.0);
            const [n2, setN2] = useState(1.52);
            const [incidentAngle, setIncidentAngle] = useState(-40);
            const [showReflected, setShowReflected] = useState(false);
            const [showAngles, setShowAngles] = useState(false);
            const [angleDisplay, setAngleDisplay] = useState('labels');
            const [laserColor, setLaserColor] = useState('green');
            const [layerMode, setLayerMode] = useState('three');

            return (
                <div className="min-h-screen dark-container flex flex-col" style={{ fontFamily: 'Poppins, sans-serif' }}>
                    <div className="max-w-7xl mx-auto w-full px-4 sm:px-6 pt-6">
                        <div className="breadcrumb mb-4">
                            <a href="index.html">Hem</a> / <a href="fysik2.html">Fysik – fördjupning</a> / Brytningslagen
                        </div>
                        <header className="mb-6">
                            <h1 className="text-2xl sm:text-3xl font-bold text-slate-100 glow-text">Brytningslagen</h1>
                            <p className="text-slate-400 mt-1 text-sm sm:text-base">Utforska ljusets brytning vid gränsytan mellan två medier.</p>
                            <div className="mt-6 flex flex-row flex-wrap items-stretch gap-6 text-cyan-300" style={{fontFamily: 'Poppins, sans-serif'}}>
                                <div className="flex items-end gap-3 flex-wrap px-6 py-4 rounded-xl border border-cyan-500/20 bg-slate-900/40">
                                    <div style={{textAlign:'center'}}>
                                        <div className="text-xs text-cyan-400/60 font-semibold mb-1">Brytningsindex medium 1</div>
                                        <div className="text-2xl font-bold"><em>n</em><sub>1</sub></div>
                                    </div>
                                    <div className="text-2xl font-bold text-slate-400">⋅</div>
                                    <div className="text-2xl font-bold text-slate-300">sin</div>
                                    <div style={{textAlign:'center'}}>
                                        <div className="text-xs text-cyan-400/60 font-semibold mb-1">Infallsvinkel</div>
                                        <div className="text-2xl font-bold"><em>i</em></div>
                                    </div>
                                    <div className="text-xl text-slate-500">=</div>
                                    <div style={{textAlign:'center'}}>
                                        <div className="text-xs text-cyan-400/60 font-semibold mb-1">Brytningsindex medium 2</div>
                                        <div className="text-2xl font-bold"><em>n</em><sub>2</sub></div>
                                    </div>
                                    <div className="text-2xl font-bold text-slate-400">⋅</div>
                                    <div className="text-2xl font-bold text-slate-300">sin</div>
                                    <div style={{textAlign:'center'}}>
                                        <div className="text-xs text-cyan-400/60 font-semibold mb-1">Brytningsvinkel</div>
                                        <div className="text-2xl font-bold"><em>b</em></div>
                                    </div>
                                </div>
                            </div>
                        </header>
                    </div>

                    <main className="flex-grow flex flex-col lg:flex-row px-4 sm:px-6 pb-6 gap-6 max-w-7xl mx-auto w-full">
                        <div className="flex-grow lg:w-2/3 xl:w-3/4 min-h-[400px] lg:min-h-0 order-1 lg:order-1">
                            <SimulationView
                                n1={n1}
                                setN1={setN1}
                                n2={n2}
                                setN2={setN2}
                                incidentAngle={incidentAngle}
                                setIncidentAngle={setIncidentAngle}
                                showReflected={showReflected}
                                showAngles={showAngles}
                                setShowAngles={setShowAngles}
                                angleDisplay={angleDisplay}
                                setAngleDisplay={setAngleDisplay}
                                laserColor={laserColor}
                                setLaserColor={setLaserColor}
                                layerMode={layerMode}
                                setLayerMode={setLayerMode}
                            />
                        </div>
                        <div className="lg:w-1/3 xl:w-1/4 flex-shrink-0 order-2 lg:order-2">
                            <ControlsView
                                n1={n1}
                                setN1={setN1}
                                n2={n2}
                                setN2={setN2}
                                incidentAngle={incidentAngle}
                                setIncidentAngle={setIncidentAngle}
                                showReflected={showReflected}
                                setShowReflected={setShowReflected}
                                showAngles={showAngles}
                                setShowAngles={setShowAngles}
                                angleDisplay={angleDisplay}
                                setAngleDisplay={setAngleDisplay}
                                laserColor={laserColor}
                                setLaserColor={setLaserColor}
                                layerMode={layerMode}
                                setLayerMode={setLayerMode}
                            />
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <footer class="footer">
        <p>&copy; 2025 Fysiklabbet. Skapad av Sam Skoglund.</p>
    </footer>
    <script src="feedback.js" defer></script>
    <script src="data/katalog.js"></script>
    <script src="section-nav.js"></script>
</body>
</html>
