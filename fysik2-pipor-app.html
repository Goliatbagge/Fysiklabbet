    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TAU = 2 * Math.PI;
        const VSOUND = 340;                  // ljudets hastighet i luft (m/s)

        // ── Glidarintervall ──
        const LMIN = 0.20, LMAX = 1.00;      // pipans längd l (m)
        const NMIN = 1, NMAX = 4;            // tonens ordningsnummer n

        // ── Scen-geometri (viewBox-koordinater) ──
        const VBW = 820, VBH = 540;
        const CY = 320;                      // pipans mittlinje (px)
        const PX0 = 116;                     // pipans vänsterände (px)
        const PPM = 640;                     // pixlar per meter
        const HH = 74;                       // pipans halva höjd (px)
        const EAMP = 48;                     // envelopens maxutslag (px)
        const ANIMF = 0.6;                   // visuell svängningsfrekvens (Hz), kraftigt fördröjd

        const TONE_NAMES = ['grundtonen', 'första övertonen', 'andra övertonen', 'tredje övertonen'];

        const fmt = (num, decimals = 1) => {
            if (!isFinite(num)) return '–';
            const s = num.toFixed(decimals);
            if (parseFloat(s) === 0) return '0';
            return s.replace('.', ',').replace('-', '−');
        };
        // tusentalsavgränsare med hårt mellanslag (NBSP)
        const fmtNum = (n, d) => {
            const s = n.toFixed(d);
            if (parseFloat(s) === 0) return '0';
            const [intp, frac] = s.split('.');
            const withSpaces = intp.replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
            return frac !== undefined ? withSpaces + ',' + frac : withSpaces;
        };

        const COL = {
            ink:   '#0f1620',
            pipe:  '#8b9096',   // pipans väggar (grå, som teorifigurerna)
            curve: '#2563c9',   // stående vågen (mörkblå)
            curve2:'#8fb3e0',   // envelopen (ljusblå)
            nod:   '#1f2530',
            dim:   '#1f2530',
            part:  'rgba(15,22,32,0.45)',
        };

        // Relationen mellan pipans längd och våglängden, t.ex. "3λ/4"
        const lRelation = (type, n) => {
            if (type === 'halvoppen') {
                const k = 2 * n - 1;
                return (k === 1 ? '' : k) + 'λ/4';
            }
            if (n === 2) return 'λ';
            if (n === 4) return '2λ';
            return (n === 1 ? '' : n) + 'λ/2';
        };

        const Slider = ({ label, sub, value, min, max, step, unit, onChange, decimals = 1, valueText }) => (
            <div className="mb-3">
                <div className="flex justify-between items-baseline mb-1">
                    <label className="text-sm font-bold" style={{ color: 'var(--lab-ink)' }}
                           dangerouslySetInnerHTML={{ __html: label }} />
                    <div className="font-mono font-semibold text-sm" style={{ color: 'var(--lab-accent)' }}>
                        {valueText || <React.Fragment>{fmt(value, decimals)} <span style={{ color: 'var(--lab-ink-muted)' }}>{unit}</span></React.Fragment>}
                    </div>
                </div>
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))}
                       className="w-full cursor-pointer" />
                <div className="flex justify-between mt-1 text-xs font-mono" style={{ color: 'var(--lab-ink-muted)' }}>
                    <span>{fmt(min, decimals)} {unit}</span>
                    <span>{fmt(max, decimals)} {unit}</span>
                </div>
                {sub && <div className="text-xs mt-1" style={{ color: 'var(--lab-ink-muted)' }}
                             dangerouslySetInnerHTML={{ __html: sub }} />}
            </div>
        );

        const FsSlider = ({ label, value, min, max, step, unit, onChange, decimals = 1, valueText }) => (
            <div className="fs-row">
                <span className="fs-label" style={{ minWidth: 150 }} dangerouslySetInnerHTML={{ __html: label }} />
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))} />
                <span className="fs-value" style={{ minWidth: 150, textAlign: 'right' }}>
                    {valueText || `${fmt(value, decimals)} ${unit}`}
                </span>
            </div>
        );

        // Formelkort-hjälpare (samma mönster som fysik2-svangningstid-app)
        const Vbl = ({ label, children }) => (
            <div className="flex flex-col items-center" style={{ lineHeight: 1.1 }}>
                <span className="flbl">{label}</span>
                <span className="fnum">{children}</span>
                <span className="flbl" aria-hidden="true" style={{ visibility: 'hidden' }}>{label}</span>
            </div>
        );
        const FracL = ({ topLbl, top, botLbl, bot }) => (
            <div className="flex flex-col items-center" style={{ lineHeight: 1.15 }}>
                <span className="flbl" style={topLbl ? {} : { visibility: 'hidden' }}>{topLbl || '·'}</span>
                <span className="fnum" style={{ padding: '0 8px 3px' }}>{top}</span>
                <span className="fnum" style={{ padding: '3px 8px 0', borderTop: '2px solid currentColor', alignSelf: 'stretch', textAlign: 'center' }}>{bot}</span>
                <span className="flbl" style={botLbl ? {} : { visibility: 'hidden' }}>{botLbl || '·'}</span>
            </div>
        );
        const FracP = ({ top, bot }) => (
            <span style={{ display: 'inline-flex', flexDirection: 'column', alignItems: 'center', lineHeight: 1.25 }}>
                <span style={{ padding: '0 6px 2px' }}>{top}</span>
                <span style={{ padding: '2px 6px 0', borderTop: '1.5px solid currentColor', alignSelf: 'stretch', textAlign: 'center' }}>{bot}</span>
            </span>
        );

        const FormulaCard = () => (
            <div className="glass-card rounded-xl p-4 mb-6 flex flex-wrap items-center gap-x-6 gap-y-3" style={{ color: 'var(--lab-ink)' }}>
                <div className="flex items-center gap-x-3">
                    <span className="flbl">Öppen/sluten pipa</span>
                    <Vbl label="Pipans längd"><em>l</em></Vbl>
                    <span className="fnum">=</span>
                    <FracL topLbl="Ordningsnr · våglängd" top={<React.Fragment><em>n</em> · <em>λ</em></React.Fragment>} bot={<React.Fragment>2</React.Fragment>} />
                </div>
                <div className="flex items-center gap-x-3">
                    <span className="flbl">Halvöppen pipa</span>
                    <Vbl label="Pipans längd"><em>l</em></Vbl>
                    <span className="fnum">=</span>
                    <FracL topLbl="Ordningsnr · våglängd" top={<React.Fragment>(2<em>n</em> − 1) · <em>λ</em></React.Fragment>} bot={<React.Fragment>4</React.Fragment>} />
                </div>
                <div className="flex items-center gap-x-3">
                    <Vbl label="Utbredningshastighet"><em>v</em></Vbl>
                    <span className="fnum">=</span>
                    <Vbl label="Frekvens"><em>f</em></Vbl>
                    <span className="fnum">·</span>
                    <Vbl label="Våglängd"><em>λ</em></Vbl>
                </div>
            </div>
        );

        // ── Huvudapp ─────────────────────────────────────────────
        const App = () => {
            const q = new URLSearchParams(location.search);
            const [type, setType] = useState(['oppen', 'halvoppen', 'sluten'].includes(q.get('typ')) ? q.get('typ') : 'oppen');
            const [l, setL] = useState(isFinite(parseFloat(q.get('l'))) ? parseFloat(q.get('l')) : 0.50);
            const [n, setN] = useState([1, 2, 3, 4].includes(parseInt(q.get('n'))) ? parseInt(q.get('n')) : 1);
            const [running, setRunning] = useState(true);
            const [playing, setPlaying] = useState(false);
            const [show, setShow] = useState({
                labels: true, particles: false, dim: true,
            });
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [controlsOpen, setControlsOpen] = useState(true);
            const [, setTick] = useState(0);

            const sceneWrapRef = useRef(null);
            const thRef = useRef(0);
            const audioRef = useRef(null);
            const pRef = useRef({});

            // ── Härledda storheter (exakt enligt genomgången) ──
            const lam = type === 'halvoppen' ? 4 * l / (2 * n - 1) : 2 * l / n;
            const f = VSOUND / lam;
            pRef.current = { running };

            // ── Animationsloop ──
            useEffect(() => {
                let raf, last = performance.now();
                const loop = (now) => {
                    raf = requestAnimationFrame(loop);
                    const dt = Math.min((now - last) / 1000, 0.05);
                    last = now;
                    if (pRef.current.running) thRef.current += TAU * ANIMF * dt;
                    setTick(t => t + 1);
                };
                raf = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(raf);
            }, []);

            // ── Ljud (WebAudio) ──
            useEffect(() => {
                if (audioRef.current) audioRef.current.osc.frequency.value = f;
            }, [f]);
            useEffect(() => () => {
                if (audioRef.current) { try { audioRef.current.ctx.close(); } catch (e) {} }
            }, []);
            const togglePlay = () => {
                if (playing) {
                    if (audioRef.current) {
                        const { ctx, gain } = audioRef.current;
                        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.08);
                        setTimeout(() => { try { ctx.close(); } catch (e) {} }, 160);
                        audioRef.current = null;
                    }
                    setPlaying(false);
                } else {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = f;
                    gain.gain.setValueAtTime(0, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.06);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start();
                    audioRef.current = { ctx, osc, gain };
                    setPlaying(true);
                }
            };

            // ── Fullskärm ──
            useEffect(() => {
                const handler = () => {
                    const fs = document.fullscreenElement === sceneWrapRef.current ||
                        document.webkitFullscreenElement === sceneWrapRef.current;
                    setIsFullscreen(fs);
                    if (fs) setControlsOpen(false);   // starta hopfälld i fullskärm
                };
                document.addEventListener('fullscreenchange', handler);
                document.addEventListener('webkitfullscreenchange', handler);
                return () => {
                    document.removeEventListener('fullscreenchange', handler);
                    document.removeEventListener('webkitfullscreenchange', handler);
                };
            }, []);
            const toggleFullscreen = () => {
                const el = sceneWrapRef.current;
                if (!el) return;
                if (document.fullscreenElement || document.webkitFullscreenElement)
                    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
                else (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
            };

            const tShow = (key) => setShow(sh => ({ ...sh, [key]: !sh[key] }));
            const setExample1 = () => { setType('halvoppen'); setL(0.24); setN(2); };
            const setExample2 = () => { setType('oppen'); setL(0.39); setN(1); };

            // ── Stående vågens form ──
            // Utslaget (normerat 0–1) som funktion av positionen x (m) i pipan.
            // Öppen pipa: bukar vid ändarna. Sluten: noder vid ändarna.
            // Halvöppen: buk vid öppna (vänstra) änden, nod vid slutna (högra).
            const xi = (xm) => {
                if (type === 'oppen') return Math.cos(n * Math.PI * xm / l);
                if (type === 'sluten') return Math.sin(n * Math.PI * xm / l);
                return Math.cos((2 * n - 1) * Math.PI * xm / (2 * l));
            };
            // nod- och bukpositioner (m)
            const nodes = [], antinodes = [];
            if (type === 'oppen') {
                for (let k = 0; k <= n; k++) antinodes.push(k * l / n);
                for (let k = 0; k < n; k++) nodes.push((k + 0.5) * l / n);
            } else if (type === 'sluten') {
                for (let k = 0; k <= n; k++) nodes.push(k * l / n);
                for (let k = 0; k < n; k++) antinodes.push((k + 0.5) * l / n);
            } else {
                for (let k = 0; k < n; k++) nodes.push(l * (1 + 2 * k) / (2 * n - 1));
                for (let k = 0; k < n; k++) antinodes.push(l * 2 * k / (2 * n - 1));
            }

            const th = thRef.current;
            const osc = Math.cos(th);
            const lenPx = l * PPM;
            const xPx = (xm) => PX0 + xm * PPM;
            const toneName = TONE_NAMES[n - 1];

            // ── Kryssrutor och lägen (uppe till höger på scenen) ──
            const sceneToggles = () => (
                <div className="scene-toggles">
                    <div className="st-title">Piptyp</div>
                    <label><input type="radio" name="ptype" checked={type === 'oppen'} onChange={() => setType('oppen')} />
                        <span>Öppen (båda ändar öppna)</span></label>
                    <label><input type="radio" name="ptype" checked={type === 'halvoppen'} onChange={() => setType('halvoppen')} />
                        <span>Halvöppen (en öppen, en sluten)</span></label>
                    <label><input type="radio" name="ptype" checked={type === 'sluten'} onChange={() => setType('sluten')} />
                        <span>Sluten (båda ändar slutna)</span></label>
                    <div className="st-sep"></div>
                    <div className="st-title">Visa</div>
                    <label><input type="checkbox" checked={show.labels} onChange={() => tShow('labels')} />
                        <span className="st-swatch" style={{ background: COL.nod }}></span>
                        <span>Noder och bukar</span></label>
                    <label><input type="checkbox" checked={show.dim} onChange={() => tShow('dim')} />
                        <span className="st-swatch" style={{ background: COL.dim }}></span>
                        <span>Måttlinjer (<em>l</em> och <em>λ</em>)</span></label>
                    <label><input type="checkbox" checked={show.particles} onChange={() => tShow('particles')} />
                        <span className="st-swatch" style={{ background: COL.part }}></span>
                        <span>Luftpartiklar (longitudinellt)</span></label>
                    {/* Styrknappar visas här BARA i fullskärm — i normalläget finns
                        de i sidopanelen (aldrig dubblerade). */}
                    {isFullscreen && (
                        <div className="st-actions">
                            <button className="btn-toggle" onClick={togglePlay}>{playing ? 'Tysta tonen' : 'Spela tonen'}</button>
                            <button className="btn-toggle" onClick={() => setRunning(r => !r)}>{running ? 'Pausa' : 'Fortsätt'}</button>
                        </div>
                    )}
                </div>
            );

            // ── Scenen ──
            const scene = () => {
                const els = [];
                const xEnd = xPx(l);

                // pipans väggar
                els.push(<line key="wt" x1={PX0} y1={CY - HH} x2={xEnd} y2={CY - HH} stroke={COL.pipe} strokeWidth="3.5" />);
                els.push(<line key="wb" x1={PX0} y1={CY + HH} x2={xEnd} y2={CY + HH} stroke={COL.pipe} strokeWidth="3.5" />);
                // slutna ändar ritas som väggar med snedstreck utanför
                const closedWall = (x, dir, key) => {
                    const hatch = [];
                    for (let hy = CY - HH + 6; hy <= CY + HH - 2; hy += 13) {
                        hatch.push(<line key={key + hy} x1={x} y1={hy} x2={x + 8 * dir} y2={hy - 9}
                                         stroke={COL.pipe} strokeWidth="1.4" />);
                    }
                    return (
                        <g key={key}>
                            <line x1={x} y1={CY - HH - 1.5} x2={x} y2={CY + HH + 1.5} stroke={COL.pipe} strokeWidth="3.5" />
                            {hatch}
                        </g>
                    );
                };
                if (type === 'sluten') { els.push(closedWall(PX0, -1, 'cwL')); els.push(closedWall(xEnd, 1, 'cwR')); }
                if (type === 'halvoppen') { els.push(closedWall(xEnd, 1, 'cwR')); }

                // mittlinje (streckad, som teorifigurerna)
                els.push(<line key="mid" x1={PX0} y1={CY} x2={xEnd} y2={CY}
                               stroke="#9aa0a6" strokeWidth="1" strokeDasharray="5 4" />);

                // envelope (ljusblå) + stående våg i aktuell fas (mörkblå)
                const NSEG = 130;
                const env1 = [], env2 = [], cur = [];
                for (let i = 0; i <= NSEG; i++) {
                    const xm = l * i / NSEG;
                    const e = xi(xm) * EAMP;
                    const xp = xPx(xm).toFixed(1);
                    env1.push(`${xp},${(CY - e).toFixed(1)}`);
                    env2.push(`${xp},${(CY + e).toFixed(1)}`);
                    cur.push(`${xp},${(CY - e * osc).toFixed(1)}`);
                }
                els.push(<polyline key="e1" points={env1.join(' ')} fill="none" stroke={COL.curve2} strokeWidth="2" />);
                els.push(<polyline key="e2" points={env2.join(' ')} fill="none" stroke={COL.curve2} strokeWidth="2" />);
                els.push(<polyline key="cur" points={cur.join(' ')} fill="none" stroke={COL.curve} strokeWidth="2.4" />);

                // luftpartiklar: longitudinell rörelse med störst utslag vid bukarna
                if (show.particles) {
                    const dots = [];
                    const NCOL = Math.max(14, Math.round(lenPx / 12));
                    const rows = [-55, -33, -11, 11, 33, 55];
                    for (let i = 0; i <= NCOL; i++) {
                        const xm = l * (i + 0.5) / (NCOL + 1);
                        const u = xi(xm) * osc * 10;
                        for (const r of rows) {
                            dots.push(<circle key={i + '_' + r} cx={xPx(xm) + u} cy={CY + r} r="1.7" fill={COL.part} />);
                        }
                    }
                    els.push(<g key="parts">{dots}</g>);
                }

                // noder (prickar på mittlinjen, som teorifigurerna) + etiketter
                if (show.labels) {
                    // etiketterna kläms in innanför pipans ändar (annars hamnar de
                    // på den slutna väggens snedstreck)
                    const lblX = (xm) => Math.min(Math.max(xPx(xm), PX0 + 15), xEnd - 15);
                    nodes.forEach((xm, i) => {
                        els.push(<circle key={'nd' + i} cx={xPx(xm)} cy={CY} r="3" fill={COL.nod} />);
                        els.push(<text key={'ndl' + i} x={lblX(xm)} y={CY + HH - 8} textAnchor="middle"
                                       fontSize="11.5" fill="var(--lab-ink-muted, #5a6170)">nod</text>);
                    });
                    antinodes.forEach((xm, i) => {
                        els.push(<text key={'anl' + i} x={lblX(xm)} y={CY + HH - 8} textAnchor="middle"
                                       fontSize="11.5" fill="var(--lab-ink-muted, #5a6170)">buk</text>);
                    });
                }

                // måttlinjer: pipans längd l samt λ/2 (nod–nod / buk–buk) eller λ/4 (nod–buk)
                if (show.dim) {
                    const dimRow = (xA, xB, y, label, key) => (
                        <g key={key}>
                            <line x1={xA + 8} y1={y} x2={xB - 8} y2={y}
                                  stroke={COL.dim} strokeWidth="1.4" strokeLinecap="butt" />
                            <polygon points={`${xA},${y} ${xA + 8},${y - 3.2} ${xA + 8},${y + 3.2}`} fill={COL.dim} />
                            <polygon points={`${xB},${y} ${xB - 8},${y - 3.2} ${xB - 8},${y + 3.2}`} fill={COL.dim} />
                            {label}
                        </g>
                    );
                    // l-måttet under pipan
                    const LY = CY + HH + 36;
                    els.push(<line key="pl1" x1={PX0} y1={CY + HH + 6} x2={PX0} y2={LY + 6}
                                   stroke="rgba(15,22,32,0.35)" strokeWidth="1" strokeDasharray="4 4" />);
                    els.push(<line key="pl2" x1={xEnd} y1={CY + HH + 6} x2={xEnd} y2={LY + 6}
                                   stroke="rgba(15,22,32,0.35)" strokeWidth="1" strokeDasharray="4 4" />);
                    els.push(dimRow(PX0, xEnd, LY,
                        <text x={(PX0 + xEnd) / 2} y={LY + 19} textAnchor="middle" fontSize="13.5" fill={COL.dim}>
                            <tspan fontStyle="italic">l</tspan> = {fmt(l, 2)} m
                        </text>, 'ldim'));

                    // λ-måttet: nod–nod eller buk–buk (λ/2), för halvöppen nod–buk (λ/4)
                    let mA = null, mB = null, mLbl = '';
                    if (type === 'halvoppen') {
                        mA = antinodes[antinodes.length - 1]; mB = nodes[nodes.length - 1];
                        mLbl = 'λ/4';
                    } else if (type === 'oppen') {
                        mA = antinodes[0]; mB = antinodes[1];
                        mLbl = 'λ/2';
                    } else {
                        mA = nodes[0]; mB = nodes[1];
                        mLbl = 'λ/2';
                    }
                    if (mA !== null && mB !== null && mB > mA) {
                        const WY = LY + 44;
                        els.push(<line key="wl1" x1={xPx(mA)} y1={LY + 24} x2={xPx(mA)} y2={WY + 6}
                                       stroke="rgba(15,22,32,0.35)" strokeWidth="1" strokeDasharray="4 4" />);
                        els.push(<line key="wl2" x1={xPx(mB)} y1={LY + 24} x2={xPx(mB)} y2={WY + 6}
                                       stroke="rgba(15,22,32,0.35)" strokeWidth="1" strokeDasharray="4 4" />);
                        els.push(dimRow(xPx(mA), xPx(mB), WY,
                            <text x={(xPx(mA) + xPx(mB)) / 2} y={WY + 19} textAnchor="middle" fontSize="13.5" fill={COL.dim}>
                                {mLbl} = {fmt(lam / (mLbl === 'λ/4' ? 4 : 2), 2)} m
                            </text>, 'wdim'));
                    }
                }

                // tonens namn + längdrelation i fri yta uppe till vänster
                els.push(
                    <g key="tone">
                        <text x={PX0} y={120} fontSize="16" fontWeight="600" fill={COL.ink}>
                            {toneName.charAt(0).toUpperCase() + toneName.slice(1)} (<tspan fontStyle="italic">n</tspan> = {n})
                        </text>
                        <text x={PX0} y={144} fontSize="13.5" fill="var(--lab-ink-muted, #5a6170)">
                            <tspan fontStyle="italic">l</tspan> = {lRelation(type, n)}
                        </text>
                    </g>
                );

                return (
                    <svg viewBox={`0 0 ${VBW} ${VBH}`} preserveAspectRatio="xMidYMid meet"
                         fontFamily="Poppins, sans-serif">
                        <defs>
                            <linearGradient id="paperG" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0" stopColor="#f7f2e8" />
                                <stop offset="1" stopColor="#ece3d2" />
                            </linearGradient>
                        </defs>
                        <rect x="0" y="0" width={VBW} height={VBH} fill="url(#paperG)" />
                        {els}
                    </svg>
                );
            };

            const Readout = ({ label, value, unit, color }) => (
                <div className="p-2 rounded-lg" style={{ background: 'var(--lab-bg)', border: '1px solid var(--lab-line-strong)' }}>
                    <div className="text-xs" style={{ color: 'var(--lab-ink-muted)' }} dangerouslySetInnerHTML={{ __html: label }} />
                    <div className="font-mono font-bold text-sm" style={{ color: color || 'var(--lab-ink)' }}>
                        {value} <span className="font-normal text-xs" style={{ color: 'var(--lab-ink-muted)' }}>{unit}</span>
                    </div>
                </div>
            );

            const nValueText = (nv) => `n = ${nv}`;

            return (
                <div className="min-h-screen dark-container px-4 md:px-8 pb-12" style={{ fontFamily: "'DM Sans', sans-serif" }}>
                    <div className="max-w-6xl mx-auto pt-6">
                        <div className="breadcrumb mb-4" style={{ fontSize: 13 }}>
                            <a href="index.html">Hem</a> / <a href="katalog.html#fy2">Fysik nivå 2</a> / Ljudvågor och stående vågor i pipor
                        </div>
                        <h1 className="text-3xl md:text-4xl font-black tracking-tight" style={{ color: 'var(--lab-ink)' }}>Ljudvågor och stående vågor i pipor</h1>
                        <p className="mt-2 mb-5" style={{ color: 'var(--lab-ink-soft)', maxWidth: 820 }}>
                            När luft sätts i rörelse i en pipa uppstår en stående våg. Vid <strong>öppna ändar</strong> bildas
                            alltid <strong>bukar</strong> (luften kan svänga maximalt) och vid <strong>slutna
                            ändar</strong> <strong>noder</strong> (luften kan inte svänga). Välj piptyp, ändra
                            pipans längd <em>l</em> och tonens ordningsnummer <em>n</em>, läs av
                            våglängden <em>λ</em> och frekvensen <em>f</em> — och lyssna på tonen! Ljudvågen är
                            longitudinell men ritas som transversell, för det är enklare och tydligare.
                        </p>

                        <FormulaCard />

                        <main className="flex flex-col lg:flex-row gap-6">
                            {/* Scen */}
                            <div className="lg:w-3/5 order-1">
                                <div className="scene-wrap" data-theme="ljusPapper" ref={sceneWrapRef}>
                                    {scene()}

                                    <div className="scene-info">
                                        <span className="si-lbl">Våglängd <em style={{ textTransform: 'none' }}>λ</em></span>
                                        <span className="si-val">{fmt(lam, 2)} m</span>
                                        <span className="si-lbl" style={{ marginTop: 4 }}>Frekvens <em style={{ textTransform: 'none' }}>f</em></span>
                                        <span className="si-val">{fmtNum(f, f < 1000 ? 1 : 0)} Hz</span>
                                    </div>

                                    <div className="scene-hint">Svängningen visas kraftigt fördröjd — den verkliga frekvensen är {fmtNum(f, 0)} Hz</div>
                                    {sceneToggles()}

                                    {/* Fullskärm: glidarna i en hopfällbar panel i underkant */}
                                    {isFullscreen && (
                                        <React.Fragment>
                                            <div className={`fs-controls ${controlsOpen ? '' : 'collapsed'}`}>
                                                <FsSlider label="Pipans längd (<em>l</em>)" value={l}
                                                          min={LMIN} max={LMAX} step={0.01} unit="m" onChange={setL} decimals={2} />
                                                <FsSlider label="Ton (<em>n</em>)" value={n}
                                                          min={NMIN} max={NMAX} step={1} onChange={(x) => setN(Math.round(x))}
                                                          valueText={`${TONE_NAMES[n - 1]} (n = ${n})`} />
                                            </div>
                                            <button className="fs-toggle-handle" onClick={() => setControlsOpen(o => !o)}
                                                    title={controlsOpen ? 'Dölj reglage' : 'Visa reglage'}
                                                    aria-expanded={controlsOpen}>
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                     strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"
                                                     style={{ transform: controlsOpen ? 'rotate(0deg)' : 'rotate(180deg)' }}>
                                                    <path d="M6 9l6 6 6-6"/>
                                                </svg>
                                                <span>{controlsOpen ? 'Dölj reglage' : 'Reglage'}</span>
                                            </button>
                                        </React.Fragment>
                                    )}

                                    <button className="fs-btn" onClick={toggleFullscreen} aria-label="Fullskärm"
                                            title={isFullscreen ? 'Lämna fullskärm' : 'Fullskärm'}>
                                        {isFullscreen ? (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M9 3v6H3" /><path d="M15 21v-6h6" /><path d="M21 9h-6V3" /><path d="M3 15h6v6" />
                                            </svg>
                                        ) : (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M3 9V3h6" /><path d="M21 9V3h-6" /><path d="M3 15v6h6" /><path d="M21 15v6h-6" />
                                            </svg>
                                        )}
                                    </button>
                                </div>
                            </div>

                            {/* Kontroller */}
                            <div className="lg:w-2/5 order-2">
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <Slider label="Pipans längd (<em>l</em>)"
                                            sub="Längre pipa ger längre våglängd — och därmed lägre frekvens (mörkare ton)."
                                            value={l} min={LMIN} max={LMAX} step={0.01} unit="m" onChange={setL} decimals={2} />
                                    <Slider label="Ton (<em>n</em>)"
                                            sub="<em>n</em> = 1 är grundtonen. Varje överton lägger till en buk inuti pipan."
                                            value={n} min={NMIN} max={NMAX} step={1} decimals={0}
                                            onChange={(x) => setN(Math.round(x))}
                                            valueText={`${TONE_NAMES[n - 1]} (n = ${n})`} />
                                    <div className="flex gap-2 mt-1">
                                        <button className={`btn-toggle flex-1 ${playing ? 'active' : ''}`} onClick={togglePlay}>
                                            {playing ? 'Tysta tonen' : 'Spela tonen'}
                                        </button>
                                        <button className="btn-toggle flex-1" onClick={() => setRunning(r => !r)}>{running ? 'Pausa' : 'Fortsätt'}</button>
                                    </div>
                                </div>

                                {/* Live-beräkning */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <div className="flbl mb-2">Beräkning av våglängd och frekvens</div>
                                    <div className="flex flex-wrap items-center gap-x-2 gap-y-2"
                                         style={{ color: 'var(--lab-ink)', fontSize: 15 }}>
                                        <span><em>λ</em></span>
                                        <span>=</span>
                                        {type === 'halvoppen' ? (
                                            <React.Fragment>
                                                <FracP top={<React.Fragment>4 · <em>l</em></React.Fragment>} bot={<React.Fragment>2<em>n</em> − 1</React.Fragment>} />
                                                <span>=</span>
                                                <FracP top={`4 · ${fmt(l, 2)} m`} bot={`${2 * n - 1}`} />
                                            </React.Fragment>
                                        ) : (
                                            <React.Fragment>
                                                <FracP top={<React.Fragment>2 · <em>l</em></React.Fragment>} bot={<em>n</em>} />
                                                <span>=</span>
                                                <FracP top={`2 · ${fmt(l, 2)} m`} bot={`${n}`} />
                                            </React.Fragment>
                                        )}
                                        <span>=</span>
                                        <span className="font-bold" style={{ color: 'var(--lab-accent)' }}>{fmt(lam, 2)}{' '}m</span>
                                    </div>
                                    <div className="flex flex-wrap items-center gap-x-2 gap-y-2 mt-3"
                                         style={{ color: 'var(--lab-ink)', fontSize: 15 }}>
                                        <span><em>f</em></span>
                                        <span>=</span>
                                        <FracP top={<em>v</em>} bot={<em>λ</em>} />
                                        <span>=</span>
                                        <FracP top="340 m/s" bot={`${fmt(lam, 2)} m`} />
                                        <span>=</span>
                                        <span className="font-bold" style={{ color: 'var(--lab-accent)' }}>{fmtNum(f, 0)}{' '}Hz</span>
                                    </div>
                                    <div className="grid grid-cols-1 gap-2 mt-3">
                                        <button className="btn-toggle w-full text-sm" onClick={setExample1}
                                                title="Halvöppen pipa, 24 cm, första övertonen">
                                            Exempel 1 ur teorin (halvöppen pipa, 24 cm, första övertonen)
                                        </button>
                                        <button className="btn-toggle w-full text-sm" onClick={setExample2}
                                                title="Öppen pipa, 39 cm, grundtonen 440 Hz">
                                            Exempel 2 ur teorin (öppen pipa för 440 Hz)
                                        </button>
                                    </div>
                                </div>

                                {/* Avläsning */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <div className="flbl mb-2">Avläsning</div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <Readout label="Våglängd <em>λ</em>" value={fmt(lam, 2)} unit="m" color="var(--lab-accent)" />
                                        <Readout label="Frekvens <em>f</em> = <em>v</em>/<em>λ</em>" value={fmtNum(f, f < 1000 ? 1 : 0)} unit="Hz" />
                                        <Readout label="Pipans längd <em>l</em>" value={fmt(l, 2)} unit="m" />
                                        <Readout label="Längd i våglängder" value={`l = ${lRelation(type, n)}`} unit="" />
                                    </div>
                                    <div className="mt-2 p-2 rounded-lg text-xs" style={{ background: 'rgba(13,148,136,0.08)', color: 'var(--lab-ink-soft)' }}>
                                        Ljudets hastighet i luft räknas som <em>v</em> ≈ 340 m/s. Spela tonen och dra
                                        i längd-reglaget — så hör du hur en kortare pipa ger en högre ton.
                                    </div>
                                </div>
                            </div>
                        </main>

                        {/* Pedagogiska sektioner */}
                        <div className="grid md:grid-cols-3 gap-4 mt-6">
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Buk vid öppen ände, nod vid sluten</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Vid en öppen ände kan luften svänga fritt — där blir det alltid en <strong>buk</strong>.
                                    Vid en sluten ände kan luften inte röra sig alls — där blir det alltid
                                    en <strong>nod</strong>. Dessa randvillkor avgör vilka våglängder som får plats i
                                    pipan, och därmed vilka toner den kan ge.
                                </p>
                            </div>
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Grundton och övertoner</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Den längsta stående våg som ryms ger <strong>grundtonen</strong> (<em>n</em> = 1).
                                    När fler bukar uppstår inuti pipan uppkommer <strong>övertoner</strong> med högre
                                    frekvens (<em>n</em> = 2, 3, …). Att blåsa hårdare i en flöjt, eller svinga ett
                                    plaströr fortare, hoppar upp till nästa överton.
                                </p>
                            </div>
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Longitudinell — men ritas transversell</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Ljud är en longitudinell våg: luften svänger fram och tillbaka <em>längs</em> pipan,
                                    inte upp och ned. Kurvan i figuren visar hur stort utslaget är i varje punkt.
                                    Slå på <strong>luftpartiklarna</strong> och se den verkliga rörelsen — störst vid
                                    bukarna, stilla vid noderna.
                                </p>
                            </div>
                        </div>

                        <details className="glass-card rounded-xl p-4 mt-4">
                            <summary className="accordion-head" style={{ color: 'var(--lab-ink)' }}>
                                <span>Var kommer formlerna ifrån?</span><span style={{ color: 'var(--lab-ink-muted)' }}>▾</span>
                            </summary>
                            <p className="mt-3 text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                Avståndet mellan två närliggande bukar (eller två närliggande noder) är alltid en
                                halv våglängd, och avståndet mellan en buk och närmaste nod är en fjärdedels våglängd.
                                I en öppen pipa sitter bukar i båda ändarna och i en sluten pipa noder i båda
                                ändarna — i båda fallen ryms då ett helt antal halva våglängder i
                                pipan: <span style={{ whiteSpace: 'nowrap' }}><em>l</em> = <em>n</em> · <em>λ</em>/2</span>.
                                I en halvöppen pipa sitter en buk i ena änden och en nod i den andra, så där ryms ett
                                udda antal fjärdedels
                                våglängder: <span style={{ whiteSpace: 'nowrap' }}><em>l</em> = (2<em>n</em> − 1) · <em>λ</em>/4</span>.
                                Frekvensen fås sedan ur <span style={{ whiteSpace: 'nowrap' }}><em>v</em> = <em>f</em> · <em>λ</em></span> med <span style={{ whiteSpace: 'nowrap' }}><em>v</em> ≈ 340 m/s</span>.
                            </p>
                        </details>

                        <details className="glass-card rounded-xl p-4 mt-4">
                            <summary className="accordion-head" style={{ color: 'var(--lab-ink)' }}>
                                <span>Vanliga missuppfattningar</span><span style={{ color: 'var(--lab-ink-muted)' }}>▾</span>
                            </summary>
                            <ul className="mt-3 space-y-2 text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                <li><strong>"Kurvan visar att luften rör sig upp och ned."</strong> Nej — ljudvågen är longitudinell. Kurvan är bara ett bekvämt sätt att rita hur stort utslaget är på olika ställen; luften själv svänger i pipans längdriktning.</li>
                                <li><strong>"Längre pipa ger högre ton."</strong> Tvärtom — längre pipa rymmer en längre våglängd, och längre våglängd betyder lägre frekvens. Det är därför en kontrabas är större än en fiol och orgelns baspipor är flera meter långa.</li>
                                <li><strong>"Ljud kan färdas genom vakuum."</strong> Nej — ljud består av täthetsvariationer i ett material och kräver partiklar att sätta i rörelse. I rymden är det knäpptyst.</li>
                            </ul>
                        </details>
                    </div>

            );
        };
