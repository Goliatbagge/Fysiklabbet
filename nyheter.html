    <style>
        /* ── Sidan Nyheter ─────────────────────────────────────────── */
        .news-hero { max-width: 1100px; margin: 0 auto; padding: 56px 56px 4px; width: 100%; }
        .news-hero-title {
            font-family: var(--lab-font-display);
            font-size: clamp(40px, 6vw, 64px);
            line-height: 1.02; letter-spacing: -0.01em;
            color: var(--lab-ink); margin: 10px 0 14px;

        .news-hero-title em { font-style: italic; color: var(--lab-accent); }

        /* Utvald (senaste) artikel */

            display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 34px;
            align-items: center;
            margin: 26px 0 14px; padding-bottom: 38px;
            border-bottom: 2px solid var(--lab-line-strong);

            background: var(--lab-bg-raised); aspect-ratio: 16 / 9;

        .news-featured:hover .news-featured-media img { transform: scale(1.03); }
        .news-featured-flag {
            position: absolute; top: 12px; left: 12px;
            font-family: var(--lab-font-mono); font-size: 10px; letter-spacing: 0.14em;
            text-transform: uppercase; color: #fff; background: var(--lab-accent);

        }
        .news-meta-row {
            display: flex; gap: 14px; align-items: center; flex-wrap: wrap;

        .news-featured-title {
            font-family: var(--lab-font-display);

            letter-spacing: -0.01em; color: var(--lab-ink); margin: 0 0 14px;

        .news-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 26px; }

        .article-fact {

        .article-sources {

        .article-sources-label {

        .article-sources-list { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
        .article-source-pill {

            color: var(--lab-ink); text-decoration: none;
            border: 1px solid var(--lab-line-strong); border-radius: 999px; padding: 6px 13px;

        .article-source-pill:hover { border-color: var(--lab-accent); color: var(--lab-accent); }
        .article-research {

        /* Lässtöd: bionisk läsning + dyslexivänligt typsnitt i artikelvyn.
           Switch-stilen (.lab-bionic-bar/.lab-bionic-toggle/.lab-bionic-knob)
           och bionic-fetstilen (.lab-bionic/.bionic-on) kommer från

        .article .lab-bionic-bar { margin: 4px 0 24px; }

        .article-body.dyslexia-on .article-quote p,

        @media (max-width: 880px) {

            .lab-section { padding: 0 22px; }

<body class="laborans">
    <div id="root"></div>

    <script>document.write('<scr' + 'ipt src="data/nyheter.js?v=' + window.__CB + '"></scr' + 'ipt>');</script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>

    <script type="text/babel" data-presets="react">
        const NYHETER = (window.NYHETER || []).slice();

        function formatDate(iso) {
            const months = ['januari','februari','mars','april','maj','juni','juli',
                'augusti','september','oktober','november','december'];
            const [y, m, d] = iso.split('-').map(Number);
            return `${d} ${months[m - 1]} ${y}`;
        }

        // ── Bionisk läsning ─────────────────────────────────────────
        // Fetmarkerar början ("fixeringspunkten") av varje ord som lässtöd.
        // Spannen läggs ALLTID in i DOM:en; på/av styrs sedan av klassen
        // .bionic-on på behållaren (ren CSS-växling). Hoppar över rubriker,
        // kod och script. Samma algoritm som teorisidorna i katalog.html.
        function bionicFixLen(n) {
            if (n <= 3) return 1;
            if (n <= 6) return 2;
            if (n <= 9) return 3;
            return Math.ceil(n * 0.4);
        }
        function applyBionic(root) {
            if (!root || root.querySelector('.lab-bionic')) return; // redan gjort
            const SKIP = { SCRIPT: 1, STYLE: 1, CODE: 1, PRE: 1, H1: 1, H2: 1, H3: 1, H4: 1, H5: 1, H6: 1 };
            const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
                acceptNode(node) {
                    if (!node.nodeValue || !/\S/.test(node.nodeValue)) return NodeFilter.FILTER_REJECT;
                    for (let p = node.parentElement; p && p !== root; p = p.parentElement) {
                        if (SKIP[p.tagName]) return NodeFilter.FILTER_REJECT;
                    }
                    return NodeFilter.FILTER_ACCEPT;
                }
            });
            const nodes = [];
            for (let n = walker.nextNode(); n; n = walker.nextNode()) nodes.push(n);
            const wordRe = /\p{L}[\p{L}\p{M}'’\-]*/gu;
            for (const tn of nodes) {
                const text = tn.nodeValue;
                wordRe.lastIndex = 0;
                if (!wordRe.test(text)) continue;
                wordRe.lastIndex = 0;
                const frag = document.createDocumentFragment();
                let last = 0, m;
                while ((m = wordRe.exec(text))) {
                    const word = m[0], start = m.index;
                    if (start > last) frag.appendChild(document.createTextNode(text.slice(last, start)));
                    let k = bionicFixLen(word.length);
                    if (word.length > 1) k = Math.min(k, word.length - 1);
                    const span = document.createElement('span');
                    span.className = 'lab-bionic';
                    span.textContent = word.slice(0, k);
                    frag.appendChild(span);
                    if (k < word.length) frag.appendChild(document.createTextNode(word.slice(k)));
                    last = start + word.length;
                }
                if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
                tn.parentNode.replaceChild(frag, tn);
            }
        }

        function Topbar() {
            return (
                <div className="lab-topbar">
                    <div className="lab-topbar-inner">
                        <span>FYSIKLABBET — TEORI, SIMULERINGAR OCH ÖVNINGAR I FYSIK</span>
                    </div>
                </div>
            );
        }

        function Header() {
            return (
                <div className="lab-header">
                    <div className="lab-header-inner">
                        <a className="lab-logo" href="index.html">
                            <svg width="36" height="36" viewBox="0 0 36 36" aria-hidden="true">
                                <g transform="rotate(-24 18 18)">
                                    <ellipse cx="18" cy="18" rx="15" ry="6" fill="none" stroke="currentColor" strokeWidth="1.4" />
                                    <circle cx="28.04" cy="13.54" r="1.9" fill="var(--lab-accent)" />
                                </g>
                                <circle cx="18" cy="18" r="2.8" fill="var(--lab-accent)" />
                            </svg>
                            <span className="lab-logo-text">Fysiklabbet</span>
                        </a>
                        <nav className="lab-nav" aria-label="Huvudnavigation">
                            <a href="index.html">Start</a>
                            <div className="lab-nav-dd">
                                <button type="button" className="lab-nav-dd-trigger" aria-haspopup="true">
                                    Ämne
                                    <svg className="lab-nav-dd-caret" width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><path d="M2.5 4.5 6 8l3.5-3.5"/></svg>
                                </button>
                                <div className="lab-nav-dd-menu">
                                    <a href="katalog.html#fy1">Fysik nivå 1</a>
                                    <a href="katalog.html#fy2">Fysik nivå 2</a>
                                </div>
                            </div>
                            <a href="simuleringar.html">Simuleringar</a>
                            <a href="nyheter.html" className="active">Nyheter</a>
                            <a href="om.html">Om</a>
                            <a href="kontakt.html">Kontakt</a>
                        </nav>
                    </div>
                </div>
            );
        }

        function Footer() {
            return (
                <footer className="lab-section lab-footer">
                    <span>© 2026 FYSIKLABBET</span>
                    <span>SKAPAD FÖR GYMNASIEELEVER</span>
                </footer>
            );
        }

        function MetaRow({ a }) {
            return (
                <div className="news-meta-row">
                    <span className="news-meta-cat">{a.category}</span>
                    <span className="news-meta-dot" />
                    <span>{formatDate(a.date)}</span>
                    {a.readingTime && <React.Fragment>
                        <span className="news-meta-dot" />
                        <span>{a.readingTime}</span>
                    </React.Fragment>}
                </div>
            );
        }

        function ListView() {
            const [featured, ...rest] = NYHETER;
            return (
                <React.Fragment>
                    <div className="news-hero">
                        <span className="lab-mono-label">Nyheter · en ny varje dag</span>
                        <h1 className="news-hero-title">Fysik­nyheter</h1>
                        <p className="news-hero-lead">
                            Det senaste från forskningsfronten — neutriner, svarta hål,
                            kvantdatorer och allt däremellan — sammanfattat på svenska och
                            skrivet för att vara lätt att ta till sig. Källa anges alltid, och
                            där det går länkar vi direkt till originalforskningen.
                        </p>
                    </div>

                    <div className="news-wrap">
                        {!featured && (
                            <div className="news-empty">Inga nyheter publicerade ännu — kom tillbaka snart!</div>
                        )}

                        {featured && (
                            <a className="news-featured" href={`?id=${featured.id}`}>
                                <div className="news-featured-media">
                                    <span className="news-featured-flag">Senaste nytt</span>
                                    <img src={featured.image} alt={featured.imageAlt} loading="eager" />
                                </div>
                                <div className="news-featured-text">
                                    <MetaRow a={featured} />
                                    <h2 className="news-featured-title">{featured.title}</h2>
                                    <p className="news-featured-deck">{featured.deck}</p>
                                    <span className="news-readmore">Läs hela →</span>
                                </div>
                            </a>
                        )}

                        {rest.length > 0 && (
                            <React.Fragment>
                                <div className="news-grid-head">
                                    <span className="lab-mono-label">Tidigare nyheter</span>
                                    <span className="lab-mono-label">{rest.length} st</span>
                                </div>
                                <div className="news-grid">
                                    {rest.map(a => (
                                        <a className="news-card" href={`?id=${a.id}`} key={a.id}>
                                            <div className="news-card-media">
                                                <img src={a.image} alt={a.imageAlt} loading="lazy" />
                                            </div>
                                            <MetaRow a={a} />
                                            <h3 className="news-card-title">{a.title}</h3>
                                            <p className="news-card-deck">{a.deck}</p>
                                        </a>
                                    ))}
                                </div>
                            </React.Fragment>
                        )}
                    </div>
                </React.Fragment>
            );
        }

        function Block({ b }) {
            if (b.type === 'h2') return <h2>{b.text}</h2>;
            if (b.type === 'quote') return (
                <blockquote className="article-quote">
                    <p dangerouslySetInnerHTML={{ __html: b.html }} />
                    {b.cite && <cite>{b.cite}</cite>}
                </blockquote>
            );
            if (b.type === 'fact') return (
                <div className="article-fact">
                    <div className="article-fact-title">{b.title}</div>
                    <ul>{b.items.map((it, i) => <li key={i} dangerouslySetInnerHTML={{ __html: it }} />)}</ul>
                </div>
            );
            return <p dangerouslySetInnerHTML={{ __html: b.html }} />;
        }

        // Poddspelare: visar en spelare om det finns en ljudfil för artikeln.
        // Lägg ljudfilen som nyheter/podd/<id>.<ext> (m4a/mp3/…), så hittar
        // spelaren den automatiskt — ingen ändring i data/nyheter.js behövs.
        // Ett explicit a.audio-fält går att sätta om filen ligger annorstädes.
        function ArticlePodcast({ a }) {
            const [src, setSrc] = React.useState(null);
            React.useEffect(() => {
                let alive = true;
                const candidates = a.audio
                    ? [a.audio]
                    : ['m4a', 'mp3', 'wav', 'ogg', 'aac', 'opus'].map(ext => `nyheter/podd/${a.id}.${ext}`);
                (async () => {
                    for (const c of candidates) {
                        try {
                            const r = await fetch(c, { method: 'HEAD' });
                            if (r.ok) { if (alive) setSrc(c); return; }
                        } catch (e) { /* nästa kandidat */ }
                    }
                    if (alive) setSrc(null);
                })();
                return () => { alive = false; };
            }, [a.id]);

            if (!src) return null;
            return (
                <div className="article-podcast">
                    <div className="article-podcast-head">
                        <span className="article-podcast-icon">
                            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                                <rect x="9" y="2" width="6" height="11" rx="3" />
                                <path d="M5 10a7 7 0 0 0 14 0" />
                                <line x1="12" y1="17" x2="12" y2="22" />
                                <line x1="8" y1="22" x2="16" y2="22" />
                            </svg>
                        </span>
                        <div>
                            <div className="article-podcast-title">Lyssna: djupdykning</div>
                            <div className="article-podcast-sub">Ljudöversikt skapad i NotebookLM</div>
                        </div>
                    </div>
                    <audio className="article-podcast-audio" controls preload="none" src={src}>
                        Din webbläsare kan inte spela upp ljudet.
                    </audio>
                </div>
            );
        }

        function ArticleView({ a }) {
            const bodyRef = React.useRef(null);
            // Lässtöd: minns valen mellan besök (samma nycklar som teorisidorna).
            const [bionic, setBionic] = React.useState(() => {
                try { return localStorage.getItem('fy-bionic') === '1'; } catch (e) { return false; }
            });
            const [dyslexia, setDyslexia] = React.useState(() => {
                try { return localStorage.getItem('fy-dyslexia') === '1'; } catch (e) { return false; }
            });
            React.useEffect(() => {
                try { localStorage.setItem('fy-bionic', bionic ? '1' : '0'); } catch (e) {}
            }, [bionic]);
            React.useEffect(() => {
                try { localStorage.setItem('fy-dyslexia', dyslexia ? '1' : '0'); } catch (e) {}
            }, [dyslexia]);
            // Lägg in bionic-spannen en gång när artikeln monterats.
            React.useEffect(() => { applyBionic(bodyRef.current); }, [a]);

            return (
                <article className="article">
                    <a className="article-back" href="nyheter.html">← Alla nyheter</a>
                    <MetaRow a={a} />
                    <h1 className="article-title">{a.title}</h1>
                    <p className="article-deck">{a.deck}</p>

                    <ArticlePodcast a={a} />

                    <div className="article-ai-note">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="9" /><path d="M12 11v5" /><path d="M12 8h.01" />
                        </svg>
                        <span>
                            <strong>Så här är artikeln framtagen:</strong> AI har använts som stöd
                            i arbetet. Innehållet är faktagranskat mot de angivna källorna och
                            korrekturläst av en människa.
                        </span>
                    </div>

                    <figure className="article-figure">
                        <img src={a.image} alt={a.imageAlt} />
                        {a.imageCredit && <figcaption>{a.imageCredit}</figcaption>}
                    </figure>

                    <div className="lab-bionic-bar">
                        <button type="button"
                            className={'lab-bionic-toggle' + (bionic ? ' is-on' : '')}
                            onClick={() => setBionic(b => !b)}
                            aria-pressed={bionic}
                            title="Bionisk läsning — fetmarkerar början av varje ord som lässtöd">
                            <span className="lab-bionic-knob" />
                            <span><b>Bio</b>nisk <b>läs</b>ning</span>
                        </button>
                        <button type="button"
                            className={'lab-bionic-toggle' + (dyslexia ? ' is-on' : '')}
                            onClick={() => setDyslexia(d => !d)}
                            aria-pressed={dyslexia}
                            title="Dyslexivänligt typsnitt (OpenDyslexic) — anpassat för läsare med dyslexi">
                            <span className="lab-bionic-knob" />
                            <span className="lab-dys-label">Dyslexivänligt</span>
                        </button>
                    </div>

                    <div ref={bodyRef}
                         className={'article-body' + (bionic ? ' bionic-on' : '') + (dyslexia ? ' dyslexia-on' : '')}>
                        {a.body.map((b, i) => <Block b={b} key={i} />)}
                    </div>

                    <div className="article-sources">
                        <div className="article-sources-label">Källor</div>
                        <div className="article-sources-list">
                            {a.sources.map((s, i) => (
                                <a className="article-source-pill" href={s.url}
                                   target="_blank" rel="noopener noreferrer" key={i}>{s.name} ↗</a>
                            ))}
                        </div>
                        {a.research && (
                            <p className="article-research">
                                <strong>Originalforskningen:</strong>{' '}
                                <a href={a.research.url} target="_blank" rel="noopener noreferrer">
                                    {a.research.citation}
                                </a>
                            </p>
                        )}
                    </div>
                </article>
            );
        }

        function App() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const article = id ? NYHETER.find(a => a.id === id) : null;

            React.useEffect(() => {
                document.title = article
                    ? `${article.title} — Fysiklabbet`
                    : 'Nyheter — Fysiklabbet';
            }, [article]);

            return (
                <div className="lab-page">
                    <Topbar />
                    <Header />
                    {article ? <ArticleView a={article} /> : <ListView />}
                    <Footer />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <script>document.write('<scr' + 'ipt src="feedback.js?v=' + window.__CB + '" defer></scr' + 'ipt>');</script>
</body>
</html>
