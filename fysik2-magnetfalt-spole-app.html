    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MU0 = 4 * Math.PI * 1e-7;      // permeabiliteten i vakuum (T·m/A)

        // ── Glidarintervall ──
        const IMIN = 0.1, IMAX = 5.0;        // ström I (A)
        const NMIN = 100, NMAX = 1000;       // varvtal n
        const LMIN = 5.0, LMAX = 30.0;       // spolens längd l (cm)

        const fmt = (num, decimals = 1) => {
            if (!isFinite(num)) return '–';
            const s = num.toFixed(decimals);
            if (parseFloat(s) === 0) return '0';
            return s.replace('.', ',').replace('-', '−');
        };
        // tusentalsavgränsare med hårt mellanslag (NBSP)
        const fmtNum = (n, d) => {
            const s = n.toFixed(d);
            if (parseFloat(s) === 0) return '0';
            const [intp, frac] = s.split('.');
            const withSpaces = intp.replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
            return frac !== undefined ? withSpaces + ',' + frac : withSpaces;
        };
        // flödestäthet med lämpligt prefix
        const fmtB = (B) => {
            const mT = B * 1e3;
            if (mT >= 10) return `${fmt(mT, 0)} mT`;
            if (mT >= 1) return `${fmt(mT, 1)} mT`;
            if (mT >= 0.1) return `${fmt(mT, 2)} mT`;
            const uT = B * 1e6;
            return `${fmt(uT, uT >= 10 ? 0 : 1)} µT`;
        };

        const COL = {
            falt:   '#c0392b',   // fältlinjer (röda, som teorifigurerna)
            strom:  '#2563c9',   // strömmen I (blå, som teorifigurerna)
            koppar: '#b5743a',   // spolens tråd (koppar)
            ink:    '#30363f',
            npol:   '#c0392b',
            spol:   '#2563c9',
        };

        // ── THREE-hjälpare ──────────────────────────────────────
        const disposeGroup = (g) => {
            g.traverse((o) => {
                if (o.geometry) o.geometry.dispose();
                if (o.material) (Array.isArray(o.material) ? o.material : [o.material]).forEach((m) => {
                    if (m.map) m.map.dispose();
                    m.dispose();
                });
            });
            g.clear();
        };

        // Textetikett som sprite (kursiva variabler via canvas-font)
        const textSprite = (parts, h = 0.42) => {
            const c = document.createElement('canvas');
            const ctx = c.getContext('2d');
            const FS = 64, PAD = 14;
            const fontFor = (p) => `${p.italic ? 'italic ' : ''}${p.weight || 600} ${FS}px Poppins, sans-serif`;
            let w = 0;
            parts.forEach((p) => { ctx.font = fontFor(p); w += ctx.measureText(p.t).width; });
            c.width = Math.max(2, Math.ceil(w) + PAD * 2);
            c.height = FS + PAD * 2;
            let x = PAD;
            parts.forEach((p) => {
                ctx.font = fontFor(p);
                ctx.fillStyle = p.color;
                ctx.textBaseline = 'middle';
                ctx.fillText(p.t, x, c.height / 2 + 2);
                x += ctx.measureText(p.t).width;
            });
            const tex = new THREE.CanvasTexture(c);
            tex.minFilter = THREE.LinearFilter;
            const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
            spr.scale.set(h * c.width / c.height, h, 1);
            spr.renderOrder = 10;
            return spr;
        };

        // Kon (pilspets) orienterad längs en riktningsvektor
        const cone = (dir, pos, len, rad, color, opacity = 1) => {
            const m = new THREE.Mesh(
                new THREE.ConeGeometry(rad, len, 14),
                new THREE.MeshStandardMaterial({ color, transparent: opacity < 1, opacity, roughness: 0.6 })
            );
            m.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
            m.position.copy(pos);
            return m;
        };

        const Slider = ({ label, sub, value, min, max, step, onChange, valueText }) => (
            <div className="mb-3">
                <div className="flex justify-between items-baseline mb-1">
                    <label className="text-sm font-bold" style={{ color: 'var(--lab-ink)' }}
                           dangerouslySetInnerHTML={{ __html: label }} />
                    <div className="font-mono font-semibold text-sm" style={{ color: 'var(--lab-accent)' }}>{valueText}</div>
                </div>
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))}
                       className="w-full cursor-pointer" />
                {sub && <div className="text-xs mt-1" style={{ color: 'var(--lab-ink-muted)' }}
                             dangerouslySetInnerHTML={{ __html: sub }} />}
            </div>
        );

        const FsSlider = ({ label, value, min, max, step, onChange, valueText }) => (
            <div className="fs-row">
                <span className="fs-label" style={{ minWidth: 150 }} dangerouslySetInnerHTML={{ __html: label }} />
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))} />
                <span className="fs-value" style={{ minWidth: 90, textAlign: 'right' }}>{valueText}</span>
            </div>
        );

        // Formelkort-hjälpare (samma mönster som fysik2-svangningstid-app)
        const Vbl = ({ label, children }) => (
            <div className="flex flex-col items-center" style={{ lineHeight: 1.1 }}>
                <span className="flbl">{label}</span>
                <span className="fnum">{children}</span>
                <span className="flbl" aria-hidden="true" style={{ visibility: 'hidden' }}>{label}</span>
            </div>
        );
        const FracL = ({ topLbl, top, botLbl, bot }) => (
            <div className="flex flex-col items-center" style={{ lineHeight: 1.15 }}>
                <span className="flbl" style={topLbl ? {} : { visibility: 'hidden' }}>{topLbl || '·'}</span>
                <span className="fnum" style={{ padding: '0 8px 3px' }}>{top}</span>
                <span className="fnum" style={{ padding: '3px 8px 0', borderTop: '2px solid currentColor', alignSelf: 'stretch', textAlign: 'center' }}>{bot}</span>
                <span className="flbl" style={botLbl ? {} : { visibility: 'hidden' }}>{botLbl || '·'}</span>
            </div>
        );
        const FracP = ({ top, bot }) => (
            <span style={{ display: 'inline-flex', flexDirection: 'column', alignItems: 'center', lineHeight: 1.25 }}>
                <span style={{ padding: '0 6px 2px' }}>{top}</span>
                <span style={{ padding: '2px 6px 0', borderTop: '1.5px solid currentColor', alignSelf: 'stretch', textAlign: 'center' }}>{bot}</span>
            </span>
        );

        const FormulaCard = () => (
            <div className="glass-card rounded-xl p-4 mb-6 flex flex-wrap items-center gap-x-6 gap-y-3" style={{ color: 'var(--lab-ink)' }}>
                <div className="flex items-center gap-x-3">
                    <Vbl label="Flödestäthet"><em>B</em></Vbl>
                    <span className="fnum">=</span>
                    <Vbl label="Permeabiliteten"><em>μ</em><sub style={{ fontSize: 12 }}>0</sub></Vbl>
                    <span className="fnum">·</span>
                    <FracL topLbl="Varvtal · ström" top={<React.Fragment><em>n</em> · <em>I</em></React.Fragment>}
                           botLbl="Spolens längd" bot={<em>l</em>} />
                </div>
                <div className="flex items-center gap-x-2" style={{ color: 'var(--lab-ink-muted)', fontSize: 13 }}>
                    <span><em>μ</em><sub>0</sub> = 4<em>π</em> · 10<sup>−7</sup> T·m/A</span>
                </div>
            </div>
        );

        // ── Huvudapp ─────────────────────────────────────────────
        const App = () => {
            const q = new URLSearchParams(location.search);
            const [I, setI] = useState(isFinite(parseFloat(q.get('i'))) ? parseFloat(q.get('i')) : 1.5);
            const [n, setN] = useState(isFinite(parseFloat(q.get('n'))) ? parseFloat(q.get('n')) : 600);
            const [lcm, setLcm] = useState(isFinite(parseFloat(q.get('l'))) ? parseFloat(q.get('l')) : 7.5);
            const [reversed, setReversed] = useState(q.get('rev') === '1');
            const [show, setShow] = useState({ falt: true, strom: true, poler: true });
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [controlsOpen, setControlsOpen] = useState(true);
            const [fontsReady, setFontsReady] = useState(0);

            const sceneWrapRef = useRef(null);
            const threeRef = useRef(null);
            const pRef = useRef({});

            // rita om text-sprites när Poppins laddats (annars fallback-typsnitt)
            useEffect(() => {
                if (document.fonts && document.fonts.ready)
                    document.fonts.ready.then(() => setFontsReady(1));
            }, []);

            // ── Härledda storheter (exakt enligt genomgången) ──
            const l = lcm / 100;                 // spolens längd (m)
            const B = MU0 * n * I / l;           // magnetisk flödestäthet (T)
            const varvPerMeter = n / l;

            pRef.current = { I, reversed };

            // ── THREE-scenen: initieras en gång ──
            useEffect(() => {
                const wrap = sceneWrapRef.current;
                if (!wrap || !window.THREE) return;

                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.setSize(wrap.clientWidth, wrap.clientHeight);
                wrap.insertBefore(renderer.domElement, wrap.firstChild);

                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0xf3eee4);   // Laborans-papper

                const camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.1, 100);

                scene.add(new THREE.AmbientLight(0xffffff, 0.75));
                const key = new THREE.DirectionalLight(0xffffff, 0.85);
                key.position.set(4, 6, 5);
                scene.add(key);
                const fill = new THREE.DirectionalLight(0xffe9d0, 0.25);
                fill.position.set(-5, -2, -4);
                scene.add(fill);

                const groups = {
                    coil: new THREE.Group(), falt: new THREE.Group(),
                    strom: new THREE.Group(), poler: new THREE.Group(), matt: new THREE.Group(),
                };
                Object.values(groups).forEach((g) => scene.add(g));

                const T = {
                    renderer, scene, camera, groups,
                    dots: [], wire: null,
                    az: 0.55, pol: 1.22, radius: 9.0,
                };
                threeRef.current = T;

                const updateCam = () => {
                    camera.position.set(
                        T.radius * Math.sin(T.pol) * Math.sin(T.az),
                        T.radius * Math.cos(T.pol),
                        T.radius * Math.sin(T.pol) * Math.cos(T.az)
                    );
                    camera.lookAt(0, -0.3, 0);
                };
                updateCam();

                // ── Rotera med musen / fingret, zooma med scrollhjulet ──
                const el = renderer.domElement;
                let dragging = false, px = 0, py = 0;
                const onDown = (e) => { dragging = true; px = e.clientX; py = e.clientY; el.setPointerCapture(e.pointerId); };
                const onMove = (e) => {
                    if (!dragging) return;
                    T.az -= (e.clientX - px) * 0.006;
                    T.pol = Math.max(0.15, Math.min(Math.PI - 0.15, T.pol - (e.clientY - py) * 0.006));
                    px = e.clientX; py = e.clientY;
                    updateCam();
                };
                const onUp = (e) => { dragging = false; try { el.releasePointerCapture(e.pointerId); } catch (err) {} };
                const onWheel = (e) => {
                    e.preventDefault();
                    T.radius = Math.max(4, Math.min(15, T.radius * (1 + e.deltaY * 0.001)));
                    updateCam();
                };
                el.addEventListener('pointerdown', onDown);
                el.addEventListener('pointermove', onMove);
                el.addEventListener('pointerup', onUp);
                el.addEventListener('pointercancel', onUp);
                el.addEventListener('wheel', onWheel, { passive: false });

                // ── Storleksändring (inkl. fullskärm) ──
                const ro = new ResizeObserver(() => {
                    const w = wrap.clientWidth, h = wrap.clientHeight;
                    if (!w || !h) return;
                    renderer.setSize(w, h);
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                });
                ro.observe(wrap);

                // ── Animationsloop: strömprickarna vandrar längs tråden ──
                let raf, last = performance.now();
                const loop = (now) => {
                    raf = requestAnimationFrame(loop);
                    const dt = Math.min((now - last) / 1000, 0.05);
                    last = now;
                    const p = pRef.current;
                    if (T.wire && T.dots.length) {
                        const speed = (0.9 + 0.5 * p.I) / T.wireLen;   // konstant fart längs tråden
                        const dir = p.reversed ? -1 : 1;
                        T.dots.forEach((d) => {
                            d.u = (d.u + dir * speed * dt + 1) % 1;
                            T.wire.getPointAt(d.u, d.mesh.position);
                        });
                    }
                    renderer.render(scene, camera);
                };
                raf = requestAnimationFrame(loop);

                return () => {
                    cancelAnimationFrame(raf);
                    ro.disconnect();
                    el.removeEventListener('pointerdown', onDown);
                    el.removeEventListener('pointermove', onMove);
                    el.removeEventListener('pointerup', onUp);
                    el.removeEventListener('pointercancel', onUp);
                    el.removeEventListener('wheel', onWheel);
                    Object.values(groups).forEach(disposeGroup);
                    renderer.dispose();
                    if (el.parentNode) el.parentNode.removeChild(el);
                    threeRef.current = null;
                };
            }, []);

            // ── Bygg om spole + fält när parametrarna ändras ──
            useEffect(() => {
                const T = threeRef.current;
                if (!T) return;
                const { coil, falt, strom, poler, matt } = T.groups;
                Object.values(T.groups).forEach(disposeGroup);
                T.dots = [];

                const R = 1.0;                                   // spolens radie
                const Lw = 1.6 + 0.1 * lcm;                      // spolens längd i scenen
                const turns = Math.max(5, Math.min(Math.round(n / 50), Math.floor(Lw / 0.11)));
                const bDir = reversed ? -1 : 1;                  // B längs +x för strömmen som ritas
                const strength = Math.min(1, B / 0.05);
                const opF = 0.5 + 0.5 * strength;

                // ── Tråden: anslutning in + helix + anslutning ut, EN kontinuerlig kurva.
                // Lindningen är högervriden kring x-axeln: strömmen i +t-riktningen
                // cirkulerar från +y mot +z ⟹ B åt +x (högerhandsregeln/tumregeln).
                const pts = [];
                pts.push(new THREE.Vector3(-Lw / 2 - 0.95, -2.15, -0.75));
                pts.push(new THREE.Vector3(-Lw / 2 - 0.55, -1.78, -0.45));
                pts.push(new THREE.Vector3(-Lw / 2 - 0.16, -1.30, -0.12));
                const NPT = turns * 36;
                for (let i = 0; i <= NPT; i++) {
                    const t = i / NPT;
                    const th = Math.PI + 2 * Math.PI * turns * t;   // start/slut i botten
                    pts.push(new THREE.Vector3(-Lw / 2 + Lw * t, R * Math.cos(th), R * Math.sin(th)));
                }
                pts.push(new THREE.Vector3(Lw / 2 + 0.16, -1.30, -0.12));
                pts.push(new THREE.Vector3(Lw / 2 + 0.55, -1.78, -0.45));
                pts.push(new THREE.Vector3(Lw / 2 + 0.95, -2.15, -0.75));
                const wire = new THREE.CatmullRomCurve3(pts);
                T.wire = wire;
                T.wireLen = wire.getLength();

                const tube = new THREE.Mesh(
                    new THREE.TubeGeometry(wire, Math.min(1400, pts.length * 2), 0.055, 10),
                    new THREE.MeshStandardMaterial({ color: COL.koppar, metalness: 0.35, roughness: 0.45 })
                );
                coil.add(tube);

                // ── Strömriktningen: pilar på tråden + vandrande prickar ──
                const stromCol = new THREE.Color(COL.strom);
                const NARROW = 12;
                for (let k = 0; k < NARROW; k++) {
                    const u = 0.05 + 0.9 * k / (NARROW - 1);
                    const tan = wire.getTangentAt(u).multiplyScalar(reversed ? -1 : 1);
                    strom.add(cone(tan, wire.getPointAt(u), 0.24, 0.105, stromCol));
                }
                const dotGeo = new THREE.SphereGeometry(0.07, 12, 12);
                const dotMat = new THREE.MeshBasicMaterial({ color: COL.strom });
                for (let k = 0; k < 14; k++) {
                    const mesh = new THREE.Mesh(dotGeo, dotMat);
                    const u = k / 14;
                    wire.getPointAt(u, mesh.position);
                    strom.add(mesh);
                    T.dots.push({ u, mesh });
                }
                // I-etikett vid högra anslutningstråden
                const iSpr = textSprite([
                    { t: 'I', italic: true, color: COL.strom },
                    { t: ` = ${fmt(I, 1)} A`, color: COL.strom },
                ], 0.4);
                iSpr.position.set(Lw / 2 + 1.45, -1.95, -0.75);
                strom.add(iSpr);

                // ── Fältlinjer ──
                // inre: parallella, jämnt fördelade — homogent fält
                const rIn = 0.015 + 0.022 * strength;
                const LIn = Lw + 1.0;
                const inMat = new THREE.MeshStandardMaterial({ color: COL.falt, transparent: true, opacity: opF, roughness: 0.7 });
                [{ y: 0, z: 0 }, { y: 0.45, z: 0 }, { y: -0.45, z: 0 }, { y: 0, z: 0.45 }, { y: 0, z: -0.45 }].forEach((o) => {
                    const cyl = new THREE.Mesh(new THREE.CylinderGeometry(rIn, rIn, LIn, 8), inMat);
                    cyl.rotation.z = Math.PI / 2;
                    cyl.position.set(0, o.y, o.z);
                    falt.add(cyl);
                    // pilspets vid utgångsänden + liten pil på mitten
                    const xdir = new THREE.Vector3(bDir, 0, 0);
                    falt.add(cone(xdir, new THREE.Vector3(bDir * (LIn / 2 + 0.10), o.y, o.z), 0.24, 0.075, COL.falt, opF));
                    falt.add(cone(xdir, new THREE.Vector3(bDir * 0.1, o.y, o.z), 0.20, 0.065, COL.falt, opF));
                });
                // B-etikett vid de inre pilspetsarna
                const bSpr = textSprite([{ t: 'B', italic: true, color: COL.falt }], 0.46);
                bSpr.position.set(bDir * (LIn / 2 + 0.30), 0.62, 0);
                falt.add(bSpr);

                // yttre: slutna slingor runt spolen, som hos en stavmagnet
                const loopMat = new THREE.LineBasicMaterial({ color: COL.falt, transparent: true, opacity: 0.72 * opF });
                // varje hel ellips täcker två radiella riktningar (φ och φ + 180°)
                const phis = [0, Math.PI / 3, 2 * Math.PI / 3];
                [1.75, 2.35].forEach((b, bi) => {
                    const a = Lw / 2 + 0.55 + bi * 0.4;
                    phis.forEach((phi) => {
                        const u = new THREE.Vector3(0, Math.cos(phi), Math.sin(phi));
                        const lpts = [];
                        for (let k = 0; k <= 72; k++) {
                            const s = 2 * Math.PI * k / 72;
                            lpts.push(new THREE.Vector3(a * Math.cos(s), 0, 0)
                                .addScaledVector(u, b * Math.sin(s)));
                        }
                        falt.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(lpts), loopMat));
                        // pilar på slingans yttersta punkter: utanför spolen går fältet N ⟶ S
                        if (bi === 0) {
                            falt.add(cone(new THREE.Vector3(-bDir, 0, 0),
                                u.clone().multiplyScalar(b), 0.20, 0.065, COL.falt, 0.85 * opF));
                            falt.add(cone(new THREE.Vector3(-bDir, 0, 0),
                                u.clone().multiplyScalar(-b), 0.20, 0.065, COL.falt, 0.85 * opF));
                        }
                    });
                });

                // ── Polerna N och S ──
                const nSpr = textSprite([{ t: 'N', weight: 700, color: COL.npol }], 0.62);
                nSpr.position.set(bDir * (Lw / 2 + 0.85), 1.62, 0);
                const sSpr = textSprite([{ t: 'S', weight: 700, color: COL.spol }], 0.62);
                sSpr.position.set(-bDir * (Lw / 2 + 0.85), 1.62, 0);
                poler.add(nSpr, sSpr);

                // ── Måttlinje för spolens längd l (dubbelpil i fri yta under spolen) ──
                const mz = 0.55, my = -1.62;
                const dashMat = new THREE.LineDashedMaterial({ color: COL.ink, dashSize: 0.11, gapSize: 0.08, transparent: true, opacity: 0.8 });
                const addDash = (p1, p2) => {
                    const ln = new THREE.Line(new THREE.BufferGeometry().setFromPoints([p1, p2]), dashMat);
                    ln.computeLineDistances();
                    matt.add(ln);
                };
                addDash(new THREE.Vector3(-Lw / 2, -1.12, mz), new THREE.Vector3(-Lw / 2, my - 0.1, mz));
                addDash(new THREE.Vector3(Lw / 2, -1.12, mz), new THREE.Vector3(Lw / 2, my - 0.1, mz));
                addDash(new THREE.Vector3(-Lw / 2 + 0.14, my, mz), new THREE.Vector3(Lw / 2 - 0.14, my, mz));
                matt.add(cone(new THREE.Vector3(-1, 0, 0), new THREE.Vector3(-Lw / 2 + 0.08, my, mz), 0.16, 0.05, COL.ink));
                matt.add(cone(new THREE.Vector3(1, 0, 0), new THREE.Vector3(Lw / 2 - 0.08, my, mz), 0.16, 0.05, COL.ink));
                const lSpr = textSprite([
                    { t: 'l', italic: true, color: COL.ink },
                    { t: ` = ${fmt(lcm, lcm % 1 ? 1 : 0)} cm`, color: COL.ink },
                ], 0.36);
                lSpr.position.set(0, my - 0.32, mz);
                matt.add(lSpr);
            }, [n, lcm, I, reversed, B, fontsReady]);

            // ── Visa/dölj grupper ──
            useEffect(() => {
                const T = threeRef.current;
                if (!T) return;
                T.groups.falt.visible = show.falt;
                T.groups.strom.visible = show.strom;

            const setExample1 = () => { setN(600); setLcm(7.5); setI(1.5); setReversed(false); };

                        </div>

                            samverkar, och inuti en lång rak spole — en <strong>solenoid</strong> — blir magnetfältet
                            <strong> homogent</strong>: lika stort överallt. Dra i scenen för att rotera spolen i tre
                            dimensioner och studera hur tråden är lindad — de blå pilarna och prickarna visar åt
                            vilket håll strömmen går runt spolen, och tillsammans med lindningen avgör det fältets
                            riktning (tumregeln). Ändra strömmen <em>I</em>, varvtalet <em>n</em> och spolens

                                    </div>

                                    {sceneToggles()}

                                    {/* Fullskärm: glidarna i en hopfällbar panel i underkant */}

                                    <div className="flex gap-2 mt-1">

                                <li><strong>"Fler varv ger alltid starkare fält."</strong> Bara om spolen inte samtidigt blir längre. Det är varv per meter, <em>n</em>/<em>l</em>, som räknas — lindas samma varvtal ut över dubbla längden halveras fältet.</li>
                                <li><strong>"Fältet är starkast vid spolens ändar."</strong> Nej — inuti en lång rak spole är fältet homogent, lika starkt överallt. Strax utanför ändarna är det tvärtom svagare, och fältlinjerna böjer av som hos en stavmagnet.</li>

                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
