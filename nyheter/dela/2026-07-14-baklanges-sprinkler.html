    <title>Så snurrar en sprinkler som suger i sig vatten — gåtan från 1883 är äntligen löst — Fysiklabbet</title>
    <meta name="description" content="Vad händer om man kör en trädgårdssprinkler baklänges, så att vatten sugs in i stället för sprutas ut? Frågan ställdes redan 1883 och gjorde till och med Richard Feynman så nyfiken att han sprängde en glasbehållare i ett misslyckat labbförsök på 1940-talet. Nu har matematiker vid New York University, ledda av Leif Ristroph, byggt en rad olika ”sprinklerleksaker” i böjda rörformer och löst gåtan i tidskriften PNAS: en baklängeskörd sprinkler snurrar visserligen, men av ett helt annat skäl än den vanliga — och omkring 50 gånger långsammare.">
