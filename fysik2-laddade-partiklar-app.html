    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const QE = 1.602e-19;                // elementarladdningen (C)

        // ── Glidarintervall ──
        const VMIN = 0.5, VMAX = 5.0;        // hastighet v (Mm/s)
        const BMIN = 0.02, BMAX = 0.20;      // flödestäthet B (T)

        // ── Scen-geometri (viewBox-koordinater) ──
        const VBW = 820, VBH = 540;
        const START = { x: 470, y: 330 };    // partikelns startläge (px)
        const PR = 11;                       // partikelns ritradie (px)
        const CR = 5;                        // banradie-skala: r_px = CR · v/B
        const CV = 50;                       // fartskala: px/s = CV · v

        const fmt = (num, decimals = 1) => {
            if (!isFinite(num)) return '–';
            const s = num.toFixed(decimals);
            if (parseFloat(s) === 0) return '0';
            return s.replace('.', ',').replace('-', '−');
        };
        // kraft i femtonewton (1 fN = 10⁻¹⁵ N)
        const fmtF = (F) => {
            const fN = F * 1e15;
            return `${fmt(fN, fN < 10 ? 1 : 0)} fN`;
        };
        // kraft i tiopotensform, t.ex. { m: '3,1', e: -14 }
        const fFexp = (F) => {
            const e = Math.floor(Math.log10(F));
            return { m: fmt(F / Math.pow(10, e), 1), e };
        };

        const COL = {
            ink:   '#0f1620',
            falt:  '#c0392b',    // fältsymboler (röda, som teorifigurerna)
            part:  '#2563c9',    // partikeln (blå, som teorifigurerna)
            kraft: '#2563c9',    // kraften F (blå, som teorifigurerna)
            vpil:  '#1f2530',    // hastigheten v (bläck, som teorifigurerna)
            bana:  '#9aa0a6',
            trail: 'rgba(37,99,201,0.40)',
        };

        const Slider = ({ label, sub, value, min, max, step, onChange, valueText }) => (
            <div className="mb-3">
                <div className="flex justify-between items-baseline mb-1">
                    <label className="text-sm font-bold" style={{ color: 'var(--lab-ink)' }}
                           dangerouslySetInnerHTML={{ __html: label }} />
                    <div className="font-mono font-semibold text-sm" style={{ color: 'var(--lab-accent)' }}>{valueText}</div>
                </div>
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))}
                       className="w-full cursor-pointer" />
                {sub && <div className="text-xs mt-1" style={{ color: 'var(--lab-ink-muted)' }}
                             dangerouslySetInnerHTML={{ __html: sub }} />}
            </div>
        );

        const FsSlider = ({ label, value, min, max, step, onChange, valueText }) => (
            <div className="fs-row">
                <span className="fs-label" style={{ minWidth: 150 }} dangerouslySetInnerHTML={{ __html: label }} />
                <input type="range" min={min} max={max} step={step} value={value}
                       onChange={(e) => onChange(parseFloat(e.target.value))} />
                <span className="fs-value" style={{ minWidth: 90, textAlign: 'right' }}>{valueText}</span>
            </div>
        );

        // Formelkort-hjälpare (samma mönster som fysik2-svangningstid-app)
        const Vbl = ({ label, children }) => (
            <div className="flex flex-col items-center" style={{ lineHeight: 1.1 }}>
                <span className="flbl">{label}</span>
                <span className="fnum">{children}</span>
                <span className="flbl" aria-hidden="true" style={{ visibility: 'hidden' }}>{label}</span>
            </div>
        );

        const FormulaCard = () => (
            <div className="glass-card rounded-xl p-4 mb-6 flex flex-wrap items-center gap-x-6 gap-y-3" style={{ color: 'var(--lab-ink)' }}>
                <div className="flex items-center gap-x-3">
                    <Vbl label="Magnetisk kraft"><em>F</em></Vbl>
                    <span className="fnum">=</span>
                    <Vbl label="Laddning"><em>q</em></Vbl>
                    <span className="fnum">·</span>
                    <Vbl label="Hastighet"><em>v</em></Vbl>
                    <span className="fnum">·</span>
                    <Vbl label="Flödestäthet"><em>B</em></Vbl>
                </div>
                <div className="flex items-center gap-x-2" style={{ color: 'var(--lab-ink-muted)', fontSize: 13 }}>
                    <span>elementarladdningen <em>q</em> ≈ 1,602 · 10<sup>−19</sup> C, <em>B</em> vinkelrätt mot rörelsen</span>
                </div>
            </div>
        );

        // ── Huvudapp ─────────────────────────────────────────────
        const App = () => {
            const q = new URLSearchParams(location.search);
            const [v, setV] = useState(isFinite(parseFloat(q.get('v'))) ? parseFloat(q.get('v')) : 2.4);
            const [B, setB] = useState(isFinite(parseFloat(q.get('b'))) ? parseFloat(q.get('b')) : 0.08);
            const [negativ, setNegativ] = useState(q.get('ladd') !== 'pos');   // negativ laddning (elektron)
            const [bIn, setBIn] = useState(q.get('falt') !== 'ut');            // B in i planet (kryss)
            const [running, setRunning] = useState(true);
            const [show, setShow] = useState({ kraft: true, fart: true, strom: false, bana: true });
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [controlsOpen, setControlsOpen] = useState(true);
            const [, setTick] = useState(0);

            const sceneWrapRef = useRef(null);
            const stateRef = useRef({ x: START.x, y: START.y, phi: Math.PI / 2, off: 0 });
            const trailRef = useRef([]);
            const pRef = useRef({});

            // ── Härledda storheter (exakt enligt genomgången) ──
            const F = QE * v * 1e6 * B;                  // magnetisk kraft (N)
            const rPx = CR * v / B;                      // banradie på skärmen (px)
            // rotationsriktning på skärmen: negativ laddning + B in i planet
            // ⟹ kraften åt vänster när partikeln rör sig nedåt (som Exempel 1)
            const spin = (negativ ? 1 : -1) * (bIn ? 1 : -1);

            pRef.current = { running, v, B, spin, rPx };

            const restart = () => {
                stateRef.current = { x: START.x, y: START.y, phi: Math.PI / 2, off: 0 };
                trailRef.current = [];
            };

            // ── Animationsloop ──
            useEffect(() => {
                let raf, last = performance.now();
                const loop = (now) => {
                    raf = requestAnimationFrame(loop);
                    const dt = Math.min((now - last) / 1000, 0.05);
                    last = now;
                    const p = pRef.current;
                    if (p.running) {
                        const st = stateRef.current;
                        const omega = p.spin * (CV * p.v) / p.rPx;   // = 10 · B, oberoende av v
                        st.phi += omega * dt;
                        st.x += CV * p.v * Math.cos(st.phi) * dt;
                        st.y += CV * p.v * Math.sin(st.phi) * dt;
                        // spår (glesa ut punkterna något)
                        const tr = trailRef.current;
                        const lastPt = tr[tr.length - 1];
                        if (!lastPt || Math.hypot(st.x - lastPt.x, st.y - lastPt.y) > 2.5) {
                            tr.push({ x: st.x, y: st.y });
                            if (tr.length > 900) tr.shift();
                        }
                        // utanför scenen länge (mycket stor banradie) ⟹ börja om
                        const out = st.x < -80 || st.x > VBW + 80 || st.y < -80 || st.y > VBH + 80;
                        st.off = out ? st.off + dt : 0;
                        if (st.off > 2.5) restart();
                    }
                    setTick(t => t + 1);
                };
                raf = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(raf);
            }, []);

            // ── Fullskärm ──
            useEffect(() => {
                const handler = () => {
                    const fs = document.fullscreenElement === sceneWrapRef.current ||
                        document.webkitFullscreenElement === sceneWrapRef.current;
                    setIsFullscreen(fs);
                    if (fs) setControlsOpen(false);   // starta hopfälld i fullskärm
                };
                document.addEventListener('fullscreenchange', handler);
                document.addEventListener('webkitfullscreenchange', handler);
                return () => {
                    document.removeEventListener('fullscreenchange', handler);
                    document.removeEventListener('webkitfullscreenchange', handler);
                };
            }, []);
            const toggleFullscreen = () => {
                const el = sceneWrapRef.current;
                if (!el) return;
                if (document.fullscreenElement || document.webkitFullscreenElement)
                    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
                else (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
            };

            const tShow = (key) => setShow(sh => ({ ...sh, [key]: !sh[key] }));
            // Exempel 1 i teorigenomgången: elektron, 2,4 Mm/s, 0,080 T ⟹ F ≈ 31 fN åt vänster
            const setExample1 = () => { setNegativ(true); setBIn(true); setV(2.4); setB(0.08); restart(); };

            // ── Fältsymboler (kryss = in i planet, prickar = ut ur planet) ──
            const fieldOpacity = 0.30 + 0.55 * Math.min(1, B / 0.14);
            const fieldSymbols = useMemo(() => {
                const els = [];
                const SP = 58;
                for (let gx = 44; gx <= VBW - 20; gx += SP) {
                    for (let gy = 44; gy <= VBH - 20; gy += SP) {
                        if (bIn) {
                            els.push(<line key={`a${gx}-${gy}`} x1={gx - 5.5} y1={gy - 5.5} x2={gx + 5.5} y2={gy + 5.5}
                                           stroke={COL.falt} strokeWidth="1.8" strokeLinecap="round" />);
                            els.push(<line key={`b${gx}-${gy}`} x1={gx + 5.5} y1={gy - 5.5} x2={gx - 5.5} y2={gy + 5.5}
                                           stroke={COL.falt} strokeWidth="1.8" strokeLinecap="round" />);
                        } else {
                            els.push(<circle key={`c${gx}-${gy}`} cx={gx} cy={gy} r="5.5" fill="none"
                                             stroke={COL.falt} strokeWidth="1.6" />);
                            els.push(<circle key={`d${gx}-${gy}`} cx={gx} cy={gy} r="1.7" fill={COL.falt} />);
                        }
                    }
                }
                return els;
            }, [bIn]);

            // ── Kryssrutor och lägesval (uppe till höger på scenen) ──
            const sceneToggles = () => (
                <div className="scene-toggles">
                    <div className="st-title">Partikel</div>
                    <label><input type="radio" name="laddning" checked={negativ} onChange={() => setNegativ(true)} />
                        <span>Negativ laddning (elektron)</span></label>
                    <label><input type="radio" name="laddning" checked={!negativ} onChange={() => setNegativ(false)} />
                        <span>Positiv laddning (proton)</span></label>
                    <div className="st-title st-group">Magnetfältet <em style={{ textTransform: 'none' }}>B</em></div>
                    <label><input type="radio" name="falt" checked={bIn} onChange={() => setBIn(true)} />
                        <span>In i planet (kryss)</span></label>
                    <label><input type="radio" name="falt" checked={!bIn} onChange={() => setBIn(false)} />
                        <span>Ut ur planet (prickar)</span></label>
                    <div className="st-title st-group">Visa</div>
                    <label><input type="checkbox" checked={show.kraft} onChange={() => tShow('kraft')} />
                        <span className="st-swatch" style={{ background: COL.kraft }}></span>
                        <span>Kraften <em>F</em></span></label>
                    <label><input type="checkbox" checked={show.fart} onChange={() => tShow('fart')} />
                        <span className="st-swatch" style={{ background: COL.vpil }}></span>
                        <span>Hastigheten <em>v</em></span></label>
                    <label><input type="checkbox" checked={show.strom} onChange={() => tShow('strom')} />
                        <span className="st-swatch" style={{ background: COL.ink, opacity: 0.5 }}></span>
                        <span>Strömriktningen <em>I</em></span></label>
                    <label><input type="checkbox" checked={show.bana} onChange={() => tShow('bana')} />
                        <span className="st-swatch" style={{ background: COL.bana }}></span>
                        <span>Cirkelbanan</span></label>
                    {/* Styrknapparna visas här BARA i fullskärm — i normalläget finns
                        de i sidopanelen (aldrig dubblerade). */}
                    {isFullscreen && (
                        <div className="st-actions">
                            <button className="btn-toggle" onClick={() => setRunning(r => !r)}>{running ? 'Pausa' : 'Fortsätt'}</button>
                            <button className="btn-toggle" onClick={restart}>Börja om</button>
                        </div>
                    )}
                </div>
            );

            // ── Scenen ──
            const scene = () => {
                const st = stateRef.current;
                const els = [];
                const vhat = { x: Math.cos(st.phi), y: Math.sin(st.phi) };
                // enhetsvektor mot cirkelns centrum = kraftens riktning
                const fhat = { x: -vhat.y * spin, y: vhat.x * spin };

                // fältsymboler + B-etikett
                els.push(<g key="falt" opacity={fieldOpacity}>{fieldSymbols}</g>);
                els.push(<text key="blbl" x={76} y={34} textAnchor="start" fontSize="15" fill={COL.falt}>
                    <tspan fontStyle="italic">B</tspan> = {fmt(B, 3)} T {bIn ? '(in i planet)' : '(ut ur planet)'}
                </text>);

                // spår
                const tr = trailRef.current;
                if (tr.length > 1) {
                    els.push(<polyline key="trail"
                                       points={tr.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')}
                                       fill="none" stroke={COL.trail} strokeWidth="2.2" strokeLinecap="round" />);
                }

                // cirkelbanan (streckad guide genom partikeln)
                if (show.bana) {
                    const c = { x: st.x + fhat.x * rPx, y: st.y + fhat.y * rPx };
                    els.push(
                        <g key="bana">
                            <circle cx={c.x} cy={c.y} r={rPx} fill="none" stroke={COL.bana}
                                    strokeWidth="1.4" strokeDasharray="6 5" />
                            <circle cx={c.x} cy={c.y} r="2.4" fill={COL.bana} />
                        </g>
                    );
                }

                // strömriktningen I (för högerhandsregeln): samma riktning som v för
                // positiv laddning, motsatt riktning för negativ
                if (show.strom) {
                    const ihat = negativ ? { x: -vhat.x, y: -vhat.y } : vhat;
                    // förskjuts i sidled (utåt från cirkelns centrum) så att pilen
                    // inte ligger ovanpå v-pilen när laddningen är positiv
                    const o = { x: st.x - fhat.x * 24, y: st.y - fhat.y * 24 };
                    const s0 = { x: o.x + ihat.x * 2, y: o.y + ihat.y * 2 };
                    const L = 40, head = 8;
                    const bx = s0.x + ihat.x * (L - head), by = s0.y + ihat.y * (L - head);
                    const tipx = s0.x + ihat.x * L, tipy = s0.y + ihat.y * L;
                    els.push(
                        <g key="strom" opacity="0.75">
                            <line x1={s0.x} y1={s0.y} x2={bx} y2={by} stroke={COL.ink}
                                  strokeWidth="1.8" strokeDasharray="5 4" strokeLinecap="butt" />
                            <polygon points={`${tipx},${tipy} ${bx - ihat.y * 4.5},${by + ihat.x * 4.5} ${bx + ihat.y * 4.5},${by - ihat.x * 4.5}`}
                                     fill={COL.ink} />
                            <text x={tipx + ihat.x * 14} y={tipy + ihat.y * 14 + 5} textAnchor="middle"
                                  fontSize="14" fill={COL.ink} opacity="0.9"><tspan fontStyle="italic">I</tspan></text>
                        </g>
                    );
                }

                // hastighetspilen v (från partikelns kant, längd ∝ v)
                if (show.fart) {
                    const Lv = 16 + 11 * v, head = 9;
                    const s0 = { x: st.x + vhat.x * PR, y: st.y + vhat.y * PR };
                    const bx = s0.x + vhat.x * (Lv - head), by = s0.y + vhat.y * (Lv - head);
                    const tipx = s0.x + vhat.x * Lv, tipy = s0.y + vhat.y * Lv;
                    els.push(
                        <g key="vpil">
                            <line x1={s0.x} y1={s0.y} x2={bx} y2={by} stroke={COL.vpil}
                                  strokeWidth="2.4" strokeLinecap="butt" />
                            <polygon points={`${tipx},${tipy} ${bx - vhat.y * 5},${by + vhat.x * 5} ${bx + vhat.y * 5},${by - vhat.x * 5}`}
                                     fill={COL.vpil} />
                            <text x={tipx + vhat.x * 15} y={tipy + vhat.y * 15 + 5} textAnchor="middle"
                                  fontSize="15" fill={COL.vpil}><tspan fontStyle="italic">v</tspan></text>
                        </g>
                    );
                }

                // kraftpilen F (från partikelns kant mot cirkelns centrum, längd ∝ F)
                if (show.kraft) {
                    const Lf = 1.6 * F * 1e15;                       // 1,6 px per fN
                    const head = Math.max(9, Math.min(15, Lf * 0.55));
                    const s0 = { x: st.x + fhat.x * PR, y: st.y + fhat.y * PR };
                    const bx = s0.x + fhat.x * Math.max(0, Lf - head), by = s0.y + fhat.y * Math.max(0, Lf - head);
                    const tipx = s0.x + fhat.x * Lf, tipy = s0.y + fhat.y * Lf;
                    els.push(
                        <g key="fpil">
                            <line x1={s0.x} y1={s0.y} x2={bx} y2={by} stroke={COL.kraft}
                                  strokeWidth="2.6" strokeLinecap="butt" />
                            <polygon points={`${tipx},${tipy} ${bx - fhat.y * 5.5},${by + fhat.x * 5.5} ${bx + fhat.y * 5.5},${by - fhat.x * 5.5}`}
                                     fill={COL.kraft} />
                            <text x={tipx + fhat.x * 15} y={tipy + fhat.y * 15 + 5} textAnchor="middle"
                                  fontSize="15" fill={COL.kraft}><tspan fontStyle="italic">F</tspan></text>
                        </g>
                    );
                }

                // partikeln (blå cirkel med tecken, som teorifiguren)
                els.push(
                    <g key="part">
                        <circle cx={st.x} cy={st.y} r={PR} fill="#f7f2e8" stroke={COL.part} strokeWidth="2" />
                        <line x1={st.x - 5} y1={st.y} x2={st.x + 5} y2={st.y} stroke={COL.part} strokeWidth="2" />
                        {!negativ && <line x1={st.x} y1={st.y - 5} x2={st.x} y2={st.y + 5} stroke={COL.part} strokeWidth="2" />}
                    </g>
                );

                return (
                    <svg viewBox={`0 0 ${VBW} ${VBH}`} preserveAspectRatio="xMidYMid meet"
                         fontFamily="Poppins, sans-serif">
                        <defs>
                            <linearGradient id="paperG" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0" stopColor="#f7f2e8" />
                                <stop offset="1" stopColor="#ece3d2" />
                            </linearGradient>
                        </defs>
                        <rect x="0" y="0" width={VBW} height={VBH} fill="url(#paperG)" />
                        {els}
                    </svg>
                );
            };

            const Readout = ({ label, value, unit, color }) => (
                <div className="p-2 rounded-lg" style={{ background: 'var(--lab-bg)', border: '1px solid var(--lab-line-strong)' }}>
                    <div className="text-xs" style={{ color: 'var(--lab-ink-muted)' }} dangerouslySetInnerHTML={{ __html: label }} />
                    <div className="font-mono font-bold text-sm" style={{ color: color || 'var(--lab-ink)' }}>
                        {value} <span className="font-normal text-xs" style={{ color: 'var(--lab-ink-muted)' }}>{unit}</span>
                    </div>
                </div>
            );

            const Fx = fFexp(F);

            return (
                <div className="min-h-screen dark-container px-4 md:px-8 pb-12" style={{ fontFamily: "'DM Sans', sans-serif" }}>
                    <div className="max-w-6xl mx-auto pt-6">
                        <div className="breadcrumb mb-4" style={{ fontSize: 13 }}>
                            <a href="index.html">Hem</a> / <a href="katalog.html#fy2">Fysik nivå 2</a> / Laddade partiklar i magnetfält
                        </div>
                        <h1 className="text-3xl md:text-4xl font-black tracking-tight" style={{ color: 'var(--lab-ink)' }}>Laddade partiklar i magnetfält</h1>
                        <p className="mt-2 mb-5" style={{ color: 'var(--lab-ink-soft)', maxWidth: 820 }}>
                            Ett magnetfält påverkar laddningar som rör sig med en <strong>magnetisk kraft</strong>.
                            Kraften är alltid vinkelrät mot hastigheten, så partikeln böjs av i en cirkelbana —
                            farten ändras aldrig, bara riktningen. Ändra hastigheten <em>v</em> och
                            flödestätheten <em>B</em>, byt laddningens tecken och fältets riktning, och
                            kontrollera kraftens riktning med <strong>högerhandsregeln</strong>.
                        </p>

                        <FormulaCard />

                        <main className="flex flex-col lg:flex-row gap-6">
                            {/* Scen */}
                            <div className="lg:w-3/5 order-1">
                                <div className="scene-wrap" data-theme="ljusPapper" ref={sceneWrapRef}>
                                    {scene()}

                                    <div className="scene-info">
                                        <span className="si-lbl">Magnetisk kraft <em style={{ textTransform: 'none' }}>F</em></span>
                                        <span className="si-val">{fmtF(F)}</span>
                                        <span className="si-val" style={{ fontSize: 12, fontWeight: 500 }}>
                                            = {Fx.m} · 10<sup>{String(Fx.e).replace('-', '−')}</sup> N
                                        </span>
                                    </div>

                                    {sceneToggles()}

                                    {/* Fullskärm: glidarna i en hopfällbar panel i underkant */}
                                    {isFullscreen && (
                                        <React.Fragment>
                                            <div className={`fs-controls ${controlsOpen ? '' : 'collapsed'}`}>
                                                <FsSlider label="Hastighet (<em>v</em>)" value={v}
                                                          min={VMIN} max={VMAX} step={0.1} onChange={setV}
                                                          valueText={`${fmt(v, 1)} Mm/s`} />
                                                <FsSlider label="Flödestäthet (<em>B</em>)" value={B}
                                                          min={BMIN} max={BMAX} step={0.005} onChange={setB}
                                                          valueText={`${fmt(B, 3)} T`} />
                                            </div>
                                            <button className="fs-toggle-handle" onClick={() => setControlsOpen(o => !o)}
                                                    title={controlsOpen ? 'Dölj reglage' : 'Visa reglage'}
                                                    aria-expanded={controlsOpen}>
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                     strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"
                                                     style={{ transform: controlsOpen ? 'rotate(0deg)' : 'rotate(180deg)' }}>
                                                    <path d="M6 9l6 6 6-6"/>
                                                </svg>
                                                <span>{controlsOpen ? 'Dölj reglage' : 'Reglage'}</span>
                                            </button>
                                        </React.Fragment>
                                    )}

                                    <button className="fs-btn" onClick={toggleFullscreen} aria-label="Fullskärm"
                                            title={isFullscreen ? 'Lämna fullskärm' : 'Fullskärm'}>
                                        {isFullscreen ? (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M9 3v6H3" /><path d="M15 21v-6h6" /><path d="M21 9h-6V3" /><path d="M3 15h6v6" />
                                            </svg>
                                        ) : (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                                                <path d="M3 9V3h6" /><path d="M21 9V3h-6" /><path d="M3 15v6h6" /><path d="M21 15v6h-6" />
                                            </svg>
                                        )}
                                    </button>
                                </div>
                            </div>

                            {/* Kontroller */}
                            <div className="lg:w-2/5 order-2">
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <Slider label="Hastighet (<em>v</em>)"
                                            sub="1 Mm/s = 10<sup>6</sup> m/s. Snabbare partikel ⟹ större kraft och större cirkel."
                                            value={v} min={VMIN} max={VMAX} step={0.1} onChange={setV}
                                            valueText={`${fmt(v, 1)} Mm/s`} />
                                    <Slider label="Flödestäthet (<em>B</em>)"
                                            sub="Starkare fält ⟹ större kraft och snävare cirkel."
                                            value={B} min={BMIN} max={BMAX} step={0.005} onChange={setB}
                                            valueText={`${fmt(B, 3)} T`} />
                                    <div className="flex gap-2 mt-1">
                                        <button className="btn-toggle flex-1" onClick={() => setRunning(r => !r)}>{running ? 'Pausa' : 'Fortsätt'}</button>
                                        <button className="btn-toggle flex-1" onClick={restart}>Börja om</button>
                                    </div>
                                </div>

                                {/* Live-beräkning */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <div className="flbl mb-2">Beräkning av kraften</div>
                                    <div className="flex flex-wrap items-center gap-x-2 gap-y-2"
                                         style={{ color: 'var(--lab-ink)', fontSize: 15 }}>
                                        <span><em>F</em></span>
                                        <span>=</span>
                                        <span style={{ whiteSpace: 'nowrap' }}><em>q</em> · <em>v</em> · <em>B</em></span>
                                        <span>=</span>
                                        <span style={{ whiteSpace: 'nowrap' }}>1,602 · 10<sup>−19</sup></span>
                                        <span>·</span>
                                        <span style={{ whiteSpace: 'nowrap' }}>{fmt(v, 1)} · 10<sup>6</sup></span>
                                        <span>·</span>
                                        <span style={{ whiteSpace: 'nowrap' }}>{fmt(B, 3)}</span>
                                        <span>=</span>
                                        <span className="font-bold" style={{ color: 'var(--lab-accent)', whiteSpace: 'nowrap' }}>
                                            {Fx.m} · 10<sup>{String(Fx.e).replace('-', '−')}</sup> N
                                        </span>
                                    </div>
                                    <button className="btn-toggle w-full mt-3 text-sm" onClick={setExample1}
                                            title="Elektron, 2,4 Mm/s, 0,080 T">
                                        Exempel 1 ur teorin (elektron, 2,4 Mm/s, 0,080 T)
                                    </button>
                                </div>

                                {/* Avläsning */}
                                <div className="glass-card rounded-xl p-3 mb-3">
                                    <div className="flbl mb-2">Avläsning</div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <Readout label="Magnetisk kraft <em>F</em>" value={fmtF(F)} unit="" color="var(--lab-accent)" />
                                        <Readout label="Laddningens storlek <em>q</em>"
                                                 value={<React.Fragment>1,602 · 10<sup>−19</sup></React.Fragment>} unit="C" />
                                        <Readout label="Hastighet <em>v</em>"
                                                 value={<React.Fragment>{fmt(v, 1)} · 10<sup>6</sup></React.Fragment>} unit="m/s" />
                                        <Readout label="Flödestäthet <em>B</em>" value={fmt(B, 3)} unit="T" />
                                    </div>
                                    <div className="mt-2 p-2 rounded-lg text-xs" style={{ background: 'rgba(13,148,136,0.08)', color: 'var(--lab-ink-soft)' }}>
                                        Testa: byt laddningens tecken — kraften (och cirkelbanan) byter håll, men
                                        kraftens storlek är densamma. Byt sedan fältets riktning i stället: samma sak!
                                    </div>
                                </div>
                            </div>
                        </main>

                        {/* Pedagogiska sektioner */}
                        <div className="grid md:grid-cols-3 gap-4 mt-6">
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Högerhandsregeln</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Håll upp högerhanden med 90° mellan tummen, pekfingret och långfingret:
                                    <strong> tummen</strong> är strömriktningen <em>I</em>, <strong>pekfingret</strong> är
                                    magnetfältets riktning <em>B</em> och <strong>långfingret</strong> är kraftens
                                    riktning <em>F</em>. Slå på "Strömriktningen <em>I</em>" i scenen och prova själv!
                                </p>
                            </div>
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Negativ laddning — vänd strömmen</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Strömriktningen är densamma som rörelseriktningen för en <strong>positiv </strong>
                                    laddning — men <strong>motsatt</strong> för en negativ. En elektron som rör sig
                                    nedåt motsvarar alltså en ström riktad uppåt. Det är därför kraften byter håll
                                    när du byter laddningens tecken i simuleringen.
                                </p>
                            </div>
                            <div className="glass-card rounded-xl p-4">
                                <h3 className="font-bold mb-2" style={{ color: 'var(--lab-ink)' }}>Cirkelbana med konstant fart</h3>
                                <p className="text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                    Kraften är alltid vinkelrät mot hastigheten. Den ändrar därför bara rörelsens
                                    riktning, aldrig farten — precis som spännkraften i en konisk pendel. Resultatet
                                    blir en cirkelbana: snävare ju starkare fältet är, och vidare ju fortare
                                    partikeln rör sig.
                                </p>
                            </div>
                        </div>

                        <details className="glass-card rounded-xl p-4 mt-4">
                            <summary className="accordion-head" style={{ color: 'var(--lab-ink)' }}>
                                <span>Kom ihåg-regel — tre fingrar</span><span style={{ color: 'var(--lab-ink-muted)' }}>▾</span>
                            </summary>
                            <ul className="mt-3 space-y-1 text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                <li><strong>T</strong>ummen är <strong>s</strong>trömmen (rimmar nästan)</li>
                                <li>"<strong>B</strong>ang-fingret" är <em>B</em> (magnetfältet)</li>
                                <li><strong>F</strong>ulfingret är <em>F</em> (kraften)</li>
                            </ul>
                            <p className="mt-3 text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                I Exempel 1 rör sig elektronen (negativ) nedåt — strömriktningen är då motriktad,
                                alltså uppåt. Magnetfältet pekar in i planet. Högerhandsregeln ger att kraften
                                blir vänsterriktad, och beloppet blir <span style={{ whiteSpace: 'nowrap' }}><em>F</em> = <em>q</em> · <em>v</em> · <em>B</em> =
                                1,602 · 10<sup>−19</sup> · 2,4 · 10<sup>6</sup> · 0,080 ≈ 3,1 · 10<sup>−14</sup> N</span> (31 fN).
                            </p>
                        </details>

                        <details className="glass-card rounded-xl p-4 mt-4">
                            <summary className="accordion-head" style={{ color: 'var(--lab-ink)' }}>
                                <span>Vanliga missuppfattningar</span><span style={{ color: 'var(--lab-ink-muted)' }}>▾</span>
                            </summary>
                            <ul className="mt-3 space-y-2 text-sm" style={{ color: 'var(--lab-ink-soft)' }}>
                                <li><strong>"Kraften pekar dit partikeln rör sig."</strong> Nej — den magnetiska kraften är alltid vinkelrät både mot hastigheten och mot magnetfältet. Det är därför banan blir en cirkel och inte en rät linje.</li>
                                <li><strong>"Magnetfältet får partikeln att röra sig fortare."</strong> Nej — eftersom kraften är vinkelrät mot rörelsen uträttar den inget arbete. Farten är konstant; bara riktningen ändras.</li>
                                <li><strong>"Alla laddningar påverkas av magnetfält."</strong> Nej — bara laddningar som <em>rör sig</em> påverkas. En stillastående laddning känner ingen magnetisk kraft alls, och en laddning som rör sig parallellt med fältet påverkas inte heller.</li>
                            </ul>
                        </details>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <script src="feedback.js" defer></script>
    <script src="data/katalog.js"></script>
    <script src="section-nav.js"></script>
</body>
</html>
